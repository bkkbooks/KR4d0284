body:
  text: 南軒集卷十四宋張栻撰序經世紀年序太史遷作十二國世表始記甲子起于成周共和庚申之歲庚申而上則莫紀焉歷世寖逺其事雜見于諸書靡適折𠂻則亦傳疑而已本朝嘉祐中康節邵先生雍出于河南窮往知來精極于數作皇極經世書上稽唐堯受命甲辰之元為編年譜如去外丙仲壬之祀康節以數推知之乃合于尚書成湯既沒太甲元年之説因康節之譜編自堯甲辰至皇上乾道改元之歲凡三千五百二十有二年命之曰經世紀年以便觀覽間有鄙見則因而明之如孟子謂堯舜三年之喪畢舜禹避堯舜之子而天下歸之然後踐天子位此乃帝王奉天命之大旨其可暗而弗章故皆書其服喪踐位之實焉夏后相二十有八載寒浞弒相明年少康始生于有仍氏凡四十年而後祀夏配天下失舊物故于此四十載獨書少康出處而紀元載于復國之歲以見少康之君臣經營宗祀絶而復續足以為萬代之冠冕于新莾之篡缺而不書蓋吕氏不可間漢統而所假立惠帝子亦不得而紀元故獨以稱制書也以至周文王之稱王武王之不紀元于國皆漢儒傳習之繆先覺君子辨之詳矣故皆正而書之漢獻之末曹丕雖稱帝而昭烈以正義立于蜀諸葛亮相之則漢統烏得為絶故獻帝之後即係昭烈年號書曰蜀漢逮後主亡國而始繫魏凡此皆節目之大者嗟乎世有古今而古今不間于一息事有萬變而萬變卒歸于一原蓋理義根乎天命而存乎人心者不可沒也是故易本太極春秋書元以著其體用其示後世至矣然則大易春秋之義其可以不明乎乾道三年正月甲子謹序閫範序天地位而人生乎其中其所以為人之道者以其有父子之親長幼之序夫婦之别而又有君臣之義朋友之交也是五者天下所命而非人之所能為有是性則具是道初不為聖愚而損益也聖人能盡其性故為人倫之至衆人則有所蔽奪而淪失之耳雖然亦豈不可及哉聖人有教焉所以化其欲而反其初也舜之命契曰敬敷五教在寬寬云者漸濡涵養之使其所素有者自發也而咎繇亦曰天敘有典敕我五典五敦哉敕云者所以正其綱而敦云者所以厚其性也降及三代庠序之教尤詳故孟子曰學則三代共之皆所以明人倫也明云者講明之而使之識其理之所以然也然則人之所以為聖賢與夫聖賢之教人舍是五者其何以哉東萊吕祖謙伯恭父為嚴陵教官與其友取易春秋書詩禮傳魯論孟子聖賢所以發明人倫之道見于父子兄弟夫婦之際者悉筆之于編又泛考子史諸書上下二千餘載間凡可以示訓者皆輯之惟其事之可法而巳載者之失實有所不計也惟其長之可取而已它為之未善有不暇問也間日携所編以示某而講訂焉未幾而成名以閫範某謂此書行于世家當藏之而人當學之也家庭閨閫之內鄉里族黨之間隨其見之深淺味之短長篤敬力行皆足以有補然在學者則當由是而講明之以求識其理之所以然者誠知是書所載莫非吾分內事而古之君子皆非有所為而為之則其精微親切必有隱然自得于中者雖欲舍是而不由亦不可得矣書所登載未盡伯恭尚繼編云論語説序學者學乎孔子者也論語之書孔子之言行莫詳焉所當終身盡心者冝莫先乎此也聖人之道至矣而其所以教人者大略則亦可睹焉蓋自始學則教之以為弟為子之職其品章條貫不過于聲氣容色之間灑掃應對進退之事此雖為人事之始然所謂天道之至賾者初亦不外乎是聖人無隱乎爾也故自始學則有致知力行之地而極其終則有非思勉之所能及者亦貴于行著習察盡其道而已矣孔子曰道之不行也我知之矣知者過之愚者不及也道之不明也我知之矣賢者過之不肖者不及也秦漢以來學者失其傳其間雖或有志于力行而其知不明擲埴索塗莫適所依以卒背于中庸本朝河南君子始以窮理居敬之方開示學者使之有所循求以入堯舜之道于是道學之傳復明于千載之下然近歲以來學者又失其旨曰吾惟求所謂知而已而于躬行則忽焉故其所知特出于臆度之見而無以有諸其躬識者蓋憂之此特未知致知力行互相發之故也孔子曰學而不思則罔思而不學則殆厯考聖賢之意蓋欲使學者于此二端兼致其力始則據其所知而行之行之力則知愈進知之深則行愈逹是知常在先而行未嘗不隨之也知有精粗必由粗以及精行有始終必自始以及終內外交正本末不遺條理如此而後可以言無弊然則聲氣容色之間灑掃應對進退之事乃致知力行之原也其可舍是而它求乎顧某何足以與明斯道輒因河南餘論推以已見輯論語説為同志者切磋之資而又以此序冠于篇首焉洙泗言仁序昔者夫子講道洙泗示人以求仁之方蓋仁者天地之心天地之心而存乎人所謂仁也人惟蔽于有已而不能以推失其所以為人之道故學必貴于求仁也自孟子沒寥寥千有餘載間論語一書家藏人誦而真知其旨歸者何人哉至本朝伊洛二程子始得其傳其論仁亦異乎秦漢以下諸儒之説矣學者所當盡心也某讀程子之書其間教門人取聖賢言仁處類聚以觀而體認之因裒魯論所載疏程子之説于下而推以巳見題曰洙泗言仁與同志者共講焉嗟乎仁雖難言然聖人教人求仁具有本末譬如飲食乃能知味故先其難而後其獲所以為仁而難莫難于克巳也學者要當立志尚友講論問辨于其所謂難者勉而勿舍及其久也私欲浸消天理益明則其所造將有不可勝窮者若不惟躬行實踐之務而懷蘄獲之心起速成之意徒欲以聰明揣度于語言求解則失其傳為愈甚矣故愚願與同志者共講之庶幾不迷其大方焉孟子講義序學者潛心孔孟必得其門而入愚以為莫先于義利之辨蓋聖學無所為而然也無所為而然者命之所以不已性之所以不偏而教之所以無窮也凡有所為而然者皆人欲之私而非天理之所存此義利之分也自未嘗省察者言之終日之間鮮不為利矣非特名位貨殖而後為利也斯須之頃意之所向一涉于有所為雖有淺深之不同而其徇已自私則一而已如孟子所謂內交要譽惡其聲之類是也是心日滋則善端遏塞欲邇聖賢之門墻以求自得豈非却行以望及前人乎使談髙説妙不過渺茫臆度譬猶無根之木無本之水其何益乎學者當立志以為先持敬以為本而精察于動靜之間毫釐之差審其為霄壤之判則有以用吾力矣學然後知不足平時未覺吾利欲之多也灼然有見于義利之辨將日救過不暇由是而不舍則趣益深理益明而不可以已也孔子曰古之學者為已今之學者為人為人者無適而非利為己者無適而非義曰利雖在己之事亦為人也曰義則施諸人者亦莫非為己也嗟乎義利之辨大矣豈特學者治巳之所當先施之天下國家一也王者所以建立邦本垂極無疆以義故也而伯者所以陷溺人心貽毒後世以利故也孟子當戰國橫流之時發揮天理遏止人欲深切著明撥亂反正之大綱也其微辭奧義備載七篇之書如某者雖曰服膺而學力未充何足以窺究萬一試以所見與諸君共講之願無忽深思焉胡子知言序知言五峯胡先生之所著也先生諱宏字仁仲文定公之季子也自幼志于大道嘗見楊中立先生于京師又從侯師聖先生于荆門而卒傳文定公之學優遊南山之下餘二十年玩心神明不舍晝夜力行所知親切至到析太極精微之藴窮皇王制作之端綜事物于一原貫古今于一息指人欲之偏以見天理之全即形而下者而發無聲無臭之妙使學者驗端倪之不逺而造髙深之無極體用該備可舉而行晚嵗嘗被召旨不幸寢疾不克造朝而卒是書乃其平日之所自著其言約其義精誠道學之樞要制治之蓍龜也然先生之意每自以為未足逮其疾革猶時有所更定蓋未及脫藁而已啓手足矣或問于某曰論語一書未嘗明言性而子思中庸獨于首章一言之至于孟子始道性善然其為説則已簡矣今先生是書于論性特詳焉無乃與聖賢之意異乎某應之曰無以異也夫子雖未嘗指言性而子貢蓋嘗識之曰夫子之文章可得而聞也夫子之言性與天道不可得而聞也是豈真不可得而聞哉蓋夫子之文章無非性與天道之流行也至孟子之時如楊朱墨翟告子之徒異説並興孟子懼學者之惑而莫知所止也于是指示大本而極言之蓋有不得已焉耳矣又説今之異端直自以為識心見性其説譸張雄誕又非當時之比故髙明之士往往樂聞而喜趨之一溺其間則喪其本心萬事隳弛毫釐之差霄壤之繆其禍蓋有不可勝言者先生如此又烏得而忘言哉故其言有曰誠成天下之性性立天下之有情效天下之動而必繼之曰心妙性情之德又曰誠者命之道乎中者性之道乎仁者心之道乎而必繼之曰惟仁者為能盡性至命學者誠能因其言而精察于視聽言動之間卓然知夫心之所以為妙則性命之理蓋可默識而先生之意所以不異于古人者亦可得而言矣若乃不得其意而徒誦其言不知求仁而坐談性命則幾何其不流于異端之歸乎某頃獲登門道義之誨浹洽于中自惟不敏有負夙知輒序遺書貽于同志不韙之罪所不得而辭焉五峯集序五峯胡先生遺書有知言一編某既序而傳之同志矣近歲先生季子大時復裒輯先生所為詩文之屬凡五卷以示某某反復而讀之惟先生非有意于為文者也其一時詠歌之所發蓋所以舒寫其性情而其他述作與夫答問往來之書又皆所以明道義而參異同非若世之為文者徒從事于言語之間而已也又惟先生自早歲服膺文定公之教至于沒齒惟其進德之日新故其發見于辭氣議論之間者亦月異而歲不同雖然以先生之學而不得大施于時又不幸僅得中壽其見于文字間者復止于如此豈不甚可歎息至其所志之逺所造之深綱領之大義理之精後之人亦可以推而得焉淳熙三年元日序江諌議奏藁序諌議江公奏藁凡十有七篇上章執徐之歲徽宗皇帝親萬機厭朋黨之論收召豪傑以自近放逐之臣相繼起南荒越明年以建中靖國為元思與天下更始于是公由奉常慱士擢左司諌自以不世之遇進見拳拳不敢不盡有所聞見言之惟恐不及而于逺便佞敦友睦消黨與客受直言尤極反復致意上往往開納會姦人得柄公旋即補外竄貶流落以死天下惜之乃紹興四祀有詔追録贈公諌議大夫制詞有曰惟世道之多變致國論之靡常是非或出于愛憎夷險獨持于一節權寵所忌竄斥莫還嗚呼公亦庶幾無憾矣某側聞前輩道公事云方公在門下珍禽竒獸稍稍入內苑奏疏力諌其漸後數日上謂公前所論繼已悉罷遣時獨一馴鷴不肯去上以杖擊之顧內侍刻公姓名此杖上以志忠諌然則公言在當時不為不用矣一斥不復豈徽考意邪而獲伸于紹興又豈非天也邪某得此書于公之孫似祖伏而讀之不知涕泗之橫集嗟乎不有君子其能國乎自祖宗有天下留意多士仁宗皇帝涵濡長育四十二年而收其用為元祐之政元祐諸君子雖厄窮百罹而直道隱然流風所被論議著見于元符之末建中靖國之初蓋又彬彬如也元氣不傾雖國家多故而中興之日旋踵即見人才之為國重輕如此然則為國計者其可忘封殖愛護伸忠直之氣遏導諛之萌以壽天下之脈而人臣幸登王朝其又可遲回利害之塗自同寒蟬卒蹈委靡陵夷以負吾國家也郡學教授卲穎慨然鋟版傳後其所嚮慕又可知也公諱公望字民表云趙氏行實序戊戌之夏吾友趙子直以書抵豫甚哀且曰先君子不幸而沒惟其隱德實行世之人鮮克知之不肖孤大懼失墜皇皇然裒集僅成編願得文冠其首以信于來者豫拜受其書伏自念頃歲侍先忠獻于餘干始識子直之尊父見其貌毅而氣平心固知其好義樂善君子也已而子直以嘉言擢上第官中朝有直聲出而臨民豈弟之實見于行事持使者節風績隱然于是人始考其源流所自而益知其父之賢今又得是編而讀之慨然如見其人焉豫觀其書凡一言一行之細莫不備紀至于其心志之所存亦皆推極而究見若子直可謂盡心于其親者矣語曰父在觀其志父沒觀其行若子直于其親其觀之也亦詳且密哉子嘗考于禮矣禮有銘銘者自名也孝子孝孫所以稱揚其先之美而著之後世者也蓋其中心汲汲然惟恐夫美之不克章此衛孔悝之鼎銘所為作也今子直之為其心豈不本于是哉然而以人之子孫而稱揚其先其能以取信于人者豈以其實而非誣故歟夫有善而弗知知而弗傳與夫傳之而誣君子皆以為恥豫觀子直之于其親致其知也深欲其傳也切而其言則實而不浮也其信于後夫果何疑也哉抑豫又聞之人之欲揚其先之美未若行其身無負之為先也以子直之賢進德不怠異時推是心以終報吾君而發于事業國人將稱願曰幸哉有子如此則其為顯揚也又孰加邪又豈有不信之患也耶若豫者求所以無墜乎先訓而無忘乎先志凛凛焉每懼莫之任也觀子直之為則亦有感于中焉于是書于其編之首子直名汝愚南軒集卷十四
