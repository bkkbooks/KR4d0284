body:
  text: 南軒集巻十三宋張栻撰記一樂堂記上饒徐衡仲㓜育于龔氏為龔氏後長讀書取科第事龔氏父母養生送終克共其子事年踰五十矣㳺宦四方求友訪道有感於昔人正本明宗之義愓懼不敢寧乃言于朝願歸徐姓詔可其請方是時衡仲之父母俱存合百有五十六春秋而其伯氏某仲氏某及其季某亦皆無故雍雍愉愉與其兄弟奉二老者以為天下之樂殆無以易此也它日伯氏取孟子所謂一樂者以名其居之堂而衡仲求予為記予惟念徃歲道岳陽衡仲適為其州學官相與語于洞庭之野愴然及茲事予蓋嘉其志賛其决而憂其為世俗之論所移也今衡仲中誠懇惻卒能成就其志又為龔氏調䕶立之後人所以處之者蓋有餘味義正而恩得天實相之且使其親壽考康寧其兄弟在旁得全其所謂一樂者固予所咨嗟而樂記也原民之生與萬物並於天地之間父天而母地本一而巳而於其身莫不有父母之親兄弟之愛以至於宗支之属釐分縷析血脉貫通分雖殊而本實一此性之所具而天之所為也聖人有作立姓以别其系嚴宗以謹其承亦因夫性之自然理之所不可易者而已苟惟强離其所系而合於其所不可合是豈性也哉是故神不歆非祀而民不祀非族以此防民而春秋之時猶有身為諸侯而立異姓以蒞祭祀如鄫子之為者聖人書之曰莒人㓕鄫謂其先無血食之理也豈不深切著明哉衡仲其講扵此矣雖然引義而返其宗衡仲之所能為也返而全其所謂一樂者豈衡仲之所能為哉衡仲誠樂乎此也人倫之際昔人謂盡其分為難衡仲誠勉乎此也抑孟子之所謂三樂其難必者吾旣已得之扵天矣則夫其二端者又可不深體之乎予嘗論三樂仰不愧俯不怍為本蓋在已者可得而勉也詩云潜雖伏矣亦孔之昭君子之所不可及者其惟人之所不見乎衡仲而力進乎此以至扵無所愧怍之地則上有以寧其親翕其兄弟而下有以推類而及人庶㡬乎克全而不憾矣予因記一樂而併及乎此亦朋友相儆勵之意云衡仲名安國今為連山令潔白堂記劒南陳君自蜀以書抵予曰某不幸今不獲奉共養深惟所以報親者惟是澡身瀹徳庶㡬終身無玷缺之行則或可以塞萬一之責家故有堂因取周詩白華孝子潔白之義名之曰潔白兄弟朝夕其間以警以戒敢請為記予雖未識陳君而嘗聞之吾友魏掞之元履謂君直諒又得君書勤甚則不果辭雖然白華之章句逸矣其為義固不可以臆度獨以予心之所謂孝子潔白者而以復于陳君焉惟人之生受之天地而本乎父母者也然則天地其父母乎父母其天地乎故不以事天之道事親者不得為孝子不以事親之道事天者不得為仁人傳曰仁人不過乎物孝子不過乎物此之謂也然所謂物者果何謂乎蓋其實然之理而已實然之理具諸其性有是性則備是形以生性無不善也凢其所為視聽言動莫不有則焉皆天之理也性則然矣是故君子無敢不敬也非禮則勿視非禮則勿聼非禮則勿言非禮則勿動將以順保其彛性庶㡬乎勿失蓋全而生之者此也其可不以全而歸之乎此所謂不過乎物孝子仁人事親之道而所以事天者也潔白之義其有取扵斯乎有取扵斯則造次不可忘也戰兢不可懈也由盡心以知性由存心以養性必期扵無媿歉若曽子所謂而今而後吾知免夫然後為盡人子之道也如予之不敏雖知此義勉焉而未至抱罔極之痛日夜以懼因陳君之請而有感扵中敢併取南陔相戒以養之義願與吾黨之士相戒以潔白其可乎陳君徃歲奉對大廷蓋盡言無隱者今又孜孜然志扵古道充是心以徃吾知其終有以無負扵斯堂之名也然則可不懋乎陳君名槩字平甫云思終堂記永嘉郡許深夫從事湖南幕府之明年其尊父登仕沒于官舍予徃弔之間又徃焉深夫位而請曰及之不天未丱而喪母吾家方窮空旣殯而無以葬逮省事則日夜䆒心不敢寧歲丁亥得地于瑞安縣之北曰李奥泣血負土乃克卒事于時老父嘗登斯丘而眷焉顧而曰異日我必葬是今者不幸至于大故殊州獨哭數千里之逺惟是不孝之軀大懼隕越頼父之靈儻獲歸合于兆則將立堂其旁以為早莫瞻省時節祀饗之地未死之前敢不勉盡其力願預請其名與記庶㡬佩服思惟有以大警其懈惰者則又泣予旣不果辭乃取禮傳慎行其身不遺父母惡名可謂能終矣之義名之以思終且從而記之夫墓祭非古也體魄則降魂氣在上故立之主以祀其精神之極而謹藏其體魄以竭其深長之思此古之人明扵鬼神之情状而篤扵孝愛之誠實者也然攷之周禮則有冢人之官凢祭於墓為尸是則成周盛時固亦有祭於其墓者雖非制禮之本經而出於人情之所不忍而其於義理不至於甚害則先王亦從而許之其必立之尸者乃亦所以致其精神而示饗之者非體魄之謂其為義抑精矣故夫後世以來立宇於墓道或立於其側以為曕省祀饗之地至有援諸古義以為之名掲而出之顧名而思義比諸几杖盤杅之有銘有戒君子亦有所取而不廢以人子之心拳拳於其親者誠無巳也然則予之名斯堂豈無旨哉蓋人子之於親終其事之為難也所為終其事之難者亦在於吾身而已故於其親之沒睹桮棬則奉之而泣以吾親之所嘗御也見桑梓則竦然而敬以吾親之所嘗息也夫其於物也猶然而吾之此身乃受之於吾親而為親之遺體然則所以敬其身當何如耶故身體髪膚不敢毀傷不敢以遺體行殆夫於其形見者其守之之嚴固如此而其賦是形以生者蓋以其具是性也然則又可使之或虧乎故自視聽言動之不莊不欽以至朋友之不信事君之不忠蒞官之不敬皆謂之非孝凢一毫有歉乎其中則為有辱乎其親為其有以害於性故也故君子戰戰兢兢毎懼或失之凢欲以順保其性以無失其身而無辱乎其親由是觀之至於曽子全而歸之而後可謂之能終其事者矣所謂行身而不遺父母惡名者其在斯歟而世之昧者顧以富貴利逹為足以顯其親汲汲然求之曽不知枉道苟得戕賊天性莫此之甚而負乘播惡恥加遺體若撻市朝其得失為如何哉是則行身以其道則雖處貧賤而其所為事親者未嘗不得不以其道則至於居富貴而所為辱親者蓋益以滋甚矣自深夫之來湖南予數與之欵又於朋游間聞其尊父教􅅚之甚嚴以深夫哀之篤而請之厪也故為推言人子之道所以終其事者而勉之使思焉思而體之體之而不忘然後知終之之果為難也予抱罔極之痛久愓念此未知所濟然則今日之所以吿深夫者是亦所以自勵云耳乾道九年七月二十二日名軒室記或曰知道矣而常患其不能長一於已夫不能長一於已則道與巳尚為二物也執柯伐柯睨而視之猶以為逺嗚呼是果為真知也歟其功未至也將使已化於道如水入水初無有間以全於天其必有本要矣其力行之積歟道與巳尚為二物則天理不備天理不備而不加省焉吾見道日有逺巳而已可不畏哉中庸曰苟不至徳至道不凝焉道至於凝斯能有之矣惟至徳可以凝道古之人禮儀三百威儀三千君臣父子兄弟夫婦朋友之際洒掃應對獻酬交酢以至於坐立寢食之間無一而不在徳焉至纎至悉也所以成其天理而已蓋毫釐之間不至則毫釐之間天理不在故學而時習之無時而不習也念念不忘天理也此所以至徳以凝道也及其乆也融然無間渙然和順而内外精粗上下本末功用一貫無餘力矣名吾軒曰時習夫習之有㫁絶者心過有以害之也心過尤難防一萌于中雖非視聽所及而吾時習之功已㫁絶矣察之緩則滋長矣惟人安於故常以為㣲而忽焉而不知此豈可使之熟也哉今日一念之差而不痛以求改則明日兹念重在矣積而熟時習之功銷矣不兩立也是以君子懼焉萌于中必覺覺則痛懲而絶之如分桐葉然不可復續如此則過境自踈時習之功專以至於至徳以凝道顔子之不貳一絶不復生也名吾室曰不貳因書此自勉焉多稼亭記嵗辛卯之八月予過毗陵甲寅郡守嵩山晁伯彊置酒郡齋薄暮登城城有故亭塞下瞰阡陌方秋稲熟黄雲蔽野相與裴徊縱觀巳而月光皎然景氣清凈伯彊舉觴属予曰斯亭者人以多稼名某假守于此嵗事適登君侯辱臨得以從容一杯實天幸也將因而葺之願為某記明日將行又以請且寄聲相趣者三四予惟念春秋書法喜雨者有志乎民者也亭名多稼豈無意哉吏於斯者以暇時登臨觀稼穡之厪勞而念民生之不易其時之不可以奪其力之不可以不裕而又謹視其苖之肥瘠時夫雨暘之節以察吾政事之若否幸而一稔則又不敢以為已之能而益思勉其不可以怠者閔閔然皇皇然無湏臾而寧於心其庶矣乎吁是春秋之意也然則伯彊之復斯亭豈為游觀者哉因書以寄甲寅之集通判州事呉興葛謙問與焉伯彊名子徤謙問名郯遊東山記嵗戊寅夏四月巳亥弋陽方疇耕道廣漢張栻酌餞東平劉芮子駒于永之東山乆雨新霽天朗氣清歩上絶頂山色如洗相與置酒于僧寺之西軒裵徊逺望于時零陵張紆公飾預焉俯仰庭户忽喟然而歎曰噫嘻此丞相范公忠宣之故居也坐客皆聳然起而問之公餙曰公居此時某始年十三四某之先人辱為公客故某亦得侍公公時巳苦目疾手執寸許玉用以摩按某未之識也則亟視之旁有小兒誑曰此石也公愕然曰非也此之謂玉嗚呼公存誠至於不欺孺子則公之氣象可想見已坐客皆咨嗟公飾又曰公居此西偏為屋僅三十楹蓋與寺僧隣也諸孫皆尚㓜它日與寺僧􅃧僧愚無知至相詬罵直行過公前語㣲及公公漠然若不聞見者明日僧大悔慚跼􅐲詣求謝亦卒無一言待之如初丞之士間有得進見公循循親加訓誘一日坐定有率爾而問曰范某於相公為何親蓋斥文正公之名時二子正平正思侍旁悚汗恐懼衆亦懼公蹙頞乆而曰先公也言者大恐已而復以温詞慰其心後亦與相見不絶公之度量雖曰天與其亦學以成之歟又二日問坐客曰郡士之登科者皆歸矣而某人獨未歸耶或曰試學官也公愀然曰吏事近民精心於此學之要也始登科顧求從便安耶凢公言簡而深足以埀世立教率類此自奉極儉約士從諸子游者時命之飯不過蔬三品彘胾不掩盤後有客至即以分餉不復更益某年㓜所記公如此不能細也於是坐客相與言曰江山如昔公不可得而復見矣而有如公飾者尚及見公所記之詳如此豈易得哉而斯亭也經兵火煨燼之餘屹然獨存吾曹晩生亦與聞公之言行又豈偶然哉中庸曰君子動而世為天下道行而世為天下法言而世為天下則孟子曰聞下惠之風者鄙夫寛薄夫敦於公其信之矣子駒謂某曰盍記之以為異日傳某雖不文至此其何敢辭也抑嘗記某庚午嵗來永時寺僧有法賢者年八十餘矣謂某言范丞相居此某時為沙彌毎見公遇朔望必陳所賜書及賜物列于堂上率家人子弟再拜伏閱嗚呼公之不忘君父至此所謂在廟堂之上則憂其民處江湖之逺則憂其君文正公之心公得之矣請併附于記之末可乎皆曰諾時某弟枃妷懽兼偕逰後一日庚子記南軒集巻十三
