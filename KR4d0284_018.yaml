body:
  text: 南軒集巻十八宋張栻撰說仁說人之性仁義禮智四徳具焉其愛之理則仁也冝之理則義也讓之理則禮也知之理則智也是四者雖未形見而其理固根於此則體實具於此矣性之中只有是四者萬善皆管乎是焉而所謂愛之理者是乃天地生物之心而其所由生者也故仁為四徳之長而又可以兼包焉惟性之中有是四者故其發見於情則為惻隠羞惡是非辭讓之端而所謂惻隠者亦未嘗不貫通焉此性情之所以為體用而心之道則主乎性情者也人惟己私蔽之以失其性之理而為不仁甚至於為忮為忍豈人之情也哉其陥溺者深矣是以為仁莫要乎克已己私既克則廓然大公而其愛之理素具於性者無所蔽矣愛之理無所蔽則與天地萬物血脉貫通而其用亦無不周矣故指愛以名仁則迷其體程子所謂愛是情仁是性謂此而愛之理則仁也指公以為仁則失其真程子所謂仁道難名惟公近之不可便指公為仁謂此而公者人之所以能仁也夫静而仁義禮智之體具動而惻隠羞惡辭讓是非之端達其名義位置固不容相奪倫然而惟仁者為能推之而得其冝是義之所存者也惟仁者為能㳟讓而有節是禮之所存者也惟仁者為能知覺而不昧是智之所存者也此可見其兼能而貫通者矣是以孟子於仁統言之曰仁人心也亦猶在易乾坤四徳而統言乾元坤元也然則學者其可不以求仁為要而為仁其可不以克巳為道乎記甘露李文饒事予過京口登北固山甘露寺訪求舊迹及觀曽畋所編丹陽類集載熙寜中寺僧應夫因治故殿基獲舎利并李文饒手記云寳歴間創甘露刹以資穆皇之冥楅文饒有祭言禪師文云因甘露之降瑞立仁祠於髙標與此記合予嘗怪文饒不樂釋氏毀其室廬貌像沙汰其徒若真疾惡之者至其諭張仲武之辭則又疑其太甚而觀其奉道士法甚至則文饒豈真知惡異教者哉今攷丼露刻所謂建刹以資冥福此在釋氏說為最陋者文饒方且惑之以此崇奉其君則文饒之欲絶弃釋氏义豈其本心也哉以予觀之文饒雖有才氣然富貴中人耳武宗素重道士故其勢必排釋氏文饒極力為此不過逢迎其君之意云耳不然與建刹藏舎利之事何大不類耶孰知數百載之後㫁刻出於土中其不可揜有如此者或曰文饒謂建刹可以資福而寜不畏毀刹之招禍乎殊不知富貴移人之意豈獨此哉嗟乎異端之為害烈矣文饒乃以此心蘄勝之不亦難乎冝其復之之速且益熾也予重為之歎息云勿齋說胡先生之季子大時求予名其讀書之室予因誦非禮勿視非禮勿聽非禮勿言非禮勿動之言而名之曰勿齋嗟乎天理人欲不並立也操舎存亡之機其間不能以毫髮所謂非禮者非天之理故也苟非天理即人欲巳勿者禁止之辭收放心之要也學者所當於視聽言動之間隨吾所見覺其為非禮則克之無愛焉慮思力行由粗以及精由著以及㣲則所謂非禮蓋將有不可勝克者克之之至則天理純全而視聽言動一循其則矣為仁由巳而由人乎哉貴夫勉之勿舎而巳勿欺室說山西郭侯子明以書抵予曰所居一室扁以勿欺願得數語以發其義庶幾朝夕觀省予惟天下之事常壞於誕謾而成於敦篤古之為將者質勝其文實踰於名矜不形而確有餘雖一介之士且不敢欺也而况於事君乎雖念慮之㣲且不敢萌欺也而况於見之事為乎是以能成功而保其令名今子明忠勲之胄以識畧被簡知方當緫統之任存心如是予知其異日有以報明主矣予於漢西京諸將中最愛营平侯純實重厚授任于外為國家計不忍便文自营其所條上確然無一語虚無一毫隠及成功而歸論兵事得失復不敢避小嫌以罔主聽其自守勿欺終始不渝如此嗟乎此誠萬世為將之良法也子明勉之哉書示呉益恭子曰吾未見剛者或對曰申棖子曰棖也慾焉得剛子路問强子曰南方之强與北方之强與抑而强與寛柔以教不報無道南方之强也君子居之衽金革死而不厭北方之强也而强者居之故君子和而不流强哉矯中立而不倚强哉矯國有道不變塞焉强哉矯國無道至死不變强哉矯昔者曽子謂子襄曰子好勇乎吾嘗聞大勇於天子矣自反而不縮雖褐寛愽吾不惴焉自反而縮雖千萬人吾徃矣新安呉益恭來邕州通判剛决而有慮臨事不避難忠義自許疾惡如讐予始一見竒之兩年間詧之云熟矣而益加敬焉秩滿親老不復可畱於其行㑹予有期服不得為之賦詩以致贈言之意而中有不能已者敬書魯論及中庸孟氏書中三義以諗之夫聖門所謂剛所謂強所謂勇者蓋如此益恭深思其義而體之於身于以揉偏而進徳嗟乎其又可量也哉淳熙四年八月甲午名周集說玉山周畏知請予名其子予名之曰集以義甫字之蓋取諸孟子養氣之論是集義所生者集義云者積衆義也積集之乆則所謂浩然者生而不窮矣義内也非外也所謂必有事焉者蓋在此學者所當講論問辨也乾道壬辰十一月甲申書于葵軒黄鶴樓說予過武昌登郡城南樓歩黄鶴故址覧觀山川慨然有感蓋黄鶴名樓以山得名也黄鶴之山逶迤起伏横亘郡城属于江滸見于前人文字間若浦若磯亦皆以山名也而唐圖經何自而為怪說謂費文偉仙去駕鶴來憩于此閻伯􅀈記中乃實其事而或者又引梁任昉所記謂駕鶴之賔乃荀叔偉所遇非文偉也此因黄鶴之名而世之喜事者妄為之說後來者旣不之察又從而並縁増餙之樓旁有石照亭不知何妄男子題詩牎間遽相傳曰此唐仙人吕洞賔所書也文人才士又為之夸大其事而蘇子瞻亦載馮當世之說有羽衣著屐之詩嗟乎寕有是理哉甚矣世俗之好怪也雖搢紳大夫之賢者有不免焉此無它不明理之故也使其知始終消息之故有無虚實皆䆒其所以然則豈得而惑之哉而世之惑者徃徃曰天地之間其何所不有是或有之未可知也為是說者其病不可復藥蓋旣置之茫昧恍惚或有或無之域則不復致思以窮其有無之實其惑終身而已矣予嘗愛漢儒之言曰明於天地之性者不可惑以神怪知萬物之情者不可罔以非類斯言必有所授非漢之儒者所能自言也嗟乎異端之惑人蓋有甚烈於斯類者斯固不足深辨予獨有感以警吾黨之士庶幾知窮理之為要而窮理則有道蓋不可以不講也江漢亭說卾之城因山而其樓觀臺榭皆因城别駕所治之南凴城而望之適當江漢之匯昭武葉才翁與予裴徊觀覧欲建亭於上予因以江漢名之才翁請志其始嗟乎江漢之水其源可以濫觴而其無窮若此之盛後之登斯亭者念夫有本者其不息之積然也亦庶幾有感乎才翁名椅乾道辛卯十有二月朔張某書贈熊辯筆說頃年得溧陽顧綱散車棗心制度殊不類近世筆邇來試使熊辯為之蓋不減綱寒牎作字十數紙不厭良覺慰意也然此筆殆不入時人手辯不可以難售而詭遇㑹有賞音者南軒集卷十八
