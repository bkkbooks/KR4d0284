body:
  text: 南軒集卷二十二宋張栻撰書答朱元晦通鑒綱目想見次第甚有益於學者也埀諭胡致堂所論五王不誅武后事偶無别本在此檢得然亦大綱記得其説武氏誠當誅畢竟既立其子難誅其母如來教所云至於豫奪輕重之間不過告于唐家宗廟廢置幽處之耳然以中宗之昏庸其復之如反手耳亦豈是長䇿以某愚見五王若有伊周之見則當時復唐家社稷何必須立中宗中宗雖是嘗為武后所廢然嘗欲傳位與后父是其得罪宗廟不可負荷已自著見五王若正大義于唐家見存子孫中公選一人以承天序告于宗廟誅此老媪則義正理順唐祚有太山之安矣試思之如何不復夢見周公章恐只當從程子之説夢寐之間亦思念周公之事如見其人然猶云見堯羔牆之類也若謂真見周公於夢周公不可見而見之夢而有妄恐非聖人之心也若傳説却是世上真有箇傳説非妄也何有於我哉某後來只改作何獨我有之之意程子所謂使學者勉進乎此者也若如向來所謂尹子之説孰能若孔子者哉終恐非聖人辭氣耳近晦叔理會久假而不歸烏知其非有謂雖使其久假不歸亦懵不知非已物某恐孟子之意為此言却是開其自新之路曰烏知其非已有也謂至其能久假而不歸雖未敢便謂其能有之亦安知其非已有乎辭氣蓋完全也如何九月間曽拜書送城南圖并録小詩去且求書樓大字不知曽達否都不見來書説及耳書樓已成只是三間字稍大于月榭可也願早得之牛李所爭維州事當如何處置溫公之説然否又某黽勉為州不敢不敬深惟聖人心誠求之與以人治人之義庶幾萬一而未之能也幸人情粗相安蠶麥差熟丁稅朝廷蠲末等無常産之輸七萬餘緍稍寬目前但弊根不除少須更力論之惟是興利之臣日進將恐多所紛更孤迹其可久於此耶又某出入省戶日負素飱反復古義不遑寧處晦叔行時已略言所處大概有以告之是望區區在此不敢不盡誠政恐學力不到無以感動惟悚懼耳正論極微假借為此論者未嘗了然於義理之所在而徒邅回於利害之末途自顧藐然之身其將何以障此波瀾然茍留一日不敢不勉用是瞻仰有不勝言伯恭鄰牆日得晤語近來議論甚進每以愚見告之不復少隱也又日自省中歸即閉關溫繹舊學向來所見偏處亦漸有覺但絶少講論之益無日不奉懷耳西銘近日常讀理一分殊之指龜山後書終未之得蓋斯銘之作政為學者私勝之流昧夫天理之本然故推明理一以極其用而其分之殊自不可亂蓋如以民為同胞謂尊高年為老其老慈孤弱為幼其幼是推其理一而其分固自在也故曰分立而推理一以止私勝之流仁之方也龜山以無事乎推為理一引聖人老者安之少者懷之為説恐未知西銘推理一之指也閫範之説極佳即以語伯恭矣只如此讀過誠可戒也伯恭近來儘好説話於蘇氏父子亦甚知其非向來見渠亦非助蘇氏但習熟元祐間一等長厚之論未肯誦言排之耳今亦頗知此為病痛矣孟子答公都子一章要須如此方為聖賢作用此意某見得但力量培植未到要不敢不勉耳此話到此尤覺難説邪論甚熾人心消蕩一至於此每思之不遑寢食也奈何奈何又祈請竟出疆顛倒絆悖極有可憂某月初即求去蓋會慶在近不忍見大使之至也自惟誠意不充無以感動且當歸去勉求其在已者今日大患是不恱儒學爭馳乎功利之末而以先王嚴恭寅畏事天保民之心為迂闊遲鈍之説向來對時亦嘗論及此上聰明所恨無人朝夕講道至理以開廣聖心此實今日興衰之本也吾曹拙見誠不過此來書以為未有孟子手段且循此途轍為少悔吝是也但孟子亦何嘗外此意特其發用變化别耳知言自去年來看多有所疑來示亦多所同者而其間開益鄙見處甚多亦有來示未及者見一一寫俟後便方得上呈更煩一往復庶幾粗定甚恨當時刋得太早耳又某出入省户日愧亡補所以見告者所謂實獲我心但請對之説容更思之區區本欲俟轉對對却在正初又恐遲耳自念學力未到誠意不能動人只合退歸勉其在我者然竊念吾君聰明勤勞不忍只如此舍去當更竭盡反復剖判庶幾萬一拳拳之心不敢不自勉惟吾兄實照知之寫至此不覺酸鼻也又西銘之論甚精乾稱父坤稱母之説某亦如此看蓋一篇渾是此意也但所論其間有一二語鄙意未安俟更為精讀深思方報去所貴乎道者三上蔡之説誠欠却本來一段工夫二程先生之言真格言也某近只讀易傳及遺書益知學者病痛多立言蓋未易也知言之説每段輒書鄙見于後有未是處却索就此簿子上批來庶往復有益也近來又看得幾段及昨日讀寄來者皆未及添入俟更詳之然便寄去又某邇來思慮只覺向來所講之偏愓然內懼不敢不勉每得來書益我厚矣蓋諸君子往往因有所見便自處高執之固後來精義更不可入故未免有病若二先生其猶一氣之周流乎何其理之該而不偏辭之平而有味也讀遺書易傳它書真難讀也西銘所謂理一而分殊無一句不具此意亦謂鄙意然來示亦盡之矣但其間論分立而推理一與推理以存義之説頗未相同某意以為分立者天地位而萬物散殊其親疏皆有一定之勢然不知理一則私意將勝而其流弊將至於不相管攝而害夫仁故西銘因其分之立而明其理之本一所謂以止私勝之流仁之方也雖推其理之一而其分森然者自不可亂義蓋所以存也大抵儒者之道為仁之至義之盡者仁立則義存義精而後仁之體為無蔽也似不必於事親事天上分理與義亦未知是否曽子之言二先生互相發明可謂至當知言疑義前已納呈今所寄尤密方更參詳之伯恭近日儘好講論喬拱在此如此等士人甚難得潘友端年方十七而立志殊不凡皆肯用力潘今暫歸省俟其來皆令拜書去求教李伯諫林擇之兄弟各有報書陳韓在此時相見亦肯回頭但頗草草耳某近因與喬潘考究論語論仁處亦有少説續便録呈晦叔猶未得到長沙書共父想已過九江探伺渠到家專人唁之是時亦得拜書憂患中正宜進德此有賴於兄也今日達官似皆不逮之故愛之尤深而責之尤重耳元履所謂但證候小變者鄙意亦云爾遺書當更令修治近與伯恭議欲取此版來國子監中儘可修治耳又某備數于此自仲冬以後凡三得對區區之誠不敢不自竭上聰明反復開陳每荷領納私心猶有庶幾乎萬一之望正幸教誨之及引領以冀也講筵開在後月自此或更得從容以盡底藴惟是迹孤愈甚側目如林此則非所計也劉樞歸想得欵曲憂患中益進德業異時當大慰人望晦叔已行未耶聞其歸計費力極念之亦有一書不知尚可及否太極圖解折理精詳開發多矣埀誨甚荷向來偶因説話間妄為它人傳寫想失本意甚多要之言學之難誠不可容易耳啚解須子細看方求教但覺得後面亦不必如此辨論之多只於綱領處拈出可也不然却只是騁辨求勝轉將精當處混汨耳如何又某十三日被命出守次日早出北關來吳興省廣德家兄翌早可去此自此前途小憩殘暑即由大江歸長沙故居偶見陳明仲知有的便具此紙奉報自惟備數朝列荷吾君知遇迄無所補報學力不充無以信于上下歸當溫繹舊學益思勉勵它皆無足言惟是吾君聰明使人眷眷不忍置耳又某黽勉南來視事踰旬矣廣右比之它路最為廣漠而雕瘁則最甚蠻落睢盱邉備寡弱日夜關慮固當以安靜為本然要須在我有隱然之勢則安靜之實乃可保方考究料理不敢茍目前也逺方法度廢弛惟以身率之立信明義庶幾萬一諸路土丁祖宗良法今虛籍雖存而其實都亡方尋繹舊規若此事有緒庶幾邉防差壯誠之已來未到也南來朋舊濶逺殊重離索之歎偶府中遣人買茶略附此紙少定專人去相看共父想已到建康責任甚重臨行示略獻區區也又某守藩倐八閲朔矣佩心誠求之之訓味哀矜勿喜之言日夜黽勉悚惕之不暇所幸綱紀粗定人情頗相信向又嵗事極稔盜賊屏戢目前僥幸無它而環視一路可寒心事極多邉備兵政亦隨力葺理保甲一事亦頗有條理惟是自靜江之外諸郡嵗計闕匱異常甚至官吏乏俸軍兵乏糧此亦何以為郡坐視民愈困比有請願與憲漕共考究一路財賦底裏通融均濟之計幸蒙賜可才此詳講熟慮庶幾有以少寬然其間曲折亦多又不敢欲速也學校略與整修士子中亦有好資質時呼一二來郡齋與之講論庶知向方三先生祠某撰有小記納去凡此不敢不盡區區耳官寮其初頗有拘束之歎蓋習於放縱已久今却極相安有樂趨事之意其間亦有數人慤實可委其餘隨力使得自展有不率者先之以訓督不悛而後加以法邇來覺得斂縮者多也此路向來盜賊之多正緣配𨽻之人萃焉例皆逃逸為害比嚴首捕之科明其賞罰接踵而至幾無日無之收其強壯以為效用故少戢也然廣中之人亦自多犯法徒流真有刑不足以勝姦宄使人愧懼恐兄見念欲知其詳故縷縷及之靜江氣象開廓風氣疏通覺得無瘴癘寒暄之候殊不異湘中環城諸山竒變栁子厚所謂拔地峭堅林立四野此語足以盡其大槩近觀水東諸巖空明寬敞惟龍隱最為勝絶蓋在小溪之濱水貫其中深窈停洑以舟入焉石色特青潤嶙峻變怪殊可喜也某日間亦得暇讀書但覺向來語言多所未安尤不敢輕易立辭中庸末章自衣錦尚絅而下反復引詩明愼獨始終之道區區朝夕惟從事於此而未之有進也誠之在此極得其助近亦得暇讀中庸章句晦叔許一來已遣人取之旦夕可到相與講磨庶少慰離索也共父處人回得書請祠之意甚濃聞所施為大抵類長沙長沙之人今嵗緣茶賊之擾害人甚思之但某前書勸渠謙虛使人得以自盡人才大小皆有用處而報書謂到江上尤不見有人才某實懼此語天下事豈獨智力能辦通都會邑豈無可器使者恐吾恃聰明以忽之彼無以自見耳若當大任恐有所妨方欲作書述此意亦望兄自以已意開廣之今日達官如是公誠亦不易得望之深耳伯恭今次講論如何得渠書云兄猶有傷急不容耐處某又恐伯恭却有太容耐處然吾曹氣習之偏乘間發見誠難消化想兄存養有道如某病痛多兢兢之不遑正有望時加砭劑也陸子夀兄弟如何肯相聽否子澄長進否擇之亦久不聞問矣無咎昨寄所編祭儀及吕氏鄉約來甚有益於風教但鄉約細思之若在鄉里願入約者只得納之難於揀擇若不擇而或有甚敗度者則又害事擇之則便生議論難於持久兼所謂罰者可行否更須詳論精處若間居行得誠善俗之方也賀州有林君勳本政書想亦須見謾附一本其間固多未盡然其人一生用工於此其説亦著本可貴此外又於其家求得數書有論屯田項目亦甚有工才抄録續當奉寄此公所至有惠政乃是廣中人才之卓然者殊惜其不得施用也所欲言甚多未易殫究餘見别紙南軒集卷二十二
