body:
  text: 南軒集巻九宋張栻撰記静江府學記國朝學校徧天下秦漢以來所未見也桂林之學自唐大歴中觀察使李昌䕫經始于郊而熙寧中徙于郡城東南隅乾道二年知府事張侯維又以其地堙陋更相爽塏得浮屠廢宫實故始安郡治請于朝而遷焉侯以書來曰願有以告于桂之士某惟古人所以從事於學者其果何所為而然哉天之生斯人也則有常性人之立于天地之間也則有常事在身有一身之事在家有一家之事在國有一國之事其事也非人之所能為也性之所有也弗勝其事則為弗有其性弗有其性則為弗克若天矣克保其性而不悖其事所以順乎天也然則捨講學其能之哉凢天下之事皆人之所當為君臣父子兄弟夫婦朋友之際人事之大者也以至於視聴言動周旋食息至纎至悉何莫非事者一事之不貫則天性以之䧟溺也然則講學其可不汲汲乎學所以明萬事而奉天職也雖然事有其理而著於吾心心也者萬事之宗也惟人放其良心故事失其統紀學也者所以收其放而存其良也夏葛而冬裘飢食而渇飲理之所固存而事之所當然者凢吾於萬事皆見其若是也而後為當其可學者求乎此而巳嘗竊怪今世之學者其所從事徃徃異乎是皷篋入學抑亦思吾所謂學者果何事乎聖人之立教者果何在乎而朝廷建學羣聚而教養者又果何為乎嗟夫此獨未之思而巳矣使其知所思則必竦然動于中而其朝夕所接君臣父子兄弟夫婦朋友之際視聴言動之間必有不得而遁者庶乎可以知入徳之門矣某也不敏何足以啓告於人辱侯盛意勉為之書袁州學記淳熙五年秋八月某來宜春至之明日州學教授李中與州之士合辭來言宜春之學自皇祐中太守祖無擇實始為之今百有二十五年矣中更兵革廢而復興惟是庳陋弗克稱至于今守乃慨然按尋舊規首闢講肄之堂立稽古閣於堂上生師之舍皆撤而一新之將告成而君侯適來敢請記以詔多士某謝不敏則請益堅乃進而告之曰先王所以建學造士之意亦嘗考之乎惟民之生其典有五君臣父子兄弟夫婦朋友是也而其徳有四仁義禮智是也人能充其徳之所固有以率夫典之所當然則必無力不足之患惟人之不能是也故聖人使之學焉自唐虞以來固莫不以是教矣至于三代之世立教人之所設官以董蒞之而其法益加詳焉然其所以為教則一道耳故曰學則三代共之皆所以明人倫也嗟夫人倫之在天下不可一日廢廢則國隨之然則有國者之於學其可一日而忽哉皇朝列聖相承留意教養所以望於多士甚厚三代而下言學校之盛未有若此時也然則教於斯學於斯者其可不深考先王建學造士之本意而勉之乎惟四徳之在人各具於其性人病不能求之耳求之之方載於孔孟之書備有科級惟致其知而後可以有明惟力其行而後可以有至孝弟之行始乎閨門而形於郷黨忠愛之實見於事君而推以澤民是則無負於國家之教養而三代之士風亦不越是而巳嗟乎可不勉哉於是書以為記今守名杓實某之弟也是月庚戍記卲州復舊學記慶歴中天子詔天下都邑皆得立學卲州去王畿數千里於時亦為學以應詔㫖而學在牙城之中左獄右庾庳陋弗稱治平四年駕部員外郎通判永州周侯敦頥來攝郡事始至伏謁先聖祠下起而悚然乃度髙明之地遷于城之東南及其成帥士者行釋菜之禮以落之今祠刻具存可考也惟侯唱明絶學于千載之下學者宗之所謂濂溪先生者在當時之所建立後之人所冝謹守以時修治而貽之無窮可也顧今僅百有餘年而其間興壊之不常甚至於狥尋常利便之說徙就他所甚失推崇先生長者流風遺澤之意而於學校之教所害亦巳大矣乾道九年知州事胡侯華公歎息其故與學教授議所以復之者轉運判官提舉學事黄侯洧聞之頗捐緍錢以相其事於是即治平故基而加闢焉祠祭有廟講肄有堂棲息有齋前後樓閣翬飛相望下至庫庾庖湢無不備具而民不知其費不與其勞遣使來請記某以為春秋之義善復古者是誠可書也然嘗考先王所以建學造士之本意蓋將使士者講夫仁義禮智之彛以明夫君臣父子兄弗夫婦朋友之倫以之修身齊家治國平天下其事蓋甚大矣而為之則有其序教之則有其方故必先使之從事於小學習乎六藝之節講乎為弟為子之職而躬乎洒掃應對進退之事周旋乎爼豆羽籥之間優㳺乎絃歌誦讀之際有以固其肌膚之㑹筋骸之束齊其耳目一其心志所謂大學之道格物致知者由是可以進焉至於物格知至而仁義禮知之彛得於其性君臣父子兄弟夫婦朋友之倫皆以不亂而修身齊家治國平天下無不冝者此先王之所以教而三代之所以治後世不可以跂及者也後世之學校朝夕所講不過綴緝文辭以為規取利禄之計亦與古之道大戾矣上之人所以教養成就之者夫豈端為是哉今卲幸蒙詔㫖得立學宫而周先生實經理其始又幸而得復其舊於巳廢之後士者㳺於其間盍試思夫當時先生所以望於後人者其亦如後之學校之所為乎抑將以古之道而望之也徃取其遺書而讀之則亦可以見矣於是而相與講明以析夫義利之分循古人小學大學之序如前所云者勉之而勿舎則庶㡬為不負先生經始期望之意而有以仰稱上之人教養成就之澤今日之復是學斯不為虚設矣學故有二記其一治平五年湖北轉運使孔侯廷之之文蓋為周先生作也其一紹興二十三年武夷胡子宏之文雖不詳學之興廢而開示學者為仁之方則甚明皆足以傳後某不敏幸以淺陋之辭列於二記之次實榮且愧云淳熙元年三月癸巳郴州學記維三代之學至周而大備自天子之國都以及於郷黨莫不有學使之朝夕優㳺於絃誦詠歌之中而服習乎進退揖遜之節則又申之以孝弟之義為之冠昏喪祭之法春秋釋菜與夫郷飲酒養老之禮其耳目手足肌膚之㑹筯骸之束無不由於學在上則司徒揔其事樂正崇其教下而郷黨亦莫不有師其教養之也宻故其成才也易士生斯時藏修㳺息於其間誦其言而知其味玩其文而㑹其理徳業之進日引月長自宜然也於是自鄉論其行而升之司徒司徒又論之而升之國庠大樂正則察其成以告于王定其論而官之其官之也因其材之大小蓋有一居其官至于終身不易者士修其身而巳非有求於君也身修而君舉之耳夫然故禮義興行人才衆多風俗醇厚至於斑白者不負戴於道路而王道成矣國朝之學視漢唐為盛郡縣皆得置學郡有教授以掌治之部刺史守令佐又得兼領其事亦旣重矣而士之居焉者大抵操筆習為文辭以求應有司之程耳嗟乎是豈國家所望於多士之意哉雖教養之法疑若未盡復古然為士者豈可不思士之所以為士者果為何事也哉郴故有學迫于城隅湫隘不治知州事薛彦愽通判州事盧􅂒教授呉鎰始議遷改因得浮屠廢宫江山在前髙明爽塏廼徙而一新之郡之士相與勸率以助資役甫踰時而迄成焉來属某願有記某惟先王之於學所以勤勤懇懇若飲食起居之不可湏臾離者誠以正心修身齊家治國以至於平天下未有不湏學而成者實生民之大命而王道之本原也然而學以何為要乎孟子論三代之學一言以蔽之曰皆所以明人倫也大哉言乎人之大倫天所叙也降𠂻于民誰獨無是性哉孩提之童莫不知愛其親及其長也莫不知敬其兄而夫婦朋友之間君臣之際禮儀三百威儀三千無適而非性之所有者惟夫局於氣禀遷於物欲而天理不明是以處之不盡其道以至於傷恩害義者有之此先王之所以為憂而為之學以教之也然則學之所務果何以外於人倫哉雖至於聖人亦曰盡其性而為人倫之至耳嗚呼今之學者苟能立志尚友講論問辯而於人倫之際審加察焉敬守力行勿舎勿奪則良心可識而天理自著馴是而進益髙益深在家則孝弟雍睦之行興居郷則禮遜㢘耻之俗成一旦出而立朝致君澤民事業可大則三代之風何逺之有豈不盛歟又豈可不勉歟學之成實乾道四年春二月桂陽軍學記桂與郴地相接近歲洞甿紛擾之後甫及安定郡各建學以館士亦可謂知務矣郴學之成某嘗為之記而桂之士復以請於是告之曰嗟夫學之不可不講也乆矣今去聖雖逺而㣲言著於簡編理義存乎人心者不可泯也善學者求諸此而巳雖然聖賢之書未易讀也蓋自異端之說行而士迷其本真文采之習勝而士趨於蹇淺又况平日羣居之所從事不過為覔舉謀利計耳如是而讀聖賢之書不亦難乎故學者當以立志為先不為異端訹不為文采眩不為利禄汨而後庶㡬可以言讀書矣聖賢之書大要教人使不迷失其本心者也夫人之心天地之心也其周流而該徧者本體也在乾坤曰元而在人所以為仁也故易曰元者善之長也而孟子曰仁者人也合而言之道也禮曰人者天地之心也而人之所以私偽萬端不勝其過失者梏於氣動於欲亂於意而其本體以䧟溺也雖曰䧟溺然非可遂殄㓕也譬諸牛山之木日夕之間豈無萌蘖之生乎患在人不能識之耳聖賢教人以求仁使之致其格物之功親切於動静語黙之中而有發乎此也有發乎此則進徳有地矣故其於是心也治其亂收其放明其蔽安具危而其廣大無疆之體可得而存矣此學之大端也然則其可一日而不講乎願與諸君共勉焉學之成乾道已丑歲三月也為之者知軍事趙公瀚教授劉允迪也欽州學記安陽岳侯霖為欽州之明年政通人和乃經理其州之學悉易故之庳陋廟堂齋廡次第一新伻來謁記乆未暇也又明年其學之教授周去非秩滿道桂復以侯意來請且曰欽之為邦僻在海隅地近鹽而俗尚利逢掖之士蓋鮮有焉惟侯不敢以其陋而鮮加忽也故新其學以勸之且求一言以示後庶或有起也某於是而歎曰是可書也巳夫所為建學者固欲其士之衆多也今夫通都大邑操觚習辭發䇿决科肩摩袂属必如是而後謂之多士乎哉殆未然也夫寡國鮮士亦何病十室之邑必有忠信之質者焉其成就與否則係乎學與不學而巳學也者所以成才而善俗也今欽雖僻而陋也其士雖鮮也然其間亦豈無忠信之質者乎無以掲之曷其昭之無以導之曷其通之為之嚴學宫於此詳其訓廸以夫人倫之教聖賢之言行薰濡之以漸由耳目以入其心志其質之羙者能不有所感發乎有所感發則將去利就義以求夫為學之方而又以訓其子弟率其朋友則多士之風豈不庶㡬矣乎異時人才成就風俗醇羙其必由侯今日之舉有以發之請刻記于學以俟淳熙四年甲午雷州學記廬陵戴君為雷州之明年以書抵某曰雷之為州窮服嶺而並南海士生其間不得與中國先生長者接於聞見為寡而其風聲氣習亦有未能遽變者某惟念所以善其俗冝莫先於學校而始至之日謁先聖祠則頹然在榛莾中用不敢遑寧乃度郡治之西有浮屠廢宫撤其地少下而得山川之勝殿堂齋廡輪奐爽塏凢所以為學宫者無一不具用錢一千萬旣成則延其長老集其子弟而語之以學之故某之心亦庶㡬其廑者願不鄙為記以詔之予嘗觀孟子論王政其於學曰謹庠序之教申之以孝悌之義而後知先王所以建庠序之意以教之孝悌為先也申云者朝夕講明之云耳蓋孝悌者天下之順徳人而興於孝悌則萬善類長人道之所由立也譬如水有源木有根則其生無窮矣故善觀人者必於人倫之際察之而孝弟其本也然則士之進學亦何逺求哉莫不有父母兄弟也愛敬之心豈獨無之是必有由之而不知者盍亦反而思之乎反而思之則所以用力者蓋有道矣古之人自冬温夏凊昏定晨省以為孝自徐行後長者以為弟行著習察存養擴充以至於盡性至命其端初不逺貴乎勿舎而巳今使雷之士講明孝弟之義於是學而興行孝弟之行於其郷則雷之俗其有不靡然而變者乎豈特可以善其郷充此志也放諸四海而凖可也然則戴君之所以教者冝莫越於是矣乃書以寄之乾道六年七月十日雷州學記淳熙四年秋知雷州李侯以書來告曰雷舊有學宫比歲日以頹壞今焉嘗治一新願請記以詔其士且希白先生嘗為是州冝公之所加念也惟希白先生實某之曽大父至和元年以殿中丞來守雷州今㕔壁題名具存故李侯援以為請然某幸得備帥事于此所當以風教為先務聞雷學之成雖㣲此請固願有以告也而况李侯之言如此哉嗟乎舜跖之分善與利之間而巳矣譬之途焉善則天下之正逵而利則山徑之邪曲也人顧舍其正而弗由以自陥於﨑嶇荆棘之間獨何歟物欲蔽之而不知善之所以為善故耳蓋二者之分其端甚㣲而其差則甚逺學校之教將以講而明之也故自其㓜則使之從事於洒掃應對進退之間以固其肌膚而束其筋骸又使之誦詩讀書講禮習樂以㴠泳其情性而興發於義理師以導之友以成之故其所趨日入於善而自逺於利及其乆也其志益立其知益新而明夫善之所以為善則其於毫釐疑似之間皆有以詳辨而謹察之如駕車結駟徐行正逵所見日廣所進日逺雖欲驅之而使由於徑不可得已故曰少成若天性習慣如自然此學之功也自學校之教不明為士者亦習於利而已故其處已臨事狥於便安而不知其有非所冝安也於富貴利逹志夫苟得而不知其有非所冝得也夫惟狥於便安而志夫苟得則亦何所不至哉間視其所為雖有渉於善事而察其所萌則亦未免出於有所為而然至於挾䇿讀書亦是意耳終身由之而以為當然是豈人之情也哉故曰性相近也習相逺也可不畏歟夫後之為治所以不及於古之世而其人才所以不及於古之人者常在於是然則學校之教其所係顧不重矣哉今李侯旣不鄙其士而新其學宫然其所以為教者則义不可以不明也故予獨以善利之說告之使不迷其所趨雷之士誠能因予之言如古之學者從事於洒掃應對之際以㴠泳乎詩書禮樂之中從師親友乆而勿舎將必有能辨之者亦非予言之所能盡也李侯名茆字叔茂長沙人江陵府松滋縣學記乾道九年冬知江陵府松滋縣事余君彦廣以書來言曰松滋之為邑僻在大江之濵自兵戈以來其郷廬邑居固不能以復舊而又重以水潦為患淪墊遷徙之餘庶事大抵苟且而學校為尤甚春秋奉祀㡬無以障風雨青衿散處莫適所依六年之秋知縣事滕君琛始聚材陶瓦撤其故而更新之首嚴廟象備其彛器巳而講肄棲息之所亦以次舉其明年彦廣實來親帥其士者而勸程之又擇其秀者而表厲之吟誦之聲藹如也今年秋復命甓工結宻其地自廟而及門又加黝堊之飾于其棟宇用釋菜之禮以告其成自惟小邑寡民不敢為勞費第積其力時而為之故與滕君相繼四年之間而後訖事願不鄙為之記以風示邑之士庶㡬有以作興焉某念今之為邑者急於簿書期㑹之報詳於追胥督責之事則云舉其職矣有能慨然於荒寒僻逺之區留意教養如二君之相繼者豈不可貴哉而余君且將求其說以作興其人才顧雖文字荒陋有不得辭也則為之說曰先王之教其大㫖見於孟氏之書曰學則三代共之皆所以明人倫也又曰謹庠序之教申之以孝弟之義是知學校以明倫為教而明倫以孝弟為先蓋人道莫大乎親親而孝者為仁之本也古之人自冬温夏清昏定晨省以為孝自徐行後長者以為弟躬行是事黙體是心充而逹之不使私意閒於其問親親之理得而無一物不在吾仁之中孝弟之道有不可勝用者矣試以諗于邑之士孰無事親從兄之心哉誠能相與勸勉朝夕講磨以從事乎此然後知人倫之際盡其道為難而學之不可以巳也士之從事于此則夫風聲氣俗之所及閭里小民亦將視効而知勸畏威而寡罪以樂趨於淳厚之習然則顧不羙與嗟乎是乃先王建學之本意余君今日之所望於多士者冝莫先於此也遂書以寄之淳熙元年正月冝州學記淳熙四年某備位廣右帥事以經略司主管機冝文字韓壁聞于朝曰壁清介豈弟願假守符俾牧逺民詔為冝州便道之官宜為州被邊所控制非一前此為州者日夜究切備禦繕治財賦之不暇莫遑他議韓侯至官旣舉其職則慨然念學校委廢議所以修復之蓋積累而後成廟宫旣嚴講肄有堂生師有舎門廡庖湢悉具合境人士歎息誦詠伻來請記方韓侯之為是舉也或者竊笑以為在邊州乃不急之務且曰冝故寡士亦何必汲汲為某獨以為不然蓋爼豆之修則軍旅之事斯循序而不忒教化興行則禍難之氣坐銷於冥冥之中詩曰旣作泮宫淮夷攸服是有實理非虚言也建學於此使為士者知名教之重禮義之尊修其孝弟忠信則其細民亦將風動胥勸尊君親上恊力一心守固攻克又孰禦焉近而吾民旣巳和輯則夫境外聚落聞吾風者亦豈不感動有以伏其心志柔其肌膚其孰有不順况於秉彛之心人皆有之竒才之出何間逺邇逺方固曰寡士然如唐之張公九齡出於曲江姜公公輔出於日南皆表然著見於後世冝之士由是而作興安知異日不有繼二公而出者乎又安知其所成就不有可過之者乎然則其可以寡士而忽諸故於其學之成樂為之書南軒集卷九
