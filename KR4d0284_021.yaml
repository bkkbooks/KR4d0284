body:
  text: 南軒集卷二十一宋張栻撰書答朱元晦祕書共父相處二年心事儘可說見識但覺日勝一日亦不易得作别殊使人關情也君臣之義要須自盡積其誠意庶幾感通是間若有一絲毫未盡則誠意已分烏能有動乎孟氏敬王之義所當深體也所寄諸說亦略觀大概林擇之思慮甚親可重可重鄙意有欲言者不敢隱容後便一一寫去共講論也近來此間相識卻是廣仲晦叔甚進德美已入書院生徒十五六人但肯專意此事者極難得耳又辱示書并見所與共甫書論校正二先生集事備悉然有說焉前次所校已即為改正七八後來者雖嘗見共甫云老兄又送所校來偶應之曰若無甚利害則姑存此本乃胡氏所傳者既而欲取一觀則亦因循而共甫亦忘送來此則不敏之過也然豈謂胡氏本便更不可改耶前日答兄書猶云後來者未曽見也答書之次日折簡徴于共甫而得詳觀其間當改處甚多方此參定又二日而領來教若以為一時答共甫之言忽而不敬與夫因循不敏之過則可若謂有私意逆拒人則內省無是也今以所校者改正近二百處矣當時胡家本極錯已是與諸公校過常恨此間無别本得兄校正甚幸如定性書前後語豈可無又如辭崇政殿說書表當在上殿劄子之後此極精當能發明先王正大之體有益於後學然其間有鄙意所未安以為不當改者亦不敢曲從如必欲以泝流為㳂流猶子為姪是也㳂乃是循流而下更無别說泝流窮源則可見用力底氣象也試嘗思之稱兄弟之子為姪無他義只是相㳂稱耳稱猶子猶或庶幾焉當時先生此兩處稱猶子亦復何害若謂是文定改此兩處則胡為他處不改也若此等卻望兄平心易氣以審其是非焉已作簡共甫并亦時有數字注在所校卷子中想共甫須送往尚有欲改及可見告者毋惜卻簽此卷見示庶成完書耳栻每念斯道知之為難知之矣請事之功為難氣習之不易消化也而可長乎人告之以有過則喜此為進步於仁仲由所以為百世師也况如淺陋得來書警䇿之甚幸嗣此無替斯義為望栻亦不敢有隱於左右也讀所與共甫書辭似逆詐億不信而少含𢎞感悟之意殆有怒髮衝冠之象理之所在平氣而出之可也如何如何相察相正朋犮之道吾曹當共敦之程先生集既有舊本可據當不憚改但心疑數處亦當注一作於其下所以存謙退敬讓之心下諭敢不深領又共甫之召蓋是此間著績有不可掩然善類屬望在此行也數日來聞二豎補外第未知所以如何若上心中非是見得近習决不可邇道理分明則恐病根猶在二豎去復二豎生不然又恐其覆出為惡若得有見識者乘此時進沃心妙論白發其姦批根塞源洗黨與一空之然後善類朋來庶有瘳乎又復和仇敵使命交馳痛心痛心陳應救時通書極知憂國但未見所以濟之之䇿已去復召卻又供職所不能曉想數得相見但今日所謂正人端士固有之惟是不知學不敢期望以向上事業耳湖南緣向來有位者惠姦長惡養成郴賊共父到頗能明信賞罰上下恱之今鄂兵集者五千人若措置得宜當數月而定但今時一種議論待盜賊只知有招安正如待仇敵只說和一般此賊蹂踐三路殺掠無數渠魁豈可不殱焉特散其黨與可耳郴桂盜賊幸有平定次第但安輯反側撫存凋瘵正惟匪易如病癰疽須消盡毒氣使血脈貫通方為無事共父甚留意偶來告有便介草草復附此又近世議論真所謂謀其身則以枉尋直尺為可以濟事謀人國則以忘親苟免為合於時變世間號為賢者政墮在此中况其它哉此風方熾正道湮微率獸食人甚可懼也吾曹但當相與講明聖學學明於下庶幾有正人心承三聖事業耳又諭及易與天地凖以下一章細看惟文義聯屬處猶有所未達方更詳之恐有定論幸見教近看和順於道德而理於義恐正是謂易書之義蓋與上四句立語同後一句乃是總括聖人作易所謂生蓍倚數立卦生爻理義皆窮理盡性至命之事也不識如何又某今夏止酒又戒生冷意思頗覺勝常年一味善噉飯耳昨見所與劉樞書聞郡中既以再辭之狀申省今且當謹俟之也伯恭聞居深山間想甚勝向來聚生徒之多聞亦有議之者曽得其詳否伯逢止酒甚勇在渠誠為不易也所諭釋氏存心之說非特甚中釋氏之病亦甚有益於學者也但何有於我哉文義細詳之只是謂此數者非獨有於我正欲學者進於此也故程子謂勉人學當如是也吕氏之說誠是添字較多若尹氏謂人孰能若孔子者哉又恐以若字易有字亦恐未安也大意固是聖人示人以近故以此數者自居若曰孰能若我則又恐非聖人辭氣耳吾有知乎哉尋常只承程子之說若文勢則上一句疑辭也下一句斷辭也猶曰君子多乎哉不多也不識如何又某幸粗安不敢廢學惟相望之逺每思講益殊不勝情耳近兩書中所講再三詳之如中庸章句中所指費隱雖是聖人尋常亦有說費處說隱處然如所指却有未免乎牽强者恐此數段不必如此指殺某方亦草具所見更定異同處俟更研究後便寫寄也仁說如天地以生物為心之語平看雖不妨然恐不若只云天地生物之心人得之為人之心似完全如何仁道難名惟公近之然不可便以公為仁又曰公而以人體之故為仁此意指仁之體極為深切愛終恐只是情蓋公天下而無物我之私焉則其愛無不溥矣如此看乃可由漢以來言仁者蓋未嘗不以愛為言也固與元晦推本其理者異然元晦之言傳之亦恐未免有流弊耳幸更深思却以見教中庸集義前日人行速附去不曽校得後見謄本錯誤處多想自改正也序文更幸為櫽括其間有云若橫渠張先生則相與上下講論者也本作合志同方者也不知如何如此未穩亦幸為易之劉樞再帥此間人情頗樂之今次奏事所以啓告與夫進退之宜想論之詳矣因其迓兵行附此一紙它俟後訊又吳晦叔八月間遂不起極可傷惜湘中遂失此講學之犮豈復可得近聞已葬矣有子方數嵗也想亦為動懷伯恭見報已轉對未知所言竟云何英州固為病痛不小但其去也殊有所係近事想悉聞之使人憂心不遑假寐又伏思之吾君勤儉之德天必將相之有所開悟所恨臣下不能信以發志耳建康屢得書亦念歸也其它逺書莫盡又某已拜書偶有少事數日來方見李夀翁侍郎申明祈依舊法義米各樁榖在逐鄉都分中曽見此文字否此說殊當但朝廷下諸路常平司與州郡相度目前諸人例以為不可行可歎然夀翁所條似未盡而户部鋪法固已沮之矣區區之意以為可行但須條畫詳密乃可望兄試為思而處之畫頃見教附此人回幸甚聞向來兄在鄉所措置斂散米事今極有倫理其間利病甚切想究復之熟矣顒俟顒俟如湘中辛卯之旱浮徙者無數徙者後來得歸十無二三此說得行當無此患文字恐未見録一本去胡明仲論語詳說雖未能的當然其間辨說似亦有益於學者也有欲板行者於兄意如何章句或問書中所引周氏說為誰某未見此書也再三思或問所條析誠恐前輩說中偏處有誤後學不可以不辨但一一辨析恐未能盡又似太費力只舉其大者與其條目使人推尋之如何然前所寄數紙詳讀又於愚慮所益固已不少恨未得盡見之也蓋其間非獨可正一事一義於其立言病痛來歷處究極之甚精也又畫僧只是一到城南經營即為劉樞閉在湘春作圖帳到今未出兩紙只是想象模寫得其大都其間有缺闕及未似處今且送往它時别作得重寄也書樓山齊方治材未立南阜未有屋成即謂之蒼然觀耳書樓欲藏數百卷書及列諸先生像此二字亦求兄寫當不惜也又向來略有疑於辭受之際者無它只為既已堅辭後來只是堂中檢坐不許辭免指揮未曽再被君命疑以為未可也今承來諭蓋已備曉但某尋常或慮兄剛厲之過今寬裕乃爾足見矯揉之功也夷齊事舊承用五峰之說謂夷齊讓國故見伐國事不是不食周粟在夷齊身分上當然是能全其清者也因諭及細思之非謂前日已曽如此今日更不得如彼只是清者之見自如此耳如何中庸章句如道不逺人章文義亦自有疑此便即行容續條去所謂欲作一略解甚善某近來看論語諸書文義間時亦覺平易中有味處病後醫者戒以少作文字未欲下筆冬間有可求教者旋寫去盍簮之樂時見夢寐未知何日果遂耶馳想馳想又胡廣仲一病遂不起極可傷惜渠氣本弱忽苦腿髀之疾醫者謂腎氣有餘以甘遂瀉之自此泄利不止百藥無效經月竟至此弟弱子稚尤可念渠邇來雖肯講論終是不肯放下病中過此猶為及此意然胡氏失之亦甚害事也元履家事如何某寄賻儀等去已久都未得其子回信不知己達否晦叔在嶽下無過從欲决意來城中要是渠自當離却婦翁家乃是伯逢月初已赴江東任諸公近來無甚講論德美却來數日終未能近思也士子輩間有好資質肯向學者更看長逺如何此亦告之以循序務本而已近來讀繫辭益覺向者用意過當失却聖人意脈如橫渠亦時未免有此耳詩解諸先生之說盡編入雖是覺泛又恐學者須是先教如此考究却可見平淡處耳如何又某幸如昨但自家弟赴官極覺離索之思耳日夕不敢廢學第覺向來語言多且易只欲且做工夫讀所寄來伊川先生簡語尤用悚然不知尊兄意如何每玩來書未嘗無警益愈恨相去逺未得聚首耳中庸義邇來細讀自誠者天之道以下尤覺所解有功前面於鄙意尚多疑處今復旋具呈子重編集解必經商量刋成願早得之此書極有益也傳心閣銘序語誠贅刪之甚佳尤溪學記此本勝前前本大抵意不甚逹耳某近為邵州作復舊學記其間論小學大學意偶亦相類録呈今猶未刻有可見教尚冀速示也嶽麓書院邇來却漸成次第向來邵懷英作事不著實大抵皆向傾壞幸得共父再來今下手葺也書院相對按山頗有形勢屢為有力者睥睨作隂宅昨披棘往看四山環繞大江橫前景趣在道鄉碧虛之間方建亭其上以風雩名之安得杖履來共登臨也它幾以道義自重又知言疑義反復甚詳大抵於鄙意無甚疑而所以開發則多矣其間數段謹録呈今自寫出再看又覺此內亦有不必寫去者亦冝附往論語仁說區區之意見學者多將仁字做活絡揣度了無干涉如未嘗下博學篤志切問近思工夫便做仁在其中矣想像此等極害事故編程子之說與同志者講之庶幾不錯路頭然下語極難隨改未定方今録呈亦俟諸老行寄去讀史管見當併往近看此書病敗不可言其中間有好處亦無完篇耳看元來意思多是為檜設言天下之理而往往特為譏刺一夫不亦隘且陋乎編通鑑綱目極善以鄙見每事更采舊史尤佳恐通鑑亦有所闕遺耳它懷併須後訊又比聞刋小書版以自助得來諭乃敢信想是用度大段逼迫某初聞之覺亦不妨已而思之則恐有未安者來問之及不敢以隱今日此道孤立信向者鮮若刋此等文字取其贏以自助切恐見聞者别作思惟愈無靈驗矣雖是自家心安不恤它說要是於事理終有未順耳為貧之故寧别作小生事不妨此事某心殊未穩不識如何見子飛說宅上應接費用亦多更深加樽節為佳耳又未知然否又晦叔留此旬餘備詳動止繼而游掾來亦能道近况欣釋為多見前後與諸人論操舍出入之說剖析極子細最後答遊掾之語尤完吕子約雖知聖人此四句正是論心然未能明别其間始終真妄邪正之所歸故遂指其乍存乍亡為感用此其差亦不小來示似未以此告之耳近因游掾來理㑹出入字有答之之語録呈未知尊意何如易與天地凖章後來愚意亦近是然不如來說之詳明更不寫去近來士人雖亦有漸向裏者然往往為邪說引取大扺是不肯於鈍遲處下工要求快便故差錯耳蘄州之說淺陋不足動人自是伯諫天資低所致若臨川其說方熾此尤可慮者吾曹惟當務勉其在已者若立得無一毫滲漏則自是孚信有非口舌所能遽挽回也伯恭已造朝兩得書聞上聰明肯容直言但隂盛陽微未見復亨之象耳奈何奈何又某食飲起居皆幸已復舊向來且欲完養此數日方出報客城南亦五十餘日不到昨一往焉緑隂已滿湖水平漫亦復不惡方於竹間結小茅齊為夏日計雨潦稍定即挾䇿其間也嘗令畫圖俗工竟未能可人意俟勝日自往平章之方得寄往耳伯恭近專人來講論詳細如此朋友真不易得但論兄出處引周之可受之義却似未然又向來聚徒頗衆今嵗已謝遣然渠猶謂前日欲因而引之以善道某謂來者既為舉業之故先懷利心恐難納之於義大抵渠凡事似於果斷有所未足耳誠之資質確實有志世故心實愛之但正宜為學不然恐未免為才使今歸必首去求見某以乍出人事頗多姑遣此紙早晚樞師又自有人行也孟子解渠却録未畢樞師處却將寫了當祝封呈餘幾為道自重南軒集卷二十一
