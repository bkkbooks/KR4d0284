body:
  text: 南軒集卷三十九宋張栻撰墓銘夔州路提點刑獄張君墓志銘君諱梲字仲山於豫為從兄實同高祖豫家自唐嶺南節度使由曲江徙長安國子祭酒由長安徙成都再世高祖諱文矩早捐館舍夫人楊氏挈孤依外家于漢之綿竹今綿竹之張皆自高祖出也君曽祖諱絢祖諱鈞考諱注俱隱德不仕考以君升朝恩封承事郎致仕纍贈正奉大夫君未冠逰鄉校貢京師入太學為內舍生預國子薦靖康之難間關歸故鄉就類省試登紹興二年進士科已而丁內艱免喪遊東南值先丞相忠獻公督師江上辟君主管機密文字以軍事入對改承奉郎湖冦平用幕府功遷宣教郎以親老丐歸授潼川府路轉運司主管文字秩滿成都府路制置使席公益辟幹辦公事未數月丁正奉公憂服闋通判參州又通判夔州未赴權四川總領所撥發船運至夔才兩月以臺檄權知忠州還夔秩滿通判峽州丁所生母太碩人憂差知資州未及赴服闋知榮州改知蜀州秩滿入對知隆州中道改洋州歲中除利州路提點刑獄公事又徙夔州路再歲請祠有旨令入奏行次荆渚得請主管台州崇道觀即日西還以疾沒于巴東享年七十有四積官至朝請大夫君資稟淳茂於勢利泊如也方忠獻公督師君在幕府入對論為國當先自治當上意忠獻且器之而君顧以親老力引歸已而忠獻去國為時相所忌併與族人抑之君以資考連得倅二率逺次且愈下不屑也其自蜀州入對上即位之三年方留意牧守訪問再四貴近有欲見之者迄不往授小州而歸晚被召命而祠請已再三上矣平時官情大略如此其為政大體本於忠厚愛民不茍其職而不為赫赫名利之為州三面阻澗懸絶數十仞自北山引水入城承以木溜雜泥滓牛馬飲民以為病君至始以陶易之甃三井以瀦之為宇以覆之題其額曰惠民至今賴其利是時提舉司欲以它郡置場貿茶君謂郡並邊每歲以茶之晚生者易蠻馬今為場使夷人知茶味必得此而後市則將何辭論再三議卒詘其攝事總幕益昌大水軍儲並江不沒才數尺君身當其衝督役夫日夜築治廪以完乃請徙置高原今南倉是也其在忠州之歲又會大水入郛郭君先期令民徙雖州治亦以舍計口豫食親撫存之民賴以活忠素雕弊獨以鹽課禆歲用君會一歲用度出入以其餘代下户輸上供銀數千兩人尤德之其在蜀州州素苦重額纍政積負緍錢總賦者方務聚斂督趣急如星火君視民力困不忍剝取寧以身受責總賦者遣其屬至郡鈎考微隱首校公帑籍迄無一毫私獨劾君首議抗拒為諸郡倡朝廷察見始末使寬期限以補總賦者迄無如之何郡有大辟獄具而君獨疑其贓未得一夕夢至何處若神祠者有大書疑字驚而作曰必是獄也審究之果主家紿囚以不死使之承追逮遂服蓋其惻怛之誠雖夢寐不忘也時北邊方用兵總賦者議調西州民轉餉君謂有三不可西州賦重於三路不待調夫民力已疲矣自蜀至利役夫徒手走千里始得負糧而行又千里乃至西和古人以為千里饋糧士有飢色今且倍矣獨奈何且劒利調夫一人之費為錢八萬西州道逺費必倍以一夫十六萬錢計之直米五十碩古人以三十鍾致一碩為困民今以五十碩致六斗之粟利害又相絶矣卒寢其議一路賴之其在洋州異時逋户反業得貸牛出租於官合諸州纍欠至三千餘碩總計者用為實數以給軍邊民至破産不能償君列其事于朝悉得免郡歲受民租總賦者輒對糴以給軍先時民輸一石以七合為羡其後並緣十倍之至是又欲以七升為額君曰作法於貪其弊將可窮邪力沮止之其持節利路興洋間多營田與民田錯官軍怙強為擾田且多荒君上其事于宣撫使請令民亦得佃耕農榖用以廣蜀飢流民至關外者甚衆按視振給且廣糶以平榖價使皆得食知樞密院虞公允文時為宣撫使每咨訪以事君率正論一不及私再三為言成都路預借之弊朝廷非不申敕而迄不能止蓋以諸郡例空乏無以塞責則巧為之計今不若盡考其用度出入之實上聞而有以寬恤之則預借可戢民受實惠矣其後諸州卒得蠲減實君發其端其在夔路於獄事尤切切首下教禁戢四事拷掠無得過數繫治無事踰律訊問必躬臨疾病必以實合一路之獄凡六十有五禁囚百三十事令下才閲月以獄空聞者三十八所夔恭兩州合欠經制緍錢至二萬七千有餘君謂赦令之下有所蠲獨此不得邪言于朝併他路得免其不急於催科而篤於厚民類如此亦異於俗吏所為矣君孝友恂恂幼事正奉公甚謹中歲以來率婦子奉所生母曲盡其意居喪以毁瘠聞治家有法度不事華飾不為戲言不忍言人過鄉人尤親且敬之不敢干以私待族黨有恩視其尤困乏者推居官所得俸以給之女兄及族弟之女貧不能行君收撫嫁遣比君沒哭之如父少長從忠獻公公每愛其慤實時時從旁推揚蜀之賢士大夫而未嘗以語人教子弟諄諄不倦每曰為人當植立貴勢不可恃也居官當亷謹已欲不可縱也治家當勤儉衆財不可私也此吾平生之所身履而以望於子弟者其所存亦可槩見矣君娶李氏先君卒纍贈宜人四子皆業進士光弼以君蔭得迪功郎充四川提舉茶馬司準備差遣次光逺將仕郎次光裔光顔四女長適迪功郎房鐸早卒次以廢疾不行次適何如川次適黎時雍皆為進士內外諸孫男女合十九人以淳熙元年十有二月甲寅朔葬于縣之武都鄉光弼等萬里遣來請銘豫惟念自幼從先公周逰四方於宗族闕敬方君在忠獻旁時豫蓋未省事也丙子之歲忠獻在疚君來省侍于長沙始獲從君語是歲忠獻入蜀又獲欵也顧其氣象猶有前輩重厚典刑足以儀刑鄉黨使後生小子消浮薄之習不謂十九年間不復見君而君亡矣豫既憂患之餘念宗族日落棠棣脊令之詩實感厥心如此又何以辭銘曰其德也器厚而不窳其藴也櫝實而不窶其用也泉澤而不淤其傳以銘匪今于古直祕閣詹公墓志自頃國家承平日久士大夫豢於寵利無捐軀殉國之志狃於宴安諱言兵事一旦戎馬入中原相視愕眙不過為畏避偷生之計仗節死義罕有所聞至其謀國則以退怯為得算事讐為全䇿風俗至此夫豈一朝夕之故哉然而其間天資忠義務為實用不汨於習俗有志於當世者亦豈無其人顧有而絀於時論又不克盡其用為可歎慨若詹公是也建炎初元公通判鞏州北騎再渡河狙脅陜洛長驅至秦隴將及鞏郡守假它檄去公即日合兵民七千人授甲登陴敵至城下大呼趣降公命以徑弩射之圍合數重部分既定歸與家人訣曰自國門直鞏九郡皆不守吾守死矣竭家資犒軍謂其父老曰我已與家人訣爾當共助我皆感激爭出金榖敵盡力攻五日不能破會公所乞熙河兵至與敵戰殺其將三人遂遁去城卒全紹興時苗傅等甫伏誅敵勢憑陵諸將有憤激戮力之意有司顧以調度不給為憂會大饗明堂已下詔矣公時從招討使慨然奏疏大略謂靖康之禍人神共憤久矣今大敵在前國勢不立與其崇孝饗之虛文曷若厲復讐之大義請停大禮悉以其費佐軍督諸將分道攻守以慰祖宗在天之靈繼志述事孰大於此事雖不行識者韙之丞相張忠獻公督師遴選時彥首辟公掌機事劇賊楊么據洞庭奉檄先走鼎州度事宜所條上悉中機會方是時敵挾我叛臣日窺邊諸將列屯淮漢幕府議軍事曲折有非文檄所能傳者必委公往諭意析理會情無不切當蓋公舊為河州士曹故將王淵為寨主捶將校至死郡守欲加罪公曰小校犯階級是不可以常人論也卒免之王公感激平生事公如父兄張俊韓世忠始淵部曲也故其言尤為諸將所信忠獻以是任之公善將兵事嘗佐世忠解濟州之圍行至熙河聞北騎已南公曰卒遇敵進退何據當駐山陽以佚待之一戰可勝世忠鋭意不能從師至宿遷果潰自是愈心服劉光世之罷兵柄也尚書吕祉往蒞其軍於合淝公已去幕府貽書忠獻曰吕尚書之賢固為一時選然於此軍恩威曲折卵翼成就恐不得與前人比兼此軍今已付王德德雖有功而與其下酈瓊輩故等夷耳恐有中不能平者願更擇其偏禆素為軍中所親附者使為德副以通下情忠獻然其言未及行而酈瓊以叛聞公明審有謀類如此自忠獻去國和議興公不復用有薦之於時相者時相方謀和亟惡言兵乃曰詹君而賢何乃樂從兵間耶嗟乎是豈知公心者哉及敵暫歸河南地見大夫無可使則又謂公有守鞏勞俾以使指往關中時公年高矣親舊爭勸無行公曰朝廷名為撫舊疆吾雖老敢辭乎曰然則無以家行乎公曰人情危疑使者不以家行是重之也即日盡室引道間關入境延父老問疾苦布德意會敵敗盟不克終事蓋其慷慨徇義之意至老不衰其為人本末大略如此所謂天資忠義務為實用不汨於習俗而有志當世者若公非耶而絀於時論不得盡其用以死則可不為之歎息哉豫故特表而出之世之君子必有能辨之者公諱至字及甫嚴州人曽祖瑀贈正奉大夫祖詢不仕父安學行為鄉里所尊以纍舉恩仕為浦江簿贈宣奉大夫母太碩人余氏公中崇寧元年進士乙科授泗州推官河州推官徙士曹參軍改秩監在京廣衍倉通判濰州易南京留臺通判永靜軍及鞏州召未對除陜西轉運使以親老辭改御營平冦左將軍隨軍轉運判官主管臨安府洞霄宫起為江淮招討使司隨軍轉運副使知常州改徽州辟州督府主管機宜文字以幕府功除直祕閣忠獻將薦于上會太碩人有疾力辭歸遭內艱服闋提舉台州崇道觀知處州言者希時相意論公與諸將善坐是罷起為永興等路提點刑獄公事後復丐祠以崇道歸紹興十年以微疾沒于其家之正寢享年六十有八初娶何氏兩娶許氏俱封令人子男三人攸之仰之倬之並右從事郎孫光祖紹祖似祖興祖昭祖女長適迪功郎潘淵明次適承節郎方守中次適承務郎王興義是歲十月甲子葬于遂安移風鄉新村之陽積官至左中奉大夫封建德縣男公自幼沈厚寡言外朴中敏孝友尚義居太碩人之喪鄉黨以為法育伯兄孤孫如已子孀妹來歸為之區處生事兒女婚嫁皆得所宗族之貧無所給者曰於我衣食死於我葬以至外姻亦賴以濟度量恢廓喜怒不形而人亦莫敢犯奬借後進聞一善若出於己有不善為之憂委曲諷曉之雖甚不肖亦知愧訓誘子弟不欲傷恩反復諄諄不憚故凡其宗族與其鄉之人生則相與愛敬病則合力祈禳終則至於流涕此豈偶然哉公於書無所不讀讀輒不忘務以躬行為主考論禮樂制度往往得經意尤喜推原歷代治亂得失之故藴蓄深厚發為文章雅健追古其得意時操筆如風及讀之雖宿致思者不能及其藁隨多散失所裒拾僅得􅌡山集十卷詹氏系本南陽五代時有避亂來嚴之建德者實公始祖也其二子復徙遂安一居遂安之原至公凡九世一居新安之原亦同邑也自宣奉公糾族講學而詹氏始多秀士及公益敦篤懼兩原子弟世逺日踈乃立二老祠每歲季春悉合其少長奉祀事已相與飲酒序親愛以無忘厥初雍雍然也又為之立墓祭之式使後人世守之其尊祖糾宗之意甚備詹氏人才之盛抑未艾也公季弟曰棫仕為宗正寺丞於公蓋同志者公之葬狀公行事甚詳而銘文未有所屬後三十有四年歲在戊戍宗丞有子曰儀之今為廣西轉運判官與帥張某聯事講學相好也於是始以屬某而某實公所從忠獻公之嗣子也乃不克讓為之論次如此而銘之銘曰猗若人之好修兮懷瑾而為美也不隨俗而風靡兮厲秋霜以為志也羌視讐而弗疾兮已獨斯之恥也紛懷生以自營兮豫何艱之避也周旋於羽檄之間兮抑將以伸其義也凛自信之不疑兮曽習俗之何睨也勒銘以昭之尚後人之興起也通直郎致仕向君墓表開封向氏自文簡公相真宗天下稱賢其家始大于後欽聖憲肅皇后作配神宗母儀三朝其族益光顯人才亦接踵而出始終與國並昌靖康女真之變二帝北狩衣冠南渡一時仗節死義之臣僅可屈指計而建炎之元守死淮寧風烈暴白者實文簡四世孫忠毅公也忠毅死時其家幾亡噍類第四子沈適以逆婦于故侍讀文定胡公之家獲免於難君即沈也字深之云君生名門資稟靜厚既受室于胡氏日親文定之教薰陶義理步趨矩度益以成其德獨痛家國禍難之酷終身於祿仕蓋泊如也至於春秋復讐之義則不能以忘於中無路自伸積憂薰心早衰多病以至沒齒識者惜之自宣和中用叔中奉公子褒恩補登仕郎紹興中始授右迪功郎監潭州南嶽廟又十五年復為添監釐其務有劉昉者安撫湖南嘗希時宰意誣奏君叔父祕閣公子忞至是昉復來君即引去適改君湖南安撫司準備差遣迄不上也君念所生母李氏自淮寧相隔歷歲久逺迎養禮絶遵律追服率禮無違服除申畀前命言者論忠毅淮寧之節訪其後人尚書下符促赴闕君以時方多虞已又抱痾養身崇德無辱其先庶幾足矣希寵徼進非所願也竟不往前後凡五監潭州南嶽廟最後以上登極恩轉右從政郎在法選人六考致其事則通朝籍君覬得以追賁李氏即引疾請會新制止得改次等已而嶽廟理考故人之在朝列者為之請乃更授右通直郎致仕拜命才八日而君沒未及為李氏言也聞者尤傷之君孝友端諒奉先致嚴居家有制為人謀必周主財用必公制事敏而詳接物簡而和居處服用取適可而止視外營未趣紛華盛麗舉無足以撓其中蓋其天資之美而亦薰習之力也君事祕閣如事父間關百為備極勤力深愛和氣小心畏忌奉承幹蠱凡四十年人無間言始忠毅死事朝命官其後六人君以其一奏季弟鴻鴻蓋淮寧脫死於襁褓中者自餘悉以聽祕閣之命畀其族人而君之子士行祕閣又以郊祀恩先已諸孫而及之推此可見其叔父猶子相與情義之篤也故侍郎胡公寅每咨嗟語人曰若向深之之事叔父可以為人猶子之法矣祕閣自南渡以來聚族而處甚恩既沒君復率諸弟守其遺訓綱紀輯睦如初乾道七年四月十八日微疾沒于正寢享年六十有四是歲六月葬于衡山縣紫蓋鄉梅橋山祔于忠毅公塋側君曽祖考綬故西京左藏庫使祖考宗琦故太中大夫贈少師考忠毅公子韶故中奉大夫知淮寧府贈通議大夫賜諡君之配胡氏文定公之女賢德懿範為閨閫之表子男六人曰士行迪功郎前荆湖南安撫司準備差遣餘皆夭女四人長適通直郎江南東路轉運司主管文字胡大原次適將仕郎劉無忌次適蕭浣次適趙維皆進士孫男二人公頥公顗淳熙二年士行以大原所狀君行來曰先君沒四年矣而墓表未立敢泣以請某惟念如君之賢實中心平日所敬者獨懼文字不足以稱耳而尚何辭乃為之銘銘曰有赫其門國之休兮有美其質羌好修兮被服名教言行周兮囏關百罹抱隱憂兮世所趨慕匪豫求兮湘江之湄獨夷猶兮終莫克知尚奚尤兮曷以詔後表于丘兮南軒集卷三十九
