body:
  text: 南軒集卷二十宋張栻撰書答朱元晦祕書示及諸君操舍出入之説吕子約所論病痛頗多後二説亦頗得之然其間似未子細按孟子此章首以牛山之木為喻又以夜氣為説而引孔子之言為證以明人之不可不操而存也心本無出入然操之則在此舍之則不在焉方其操而存也謂之入可也本在內也及其舍而亡也謂之出可也非心出在外蓋不見乎此也無時者言其乍入乍出非入則出也莫知其所止也此大概言人之心是如此然其操之則存者是亦可見心初未嘗有出入也然則學者其可不以主一為務乎吕子約之説既誤以乍存乍亡為感之用而後説如謂心之本體不可以存亡言此語亦未盡存亡相對雖因操舍而云然方其存時則心之本體固在此非又於此外别尋本體也子約又謂當其存時未能察識而已遷動是則存是一心察識又是一心以此一心察彼一心不亦膠擾支離乎但操之則存操之之久且熟則天理寖明而心可得而盡矣又某向來有疑於兄辭受之間者非它也意謂若其初如伯恭之説承當朝廷美意受之可也後來既至于再至于三守之亦云固矣非尋常辭官者比也若只是朝劄檢舉不許辭免指揮行下則是所以辭之之義竟未得達于君前而被君命也若君命不許辭而使之受則或可以今初未嘗迫於君命也忽復受之恐於義卻未盡不知劉樞曽如此報去否又示以所定祭禮私心亦久欲為之但以文字不備及少人商量今得來示考究精詳甚慰論議既定須自今歲冬至行之乃安但其間未免有疑更共酌之古者不墓祭非有所略也蓋知鬼神之情狀不可以墓祭也神主在廟而墓以藏體魄體魄之藏而祭也於義何居而烏乎饗乎若知其理之不可行而徇私情以強為之是以偽事其先也若不知其不可行則不知也人主饗陵之禮始於漢明帝蔡雍蓋稱之以為盛事某則以為與原廟何異情非不篤也而不知禮不知禮而徒徇乎情則隳廢天則非孝子所以事其先者也某謂時節展省當俯伏拜跪號哭灑掃省視而設席陳饌以祭后土於墓左可也此所疑一也祭不可疏也而亦不可數也古之人豈或忘其親哉以為神之之義或黷焉則失其理故也良心之發而天理之安也時祭之外冬至祭始祖立春祭先祖季秋祭禰義則精矣元日履端之祭亦當然也而所謂嵗祭節祠者亦有可議者乎若夫其間如中元則甚無謂也此端出於釋氏之説何為徇俗至此乎此所疑二也大抵今日之定祭儀蓋將祭之以禮者苟無其理而或牽於私情或狃於習俗則庸何益乎鄙見不敢隱更幸精思卻以見教庶往復卒歸於是而已至於設席升降節文皆甚縝密穩當它日論定當共行之且可貽之同志非細事也又近伯逢方送所論觀過之説來某前日洙泗言仁中亦有此説不知如何大抵以此自觀則可以察天理人欲之淺深以此觀人亦知人之要也嶽下諸公尚執前説所謂簾窺壁聽者甚中其病耳伯恭昨日得書猶疑太極説中體用先後之論要之須是辨析分明方真見所謂一源者不然其所謂一源只是臆度想象耳但某意卻疑仁義中正分動靜之説蓋是四者皆有動靜之可言而靜者常為之主必欲於其中指二者為靜終有弊病兼恐非周子之意周子於主靜字下注云無欲故靜可見矣如云仁所以生殊覺未安生生之體即仁也而曰仁所以生如何周子此圖固是毫分縷析首尾洞貫但此句似不必如此分仁義中正自各有義初非混然無别也更幸見教又中字之説甚密但在中之義作中外之中未安詳蘇季明再問伊川答之之語自可見蓋喜怒哀樂未發此時蓋在乎中也只如是涵養才於此要尋中便不是了若只説作在裏面底道理然則已發之後中何嘗不在裏面乎幸更詳之又中庸之云中是以中形道也喜怒哀樂未發之謂中是以中狀性之體段也然而性之體段不偏不倚亭亭當當者是固道之所存也道之流行即事即物無不有恰好底道理是性之體段亦無適而不具焉如此看尤見體用分明不識何如忠恕之説如來諭精義序引亦已亡疑言仁已載往返議論于後今録呈所論一字若如老子以形而下者言則可與二三通數若如知言指道而言則難於復與器通數二三也心譬之水一節某意謂孟子只將水無有不下比人無有不善意味極完性情之理具矣今將心譬之水去水上用意差錯許多字固不為無義但恐終費力耳所論知言中餘説再三詳之未有疑可復也又天命之謂性所解立言極明快但率性之謂道竊疑仁義禮智是乃道也今云循性之仁則有所謂父子之道卻恐費力更幸瑩之又如審其是非而修之則知之教無不充之類亦未穩當兼此首章三語以某所見更須詳味伊川先生遺書中語某亦方欲下一轉語俟卻録去求教也在中之説前書嘗及之未知如何中者性之體和者性之用恐未安中也者所以狀性之體段而不可便曰中者性之體若曰性之體中而其用則和斯可矣又示及中庸首章解義多所開發然亦未免有少疑具之别紙望賜諭也所分章句極有功如後所分十四節尤為分明有益玩味但家語之證終未安家語其間駁雜處非一兼與中庸對其間數字不同便覺害事以此觀之豈是反取家語為中庸耶又如所引證及其成功一也之下有哀公之言故下文又有子曰字觀家語中一段其間哀公語有數處何獨於此以子曰起之耶某謂傳世既逺編簡中如子曰之類亦未免有脫略今但當玩其辭氣如明道先生所謂致與位字非聖人不能言子思蓋傳之耳此乃是讀經之法若必求之它書以證恐卻泛濫也不知如何又如云此一節明道之隱處此一節明道之費處亦恐未安君子之道費而隱此兩字減一箇不得聖人固有説費處説隱處然亦未嘗不兩具而兼明之也未知如何又按固陵録遊公元符三年十月庚戌除監察御史今已改定考其言行而泝師犮之淵源體之吾身而明義理之正當下句中字固有未安元晦欲作即其所至而益求其所未至恐亦未安蓋方建祠作記使學者知所景慕而遽云求其所至則語意似迫露學者將未能識其所至而遽云其所未至在薄俗不得不防其然也今更定云即其所至而益究夫問學之無窮則可見向上更儘有事意味似長也不知如何又仁之説前日之意蓋以為推原其本人與天地萬物一體也是以其愛無所不至猶人之身無尺寸之膚而不貫通則無尺寸之膚不愛也故以惟公近之之語形容仁體最為親切欲人體夫所以愛者言仁中蓋言之矣而以所言愛字只是明得其用耳後來詳所謂愛之理之語方見其親切夫其所以與天地一體者以夫天地之心之所存是乃生生之藴人與物所公共所謂愛之理者也故探其本則未發之前愛之理存乎性是乃仁之體者也察其動則已發之際愛之施被乎物是乃仁之用者也體用一源內外一致此仁之所以為妙也前日所謂對義禮智而言其發見則為不忍之心者非謂義禮智與不忍之心均為發見正謂不忍之心合對義禮智之發見者言羞惡辭遜是非之心是也今再詳不忍之心雖可以包四者然據文勢對乾元坤元而言恐只須曰統言之則曰仁而已可也或云天地之心其德有四云云而統言之則元為善之長人之心其德亦有四云云而統言之則仁為人之心如何前日所謂元之義不專主於生物者疑只云生物説生生之意不盡今詳所謂生物者亦無不盡者矣在中之義程子曰喜怒哀樂未發只是中也蓋未發之時此理亭亭當當渾然在中發而中節即其在中之理形乎事事物物之間而無不完也非是方其發時别為一物以主張之於內也情即性之發見也雖有發與未發之殊而性則無內外耳若夫發而不中節則是失其情之正而淪其情之理然能反之則亦無不在此者以性未嘗離得故也不識如何又觀所與廣仲書析理固是精明亦可謂極力救拔之矣然言語未免有少和平處謂當循前人樣轍言約而意該於緊要處下針若聽者肯思量當自有入處不然我雖愈極力彼恐愈不近也如何如何比見報承有改秩崇道之命竊計自有以處之矣兩日從共甫詳問日用間事使人歎服者固多但以鄙意觀之其間有於氣稟偏處似未能盡變於舊蓋自它人謂為豪氣底事自學者論之只是氣稟病痛元晦所講要學顔子卻不於此等偏處下自克之功豈不害事願以平時以為細故者作大病醫療異時相見當觀變化氣質之功重以世衰道微吾曹幸聞此理不可不力勉也有如孤陋正望切磋之益焉此外尚有一二事可疑此便頗速俟後訊詳列又某近年以來竊見尊兄往來書問之間講論知見甚異疇昔每用敬歎且因得以開益其愚陋者固非一端獨恨相去之逺顧以未得詳日用間事為念蓋子路有聞未之能行惟恐有聞古之人於其知見之進則又顧其躬之所履每患其不及而惟懼其有所偏焉故能日新而不疚此某所以亟欲詳聞用工進德之實以為相觀而善之益也幸共甫之來可以詢問則首訪而盡請焉得之共甫者亦多矣其所以慰鄙心而增歎仰者固不用言獨其間有使人不能無疑者切切偲偲之義則在所不敢默也聞兄在鄉里因嵗之歉請於官得米而儲之春散秋償所取之息不過以備耗失而已一鄉之人賴焉此固未害也然或者妄有散青苗之譏兄聞之作而曰王介甫所行獨有散青苗一事是耳奮然欲作社倉記以述此意某以為此則過矣夫介甫竊周官泉府之説強貸而規取其利逆天下之公理而必欲其説之行用奉行之小人而必欲其事之濟前輩辨之亦甚悉矣在高明固所考悉不待某一二條陳而其與元晦今日社倉之意義利相異者固亦曉然度元晦初亦豈有所取乎彼哉特因或者之言有所激作遂欲增加而力主其事故併以介甫之為亦從而是之是乃意之所加不自知其偏者也譬之有人焉於此執權以稱物之輕重初未至於偏也或指而告之曰此為重矣執權者主其説曰吾猶覺此之輕也於是復就其所指之處增之使重而其偏始甚矣且元晦謂介甫青苗為可取者以其實之可取乎抑以其名之可取乎以其實則流毒天下固有顯效以其名則不獨青苗凡介甫所行其名大略皆竊取先王之近似者非特此一事也竊取之名而何取乎且介甫自以其為鄞縣嘗貸榖而便於民故以謂可行於天下執一而不通天下之務立法無其本用法無其人必欲其説之行故舉天下之異已者盡歸之流俗於是來合其説者無非趨附之小人既欲其事之濟則用其説之合者小人四出以亂天下其勢則然也介甫初亦用程明道及吕晦叔輩其意豈不用賢而以其天資視吕惠卿之徒為何等哉惟其欲其説之濟故擯異而用同卒至棄仁賢而任羣小也今元晦見吾行社倉於一鄉為目前之便而遂以介甫之事為有可取無乃與介甫執鄞縣所為而遽欲施之於天下者相類乎似不可不周觀而深察也此雖為一事然明者胸中因人激作而為之增加斤兩以至於偏則懼其有害耳又來者多云會聚之間酒酣氣張悲歌慷慨如此等類恐皆平時血氣之習未能消磨者不可作小病看前書亦嘗略及之矣某每念人心易偏氣習難化君子多因好事上不覺乘快偏了若曰偏則均為偏耳又慮元晦學行為人所尊敬眼前多出已下平時只是針規它人見它人不是覺已是處多它人亦憚元晦辨論之徑排闢之嚴縱有所疑不敢以請深恐諛言多而拂論少萬有一於所偏處不加省察則異日流弊恐不可免念世間相知孰踰於元晦切磋之義其敢後於它人况某之不肖朝夕救過不暇正有望於藥石之言亦求教之一端惟深察焉又某幸粗安日往城南水竹間翻閲簡編或遂與一二士留宿頗多野趣不覺伏暑之度惟是嵗月易徂每懷學不足之憂耳共甫甚得此方人情然所以望之者固不宜少不滿也開府之初舉動多慰人意其樂義之風亦不易得耳前書所講及與嶽前諸友書於鄙意大抵無可疑仁説嶽前之論甚多要是不肯虛懷看義理某近為説以明之亦只是所論之意卻似稍分明今録呈其間有未安處某昨得晦叔書卻肯相信更俟相見與面剖也又來書披玩再四所以開益甚多所謂愛之理發明甚有力前書亦略及之矣區區並見别紙嗣有以見告是幸中庸所引家語之證非是謂家語中都無可取但見得此章證得亦無甚意思俟更詳之所改定本亦幸早示得以考究求教克齋銘讀之無可疑者但以欠數句説克己下手處如何敬齋針皆當書之坐右也洙泗言仁中當仁不讓於師之義舊已改孝悌為仁之本巧言令色鮮仁之義今亦已正并序中後來亦多換卻納一册去上呈所謂觀書當虛心平氣以徐觀義理之所在如其可取雖世俗庸人之言有所不廢如有可疑雖或傳以為聖賢之言亦須更加審擇斯言誠是也然所謂虛心平氣者豈獨觀書當然某既已承命而因敢復以為獻也某近作一拙齋記併録往幸為刪之安國所寄書册今附去數見别紙石屏一枚似勝前如何共父之勢想必此來異時卻易得便第未知再見之日懷向殊不勝情耳中庸集解俟更整頓小字欲盡移作大字又恐其間逐句下有解釋難移向後侯師聖之説多可疑然亦有好處也魏元履栻兩次作書託虞丞附去不知何故不達來諭皇恐豈有此哉今復有數字往問其疾且謝之也子飛家事聞之傷心其子之喪恐亦宜早歸土也南軒集卷二十
