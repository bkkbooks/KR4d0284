body:
  text: 南軒集卷一宋張栻撰詞風雩亭詞嶽麓書院之南有層丘焉於登覽為曠建安劉公命作亭其上以為青襟逰息之地廣漢張某名以風雩又繫以祠眷麓山之面隩有絃誦之一宫鬱青林兮對起背絶壁之穹窿獨樵牧之往來委榛莾其蒙茸試芟夷而郤視翕衆景之來宗擢連娟之修竹森偃蹇之喬松山靡靡以旁圍谷窈窈而潛通翩兩翼兮前張擁千麾兮後從帶湘江之浮渌矗逺岫兮橫空何地靈之久閟昉經始乎今公恍棟宇之宏開列闌楯之周重撫勝槩以獨出信兹山之有逢豫揆名而諏義爰逺取於舞雩之風昔洙泗之諸子侍函丈以從容因聖師之有問各跽陳其所𠂻獨點也之操志與二三子兮不同方舍瑟而鏗然諒其樂之素充味所陳之紆餘夫何有於事功蓋不忘而不助示何始而何終于鳶飛而魚躍實天理之中庸覺唐虞之遺烈儼洋洋乎目中惟夫子之所與豈虛言之是崇嗟學子兮念此遡千載以希蹤希蹤兮奈何盍務勉乎敬恭審操舍兮斯須凜戒懼兮𡨕濛防物變之外誘遏氣習之內訌浸私意之脫落自本心之昭融斯昔人之妙旨可實得於豫躬循點也之所造極顔氏之深工登斯亭而有感期用力於無窮謂陶唐帝廟詞宋淳熙四年靜江守臣張某既新陶唐帝祠以二月甲子率官屬祗謁祠下再拜稽首退而歌曰溪交流兮谷幽山作屏兮層丘木偃蹇兮枝相樛皇胡為兮于此留藹冠佩兮充庭潔芳馨兮載陳純衣兮在御東風吹兮物為春皇之仁兮其天四時敘兮何言出門兮四顧渺宇宙兮茫然公安竹林祠迎神送神樂章神之來兮何許風蕭蕭兮吹雨悄屛氣兮若思嚴霓旌兮來下昔公車之自南民望車以欷歔今乘駒兮入廟亦孔悲兮若初秋月兮皎皎嚴霜兮凜凜澤終古兮何窮噫微管吾其左袵酌荆江以為醴兮擷衆芳以為羞歌嗚嗚兮鼓坎坎惠我民為此留神之去何所遊風颯颯挾歸輈倐昭明兮上征撫一氣兮橫九州有新兮斯宇竹森森其在戶嗟我民兮勿傷公時來兮一顧有新兮斯堂竹猗猗其在旁嗟我民兮勿替公顧民兮不忘賦遂初堂賦洛陽石伯元作堂於所居之北榜曰遂初廣漢張某為之辭曰皇降𠂻于下民兮粵惟其常猗於穆而難名兮維生之良翕衆美而具存兮不顯其光彼孩提而知愛親兮豈外鑠繄中藏年燁燁而寖長兮紛事物之交相非元聖之生知兮懼日逺而日忘緣氣稟之所偏兮橫流始夫濫觴感以動兮不止乃厥初之或戕既志帥之莫御氣決驟以翺翔六情放而曷禦百骸弛而孰強自青陽而逆旅暨黃髮以茫茫儻矍然於中道盍反求於厥初厥初如何夫豈逺歟彼匍匐以向井我惻隱之拳如驗端倪之所發識大體之權輿如寐而聰如迷而途知睨視之匪遐乃本心之不渝嗚呼豫既知其然兮豫惟以遂之若火始然而泉始逹兮惟不息以終之豫視兮母流豫聽兮母從豫言兮母易豫動兮以躬惟自反兮于理兹日新兮不窮逮充實而輝光信天質之本同極神存而過化亘萬世以常通嗚呼此羲文之所謂復而顔氏之子所以為道學之宗也歟吾友石君築室湘城伊抗志之甚逺揭華榜以惟新命下交兮勿固演妙理以旁陳探上古之眇微得斯説於遺經謂非迂而匪異試隱几而一聽然則兹其為遂初也又豈孫興公所能望洋而瞪塵者乎後杞菊賦張子為江陵之數月時方中春草木敷榮經行郡圃意有所欣非花栁之是問眷杞菊之青青爰命采掇付之庖人汲清泉以細烹屏五味而不親甘脆可口蔚其芳馨蓋日為之加飯而它物幾不足以前陳飯巳捫腹得意謳吟客有問者曰異哉先生之嗜此也昔坡公之在膠西值黨禁之方興歎齊厨之蕭條乃攬乎草木之英今先生當無事之世據方伯之位校吏奔走頥指如意廣厦延賔毬場享士清酒百壺鼎臑爼胾宰夫奏刀各獻其技顧無求而弗獲雖醉飽其何忌而乃樂從夫野人之餐豈亦下取乎葑菲不然得無近於矯激有同於脫粟布被者乎張子笑而應之曰天壤之間孰為正味厚或臘毒淡乃其至猩唇豹胎徒取詭異山鮮海錯紛紏莫計苟滋味之或偏在六府而成贅極口腹之所欲初何出乎一美惟杞與菊中和所萃微徑不苦滑甘靡滯非若他蔬善嘔走水既暸目而安神復沃煩而蕩穢驗南陽與西河又頽齡之可制此其為功曷可殫紀況於膏粱之習貧賤則廢雋永之求不得則恚兹隨寓之必有雖約居而足恃殆將與之終身又可貽夫同志子獨不見吾納湖之隂乎雪消壤肥其茸萎㽔與子婆娑薄言掇之石銚瓦碗啜汁咀虀髙論唐虞詠歌書詩嗟乎微斯物孰同先生之歸於是相屬而歌殆日晏以忘飢古詩送八兄彌旬積雨穗生耳冬壑未渠收潦水圍爐情話政爾佳乃復歸舟行萬里三年百感卧湘城風急鶺鴒原上情豈無他人意獨真每覺軟語溫如春少年鋭氣凌八區晚以樂義稱鄉閭聞人有急若已如天報兩子雙明珠小隱卜築蘭溪邊修篁喬木今參天是非榮辱不到處卷書一榻清晝眠人言壽骨隱修眉慶事鼎鼒供期頥豈惟宗族託軌範政倚晚節增光輝有弟有弟復何為杜門讀書人謂癡故山未遂掃松願江頭獨立送歸時五士遊嶽麓圖閉門六月汗如雨出門褦襶紛塵土文書堆案曲肱卧夢逐征鴻過前浦西山突兀不可忘勇往政須求快睹朝暾未升起微風中流咿啞挾鳴櫓長林秀色已在望有如出語見肝腑意行愛此松隂直眼明還喜碑字古髙低梵釋著幽居深穩仙家開閟宇忽看宫牆髙十丈學宫峩峩起鄒魯斯文政倚講磨切石室重新豈無補危梯徑上不作難橫欄截出可下俯惟兹翼軫一都會往事繁華雜歌舞變遷返覆寧重論昔日樓臺連宿莾邇來人物頗還舊豈止十年此生聚泉流涓涓日循除華表何時鶴來語炎氣知不到山林茗碗蒲團對香縷鼎來杖屨皆勝引季也亦復同步武洛陽年少空白頭三閭大夫浪自苦一笑便覺真理存髙談豈畏丞卿怒不圖畫僧聖得知貌與兒童作夸詡請君為我添草堂風雨蕭蕭守環堵次韻伯承見簡探梅之什且約人日同逰城東江湖漫浪歲年晚雖有梅花誰寄逺城中可人獨吳郎不惜日力供往返東郭枝頭玉雪明下有清淺溪流橫新春好趂花前約莫待飄零空作惡張安國約同賦仇氏㔶甕酒人間炎熱不可耐君家甕頭春未央想當醉倒卧永日夢繞清淮歸故鄉後生那得識此酒從君乞方還肯否徽州作賦為欷歔荆州詩來端起豫李仁父寄伏苓酥賦長句謝之岷峩山中千歲松枝虬幹直摩青空雪霜剝落中不稿膏液下與靈泉通龜跧鳬伏自磊砢金堅玉潔仍豐融篝明夜取喜得雋煮鼎朝聽如吟風杵成坐上看飛雪更和酪乳收全功當知至味本無味子若服之壽莫窮巽巖脊梁硬如鐡冠峩切雲佩明月百好都隨春夢空大藥獨傳鴻寶訣中宵咀嚼不搖頭玉池生肥咽不徹憐我百慮形蚤衰褁贈扶持意何切丹砂著根謾爾傳脂澤釀黍計已拙由來妙道初不煩此法莫從兒輩説徑思舉袂揖浮丘下視塵世真一吷朱顔留得亦何為追逐同堅歲寒節和吳伯承一葦湘可航風濤逮春深裴臺咫尺地勇往復雨淫窗前幾紅藥俯首如不禁悠悠覽物化了了知豫心卜鄰得佳士問學方駸駸端如雲間鶴不受塵埃侵應門有長鬚杖䇿許相尋匪為食有魚杞桋采牆隂聽我清廟詩三歎有餘音洋洋百世下斯道豈陸沉君看有本源發端自涔涔願君勉勿倦抱膝試長吟儻臻名教樂何必懷山林新詩尚來嗣庶以貽規針用前韻送彪德美嘗嗜貴知味短綆難汲深讀書不能發但自成書淫況復翻異説潢流渺難禁豈知言意外妙此惟微心初無古今異歲月謾駸駸五峯講學地歎息風雨侵前時約同途舊逰愴追尋鳴鳳不可見修竹餘清隂斯文天未喪千載發韶音春風滿天宇魚鳥自飛沉河流貫霄極芥舟膠寸涔神交獨吾子妙處但微吟文會匪易得未應歸故林君無泉石癖膏肓詎須針再用前韻元化首萬類聖學極幾深有如亞聖賢尚謹殆與淫淺見僅一斑歡喜不自禁豈知天地全於穆千聖心嗟哉我學子進道宜駸駸立志務𢎞毅異説母交侵仁端驗發見精微試探尋超然見大體皎日破重隂重新鄒魯傳挽回韶濩音當年不自勉與物終堙沉神龍倐變化豈復顧泥涔有來南山友更唱共迭吟羣材欲封殖杞梓看成林殷勤勸學子逆耳成良針采菊亭并引陶靖節人品甚髙晉宋諸人所未易及讀其詩可見胸次灑落八窗玲瓏豈野馬逰塵所能棲集也前建安丞張君精力未衰即挂冠家于瀏陽有年矣葺小園為亭面南山來求豫名豫名之曰采菊取靖節所謂采菊東籬下悠然見南山嗚呼靖節興寄深逺特可為識者道耳陶公千載人髙標跨餘子豈無濟時念斂蔭獨知止歸來卧衡門無愠復何喜九日天氣佳東籬擷芳蕊舉頭見南山佳處政在此地偏心則逺意得道豈否張侯謝銀魚築室娛燕几小亭才尋丈景物自新美頗聞雙瞳清亦復強步履不妨數登臨倚杖看雲起髙詠悠然篇飛鴻送千里送楊廷芳自吾友若人歎息恨不早相逢未出語已足慰懷抱寒窗逾浹旬百慮略傾倒霜晴不留客别語詎能好不盡此時情梅邊試深討又昔人忘言處可到不可會還須心眼親未許一理蓋辭章抑為餘子巳得其最當知鄒魯傳有在文字外又平生風雨夕每念名節難窮冬百草歇手自種琅玕吾子三十䇿字字起三歎豈欲求人知正自一心丹請哦碩人詩匪為樂考槃送鮮于大任入成都幕敵騎昔飲江扁舟憶同騖翁方為國謀客以名義故安危匪前料得失渠異趣淮壖渺風雪王事有程度息偃多在床君車不停駐初無作難色所立詎愆素嗟我吳門别風木歲徂暮相逢復湘城往事忍回顧獨餘後凋心特立凜不懼莫邪雖云利寧作囊錐露善藏要有待小試隨所遇終無缺折虞豈但走狐兔吾州得良牧民力或可裕本根賴封殖疆索費調護從容試長思取急無窘步作别忽草草懷抱復誰付他時下瞿唐訪我林下屨儻於功名餘更講末後句同逰嶽麓分韻得洗字逰觀不作難呼舟度清泚新晴宿潦淨羣山政如洗上方著危欄萬象見根柢寒泉自可㪺況復雜肴醴髙談下夕陽邂逅玄鑰啓中流發浩歌月色在波底送張深道秋風木葉落送客麗譙東豈懷兒女戀愛此趣味同至理無轍迹妙在日用中聞言有不信渠自馬牛風吾子實所畏立志髙𡨕鴻卓然逰聖門不受異説訌切磋豈不樂愧非斫鼻工於皇太極藴精微浩無窮願言終玩繹默參元化功人言底柱險袖手不敢邇孰知人心危毫釐千萬里有來事物繁酬酢無披靡雖云應不難要且辨真偽良知本易直天機驗所起㴠濡自日新日新乃無蔽聖學非空言要領故在此吾子端發源所進渺涯涘我雖念不敏詎敢忘所止後會儻有時深功同舉似留題金山寺長江岷山來灌注天下半東行近海門勇往更瀰漫蒼巒忽中流屹立助傑觀孤根入層淵秀色連兩岸我來最竒絶霜月與璀璨褰衣到絶頂恍若上河漢悠然發遐思俯仰為三歎乾坤無餘藏今古有長算更深寂羣動樹杪獨鳴鸛回頭喚山僧為記此公案送范西叔教授西歸乃祖至和間忠謀書鼎彛但知陛下聖豈知吾言危元祐愛君語讀者猶涕洟典刑今不亡盛德故在兹歲晚子過我秀若齋房芝持身蹈規矩出語無瑕疵向來長安道詎肯舍靈龜萬里一泮宫行囊幾新詩湘山足幽勝而水清漣漪登臨豈不樂邂逅枌榆思我懶抱僻學絶絃理朱絲子獨慕千載悠然契心期豈不為我留感此節物移臨岐撫陳編為子三噫嘻髙深諒何極循求有端倪願言勉事此奕葉光前規王長沙梅園分韻得林字令君五畝園不問蓬蒿深江梅忽秀發邂逅成賞音一笑領諸客掃地坐牆隂清芳到酒面落蕊飄衣襟月去未忍去起舞獨微吟人自賞晤耳問花亦何心花雖有開落意則無古今須君戒勿折嘉實看成林送卲懷英赴召自君之西來吾徒獲三益匪惟欣晤言望見意巳適俯仰歲再更交情共金石翩然别我去寧復得此客諸公有推轂詔下亟傳驛嘉言久填胸往覲天咫尺豈其湘水邊而可滯六翮雖深惜别思敢後天下責嗟哉善利途雞鳴分舜跖浮雲起毫釐乃有泰山隔持身與謀國兹義貫於一君侯天資髙遇事無逼迫所立凜不回舉手謝物役保此方寸印勿受一塵隙廓然麗昭回萬象歸指畫富貴豈君心事業追往昔贈言不能工庶以永無斁陪安國舍人勞農北郊分韻得闌字寒收花尚瘦風靜江不湍元戎肅千騎歷覽無留難好景要徐出微雲故遮闌惟春布嘉惠公豈樂逰觀龎眉八十老扶杖來蹣跚去年幸一稔何以報長官酌酒公自勞得無有愁嘆嗟哉三章約所貴簡且寬黃堂載清靜自覺田里安須公出妙語兹逰記不刋安國晚酌葵軒分韻得成字桐花三月寒風雨滿江城使君晚被酒千騎過友生名談宿霧捲逸氣孤雲橫揮斥看墨妙笑語皆詩成人物有如此爾輩賴主盟更呼南鄰客共此樽酒傾愛我庭下竹頭角方崢嶸永懷氷雪姿寧復世俗情新篇一湔袚凡木不足程願言謹封殖歲晚長敷榮安國置酒敬簡堂分韻得栁暗六春字桴鼓息荒村襏襫盛南畝永日省文書呼客共樽酒主人出麈姿宛是靈和栁行歸帝所逰此地豈淹久公卧百尺樓餘子可下瞰我每奉談塵汲古得深探身外皆為餘此道要無憾從渠梅雨天隂晴遞明暗公憎孔壬面怪石乃寓目夜堂發深藏林立驚滿屋我亦苦嗜此一見下風伏何當載而歸妙䇿三十六堂下列絲竹堂上娛佳賔相看夜未艾樂此笑語真風流今屬公我輩但逡巡文章千古意翰墨四時春同元晦擇之逰嶽道遇大雪馬上作驅車望衡嶽羣山政參差微風忽南來雲幕為四垂炎官挾蓐收從以萬玉妃庭熒亦何有尺璧仍珠璣竒貨吾敢居妙意良自知林巒倐變化轍迹平髙低喬松與修竹錯立呈瑰姿清新足遐寄浩蕩多餘思平生湘南道未省有此竒況復得佳友晤言相追隨茅簷舉杯酒旅榻誦新詩更約登絶頂同觀霽色時詩送元晦尊兄君侯起南服豪氣蓋九州頃登文石陛忠言動宸旒坐令聲利場縮頸仍包羞却來卧衡門無愧自日休盡收湖海氣仰希洙泗遊不逺關山阻為我再月留遺經得紬繹心事兩綢繆超然會太極眼底無全牛惟兹斷金友出處寧殊謀南山對床語匪為林壑幽白雲政在望歸袂風颼颼朝來出别語巳抱離索憂妙質貴強矯精微更窮搜毫釐有弗察體用豈周流驅車萬里道中途可停輈勉哉共無斁邈矣追前修逰南嶽風雪未已決䇿登山用春風樓韻人言南山巔煙雲聳樓觀俯瞰了坤倪仰攀接天漢勇往愧未能長吟湘水畔兹來渺遐思風雪豈中斷行行重行行敢起自畫歎我聞精神交石裂氷可泮隂沴驅層霄杲日麗旭旦決䇿君勿疑此理或通貫南軒集卷一
