body:
  text: 南軒集卷四十四宋張栻撰祭文祭萬二提刑兄惟兄植德忠厚持身謹嚴早䇿名於雋科遂蜚英於賢軌對揚天陛蓋嘗膺綸綍之褒周旋坤維所至有袴襦之詠爰因郡最益究外庸漢水詳刑茂著平反之實夔門易節有增刺舉之光方聞趨召之恭忽駭抱痾之報竟茲奄忽實重痛傷載惟門户之衰正竊棣常之庇永言流涕莫喻此情恨以阻修無因奔走一奠不腆鄙誠是將祭黃運使清臣惟靈敦厚為質而德慈祥惟其所歷阻難備嘗故於民情尤所究詳景倩真清徐公有常將命嶺海以身律荒移節來湘風采載揚于彼原隰馳驅靡遑謂當終更歸近帝旁如何一朝而奄云亡賔席方設語音琅琅得疾俄頃見聞駭傷下逮閭里攀嗟倣徨某之所居實邇門牆奔走弗及執手涕浪念言傾蓋意味則長與人之周是固難忘疇昔勝日從容豆觴豈期於今來哭公堂一奠不腆中誠是將祭趙養民運使惟靈寶源積慶列鼎傳家宣化承流飛聲籍甚盤根錯節遊刃恢然爰入對於昕朝遂結知於宸扆出綸示寵持節分華民瘼旁咨豈憚驅馳之逺邦財益阜生取斂散之權何一疾而弗瘳不終更而歸報王畿結綬未酬葵向之厪夜壑移舟乃起薤晞之歎某雅承契好兹共官聯笑語如存忽驚於永已酒肴不腆少寄於餘哀祭蕭殿撰惟公氣和而節剛言訥而行敏視之退然初若不能及其當可言之地論議切直風采凛凛中外聳然豈非庶幾乎仁者之勇耶某頃在朝列每見公憂時惻惻備形辭色心竊期之已而平日之言率皆可復益知其所守有素非茍然者來使湘州某適在逺方嗟再見之難豈謂九原之隔書猶在手訃忽來傳為時惜賢臨風隕涕一奠遣致少述鄙誠祭宇文使君三十一舅惟靈席慶鼎鍾之門留心韋布之事迹其壯歲蔚然懿文况德履之素寬復天下之有裕宜昌逺業克繼先猷方小試於遍州固已稱於惠政未結王畿之綬忽移夜壑之舟宣室受釐不復賈生之召桐鄉奉祀空留朱邑之名某適守遐方遽承來訃載誦渭陽之什涕隕盈襟緬想佳城之阡心馳執紼祭魏元履嗟乎仕于王朝自一命而上皆得一論疏時事此古之義而亦祖宗詔也君起布衣服在學省忠言屢發率關大體在他人方且蹙縮畏避君輒先之亦可謂毅然有立矣世之議者羣起而求多於君此蓋無足怪然君自退歸以來益務自修以書抵豫謂將講學進所不逮豫得之而嘆息以為君異日之所成就其又非豫所可量者而孰謂天不復假之年耶君雖未遂傾蓋之願而君相與之意則甚厚豈謂竟不克識君耶一奠往致以紓豫情祭儲經屬惟靈早以藝文有聲場屋晚遊幕府簡默自將故鄉渺然羇懷莫寄因循一疾遂至沈綿獨資同僚共舉終事嗚呼可哀也夫祭秦致政某來桂林首訪鄉之老成而將問政焉人士同辭以公為稱首公雖已枕疾于家罕接人事然如珠玉之在山淵遊于其間者亦足以借其輝潤惟公起自兹土取科第歷事以忠厚亷直稱亦嘗典州有澤于民已乃謝事於未衰優遊鄉閭子孫滿前安恬獲福克享上壽在公庶幾乎無所恨矣然公之云亡後生失儀刑之尊吾黨乏咨詢之益是用嘆傷為之流涕不腆一奠聊寫此誠祭甄總管惟靈早以忠義赴乎功名方排難解紛之時有投機應變之智慷慨辭氣感動三軍謂當究於設施乃繼遭於排抑逮于晚歲再逢當寧之知旋即九原莫展據鞍之願考先世平江之牘想一時共濟之人念事會之多違歎竒才之難得屬兹假守適值喪舟薄奠薦誠臨風增愴祭賈仲山知縣惟我别墅與君鄰牆春朝秋夕幅巾徜徉湘西之别我獨憂君薾然其癯願言愛身甫兹半載遽以訃傳推案愕眙繼以泫然惟君之才疏通而敏惟君之行友睦以謹曽未究施而止斯耶道阻且長豫之悲耶祭邢致政嗚呼魯仲生而多艱暫仕輒歸已乃挂冠其才有餘蓋可撥煩曽不少試老于家山間止名堂惟適之安窗户明潔日對孱顔坐上客滿不空杯柈且復重義周人急難謂享夀康而年亦慳我家長沙殆若鄉關故舊益落為之涕澘昔來兹堂舉酒相看今來兹堂帷白旐丹嗚呼哀哉祭經幹八兄嗟哉吾兄生也多屯惟生之艱宜永厥齡胡亦嗇之而止於斯命也不齊其孰為之乙酉之夏過我湘濵撫我苫凷話言諄諄為我久留去則不忍舟中之别有淚如隕我觀吾兄齒髮未衰願言愛身相逢有時兄復一笑子言甚真我健且武當復南征側聞還家有以自娛釃酒擊鮮賓筵則都謂當婆娑樂此晚歲豈期訃來駭痛曷已邈在萬里走哭無從寄此一觴酬西南風祭宋子飛參議哀哉子飛而至然耶孰無憂患君何酷耶始聞哭子繼曰悼亡念君之親白髮在堂曽未幾日亦以訃傳想若曷任摧荒曷全作書弔君下筆不忍道阻且長畏聞來信哀哉子飛身竟隨之臨風泫然為君涕洟如君吉德所遭乃爾惟命不齊孰主張是連陽識君今兩周星離合不常交情愈親湘岸之别自夏徂秋詩墨未乾君已不留有纍者殯誰其收之婉孌兩孫誰其周之里有賢公鄰有君子話言平生當亦任此我獨在逺莫克奔馳一奠往致哀哉子飛祭南康四九兄嗚呼同袓兄弟今存四人惟兄能文自于妙齡意其逺大以翼吾門僅守一州才未克伸豈謂兹朝乃傳訃音驚惶慟哭痛心原鴒為位一奠哀哉此情同前嗚呼哀哉惟兄早歲秀發而文秦國之恩篤於諸孫忠獻之愛視子攸均矧惟伯父實艱實勤未究之業付之吾兄謂當逺大以翼以承如何中道車折其輪僅歷一州莫覩厥成嗚呼哀哉某之於兄少長相親論文講藝豈無友生霅川之别慘焉酸辛視兄之容澀而不榮酒酣諄復願言愛身少屏剛劑以致和平孰期一疾竟以此傾嗚呼哀哉于今幾年逺寓霅濱鴻雁莫聯每傷豫心矧兹永訣痛復可任念當挈歸以近榆枌乃聞知命留葬是云嗚呼哀哉遺字見屬奉之涕零將絶泚筆又何剛明嗚呼哀哉屬拘印紱奔走不能向風長號薄奠是陳猶子幼弱念言惸惸敢不扶持兄言是遵尚惟英爽其或來歆祭胡廣仲主簿惟君孝友之德篤乎天性問學之志自乎初年疾惡見其公心臨事知其審慮謂當逺大以究所成如何一朝遽止於此聞訃之始痛恨則多豈惟歎德門失承家之賢抑亦吾黨失同志之助交逰歲夕重以婚姻往哭未能薄禮先致涕零橫臆言不復文祭吳晦叔嗚呼惟君早登五峯之門即捐進取之習從事義理今幾二十年思慮益親操履益固而其曉悉人情通練世事持之以忠信行之以周密蓋有用之實才而進學之良資也豈謂一旦止於斯耶某與君論心為日亦久切磋講究友誼金石訃音來傳泣下莫止嗟夫任道之艱而同志益落此豫之所悲而且憂也官守所拘未能往哭一奠遣致言不復文祭外姑何恭人惟靈生于相家來嬪德門奉饋采藻克謹晨昏如賔之敬婦道則宜逮夫晚歲有光母儀允矣三德協于彤史胡不百年永庇孫子憶在柔兆獲拜于堂辰幾一周有淚淋浪我悲終天靡怙靡恃起尋渭陽痛復抵此傷哉道逺一慟莫前薄禮捋誠靈其鑒旃省墓祭文某往者惟念古不墓祭之義每來展省號哭于前不敢用世俗之禮以行其所不安而其中心終有所未滿者近讀周官有祭於墓為尸之文乃始悚然深惟先王之意存世俗之禮所以緣人情之不忍而使之立尸以享所以明鬼神之義蓋其處之者精矣今兹用是敬體此意為位于亭具酒肴之薦以寫其追慕之誠惟事之始不敢不告俯伏流涕不知所云惟考妣之神實鑒臨之南軒集卷四十四終
