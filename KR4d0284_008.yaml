body:
  text: 南軒集卷八宋張栻撰表謝太師加贈表日月昭回燭孤忠於既沒風雷鼓動詔恤典於無窮藐然遺孤重於隕涕中謝伏念先臣早趨列著即值多難痛陵廟之莫扶嘆簮紳之自保以為冦讐若此豈臣子之遑安義理所存何利害之足計㑹真人之勃起先百辟以駿奔奉命於危機洶湧之秋投軀於衆難紛紜之際以至進登揆路盡護戎車不憂醜膚之方張惟懼人心之不正炳若丹青之誓率兹縞素之師雖蒙神聖之深知亦致姦邪之橫疾擯居炎服中逾二紀之更敢意餘齡復際重明之運竊窺睿蘊思復祖疆願畢效於精誠冀平清於氛祲而割地奉讐之論起合黨締交之謀深修邊備則指為費財講武功則目為生事妄擬偷安於歲月曽微却顧於興衰非惟沮先臣之為實乃傷陛下之志鑠金成市卒賴保全易簀餘哀空存感慨悵歷時之䆮久忽當饋以興思中旨顯頒褒章具舉既極上公之貴復稽節惠之文人知忠義之榮莫不競勸士喜是非之定少緩私憂固將埀訓於邦家豈但增光於泉壤此蓋伏遇皇帝陛下勤儉法禹聰明繼堯緯武經文不暫忘於宗祏彰善疸惡用允若於天心敷揚舊勳表厲在服誦溫言之曲盡仰至意之旁孚臣猥以承家極兹追往奉牲以告知神理之來歆聚族而謀念上恩之曷報惟慕先臣之許國力圖後日之捐身嚴州到任謝表奉詔中陛分符近邦巳見吏民敬頒條教中謝伏念臣禀資不敏涉道未深誦編簡以窮年粗守趨庭之訓雖江湖之屏迹敢忘向日之心藐兹憂患之餘時軫記憐之舊既將詳試以民事又使密邇於行都賜對彤庭曲形睿奬辭闕未更於積日驅車已届於新封仰在望之雲天依歸曷巳顧來迎之父老責望謂何此蓋伏遇皇帝陛下勇智繼湯聰明法舜謂意誠心正澄源雖自於朝廷然本固邦寧共理亦資於牧守夫何遷戇乃預選掄惟是此方素稱瘠土而其輸賦獨重他州編居半雜於山林稔歲猶艱於衣食觀其生理良足興嗟臣謹當咨訪里閭推原根本悉陳利害之實仰冀恩澤之流視民如傷用體大君之德意為國以禮更思先聖之格言靜江到任謝表還之寓直假以價藩祗服訓詞已臨官次伏念臣禀資甚戇涉理未深徒以蚤被於教忠故亦粗知於守義頃由即省入侍經帷方聖主之有為思延忠讜愧下臣之末學無補髙明居然牛載之間負此素餐之責獨有孤危之迹上廑覆護之私終畀便州使歸故里甫及瓜期之近更叨改命之榮此蓋伏遇皇帝陛下愛養人才重惜名器謂臣鈍不生事或可責以撫摩察臣愚無它腸示不忍於捐棄惟是桂林之地夙專制閫之權盡護邊蠻南極嶺嶠深虞綿薄莫副使令臣敢不思既厥心克共于事奉法循理期躬率於遐方和衆安民用仰承於皇武江陵到任謝表便私有請巳愧乘軺改命彌優又叨分閫仰承德意既見吏民中謝惟全楚之上流實皇家之要屏居吳蜀之㑹屹形勢之相關控襄沔之衝渺規摹之甚逺自戎馬平寧之後亦歲時閲歷之多田土膏腴莫盡新耕之利人煙蕭瑟靡聞舊觀之還既富庶之未臻諒恢圖之難濟孤聖主有為之志虛輿人望治之心謀帥之艱于今尤甚豈兹遴選乃及微臣兹蓋伏遇皇帝陛下明並日中仁同天大念臣服於先訓亦有意於捐軀謂臣守其愚忠或可望以立事肆加明試不忍遐遺臣敢不務集衆思勉圖來效事君以勿欺為主期利害之實聞禦侮以得民為先當本根之力護庶幾毫髮仰答乾坤進職因任謝表內閣分華進其寓直介藩因任鍚以贊書既莫遂於終辭凛不知夫所措臣某誠惶誠懼頓首伏念臣昨承人乏來守嶺隅忽坐閲於兩秋亦既殫於五技所賴旁流之惠澤故兹少息於疲氓吏於其間譴因以免敢希誤寵何有微勞此蓋伏遇皇帝陛下以大有為之資行不忍人之政逺邇一視真傳太上之心賞罰至公悉聽國人之論惟臣不敏曷稱所蒙况聞前哲之言多畏居官之久非人情狃習之為慮實已志怠忽之難防其幾弛於方寸之間則害及於一路之廣返復以念經營莫寧敢不履薄臨深益思謹於侯度庶幾積銖纍寸或不玷於皇明謝除祕閣修撰表臣某言先在廣西任日伏䝉聖恩除臣祕閣修撰尋具辭免奉聖旨不允已秪受誥命者奉藩何補坐費三年進律之褒乃蒙再命控忱辭而莫獲拊小已以增羞中謝伏念臣鈍質無堪孤蹤難植備保鄣於逺服凛危懼之百懷惟仰恃於聖明勉自殫其心力班超之䇿但守於平平陽城之書固井於下下豈期睿奬荐賜寵光俯矜塵坌之餘生俾𨽻蓬萊之髙選超踰若此報稱謂何此蓋伏遇皇帝陛下器使羣才光被四表顧未忘於簮履之舊尚念黯愚將示勸於牧圉之臣姑從隗始榮踰華衮愧甚循墻臣敢不勉務朴忠仰承德意始終一節期不負於素懷驅馳四方敢或憚於煩使謝侍講表拜命中宸執經西學雖踵熙朝之故事實為儒者之至榮莫遂􅈤辭惟深愓懼臣某云云竊以剛健篤實易稱多識之功緝熙光明詩著仔肩之義蓋典學所以建事而治國始乎修身厥惟哲王乃燭大本此蓋伏遇皇帝陛下德先勤儉政用中和從善君轉圜每盡謙虛之道臨民如御馬居懷兢業之思念六籍之格言為百王之要範將求鴻碩與共講論顧臣何人亦預兹選臣敢不朴忠自許古義是研勉殫夙夜之誠庶幾千慮儻有㳙埃之補少答大恩謝賜冬衣表出笥分珍在廷均賜方此御冬之始俱懷挾纊之溫中謝兹蓋伏遇皇帝陛下子視庶民天臨羣下遇之有禮俾知臣節之恭豈曰無衣獨覺君恩之重臣等敢不力圖其報仰稱所蒙惟公爾以忘私庶服之而無斁賀郊祀表率時陽復式展泰壇配我思成有嚴熙事中賀竊考前王之典莫先上帝之郊明德惟馨匪備物之為貴精意以饗本一誠以潜通必知禮樂之原斯格髙升之應恭惟皇帝陛下躬行舜孝業廣禹勤守位曰仁允寶祖宗之訓應天以實克單夙夜之心兹舉彌文益昭順福神靈來燕穆然聲氣之交服采駿奔儼若豆籩之薦更旁流於沛澤用永鍚於蒸黎臣等幸備邇聮豫承明祀體宸中之寅畏敢怠交修仰帝命之昭融庶幾無斁賀冬至表律應中聲候迎長景冝人神之贊喜輔宗祏以儲休中賀恭惟皇帝陛下重堯之華行禹之智籲俊以尊上帝斂福而鍚庶民周典是遵待彼隂陽之定羲爻默玩見夫天地之心臣叨奉藩條阻陪班綴天子萬夀敢忘歸美之誠王者三微願廣好生之德遺奏庚子二月初二日臣再世蒙恩一心報國大命至此厥路無由猶有微誠不能自已伏願陛下親君子逺小人信任防一已之偏好惡公天下之理永清四海克鞏丕圖臣死之日猶生之年經筵講議二南之詩聖人示萬世以制治之本源乃三百六篇之綱要如易之首乾坤然葛覃次於關雎蓋述后妃雖貴不可忘其初處宫室之中而思其在父母家之時居冨貴之位而念夫女工之勞感時撫事而因以起其歸寧之心思其節儉敦本孝愛恭敬薰然見乎其辭反復誦詠之則可以得其趣矣一章思夫在父母之時方春葛延蔓于中谷維葉萋萋然其始茂也黃鳥聚于麗木其鳴喈喈然其甚和也誦此章則一時景物如接吾耳目中矣二章維葉莫莫則是葛既成而可采之時也於是言其刈獲之以為絺綌如此服之無厭也蓋躬其勤勞而享之則安耳誦此章則其敦本之意可見矣三章言其因是以思其父母告師氏以言歸汙治其燕私之服浣潔其朝見之衣害浣害否言何者當浣何者當否治其衣服蓋欲以歸寧父母也誦此章則其孝愛恭敬與夫節儉之意又豈不薰然於言辭之表乎古者雖后妃之貴亦必立之師傅以詔之故此詩言歸必首以告師氏而左氏傳亦謂傳母不在宵不下堂則知師傅之職所以朝夕輔導之也法家拂士非惟人主不可一日無在后妃亦然誠以人心易動貴驕易溺處其極而無所畏憚則其可憂將有不可勝言者是以古之明君與其后妃相與夙夜警戒而不敢少忽乎此也臣嘗考周家建國自后稷以農事為務歷世相傳其君子則重稼穡之事其室家則躬織絍之勤相與咨嗟歎息服習乎艱難詠歌其勞苦此實王業之根本也如周公之告成王其見於詩有若七月皆言農桑之候也其見於書有若無逸則欲其知稼穡之艱難知小人之依也臣以為帝王所傳心法之要端在乎此夫治常生於敬謹而亂常起於驕肆使為國者而每念乎稼穡之勞而其后妃又不忘乎織絍之事則心不存焉寡矣何者其必嚴恭朝夕而不敢怠也其必懷保小民而不敢康也其必思天下之飢寒若已飢寒之也是心常存則驕矜放肆何自而生豈非治之所由興也歟美哉周之家法也聖哲相繼固不待論而其后妃之賢見於簡編太王之妃則姜女也而文王之毋則太任妃則太姒而武王之后義邑姜也皆助其若子焦勞于內以成風化之美觀后妃則太王文武之德可知矣以此埀世而其後世猶有若幽王者惑褒姒而廢正后以召犬戎之禍而詩人刺之曰婦無公事休其蠶織蓋推其禍端良由稼穡織絍之事不聞於耳不動於心以至於此故誦服之無斁之章則知周之所以興誦休其蠶織之章則知周之所以衰其得失所自豈不較著乎以是意而考秦漢以下其治亂成壞之源皆可見矣講畢臣栻復進曰臣觀三代令王必知稼穡之艱難其后妃必知織絍之勤勞惟其身親之視民如傷其心誠痛切也後來只為不知艱難故都不省察但見目前一事之辦一令之行不知百姓流離困苦于下所以漢唐妄為興作之君多在中葉良由不知艱難所致周公作七月反復只說農桑作無逸只說稼穡之艱難要得成王胸中了然都知許多辛苦曲折自然朝夕敬畏惟恐失民心下情通逹凡事不敢草草其治所以安固長久天生民以立若非欲其立乎民之上以自逸也蓋欲分付天之赤子而為之主人主不以此為職分以何為職分人主不於此存心於何所存心若人主之心念念在民惟恐傷之則百姓之心自然親附如一體若在我者先散了此意思與之不相管攝則彼之心亦將泮渙而離矣可不懼哉自古帝王為治皆本乎此後世興利生事之臣先毀薄此論謂之陳腐亦無怪其然蓋須指此為陳腐則彼興利生事之說方得而進臣嘗譬之飢必食穀粟渴必飲水漿此語似乎陳腐然飢須食穀粟渴須飲水漿不可易也若以此為陳腐却求吸風飲露之計寧有是理人主不可以不察臣又嘗觀後世兩種議論或云小害無傷或云要得立事擾人不奈何臣以為此等議論乃壞國家元氣毒藥上云王安石謂人言不足恤所以誤國事臣栻請破前此二者說臣嘗為州郡備見百姓利害百姓甚易擾動未論州郡所行只如知縣妄行出一文字鄉間擾害百姓有不可勝言者何况以朝廷之勢臨之若一事偶未審草草行出外間受害又何可以數計百姓被困毒得聞於人主之前者有多少間隔其受害已不少矣然則豈可謂小害無傷濟大事必以人心為本若未曽做得一毫事先擾百姓失却人心是將立事根本自先壞矣烏能立哉然則豈可謂要立事擾人不奈何人主又豈可不察然而又有一等頽墯苟且之論借養民之說却是要玩歲愒日都無所為此反害正論臣所論先王養民之政蓋其所施行具有本末先後正合朝夕講䆒以次行之非是恬然不為臣栻又進曰古人論治如木之有根如水之有源言治外必先治內言治國必先齊家須是如此方為善治臣適論成周家法自漢唐以來家法之美無如我宋臣嘗考四后之德其立甚正終為宗廟社稷之福光獻曹太后方英宗之初有功社稷宣仁髙太后致元祐之治號女主中堯舜欽聖向太后建中靖國之初有功社稷欽慈孟太后靖康建炎間社稷之功又冠前古以此知本朝之家法何愧三代實子孫萬世無窮之法啓謝宰執啓太師加贈仰祗明詔追述遺忠惟聖主明燭無疆莫掩中天之照而大臣言乃底績豈無前席之陳孤生藐然有涕滂若永言先父之志粵自靖康而來蓋以為天理所安期沒身而後已人臣之義不與賊以俱生國餘三户而可以亡秦田有一成而卒能祀夏苟精誠之自竭豈利鈍之逆知惟其不渝是以克濟若謀國懷畏愞之見則事仇井陵夷之歸妄希一日之安莫思千載之耻三綱不振萬事曷成皎若丹心歷多艱而愈厲凛乎白首曽孤立以奚傷痛易簀之有言恨枕戈之未遂孰謂閲時之久忽形當寧之思肆命有司昭加恤典焚中山之篋既空讒慝之羣祭曲江於家益懋始終之眷而平章僕射相公扶持公論翌贊化原想夫正色於朝蔚有沃心之助致此休命賁于幽扄豈私門以為榮實吾道之增重某奉書而告追往更深記先友以示方來所願勳名之懿銘上恩而思報效敢忘忠義之傳答周漕啓伏審持節載驅褰帷來蒞送以禮樂上資周度之聞雖則劬勞民有安居之託共惟某官以敦厚之禀負通逹之才學道愛人夙著撫循之實正身率下更髙刺舉之風眷此南湘實為巨屏湖山清逺昔稱控制之雄户口浩穰尤覺賦輸之劇雖故歲之幸稔尚前歉之未償正資惠存以底安裕儻官吏之奉法自民俗之蒙休激濁揚清即聽公平之論圖事揆䇿旋歸獻納之班某久寓是邦便同舊里方衡門之自屏喜廣䕃之可依染翰見貽先辱瓊瑶之贈造門不逺行修桑梓之恭答胡提舉啓伏審持節載驅褰帷來届送以禮樂主資周度之聞雖則劬勞民有安居之託伏惟提舉郎中以疏明之禀負通逹之才執法漢庭夙著平反之譽觀風周道已聞忠厚之言載惟推擇之公實寄丁寧之旨蓋念兹土重罹歉菑尚逺食新之期居多仰哺之衆是勤賢德來布上恩正兹救患之時何異拯焚之急儻誠心惻怛惟恐一夫之傷則惠澤周流自然千里之及政施有序風動可期既寬宵旰之深憂且召豐年之和氣遂因成績入步要津某昨幸朝班數曕風宇方衡門之自省喜廣䕃之可依染翰見貽先辱瓊瑶之贈造門不逺行修桑梓之恭答柳嚴州啓奉詔牧民方待臨川之次䝉恩易郡更叨桐水之除自揆初心敢忘素守已上奉祠之請輒辭乘傳之行豈不知在今此州實拱行闕仰雲天之在望知日月之可依地望既隆民俗且簡几席枕湖山之上簿書雜魚鳥之間前瞻文王之風流尚想子陵之節槩叨逾過分夫復何言然某方兹退伏於里閭且欲從容於學問斯未能信敢言輕試於治人道之難明祗合靜求於在巳庶幾有得不辱其先日冀大君之仁俯從小已之願豈謂山川之阻忽勤魚素之攽敢占蕪辭少叙鄙意恭惟知府朝議以德履之甚茂全才脫之有餘惟自處期忠厚之歸故所至以牧養為事翺翔中外益著聲猷詠中和之詩已騰聲於近服陳治安之䇿即趨對於明庭某未諧先覩之期徒負告新之意敢借偃藩之樂少留坐嘯之娛秋律既深霜飈愈厲願體眷毗之厚益精調護之冝瞻頌之深敷宣罔既答胡參議啓空冀北之野昔知人物之英佐湖南之軍今喜風猷之近辱書先及佩意惟深伏惟某官以淳茂之資冨通明之學持心近厚蔚聞平讞之風正色不求雅有安恬之樂惟瀟湘之都㑹控江漢之上流溪山阻深户口繁夥雖民安俗阜必資元帥之得人然川泳雲飛亦賴嘉賔之贊畫是煩耆德來慰輿情諒坐席之未溫即蜂車之趨駕某深惟亡補退切自修好語見貽知有斷金之義從遊在即更歌伐木之詩答翟通判啓德門雅望聖世美才久更踐於民情益推髙於吏治出分屏軾尚淹半刺之權入佩荷囊行被九重之眷知有斷金之義偶同退鷁之飛逺勤專價之臨重辱長城之貺褒揚過實展讀懷慚千里叙情所愧非子雲之筆札一時仰德末由披彥輔之雲天瞻頌之深敷宣罔既答竹通判啓義形辭色識辨安危惟險阻之備嘗冝功名之立致豈期歲月之久尚爾淹遲乃於州縣之間更煩關决頃自吳門之别繼為南楚之歸寤寐雖勤書辭莫及知有斷金之義偶同退鷁之飛兹承專價之臨首辱朋緘之問辭旨敷暢展讀再三事理分明惟知感歎騏驥伏櫪無忘驤首之時鵰鶚在天更看冲霄之翼答嚴州州縣官啓南為祝融客方自屏於江湖郡枕子陵溪忽起分於符竹雖公朝之不棄在私義之未遑蓋退而治已尚多缺然則出而臨民其敢率爾輒上祠宫之請且惟編簡之求豈期薰慈逺貽慶問三復辭情之美益增顔面之慙恭惟某官論議該深見聞卓異素所蓄積蔚為瑚璉之珍暫爾淹遲莫掩斗牛之氣未遂同僚之幸徒勤仰德之懷愧感之深敷宣罔既答吕太博啓兹䝉薰慈委貺箋翰不為華藻無非忠信之言歷舉大猷備著切磋之義詠味數過感藏至深伏惟某官世德相傳天資甚茂立志靡追於時好行身力慕於昔賢暫分典於泮宫益養成於逺器某相聞雖久既見末繇永惟事道之難莫若求人之要考麗澤之象正資講習之功誦伐木之詩益見和平之助顧驅車之䆮邇知傾蓋之可期所欣有過之必聞庶或臨民之寡悔答遊廣文啓疏恩北闕分教南邦出御史之名門先聲巳著羣諸生於泮水講席方嚴伏惟某官文采蜚英豈弟從政蓄於平素既以致逺為心見于施為當有躬行之實念兹都㑹夙多俊良正資教養之功庸底作成之盛識其大者豈誦說云乎哉何以告之亦仁義而已矣某一違風采三易歲華欣聞徒御之臨首拜箋辭之辱自慚短翰曷報勤渠即聽名言少慰孤陋回嚴主簿啓發䇿大庭蜚英雋軌所論不詭公言允孚惟皇家設科本收多士之用而君子從仕豈為一身之謀故官無尊卑而報國則均事無大小而行志則一方觀逺業以慰輿情先辱貺於辭箋徒增深於感抱答新及第啓兹審承恩天陛拜慶親庭閭里知榮士友增慰惟䇿名委質當思忠義之勉圖而學道愛人豈其利祿之是慕願擴昔賢之志永為鄉國之光答新舉人啓伏承起從里選遂與計偕顧兹勸駕之初是乃䇿名之漸惟國之取士豈將富貴其身而士之逢時盍厲忠嘉之節行觀大對用卜逺圖願希董子之奏篇更加剴切毋若公孫之曲學徒取譏羞輒因報貺之辭少致贈言之義敷宣罔既悚愓增深答新舉人啓兹審起從里選榮與計偕惟蘊積之素充冝發揮之有漸待時而動豈為千祿之云正學以言斯乃事若之始蔚辭章之辱貺惟推轂之何功報贈不文謹藏為好謝生朝啓歲晚而思益艱蓋重蓼莪之感齒長而學不進更深伐木之求方渴佇於良規乃忽廑於善頌意則厚矣吾惟闕然敢云初度之光實積中心之愧南軒集卷八
