body:
  text: 南軒集巻三十五宋張栻撰題䟦䟦歐陽文忠公書梅聖俞河豚詩帖文忠公喜誦梅公此詩且屢書之抑亦有所感歎而然邪䟦呉晦叔所藏伊川先生上蔡龜山帖乾道癸巳歳八月之七日某伏閲是軸喟然而歎曰嗟乎學者不克躬見先生之儀刑既朝夕誦味其遺言以求其志攷其行事以究其用又幸而得其字畫而藏之盖將以想慕其誠敬之所存而亡有極也豈與尋常緘藏書帖者比哉夫聞其風猶使人若是況於如上蔡龜山親炙之而稱高弟者乎併與二公之書而寳焉抑可見師友淵源之盛矣䟦王介甫帖後一帖大理少卿許遵守京口時王丞相與之書遵刻之石始遵在登州論阿云獄事丞相為從臣力主之自後殺人至十惡亦許案問自首减死長惡惠姦甚逆天理今此帖乃謂遵夀考康寧子孫蕃衍由其議法求所以生之之故蓋丞相炫於釋氏報應之說故以長惡惠姦為隂德議國法而懐私利有所為則望其報其心術之所安蓋莫掩於此予故表而出之䟦王介甫帖金陵王丞相書初若不經意細觀其間乃有晉宋間人用筆佳處但與人書帖例多怱怱草草此數紙及予所藏者皆然丞相平生何有許忙迫時邪䟦王介甫帖予喜藏金陵王丞相字畫辛夘嵗過霅川有持此軸來售而得之丞相於天下事多鑿以已意顧於字畫獨能行其所無事如此此又其晚年所書尤覺精到予所藏他帖皆不及也跋東坡帖坡公與銀臺舎人帖殆是行新法時勸其因入對盡所欲言且曰人臣事君惟有竭盡庶幾萬一恐未當以前例為戒讀斯言凜凜有生氣士大夫希世求合者固不足問茍雖有言而懐不自盡皆徇情惜已非為臣之義也讀斯言亦可以興起矣跋東坡帖坡公結字穏密姿態横生一字落紙固可藏玩而况平生大節如此哉竊嘗觀公議論不合於熈豐固宜至元祐初諸老在朝羣賢彚征及論役法與已意小異亦未嘗一語茍同可見公之心惟義之比初無適莫也方貶黄州無一毫挫折意此在它人已為難能然年尚壯也至於投老炎荒剛毅凜凜略不少衰此豈可及哉范太史家藏公舊帖其間雖有壯老之不同然忠義之氣未嘗不蔚然見於筆墨間也真可畏而仰哉跋蔡端明帖蔡端明書如禮法之士盛服齋居不敢少有舒肆之意見者自是起敬䟦司馬忠潔公帖右司馬忠潔公帖惟公㐲節仗義不辱其先某頃在儀曹嘗上公節惠應諡法今獲見翰墨慨然想其平生所謂臨風涕零之語其憂傷之意夫豈私于身哉䟦張侍郎帖右侍郎張公政和間與成正賈公手帖所論陜西鐵錢事使人歎息盖自熈豐用事大臣更變法度其後祖述之者益以近利為急一時觀望蠭起毛舉至於無法之不變而無法之不壊陜西錢事亦其一也小人大抵喜更作務生事其意欲乗時射利而已寧為國家生民計耶是以歎息跋陳了翁帖了翁忠義剛大之氣高出一世及觀此帖處事精密不忽於細微益知前輩工夫非苟然也淳熈乙未嵗未盡三日賀州别駕李宗甫見寄跋了翁責沈責沈者贈諫議大夫忠肅陳公之所作也公壯嵗未聞前輩先覺之名迄終身以為歉至引葉公之事自責葉公實沈諸梁故名其文曰責沈龜山楊先生嘗為之䟦既足以發明公之盛德矣反復而讀之又以見公進學之心尤嚴於既老之際徙義之勇不忽於卑者之言其虚中克己皆可以為後世師法建康留守劉公得真蹟而刻之以墨本來寄某謂斯文之傳誠有補於世教獨恐逺方之士艱於得見乃復刻于桂林學宫云劉公名珙淳熈四年六月戊子廣漢張某謹志䟦李泰發帖李公以八十之年流落鯨波萬里之外而翰墨辭氣凜凜如此誠一時偉人也某雖不及識公展玩此軸亦足想見其平生耳跋了翁與丞相隴西公書丞相隴西公宣和元年六月論都城水事自左史謫官沙縣此諫議陳公所寄書也丞相精忠大節森然如星斗之在天而事業實權輿於此諫議於丞相為丈人行今觀書辭所以相與蓋甚篤前輩憂時之念深故於人才拳拳如此歛袵三復敬歎何窮惟是某嘗竊怪諫議平生於君父大義跬歩不舎其與異教淪棄三綱者不翅霄壤之異矣顧乃區區樂講於其説獨何歟恨生晚不及親見公質所疑也書相公親翰子曰顔氏之子其殆庶㡬乎有不善未嘗不知知之未嘗復行易曰不逺復無祗悔元吉甲申孟秋朔先公次餘干暑甚憩趙氏養正堂毎閒暇親翰墨多冩經書要言置縑囊中累十百紙先公易簀於仲秋不肖孤哀苦謹藏遺澤不忍發讀越二年前進士太原陳伯雄來相弔於湘水之上自以嘗在江淮辱先公誨言欲求字畫而歸為子孫藏予慟哭開篋取此紙授之嗚呼學聖人必學顔子則有凖的顔氏之所以為有凖的何也以其復也復則見天地之心成位乎中而人道立矣然而欲進於此奈何其惟格物以至之而克己以終之乎嗚呼此先公之所以教某者今併以告陳子丙戌十月甲戌某謹書䟦尚憲帖尚公之所以告其知己者可謂切矣受人之知者不當爾邪公之没也乆矣讀其書辭猶覺生意凜然義理之不可泯也䟦孫忠愍帖孫公此數帖其處死蓋已素定事豫則立豈不信乎自熈寧相臣以釋老之似亂孔孟之真其說流遁蠧壊士心波蕩風靡中間變故仗節死義之臣鮮聞焉論篤者知其有所自來也觀公訓敕諸子從事經史大抵以實用為貴以渉虚為戒其不愛變於俗學可知卒有以自立宜也鄂州史君千里寓書敬題巻末䟦尹和靖遺墨和靖先生所居之齋多以片紙書格言至論寘于窻壁間今徃徃藏于其家如此所刻是也反復玩繹遐想其感發之趣深存體之工至而浹洽之味為無窮也嗟乎學者於此亦可得師矣書贈吴教授誠者天之道敬者人事之本敬道之成則誠而天矣然則君子之學始終乎敬者也人之有是心也其知素具也意亂而欲汨之紛擾臬兀不得須㬰以寧而正理益以蔽塞萬事失其統矣於此有道焉其惟敬而已乎伊川先生曰主一之謂敬又曰無適之謂一夫所謂一者豈有可玩而執者哉無適乃一也蓋不越乎此而已嘗試於平居暇日深體其所謂無適者則庶乎可識於言意之表矣故儼若思雖非敬之道而於此時可以體敬焉即是而存之由是以察之則事事物物不得遁焉涵泳不舎思慮將日以清明而其知不蔽矣知不蔽則敬之意味無窮而功用日新矣天地之心其在兹與學者舎是而求入聖賢之門難矣哉至於所進有淺深則存乎其人用力敏勇與緩急之不同耳吾友臨川吴仲權志於古道將以敬名其所居之齋而日勉焉於其行也書此以贈之蓋朋友相與警勸之義也題長沙開福寺長沙開福蘭若故為馬氏避暑之地所謂㑹春園者今荒郊中時得塼甓皆為鸞鳯之形而竒石林立二百年來供城中官府及人家亭館之玩何可數計而蔽於榛莽卧於泥池者尚多有之當時不知載致何所用民之力又何可量哉馬氏父子乗時盜據一方竭澤聚斂以自封而又以資其侈靡之用旋踵而衰兄弟相讐敵魚肉惟恐不及亦其理與勢宜然今湘岸有淫祠江中有誓洲及其交兵詛誓之所小家自為蠻觸祗足以發千載之一笑寺之西袚禊亭下臨湖光舉目平逺自為此邦登覽勝處不足用馬氏為汙也䟦祖慶所藏其師宗杲法語觀慶之請以父母為言而其師特為拈出嗟乎是非秉彛之所存而不可以己者邪今祖慶刻石蔣山改父母作生死字南軒集巻三十五
