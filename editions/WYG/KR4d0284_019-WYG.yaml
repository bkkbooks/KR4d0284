body:
  text: 南軒集巻十九宋張栻撰書寄劉共甫樞宻某幸安湘濵不敢廢學無足厪記念自惟不敏竊守樸學顧世衰道㣲邪說並作肯信此者少獨樞宻發慨然之志而下取及一得之愚乆而益眷眷焉毎念無以禆補萬分退用愧悚來教自以為報主之心有加無已而向者之為有所未慊于中方將沛然用力於古道區區聞之喜且不寐嗟乎靖康之變亘古所無金人盤㨿中原四十餘年矣三綱不明九法盡廢今為何時耶士大夫宴安江左而恬莫知其為大變也此無他由不講學之故耳今樞宻以天子大臣而志乎此道則某之喜為如何雖然學之難明也乆矣毫釐之差而千里之繆其用極天地而其端不逺乎視聽食息之間識其端則大體可求明其體則妙用可充願樞宻勉之又程先生易得樞宻録本傳逺實學者之厚幸夫所謂易者何哉聖人之言曰乾坤成列而易立乎其中矣此豈獨謂此數巻書乎其必有所謂矣而此數巻中書所以述其藴也言有盡藴無窮故學者必於言意之表識易而後易可讀也頃文定春秋此路有卲陽本字差小栻所㸔舊日嚴州本謹納去春秋即事而明天理窮理之要也極宻觀此書取其大義數十㫁為定論而詳味其抑揚予奪輕重之宜則有以權萬變矣又湘民望樞宻之至不減赤子之於慈父使人咨嗟歎仰然某之愚有敢為先事之獻者輙以布之某觀近世再臨舊鎮者聲望率減於前或曰上下玩習之故某以為無是理殆由在我者有忽之之心耳前者旣已得譽及其復來將曰此易治耳是心一萌則敬肆分宜乎羙惡之不同也而况樞宻今兹之來勢位益尊聲名益重則下民之情將有不敢以自盡者隔絶壅塞之患此亦不可以不慮也易曰徳言盛禮言恭此言徳貴於盛而禮貴於恭也伏惟樞宻警懼存心益敬其事謙虚自處不負其有降其辭色惟恐不及使匹夫匹婦之情皆得以通而士大夫有懐皆得以吐露至于箴規指摘畢聞於前而無所謂不敢者則善政日新而無斁矣豈惟一路之幸實經綸之業益以光大將邦家是頼而天下之福也昔人自逆于境逆于郊即觀聽其辭色而議之蓋人心之向背首謹於兹時用敢陳于未及境之前側承風聲以慰願望又某效職于此亦以十閱弦晦佩心誠求之之訓味哀矜勿喜之言怵愓黽勉幸而未得罪於斯民又幸而適遇稔嵗盗賊屏戢人情頗相安惟是區區不敢但為目前計考究緝理庶幾萬有一乆逺之計云今最急者諸州窘匱無以支梧一路財計本可以均濟其如計臺之壅利何秋中有請願與憲漕共究一路財賦底裏通融均撥幸䝉賜可詳細紬繹頗見涯緒若此論遂定庶幾諸州官吏有俸軍兵有粮而民力因得少寛也邕宜諸邊雖幸悉安靜然野心豈可保惟當充吾備禦之實使有隠然之勢以折其萌選練親兵立伍結隊明其訓習教以親睦激以忠義至於旂皷器械皆從一新收拾强壮不敢惜費今所増已近三百率皆選士江淮健者視亦無以相逺也邕冝將兵亦與選練按試矣獨患難得好將官只得短中取長耳諸蠻一以信義待之如買馬一事舊弊革去凡數十事最害是塩銀輒虧其輕重彼顧豈不曉吾所得幾何而所喪者邱山帥司先利夫出剩銀之得受此利㗖而其下官吏悉從而刻减乾沒今先罷出剰銀正名以率之而嚴法以核之必使輕重悉以實毋得少罔之招馬官先以此意出塞喻蠻落舊來馬至二月末方有來者而羅殿又四年不來市正以吏侵牟之之故今方中冬數日前邕州己申羅殿將馬千七百疋近塞矣益知忠信之可行而在我者誠當自檢也素荷教誨愛念輒以及之自惟孤迹䝉上使令於此一日不敢不盡一日之心力其它非所能計獨恐淺短綿薄有所不能勝又所部闊逺防虞非一每懐淵氷之念鈞慈不忘誨旨時及不勝幸願又某承乏逺藩未速罪戾實惟庇䕃之及近日鄭憲旣行趙漕物故兩臺俱闕官不克兼攝事緒業委然向來兩臺於諸州多興獄事紛紜淹乆一切觀望不敢與决困於囹圄瘐於道路深可憐惻今得以决遣觧釋頗有次第又向來㑹議財賦事正縁所見異趣者不肯商量計司虚實終未知其底裏今得以考究無遺始知異趣者前日誠有棓聚為羡獻意坐視諸州困極恬莫之恤深可歎息兩日來子細區處為一定乆逺之計頗有條理旦夕徑奏于上自餘赦條合放而不放道理不當取而妄取者悉施行以次蠲䘏矣自惟愚戅苟一日在職不敢不究心此外身之利害非所遑䘏又某少意冐禀鈞聽前知光州滕瑞編管在此其人乃是滕樞族人比歲自山東來歸正粗勇習兵事可以在軍中任使而虞丞相用之過當畀以郡符此豈其才哉其所以速今日顛隮者實虞使之然也然東北人流落為可憐憫其孥尚畱江上在此極栖栖然今為差兵校前徃般取欲望鈞慈頥旨應副一客舟津致其來俾其骨肉得以團聚謀生恩賜甚大其人雖愚異日可偹顔得荷㦸之用伏鈞察又某近因到一巖空中得石刻載昭陵盛徳一事可以補史之遺已移置府治㕔事敬以一軸上呈此語祖宗家法也伏想鈞慈三復焉此邦山巖之勝誠它處所未見環城竒觀柳柳州所謂拔地峭堅林立四野可盡大槩然拙守但一渉歴不欲數出游時獨憑樓覧觀耳又某輙有愚見仰裨海嶽前領鈞翰其間有云自到江上未見人才某竊以為人才在今日誠難得其備然而舎短取長隨才而用則恐所至亦不容無而况通都大府乎丼苦燥冷惟良毉所擇义負偃植惟大匠所施伏惟鈞慈洪取人之方酌采葑之義庶幾片善寸長盡歸掄選又惟樞宻髙明傑出之資人之有長固未易進于前儻非虚心降已不忽隠㣲懇惻敦篤以招來之則非惟抱實能者有所不能盡察而懐髙見者彼亦烏肯自售哉某之區區以為天下事要湏衆力共濟乃可有成伏惟樞宻負天下之望者也故旅鄉祈望之切而不自知其僣越伏紙皇恐之至寄周子充尚書埀諭或謂人患不知道知則無不能行此語誠未完知有精粗行有淺深然知常在先固有知之而不能行者矣未有不知而能行者也語所謂知及之仁不能守之是知而不能行者也所謂知之者不如好之者好之者不如樂之者是不知則無由能好而樂也且以孝於親一事論之自其粗者知有冬温夏清昏定晨省則當行温清定省行之而又知其有進於此者則又從而行之知之進則行愈有所施行之力則知愈有所進以至於聖人人倫之至其等級固逺其曲折固多然亦必由是而循循可至焉耳蓋致知力行此兩者工夫互相發也尋常與朋友講論愚意欲其据所知者而行之行而思之庶㡬所踐之實而思慮之開明不然貪髙慕逺莫能有之果何為哉然有所謂知之至者則其行自不能已然湏致知力行工夫至到而後及此如顔子是也彼所謂欲罷不能者知之至而自不能以已也若學者以想象臆度或一知半觧為知道而曰知之則無不能行是妄而已曽晢詠歸之語亦可謂見道體矣而孟子猶以其行不掩為狂而况下此者哉不識髙明以為如何問及此間相從者某邇來退縮豈敢受徒但有舊日士子數軰時來講問亦不過以行逺自邇登髙自卑之方語之耳所謂晩軰假先儒之論以濟其私者誠如所憂胡文定蓋嘗論此然在近日此憂為甚是以使人言學之難非是不吿語之正恐竊聞一言半句返害事耳要亦如玉石之易辨即其行實夫豈恫疑虚喝可掩哉文定所論甚詳備在文集中曽見之否义重諭近世學者徇名忘實之病此實區區所憂者但因學者狥名忘實而遂謂學之不必講大似因噎廢食耳後世盗儒為害者多矣因夫盗儒之多而遂謂儒之不可為可乎熙寧以來人才頓衰於前正以王介甫作壊之故介甫之學乃是祖虚無而害實用者伊洛諸君子蓋欲深救兹弊也所謂聖人誨人有先後學者進徳有次第此言誠是也然所謂先後次第要湏講明譬如適逺豈可不知路之所從不然只是冥行而已至如所謂不可以聖賢自期者則非所聞大抵學者當以聖賢為凖而所進則當循行序亦如致逺者以漸而至若志不先立即為自棄尚何所進哉所欲言者要湏面盡又埀諭子澄所疑且云禪初不知其得失不欲隨衆詆之伊川未窺其閫奥不敢以言語稱道足見君子所存之忠信也第以某愚見所謂不知其得失者要當窮究其得失果何如未窺其閫奥者當窮究其閫奥果何如講論問辨深思熟慮必使其是非淺深了然扵胷次此乃致知之要入徳之方豈可含胡閃避而已也毎竊敬歎下風故所懐亦不復敢隠有以見教是所望也答湖守薛士龍寺正講聞髙誼之日乆矣近歲見吕伯㳟陳君舉稱說尤詳毎念曕際以慰此心在省中時亦見辭免審察文字竊為諸公言致賢者之道恐不當如是已而某亦出闗尚念取道義興儻可一見而义差池徒徃來于懐而已兹辱手字辭氣温厚如接眉宇重篤先契尤所感歎即日歲晩雨寒伏惟撫循有相台候萬福某向者備數朝列雖粗知自竭而誠意不充迄無以仰答明主之遇寛恩保全獲返先廬惟知深自省厲它無足軫念聞去冬嘗以使指徃淮上想事情之實悉得徹旒冕之前所謂荒田蕪扵包占經理害扵無謀二語誠切要也呉興下車䆮乆學道愛人之志亦可少施否某毎念時事若此良由士大夫鮮克務學之故蓋天理之㣲為難存氣習之偏為難矯譬諸射者在此有秋毫之未盡則扵彼有尺尋之差矣自惟不敏愓然夙夜不敢遑暇思得良友相切磨以庶㡬乎萬一其願見之心誠非可以言喻也報問之始亦不欲只以寒暄語惟窮理戒我心之萌臨事防已意之加充茂徳業以慰士望伏紙拳拳又論及學校之事此為政之所當先也湖學安定先生經始當時作成人才亦可謂盛矣聞欲招陳君舉來學中此固善但欲因程文而誘之讀書則義未正今日一種士子將先覺言語耳剽口誦用為進取之資轉趋扵薄此極害事若曰扵程文之外明義利之分教導涵養使漸知趨嚮則善也又某前年過霅上時嘗徃拜安定先生之墓荆棘㡬不通路又墻垣頹圮為何人所侵勢有可慮某意謂冝專責教官掌管令一家守之正其封域勿使侵犯是時無可告語今想自賢使君下車之後已留意矣謾及之答潘端叔大抵讀經書湏平心易氣涵泳其間若意思稍過當亦自失却正理要切處乃在持敬若專一工夫積累多自然體察有力只靠言語上苦思未是也事親之心至親至切古人謂起敬起孝更湏深體而用力焉答潘叔度所諭讀書平易則簡畧放過稍思則似做時文固當如此省察但所貴扵平易者謂平心易氣優㳺玩味其旨正非簡畧放過也若夫家庭間事於已見有阻礙其間曲折萬端乃是進修深切處大要返求吾身而已矣與顔主簿竊觀左右論程氏王氏之學有兼與而混為一之意此則非所敢聞也學者審其是而已王氏之說皆出扵私意之鑿而其髙談性命特竊取釋氏之近似者而已夫竊取釋老之似而濟之以私意之鑿故其横流蠧壊士心以亂國事學者當講論明辨而不屑焉可也今其扵二程子所學不翅霄壌之異白黒之分乃欲比而同之不亦異乎願深明義利之判反求諸心當有不待愚言之辨者惟深察焉答呉晦叔埀諭太極之說某妄意以為太極所以形性之妙也性不能不動太極所以明動靜之藴也極乃樞極之義聖人扵易特名太極二字蓋示人以根抵其義㣲矣若只曰性而不曰太極則只去未發上認之不見功用曰太極則性之妙都見矣體用一源顯㣲無間其太極之藴歟所謂太極天地之性語意亦未圎不若云天地亦形而下者一本扵太極又曰惟其有太極故生生而不窮夫生生不窮固太極之道然也所云一隂一陽之謂道繼之者善也不若云有太極則有兩儀生生而不窮焉言其如此則曰性言其如此則曰太極似亦不必如此說又曰惟天地及人具此大本亦有病人仁則太極立而天地之大萬物之多皆吾分内耳詩曰予懐明徳不大聲以色明徳固是心之徳然不可只㫁了便休湏要教分明之云者自明也更黙體之當見有味又近玩味已發未發扵日用間甚覺顯煥周子誠通誠復之說極有理也伯逄書來亦說及善不足以名之之說某所答曽見否大抵當時知言中如此說要形容人生而靜以上事却似有病故程子云天命之謂性人生而靜以上更不容說才說性時便已不是性凢人說性只是說得繼之者善也此猶是天下之言性者斯言最為盡之蓋性之淵源惟善可得而名之耳晦叔意如何數日來看龜山集乃知前軰所造如龜山軰未易輕議也又仁右道左之說伊川所以有取者亦嘗思之仁字對道字而言乃是周流運用處右為陽而用之所行也左為隂而體之所存也仁者天下之正理此言仁乃天下之正理也天下之正理而體之扵人所謂仁也若一毫之偏則失其理則為不仁矣道也者不可湏臾離也可離非道也道無徃而不存遺書中所謂道外無物物外無道即父子而父子在所親即君臣而君臣在所敬是也如何離得人之所以不能體道者以人為之私蔽之也人雖蔽扵私不能與道為一然道實未嘗離也明道與韓持國論克己一叚反復此意甚詳所宜深味耳辱埀問据鄙意言之要非尺紙可盡术知是否却幸見諭又前䝉録寄所答元晦書得詳讀甚幸所謂知之在先此固不可易之論但只一箇知字用處不同蓋有輕重也如云知有是事則用得輕匹夫匹婦可以與知之類是也如說知底事則用得重知至至之之知是也在未識大體者且當据所與知者為之則漸有進歩處工夫若到則知至矣當至之知終矣當終之則工夫愈有所施而無窮矣所示有云譬如行路湏識路頭誠是也然要識路頭親去路口尋求方得若只端坐于室想象跂而曰吾識之矣則無是理也元晦所論知字乃是謂知至之知要之此非躬行實踐則莫由至但所謂躬行實踐者先湏隨所見端確為之此謂之知常在先則可也撥冗殊不逮意更幸悉察又在中之說鄙意正爾幸扵此涵養焉兀晦太極之論太極固是性然情亦由此出曰性情之妙似亦不妨如知言粹然天地之心心字有精神觀其下文云道義完具無過無不及固是指性然心之體具扵此矣伊川謂心一也有指體而言有指用而言又以喜怒哀樂未發為寂然不動者也幸更扵此深思焉太極之說某欲下語云易也者生生之妙也太極者所以生生者也曰易有太極而體用一源可見矣不識如何某向來答元晦中庸之說後見所示疑處徃徃有同者今録呈渠又有分中庸章句一紙欲寄呈偶尋未見大畧某書中所答者可見矣明道先生為條例司属官乃是介甫初為叅政時正欲就其中調䕶變化之也後來見他執抝不可囬為天下害故在臺中力論之無非中節也介甫與人雖是如此不同畢竟稱其忠信此可見當時所以調䕶變化之者亦無所不盡其誠矣又反復其道正言消長徃來乃是道也程子所謂聖人未嘗復故未嘗見其心蓋有徃則有復以天地言之陽氣之生所謂復也固不可指此為天地心然扵其復也可見天地心焉蓋所以復者是也其在人有失則有復復賢者之事也扵其復也亦可見其心焉若夫聖人生知純全無俟乎復則何所見其心焉妄意未知是否又近季隨寄勿齊𨽻字幷諸詩來某報之以題榜旣設所冀顧名思義惟日孜孜焉而後可因見時警䇿之幸也再玩所為詩語意固佳但如雲潰牎涵月春囬木放花只說得克後意味却扵勿處少力觀顔子請問其目而孔子所以告之者正是吿克已之目顔子請事乎此乃萬世標準學者但當深吿以勿字工夫工夫到後自㑹見得若遽只說克後意味又恐使之只貪想象之見工夫滅裂耳此亦不敢不告非惟吿人在我所當謹也又樂記人生而靜一章曰靜曰性之欲又曰人欲靜者性之本然也然性不能不動感扵物則動矣此亦未見其不善故曰性之欲是性之不能不動者然也然因其動也扵是而始有流為不善者蓋物之感人無窮而人之好惡無節則流為不善矣至此則豈其性之理哉一已之私而已扵是而有人欲之稱對天理而言則可見公私之分矣譬諸水泓然而澄者其本然也其水不能不流也流亦其性也至扵因其流激汨扵泥沙則其濁也豈其性哉又某已作書偶復檢得舊書一紙今併報去夫子答子路子貢管仲之問愚意以為子紏之立非正管仲可以不死然其初之從紏知其不正而從之蓋亦非矣其不死於紏而從桓僅比扵背君從讐者為免耳非無歉扵義也二子扵此其必講之明矣夫子但稱其捄世之功問其仁而獨稱其事功則其於仁也亦可知矣然使其果為背君而從讐也則雖事功亦不足稱矣抑揚與奪固備扵此更幸詳之以朱温系統通鑑亦然蓋扵紀事有不得已焉耳方其時正統無所属而彼實承唐之後以有中原則紀史事者烏得而不系之亦非為其所成者大也茗貨之事亦嘗思之未得完䇿幸更為精愽詢訪評論見告必有至當之說也又累書皆有所講評冗迫乆未及報然亦嘗思之今􅓽布一二黄老之學流入於刑名蓋其翕張取與之意竊弄造化之機故其流為刑名若隂符經之說已可見刻薄之意露矣天生徳扵予不言命而言徳亦猶天之將喪斯文稱斯文也蓋其理是如此聖人之言自爾渾全若着自任兩字恐却扵夫子氣象有所未合耳井有仁之說近來思之當從明道先生說舊觧論語比更定已六七篇矣中虚信之本謂信之所以有也中實信之質謂信之體質也忠信可以蹈水火只是言有此理耳如必欲摭事而言則宋共姬逮乎大理是固忠信之所行也知我者其天乎蓋理之不二也謂常人一念之形天地知之似亦無害蓋自不可掩非謂天地有尸之者而能知也怱怱畧及大槩更幸詳之却以見教南軒集巻十九
