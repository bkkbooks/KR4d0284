body:
  text: 南軒集卷二十四宋張栻撰書答朱元晦章句序文理暢達誦繹再四恨未見新書體製耳近思録誠為有益於學者之近思前此伯恭尚未寄來也某比改定得語解數篇未及寫去先進以後後來過目有可示教一一條示至幸至望游誠之誠長進但向來相聚見其病多在矜之一字亦嘗力告之若不痛於此下工則思慮雖親切亦終必失之耳今在彼動心忍性處多於渠當復有深益某若祠請得遂徑歸城南溫繹舊書甚幸但近年極思與君子一相見何日得爾耶儻居間當漸可圖也是間學校廟宇巳成頗為雄壯書閣講堂次第而立闕然大抵類長沙學而木植規範似過之恐早晚去此求記不闕令具始未及畫圖旦夕專人走前它懷此未能具布又某幸粗安常近緣憲漕兩臺俱闕官不免時暫兼攝雖事緒頗多然一路滯獄苛征得以决遣蠲放不敢不盡心也向來慮所論乞增撥諸州一分鹽息錢及增邉州米錢事㑹適䝉恩㫖施行因得子細奉承且為一路思久逺根本之計樁貯四十萬緡於諸州以權衡鹽法接借本腳而又措置防異日漕司增鹽諸州抑賣及妄費等弊頗詳一一列上若非今次攝漕事則亦無由料理得也此是一路性命所係前日幾為小人盡刮以獻前後文字俟一一録去此事一定則拙者欲秋凉後丐歸長沙舊廬耳虞帝廟磨崖已刻得有次第前日打得數字謾附呈兩日以霖雨不曽打得也磨崖之傍近因取石遂鑿開一巖頗佳巖之後正臨皇澤之灣今欲當戶為亭以瞰之巖曰韶音亭曰南風亦恐欲知中庸集解已成只是覆尤溪版納一部去見刻三家昏喪祭禮溫公橫渠伊川未畢也孟子欲再改過終緣公務斷緒蓋雖退食其於庶事又有當考究思慮者不敢放下耳偶有少事具見别紙速遣此價它未能及俟碑成再遣人去正惟為道義重又某近聞建寧書坊何人將癸巳孟子解刻版極皇恐非惟見今刪改不亭恐誤學者兼亦甚不便日夜不遑已移文漕司及府中日下毁版且作書抵鄭傳二公矣更望兄力主張移書若言之且諭書坊不勝幸甚此價回欲知已毁之報甚望又奉教以禮書中不當去冠禮事甚當是時正欲革此間風俗意中欲其便可奉行故不覺疏略如此見已改正如冠禮乃區區久欲講者當時欲留此一段候將來商議定耳比者長沙亦略考究為之說其間固多未安今謾録呈願兄裁定示誨此事乃人道之始所係甚重所謂冠禮廢天下無成人也惟早留意幸幸虞廟樂章所以未刻者緣有少疑辭固高古有餘味但如神降集兮巫屢舞之類恐涉於不敬又此邦之人尚鬼訛怪百端恐愚民不識用意之所在傳訛為怪異恍忽故未敢刻更幸詳之見教乃得奉承耳所謂天德剛明非幹母之蠱者所能開迪此論之至當某之愚近思之亦謂然如闕輩難責蓋未免要它官職耳不知寫與伯恭渠謂如何若只如闕所執恐終無益下梢了得個渾身無病痛出來已是大㬠竟何益也然此論切不可輕出已是被人憚吾輩之深未有益而空先重其疾耳又孟子解板不謂鄭少嘉全不解人意早晚賀倅李宗甫歸當今擕書往見趙守專辦此事須煩李君面看劈版是時亦拜書煩力一言也某已遣人行偶復記有一事再此具布虞廟碑中肸嚮字此間有舊日監本西漢書檢得甘泉賦中肸嚮豐融乃是從向古字固多通用遂不復改幸照悉又語說荐荷指諭極為開警近又刪改一過續寫去求教私心甚欲一相㑹若得至長沙當有可議耳伯恭既已轉對恐當為去就計近見臺臣論程學云云如伯恭在彼尤不應恝然也石子重向來聞在三衢辭召命甚善今聞已到闕未知所言何如耳其它大抵非逺書可達也學舍己成方敢請諸邑有行義士人入其中為表率嶺外風俗尤弊雖未易遽正然不敢不開端示漸如喪祭婚姻間亦頗有肯革者理義存乎人心但患啓迪薰陶之未至耳又論語章句精確簡嚴足以詔後學或問之書大抵固不可易之論但某意謂此書却未須出蓋極力與辨說亦不能得盡只使之誦味章句節節有得則去取之意與諸家之偏當自能見之不然却恐使之輕易趨薄耳又共父一病遽至薨逝聞問慟哭傷痛奈何積望至此亦殊未易時多艱虞喪此柱石深為天下痛惜之不但朋犮相與之私情想同此心也奈何奈何其家事今如何嗣子頗能立否凡事相悉倚賴賢者當亦不惜力也葬事在幾時有定耶某義當往哭適此拘攣今且專價去俟到武昌更再遣往臨書涕零不勝情也又某自附陳明仲書後一向乏便嗣音惟是懷仰未嘗忘也秋凉行大江所至逰歷山川復多濡滯今方欲次鄂渚更數日可解舟舟中無事却頗得讀論語易傳遺書極覺向來偏處取所解孟子觀之段段不可意義之難精正當深培其本耳修改得養氣說數段舊說略無存者得所寄助長之論甚合鄙意俟到長沙録去求教曽子之說伊川法則之語深有味於此看得道字極分明也知言疑義開發尤多亦有數處當更往復及後來旋看出者併俟後便此論誠不可示它人然吾曹却得此反復尋究甚有益不是指摘前輩也上蔡語解偏處甚多大有害事處益知求道之難也又某受任上流到郡恰一月顧此地在今日至重豈謭陋所能勝然亦不敢妄自菲薄黽勉激昻期為逺計第承積弊之餘綱紀委地無一事不當整頓今頗有條緒邦人似相信愛邉備深可寒心軍政極壞今軍事在都統財賦屬總司所謂帥臣者其所當為要是以固結民心為本使斯民皆有尊君親上報國疾讐之心則以守固以戰克矣此路民貧悴尤甚它處田多未墾茅葦彌望坐失上䇿于今幾年義勇民兵實多强壯但久不核其籍且數年不教其勢因循見行整頓此事在於人情亦似樂之然其間曲折之冝正須精密乃可帥司兵但有神徑馬步合千人騎軍共父所制也方一新隊伍嚴紀律明節制兵雖不多要是規摹不可不立荆鄂大軍屯營在此者亦萬五千餘人非復嶽侯向日規摹近日曽喚來射亦全不成次第兵將輩見帥司治軍似頗有愧色前此其軍擾郡中百姓不可言某務以信義開懷待之而號令則不可少犯頗肅然無敢干者襄陽去此平原四百餘里耳然向來兵不曽出此者以糧運費力之故顧此亦何足恃但此間乃吳蜀腰領自襄陽至此要當以死守之往年劉信叔號名將張安國素豪俊然為帥時才聞邉上少警便倉皇要為移治江北之計此乃大繆不知縱敵使至此更有甚世界此皆不知義亦不知勢也某孤危之蹤獨荷主上照見使為此來然實不敢自保其久于此惟是深懼一日必葺之義思效萬分而獨力更無人相助欲辟一二官屬未知得與否耳范伯達夫田文字前日來時遍尋不見輒更求一本及兄有可損益於其間者併願聞之甚望又懇辭再四不獲就國為冝一境之民得䝉被詩書之澤何其幸哉某居官如常但比之靜江應接頗多殊覺少暇耳所幸逺近頗寧肅雨澤沾足高下之田悉得就耕京西界中有賊過北界劫其縣殺其令歸途涉本路境追捕得數輩梟于境上其中有北方官員亡奴過來勾引京西賊劫天下之惡一也本縣亦縛送之邉頭之人初頗不安賴此安靜但孤蹤殊不敢自保然茍尚留此每事不敢不黽勉義勇近來振激之頗覺它時可用為之立節制總紀使各受縣宰節度寓以階級向來科擾迎送役使之類並罷專一令防盜暇時習武若今冬未以罪去當更聚閲整齊之本路副都統兵寨在此而身留襄陽比來此相見其人乃郭杲亦明快可與語問某此間得無為守備乎緩急有堡寨否某應以此間出門即是平原走襄陽僅六百里所恃者襄漢立得定折衝捍蔽耳太尉當力任此事要兵要糧此當往助若放其入肝脾裏人心瓦碎何守備為向來劉信叔張安國皆有緩急移保江北之論乃大繆也使敵到此地何以為國守臣但當握節而死耳渠頗悚然然某所恃者有此二萬來義勇所當整頓緩急有隱然之勢也今專務固結其心愛養其力庶幾一旦可共生死第一義也到此半年所見如此謾恐欲知劉寶學志銘正月半間專遣價走送其家至今無耗殊不可曉今録本去拜呈恐未之見也共父遂葬聞之不覺淚落渠此間置神徑馬軍及經理義勇兩事可書但是時為政猶未及晚年在建康時耳又仁風義氣想已周浹四境重稅厚供想已考究本末備見求牧與芻固當然也某於此有所見亦不敢以隱但亦精審而後發耳辰沅等五郡刀弩手事近嵗為誕謾觀望者所害比列上為久逺計諸司皆恐未合時論雖知其是有不敢聨銜者不免徑自以聞便䝉開可為明主可為忠言士大夫往往負之耳如茶引㑹子上供皆目前大利害見考究以次陳也惟是孤蹤不敢自保然一日必葺之義不敢少墮耳義勇事屢承問及共父向來在此入奏謂義勇武藝勝大軍緩急可調發某實未見其然然其人多强壯倉卒足為荆渚之衛以壯上流平時可以捕察盜賊此則然耳共父御此輩未免姑息如免役一事極害事後來至縣道無人可差役中下以下户反受深害今亦修正其事又縣道不能節度豈有是理亦明示節制使知縣而不任則去之可耳比有總首徑申本司保明差一部將不經縣道不免懲治使知循序此最要務也然義勇尋常多有所患若如率斂等事一切禁止所以恤之者固不可不盡而於節制則不可不明耳若今冬聚教某未以罪去當更一一整頓之但患武將極難得亦是近年以來進退在近習之門所取皆誕謾之輩壞得人才狼狽極可慮耳所諭傳聞之說甚皇恐不知何以得此連日循省緣初到時承縱盜之後不免重賞連獲江湖間積年殺人之賊以正典刑又有一賀之美者乃一路囊橐渠魁六七年來激茶客為盜誤官軍使敗且假盜以報寃用此致家資纍巨萬一路之人怨毒之深畏之甚如虎狼不免逮捕按誅徙其妻子盡沒其資歸之有司而不有之併按治憲司大吏向來受賂故縱者今年茶客盡循約束無一夫敢持兵行於途者此一事之力為多恐或者便以為嗜殺耳近數月以來既幸無新盜而舊盜已多得亦無所用刑矣但昔人哀矜勿喜之意每切味之要須使此氣味無間斷耳尚氣之言亦每防有主張過當處亦不敢不聞而警之也近安一郡守素來凶險事極披猖不得而已異時恐亦不在祝大任之下因思諸葛忠武李平廖立之事固是公道然亦由德盛感人之深乃能致然每使人愧昔賢耳又幸安職守今年雨暘以時可望一稔盜賊頗戢刑罰亦省獨兵戈間弊病非一掇其尤者列聞它不遑恤也兄近來為况何如教令既孚當益無事且須為少留否相從今後有何人須得暇議論某此間但有長沙梁仁伯秀才在此資質亦頗淳篤近有澧州教授傅夢泉來相見乃是陸子靜上足其人亦剛介有立但所談學多類揚眉瞬目之機子靜此病曽磨切之否亦殊可懼又梁仁伯主簿偕來者日夕得暇即講論近頗長進偶以其祖母病復歸殊覺落莫子澄有新功否甚恨未識之伯恭聞復喪偶多難如此可念可念有澧州教授傅夢泉者資稟剛介亦殊有志但久從陸子靜守其師說甚力此人若肯聽人平章它日恐有可望也又濓溪先生祠記乃遂刻石對之愧汗卧龍想見勝槩欲賦一詩續當寄上近作每得之輒有開益别籍異財榜文甚佳此間却不至有如此太甚者大抵近北州民間以易道說非湖嶺間比也重九日出郊二十里間遂登龍山四顧雲水渺然亦復壯觀平原中獨有此山亦不高蜿蜒如龍蛇耳堤岸係一方之命尋常極草草夏潦盛時其不為魚者幸耳近城一堤十數里最所恃者今為之久逺之計不敢草草也又少懇比對郡學開一城門正直江湖舊有門曰恩波在近處久塞今移于此緣舊學出門即牆面今焉開闢氣象甚佳因為樓於上登覽遂為一郡之冠以曲江樓名之蓋張曲江來為長史時有登江陵郡城南樓詩故用以名欲求尊兄為記幸不惜落筆以為此邦形勢之重樓之下即是白水河河之外即大湖濼濼之外即荆江如高沙湖之類皆在指顧以至峽州諸山亦隱隱見於雲水之外也又伯恭近遣人送藥與之未回渠愛敝精神於間文字中徒自損何益如編文海何補於治道何補於後學徒使精力困於翻閲亦可憐耳承當編此文字亦非所以承君德今病既退當專意存養此非特是養病之方也南軒集卷二十四
