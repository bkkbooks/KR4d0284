body:
  text: 南軒集巻三十四宋張栻撰題䟦西漢蒙求䟦栁宗直輯西漢文類其兄司馬序其首有曰搜討磔裂攟摭融結離而同之與類推移世謂宗直是書固足以傳逺抑有頼於司馬之文有以發之也東平侯彦明取班史故事及雅訓語恊而比之他日過予求為之序予謂侯君為是書亦勤矣予烏能發之君家彦周任其責可也雖然有求於予固將以求益也試言讀史之法可乎讀史之法要當考其興壊治亂之故與夫一時人才立朝行已之得失必有權度則不差也欲權度之在我其惟求之六經乎盍進於斯而以餘事誦其言語文字之工莞然一笑可乎因書于後䟦孫子右唐中書舎人杜牧所注孫子三巻牧在當時號為知兵者親見藩鎭相煽為盜不可制國威日削發憤感激留意兵法可以教於後世者無若武之書於是章分句析而為之說其言皆有所據依推之事實而可以行若牧者誠有志當世者哉蓋君子於天下之事無所不當究況於兵者世之興廢生民之大本存焉其可忽而不講哉夫兵政之本在於仁義其為教根乎三綱然至於法度紀律機謀權變其條不可紊其端為無窮非素攷索烏能極其用一有所未極則於酬酢之際其失將有間不容髮者可不畏哉若武之書蓋講乎法度紀律其於機謀權變之用詳矣按西漢藝文志武所著兵法凡八十二篇圖九巻牧亦謂武書凡數十萬言曹氏削其繁剰筆其精粹為十三篇是則今所存者特操所刪定耳牧初雖本操所注然所自發明者蓋十之九予得其書於集注中而樂其說因次第繕冩牧本書悉存操説今不復具獨其間有渉於牧解釋辨正者則亦因而併出之嗟乎敵人分據神州有年于兹國家讐耻未雪聖上宵衣旰食未嘗忘北顧凡在臣子所當仰體至意思所以効忠圖稱者然則於是書又其可以忽而不講哉予故刻而傳之願與同志者共焉此亦牧當時之意也䟦許右丞許吏部奏議觀二許公先後立朝當事㑹之際皆力言和議之非嗚呼善哉自敵入中國專以和之一字誤我大機非惟利害甚明實乃義理先失義理之所在乃國家之元氣謀國者不可以不知也䟦戊午讜議自古為國必有大綱復讐之義今日之大綱也要不當論其利害之所存獨念夫君臣父子之義不明則戴天履地不能一朝處也則知性與之俱立若飢之必食渇之必飲弗可改也已雖然復讐之義固其大綱而施為舉措之間貴乎曲盡脩德任賢立政又復讐之大綱也不此之為而徒曰吾讐之復有是理哉故某嘗論今日之事正名為先而務實為本蓋名實一事若夫為人臣而不思大義之所存甘心於事讐而不以為恥其為罪固不可勝言而或借復讐之說名不正而實不務欺當時而貽後患者亦正論之稂莠也可不察哉乾道庚寅始得吾友魏元履所編讜議三歎之餘附書于末䟦温公黼座銘藁壅蔽者天下之大患也古之明王所以致治者亦去此而已矣其道莫先於虚己莫要於任賢虚己則壅蔽消於内任賢則壅蔽撤於外内外無蔽而下情畢通泰治所繇興也先正温國公反復開陳於治亂之際可謂深切讀其遺藁使人流涕嗟乎公愛君之心萬世不可泯也題司馬文正公薦士編右司馬文正公薦士編起至和之元盡熈寧十年凡百有六奏其間多公所親錄而其外題曰舉賢才亦公𨽻筆也某來宜春公之元孫邁出以相示翻閱終日起敬起慕惟公薦士報國惻怛篤至之心後世觀此編者亦可以想見萬一矣題文正公條畫㳂邉弓箭手藁後右文正公條畫約束㳂邉弓箭手事蓋公在并州佐龎頴公時所具藁也其察微慮逺固本防患之意具備觀諸此非獨可以窺公制事之權度抑可得為國御邉之良法矣䟦濓溪先生帖右濓溪周先生二帖某來桂林邇先生之鄉因鄉之士何士先來訪屬以攷尋先生舊蹟已而胡良輔持此二帖及家譜石刻來良輔寔先生姻族也按石刻先生皇考諱輔成任賀州桂嶺縣令累贈諫議大夫葬道州營道縣榮樂鄉鍾樂里又載濓溪隱居在石塘橋西先生之兄諱礪其子仲章即第二帖所寄者是也濓溪在其鄉古有是名先生晚築廬山下有溪焉因亦以名之蓋示樂其所自生不忘其本之意良輔云鄉之父老相傳能道先生此意也某不佞竊誦習先生之言行蚤歳獲拜遺像今又得心畫而藏之慕仰涵泳不勝拳拳敢書于左方䟦上蔡先生所述衡州秦府君志銘右上蔡先生所述衡州秦府君志銘先生克己之嚴徙義之勇任道之勁讀斯文者亦可以想其餘風於辭氣間矣先生之於言無所茍也則府君之行事足以取信於來今不疑矣府君之出劉拯景仁以此刻相示蓋澗上陳公之書字畫森嚴寔歐陽率更書温公碑法是亦可寶云題曽大父豫公思亭記後皇祐四年朝論以黎人不寧擇可為雷州者有言曽大父豫公乆佐西邉熟兵事亟命徃守自四明以數百兵轉海比至冦盜屏息乃以閒暇時延見長老諸生授條教始雷之俗未知禮遜長子之子常為長易數世之後至叔父反拜猶子公諭以長㓜之序親踈之宜悉革其舊又為之増治城壘行田積水為乆逺計雷人愛敬之召還監都進奏院年踰六十即以殿中丞致其事自號希白先生今家集目中有修城及西湖思亭三記皆為雷時所作而獨思亭之文存後百有十五年公之曽孫某敬書以授知雷州廬陵戴君且屬為訪舊刻存否或可以補海康故事之闕也題先忠獻公清音堂詩後先公書此詩去易簀纔兩旬先是一日游清音堂歩上山頂下煑泉亭㵸茗命道士鼔琴復歩下石磴略無倦意笑顧某曰爾輩喜吾强健不知吾大命且不逺矣次年重九日泣血追記䟦貴溪簿㕔記貴溪簿舎之不焚可以見人情之不逺彼雖放而為盜然其心終有不可盡殄者為政者推乎此亦可以知馴足弭暴之方矣陸君之為人所謂安靜之吏悃愊無華者詩不云乎豈弟君子神所勞矣䟦吕東萊與許吏部詩許吏部以直道不容於時宰而其典州持使者節所至懇懇然推其學道愛人之心惟恐不及東萊寄詩蓋公䕶漕廣右時也豈不在行路自逺霜露濕百川貫河來砥柱乃中立誦詠斯言尚可想味公平生也䟦趙不遯壽昌堂記不遯請以所遷官封其母上方篤孝愛以錫天下登聞賜可是足為人子之榮矣雖然攷諸聖賢之訓所以顯揚其親者蓋抑有其道惟反求於身而勉焉斯有以稱明詔寵光奬厲之意矣不遯既摘取訓詞之語以名堂其季下遂出堂之記示某敬書于後䟦宇文中允傳故曲水令宇文中允吾鄉之前輩先生也熈寧間伊川先生之尊父大中公守漢州以禮致公典郡之學今兩書具載伊川集中謂公不以榮利屈志道義為鄉里重非特今人之難古人所難則其人不問可知矣又況司馬文正公與范文忠公相與稱道紀述皆足以垂信於方來哉元祐修裕陵實錄時嘗為公立傳頗采文正所稱著於篇末至紹聖章惇蔡卞得志改易舊史乃謂公於法不當立傳元祐諸人獨以司馬丞相故私公小人不知春秋賢而得書之義顧反用私意誣公論類如此紹興初天子命大臣更正史事盡黜姦臣之説於是公復得立傳是非乆而自定此天也今吾邑緜竹附郭之南有所謂止正亭者公所歸隱之地也清泉老木固亦無恙而公之風烈後生知所師慕者鮮矣嗟夫君子之仕本以行道也非欲貴求富也昔之人道不得行則不敢以居其官若公豈忘世而素隱者哉身為縣令以字民為職而扼於勢不得其職引而去之義當然耳觀公之去猶以胷中所欲言者為書獻之天子則公之心非忘世而素隱抑可見矣古之所謂大臣者以道事君不可則止使公而得時與位則其於古大臣之事豈不可望庶幾能之邪世衰道微仕者狃於習俗憧憧然以欲貴求富為心而君臣之義益以不明如公之風烈要當表而出之庶幾來者有所感動興起夫豈小補邪其家將刻元祐紹興所立兩傳併以諸公之文附列于後求某為書念不敢辭而不知其為僣越也䟦陳分寧傳為吏者受天子之土與民不幸遭變故守死其職亦理之所當然也然方世之衰彛倫蕩覆節義頽廢於是而有能特立其間不為之變者其可貴豈特景星鳯凰比哉表而出之以風厲臣子實為國家之先務也建炎中北騎所蹂踐及于江右牧守之臣望風逃避甚至率民迎拜者相屬也獨分寧宰陳公以區區一邑抗義不屈斬敵使期與民守死卒全其境使一時不至有秦無人之歎其有補於世教抑多矣淳熈四年公之子義守靖州以始末傳記文字寄桂林某讀之慨然謹附志于左題蔣邕州墓志銘後予來桂林首訪其耆舊之賢則聞蔣邕州之名且曰邕州非獨行義推於鄉閭邕州之政近世所難得也而予不及見其人矣已而士大夫有自邕來者皆曰邕之人至今思公不忘而溪洞之豪來受事于幕府者問前牧之善政亦莫不以公為首且咨嗟歎息至其州之民言之則又眷焉有思慕之色予於是歎夫蔣公之賢去邕且十年而使人稱之一辭至於强者服弱者懐此豈偶然也哉及究其所為則初未嘗為姑息小惠其御夷落先示以信號令簡而賞罰明持身嚴正表戢邉吏毋得少侵牟之至於治民雖細事必躬親不以入吏手務為安靜不擾之政而其梗悍為善良害者則必懲無貸其所以乆而不忘者盖如此予嘗怪今之為吏其號為能者則或以察為明以刻為公以不恤為能任而其號為賢者則又或以姑息為惠以縱弛為寛以秣稜為善處故其能適以賈怨貽毒撅害邦本而其賢反以流弊基患及於後日嗟乎此豈真所謂賢能也哉若公之賢則庶幾矣然自中興以來為邕者不下數十人而其民之不忘不過二三人而止公又近而尤見稱者則夫公理之在人心詎可没哉公之葬予亡友張安國嘗為之志辭甚美獨恨述守邕事未詳故予追書之以授其子礪䟦鄭威愍事鄭威愍公守同州城陷死之可謂得其死矣讀公書辭胷中所處蓋已素定嗟夫義之所在君子蹈之如飢之必食渇之必飲不可改也若一毫私意亂之則顧藉牽滯而卒失其正矣然則觀公之為豈不凛然可貴哉先公使川陜時得公死時事為詳某侍旁蓋敬聞之矣乾道己丑公之孫忱德復以始末見示輒歎息而書之䟦范文正公帖先公舊藏文正范公與朱校理手帖墨刻一巻某以示汶上劉君子駒一見咨歎不忍去手即摹本寘之篋笥且屬某志其後某竊惟文正公平生事業光明偉特如此及觀此帖味其辭意而有以知公處事之周密玩其書畫而有以見公日用之謹嚴此豈非其事業淵源所自耶晚生何足以形容萬一然嘗反復於此而復有感焉公蓋生二歳而孤隨其母育於長山朱氏既第始歸姓范氏今所與書者即其朱姓時從子行也公雖以義還本宗而待朱氏備極恩意既貴則用南郊恩贈朱氏父以及其諸子之䘮皆為之收𦵏歲時奉祀則别為饗朱氏以公廕為官者三人此載在遺事世所知也詳觀是帖其親愛惇篤之意發於自然蓋與待其本族何異其於天理人情可謂得其厚矣只此一事表而出之聞其風者蓋可使鄙夫寛薄夫敦也誠盛德哉淳熈元年六月既望張某謹題又文正范公德業之盛借使字畫不工猶當寳藏況清勁有法度如此哉至於温然仁義之言使人誦歎之不足也又右文正范公帖某得之文定胡公之家以刻于桂林郡齋某聞君子言有教動有法某於文正公見之矣觀此雖一時書帖之間亦足以扶世教垂後法非德盛者其能然乎故敬志之以詔來世南軒集巻三十四
