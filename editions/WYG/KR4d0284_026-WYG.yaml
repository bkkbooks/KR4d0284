body:
  text: 南軒集巻二十六宋張栻撰書答喻郎中長者謂事最忌激觸然所謂激觸者要當平心易氣審處其理期於中節而已若欲遷就囬互於所當然而不然枉尋以求直尺而曰吾所畏者激觸也無乃終墮於姦邪之域人欲愈肆而天理愈滅歟觀伊川先生解遇主于巷一爻意極明切後人不知乃以己私窺聖人之意其失大矣長者言重懼學者聽之而惑也故敢獻其愚答李秘監竊聞除書復長道山固為吾道慶然而進退去就之義高明所素講今日必有以處之而亦士類之所屬望也詩曰戰戰兢兢如臨深淵如履薄氷此古人所以周旋乎理義動中節奏而不失也辭章儻未報可則繼此何如耶辱在下風所願聞也與施蘄州少路乆聞蘄春文物彬彬有前輩遺澤漸濡未泯也計士人中器質多美者鐵錢事如何計循其理而為之不若它人做工作事也大抵今日人才之病其號為安靜者則一切不為而其欲為者則又先懐利心徃徃貽害要是儒者之政一一務實為所當為以䕶養邦本為先耳此則可貴也某冒居要藩日夜悚仄蓋日勉焉而未之能有益也臭味一家偶及之耳答周允升所諭約之說前書正欲左右從約束簡約中下工夫所謂曽子之約其始亦須由是以進焉來書謂約束簡約之云某之趨此也有日矣此乃見左右之未能趨約也如是而遽云曽子之約只是妄意度量耳大抵觀書辭多暴露恍惚之語少沈潛篤實之意講學不如此也且當熟讀論語玩味聖人所以教人與孔門弟子學乎聖人者則自可見蓋聖門實學循循有序有始有卒者其惟聖人乎非若異端驚夸籠罩自謂一超徑詣而卒為窮大而無所據也近世一種學者之弊渺茫臆度更無講學之功其意見只類異端一超徑詣之説又出異端之下非惟自誤亦且誤人不可不察也五峯所謂此事是終身事天地日月長乆斷之以勇猛精進持之以漸漬薰陶故能有常而日新誠至言哉撥冗姑此為報幸深思之又所諭尚多駁雜如云知無後先此乃是釋氏之意甚有病知有淺深致知在格物格字煞有工夫又云儻下學而不加上達之功此尤甚上達不可言加功聖人教人以下學之事下學工夫浸密則所為上達者愈深非下學之外又别為上達之功也致知力行皆是下學此其意味深逺而無窮非驚怪恍惚者比也學者且當務守守非拘迫之謂不走作也守得定則天理浸明自然漸漸開拓若强欲驟開拓則將窮大而失其居無地以崇德矣惟收拾豪氣毋忽卑近深厚縝密以進窮理居敬之工則所望也喜左右之志故屢言之惟深念焉答陳平甫某自㓜侍親來南周旋三十餘年間又且伏守墳墓于衡山之下是以雖為蜀人而不獲與蜀之士處以親友其仁賢每以是念徃歳得建安魏元履書始知足下之名且聞廷對所陳大略念足下天資剛毅人也恨未之識耳雖然世固有天資之美者茍不知進乎學則終身安於其故而已蓋氣質雖美而有限天理至微而難明是以君子必貴乎學也近得猶子然書復聞足下超然㧞出流俗志於古道孜孜不舎則又歎足下於世衰道微之際能獨見自立如此其進也何可量則願見之心益厪今得足下書并所論著連緘累牘伏而讀之無非以討論問學為事而果有以知足下之所存甚幸甚惠惟是不以僕為不敏意欲與之共講斯道而勉為君子之歸固所願者若夫推予期待之過其實則非所敢當也僕自惟念妄意於斯道有年矣始時聞五峯胡先生之名見其話言而心服之時時以書質疑求益辛巳之嵗方獲拜之于文定公書堂先生顧其愚而誨之所以長善救失蓋有在言語之外者然僅得一再見耳而先生没自爾以來僕亦困於憂患幸存視息於先廬紬繹舊聞反之吾身寖識義理之所存湘中二三學者時過講論又有同志之犮自逺而至有可樂者如是又五載而上命為州不得辭繼為尚書郎猥以戇言誤被簡遇遂得執經入侍且須都省下士誠欲自竭庶㡬以報而學力不充迄亡毫髮之補歸來惟自省厲蓋愈覺已偏之難矯聖學之無窮而存察之不可斯須忘也誦伐木神之聽之終和且平之章思欲與海内賢士切磋琢磨庶㡬卒以無負初志然則自治之不暇又烏能有益於人哉念辱足下萬里盛意則亦不敢隠耳蓋道之不明乆矣自河南二程先生始得其傳於千有餘載之下今二先生之言雖行於世然識其真者或寡矣夫二先生之言凡以明孔孟之道而已孔孟之道其博厚高明雖曰配二儀之無疆然其端豈逺於人心而欲它求哉人病不能推而充之耳世之聞二先生之言而驚疑竊怪者固不足道而其間有慕高逺者則又戃怳虚矜而不循其實亦為失其真而已竊攷二先生所以教學者不越於居敬窮理二事取其書反復觀之則可以見蓋居敬有力則其所窮者益精窮理寖明則其所居者益有地二者蓋互相發也為人之要孰尚於此學而不知其要則泛濫而無功二者言之雖近而意味工夫無窮其間曲折精微惟能用力者當漸知之耳升高自下陟遐自邇務本循序而進乆自有所至不可先起求成之心起求成之心則有害於天理孔子之所謂獲孟子之所謂正者政此病也區區誦其所聞言不盡意惟願足下毋忽於卑近以卒至於逺大則幸甚幸甚别紙所諭亦各以鄙意批呈未知然否自爾既定交於萬里之外則不惜時惠音有箴有晦有得有疑一一詳及勿為無益之書所願望也答曽致虚承聞侍旁無事不廢講論以致虚資稟之美而有志斯道其何可量甚幸甚仰惟是某不敏何足以辱下問之意來教所及悚戢何勝雖然於左右不敢隠其愚也所謂持敬乃是切要工夫然要將箇敬來治心則不可蓋主一之謂敬敬是敬此者也只敬便在此若謂敬為一物將一物治一物非惟無益而反有害乃孟子所謂必有事焉而正之卒為助長之病如左右所言窘於應事無舒緩意無怪其然也故欲從事於敬惟當常存主一之意此難以言語盡實下工夫涵泳勿舎乆乆自覺深長而無窮也不識以為如何某去嵗作主一箴謾納呈有以徃復開益所願望也答項秀才承來金華從容師犮間當有進益為學之方循循有序要須著實趨約自卑近始度正字亦必常及此在勉之而已答羅孟弼數日欲答前書檢未得但記其間所引濓溪無欲則靜虚動直之語念不可不報所謂無欲者無私欲也無私欲則可欲之善著故靜則虚動則直虚則天理之所存直則其發見也順理之謂直若異端之談無欲則是批根㧞本泯棄彛倫淪實理於虚空之地此何翅霄壤之異哉不可不察也答蕭仲秉聞䘮事謹朝夕之奠不用異教甚善此乃為以禮事其親若心知其非而徇於流俗之義則為欺偽不敬莫大焉惟致哀遵禮小心畏忌以守之鄉曲之論乆當自孚勉為在我者可也又生死鬼神之說須是胷中見得洒落世間所說不得放過有無是非一一教分明方得若有絲毫疑未㫁將來被一兩件礙著未必不被異端揺動引去覺得諸友多於此處疑著正好玩味横渠之說昨見文集有數處極精切蓋横渠皆是身經歴做工夫剖决至到故於學者疑滯處尤為有力耳工夫須去本源上下沈潛培植之功不然區區文義之間一知半解歲月只恁地空過也答戚如玉垂諭忿怒之病氣習偏私處正當深致其力損卦懲忿窒欲懲之為言須思其所以然而懲艾之先覺謂惟思為能窒欲某謂懲忿亦然若為正當發時最好看吾本心此却有病本心須是平日涵泳庶㡬私意漸可消磨若當其發時如明道先生所謂遽忘其怒而觀理之是非則可若直待此事看吾本心則天理人欲不相叅恐無力也更幸思之答江文叔垂諭大學格物之說顧某淺陋何足以發高明之思抑嘗聞之格至也格物者至極其理也此正學者下工夫處吕舎人之說雖美乃是物格知至以後事學者未應躐等及此也雖然格物有道其惟敬乎是以古人之教有小學有大學自洒掃應對而上使之循循而進而所謂格物致知者可以由是而施焉故格物者乃大學之始也因下問及之併幸詳焉有以見教答劉宰垂諭識大本除物欲之說蓋義理精微處毫釐易差故以吕與叔㳺伊川横渠之門所得非不深而至論中處終未契先生之意知未易至也今學者未循其序遽欲識大本則是先起求獲之心只是想象模量終非其實要須居敬窮理工夫日積月累則意味自覺無窮於大本當漸瑩然大抵聖人教人具有先後始終學者存任重道逺之思切戒欲速也物欲之防先覺所謹蓋人心甚危氣習難化誠當兢業乎此然隨起隨遏將滅於東而生於西紛擾之不暇惟端本澄源養之有素則可以致消弭之力舊見謝上蔡謂透得名利闗便是小歇處疑斯言太快透得名利闗亦易事耳如何便謂之小歇處年大更事始知真透得誠未易世有自謂能擺脱名利者是亦未免被它礙著耳前人之言不茍然類如此要用力乃知之耳答游誠之出入二字更須子細理㑹程子曰心本無出入以操舎而言又曰心則無出入矣逐物是欲蓋操之便在此舎之則不見因操舎故有出入之云耳若論人之逐物蓋因其舎亡故誘於物而欲隨之欲雖萌於心然其逐物而出則是欲耳不可謂心也欲可去而心未嘗無至於是心之存物順應理在於此又豈得謂之出乎幸深思之又大抵學者貴近思若泛濫則有病近字極有味宜深體之未發已發體用自殊不可溟涬無别要須精析體用分明方見貫通一源處有生之後皆是已發是昧夫性之所存也伊川先生語錄所論幸精思之答吕季克原說中弊病似不難見不知李伯諫何故下喬木而入幽谷如此如克己復禮之說所謂禮者天之理也以其有序而不可遏故謂之禮凡非天理皆己私也己私克則天理存仁其在是矣然克己有道要當深察其私事事克之今但指吾心之所愧者必其私而其所無負者必夫禮茍工夫未到而但認己意為則且將以私為非私而謂非禮為禮不亦誤乎又如格物之說格之為言至也理不循乎物至極其理所以致其知也今乃云物格則純乎我是欲格去夫物而已獨立此非異端之見而何且物果可格乎如其說是反鏡而索照也推此二端其它可見答王居之原説前日吕季克己寄來觀其言殊無統紀其所安乃是釋氏而又文其說說亦淺陋本不足以惑人不意伯諫乃爾向來與元晦相從不知講論甚事其人亦可謂不善變矣前日答季克書謾錄去今得所示伯諫之語益知蘄州李君乃是類告子之不動心者不知既不窮理如何去得物蔽其所謂非蔽者未必非蔽而不自知也釋氏之學正縁不窮理之故耳又將盡性至命做一件高妙恍惚事不知若物格知至意誠心正則盡性至命亦在是耳答章茂獻來問詳切思慮講辯要當如此爾向者見呉德夫說汪端明嘗以正大兩字奉告某謂此意固美矣然正大是指其體要須有下手處𢎞毅兩字乃學者下手處也與正大本相須就其體言之天理渾然正且大也推其用言之散在事物之間精微曲折正大之理無不存焉學者當黙存其體而深窮其用則所謂𢎞毅之功不可以不進也然就學者用工常患於偏欲其𢎞則懼夫肆欲其毅則懼夫拘是非𢎞毅之正也氣習之所乗也在學者初用工亦無恠其有此然要知其為病而致吾存養窮索之力耳凡足下之所問不能一一具報大意亦略具是矣幸以此推之而復以告焉區區每樂得同志相與共講扶掖其愚儻或有進賢者不鄙而辱貺之某誠知幸矣答彭子夀别紙示以所疑深慰孤寂輒據所見奉呈正望徃復之益第詳觀所論不喜分析窮理不應如此理有㑹有通㑹而為一通則有萬釐分縷析各有攸當而後所謂一貫者非溟涬臆度矣此學所以貴乎窮理而吾儒所以殊夫異端也更幸深思焉答沙市孫監鎭某辱諭伍員廟事足見致思相助之意甚幸甚幸惟是時有古今而君臣之義無古今也楚乃伍員之宗國君臣之義其來有素矣父以無罪誅子逃之而勿仕終身蔬食布衣可也豈有假手於讐覆其宗國快心於其君耶狄梁公乃與大禹呉泰伯一例存之前輩蓋嘗有議論梁公之賢偶未之思耳今敕額在呉以慰呉人之思可也在楚地則不可以施按祀典有功德於民則祀之員於此地何止無功德而已哉然復讐之義又不可不詳講如今日中原之人本吾宋之臣子金乃敵國也向來不幸而困於金若幸而脫歸則當明復讐之義令吾宋臣子翦伐之所當為也若員則家世為楚之臣子而以復讐之義自施於君其可乎哉使員而果有靈也其敢饗於兹地乎此義恐不可不正來意雖深荷然皇恐不敢從也更惟思之答陸子壽某聞昆仲之賢有年矣近歳得之為尤詳每懐願見以共講益渺然相望而未克遂向徃可知忽辱枉教三復辭義有感于中第惟孤陋不足以當盛意也然而不敢以虚來貺講學不可以不精也毫釐之差則其弊有不可勝言者故夫專於攷索則有遺本溺心之患而騖於高逺則有躐等憑虚之憂二者皆其弊也考聖人之教人固不越乎致知力行之大端患在人不知所用力耳莫非致知也日用之間事之所遇物之所觸思之所起以至於讀書攷古茍知所用力則莫非吾格物之妙也其為力行也豈但見於孝悌忠信之所發形於事而後為行乎自息養瞬存以至於三千三百之間皆合内外之實也行之力則知愈進知之深則行愈達區區誠有見乎此也如箋注詁訓學者雖不可使之溺乎此又不可使之忽乎此要當昭示以用工之實而無忽乎細微之間使之免溺心之病而無躐等之失涵濡浸漬知所用力則莫非實事也凡左右之言皆道其用力之實也故樂以復焉聖上聰明不世出真難逢之㑹所恨臣下未有以仰稱明意大抵後世致君澤民之事業不大見於天下者皆吾儒講學不精之罪故區區每願從世之賢者相與切磋究之而盛意之辱欣幸至于再三也元晦卓然特立真金石之犮也然作别十餘年矣書問徃來終豈若㑹面之得盡其底裏哉伯恭一病終未全復深可念向來亦坐枉費心思處多耳心之精微書莫能究布復草草正惟亮之答魏元履頃寄一書度到時從者已南轅不知獲徹否便中領臨行教字極荷秋氣寖清伏惟歸侍雍容尊履萬福兄抗論切直悚動一時此書亦庶㡬不虚矣但非惟善言之不用而遽使直士引去使人重憂歎耳聞太學多士有欲閉何蕃之意亦可見人心所同也然兄今日袖手却思當益知天理之難明人心之難定而講學之不可一日忘也則君子之所進其有極乎元晦必已相見請外想遂矣共父近得㫖行邉今在襄陽也某幸粗安日夕不敢自怠棄但良朋在逺每懐離索之懼安得識面少沃此懐也適有端便略此問訊更㡬勉茂德業厚自愛重戊午讜論有人可為錄本否先得兄所作序及元晦者見寄為望南軒集巻二十六
