body:
  text: 南軒集巻四十三宋張栻撰祭文祭虞雍公惟公起自逺服進登王朝適逢禦敵之辰曽靡辭難之色攘袂獨奮力折凶渠之鋒驅車四馳徧當邊圉之寄式符眷意遂正鈞衡堂堂漢相之容赫赫周民之望方三年之坐閲指萬里以言歸顧寵光之至隆在近世而莫比豈期疾遇遽以訃聞帝所咨嗟士増歎息某之愚戅嘗勤推轂之懐論有與同正惟公議之報輙遣薄奠用將鄙誠公之英靈實所臨鍳祭汪端明嗚呼公之盛名盖四十年有如黄鍾大吕巋然在懸使未攷擊人之望之亦知其為衆樂之先惟平日之所履毎務倣乎昔賢不與世以交騖不絶俗而孤騫獨好義以欵欵而懐忠之拳拳茍片善之足取必挽後而推前或所趣之有違敢妄假於色言顧規摹之若是豈斯世之其然昔棲遲於下僚窮師友之淵源逮顯用於王朝論據經而不偏實衆芳之所宗蔚佩蘭而握筌屢賦政於藩方亦惠澤之究宣晚卧柯山靜觀其旋玩心於羲經不自放而益䖍隱聲實之逾隆竚側席之招延何大命之止斯歎莫返於逝川痛易簀於蕭寺無居宅之一椽嗚呼前軰風流于今邈焉典刑云亡後生孰傳念言愚蹤公所知憐義篤金石乆而彌堅書猶在手人隔九泉屬拘印紱奔走莫縁孰知予悲涕泗洏漣祭劉樞密共甫謹為位致祭于故留守觀文樞密劉公之靈惟公德業孚于上下威望著于華夷宜秉國鈞以輔明主天不慭遺人之云亡夙䝉公知尤重傷痛為位家塾慟哭冩哀再祭嗚呼哀哉六月甲子䘮我元臣如其可贖何直百身盖積天下之望已乆而閱天下之故已深其明决足以斷謀於俄頃而剛毅足以任重於千鈞忠誠孚于君心惠澤浹于斯民威名慴乎姦宄義槩動乎三軍使之主廟堂之上固足以厭患於未形而置之排難解紛之際不俟施為巳足以折衝於精神國虧柱石人失典刑此有識之士所以為天下惜而至於泣涕沾巾者也嗚呼哀哉忠顯之烈感乎幽明二卿之忠不忘請纓公自壯歳念其家聲敵騎飲江扈從時巡國有大政抗論前陳由斯而來蔚其直稱出身而刑國有大人及其分閫潢池息兵遂登紫樞以翼政經収綱端本用尊朝廷凛然正色公言是伸復牧于藩所至續聞捄荒之政近世莫倫旋觀設施靡囏靡棼左右具宜乆而愈新江湖轍環幾老于行人望公歸帝圖厥勤豈不用公未極于成嗚呼哀哉夫子知我匪契之云我之於公惟義是親相勉相厲期報吾君情深意得有同弟兄言念作别乙未之春我車入南公徃江濆眷焉不舎語何諄諄豈期一闊而隔死生精爽在目我言孰聽嗚呼哀哉義當奔走送公歸輤屬其拘攣王事有程哭公家塾載遣此文禮雖不豐公鍳其誠三祭嗚呼哀哉公之云亡既踰再時匪今之悲百年之思故歳之冬始奉遺墨一見流淚繼之以哭墨淡行斜如公疲薾誦公之言則何昭晣始云國恥抱恨九原勉予忠義以報吾君中言先公銘志未立豈無他人命予以筆永復繼書嘱弟及子嗟予何人乃託以死精爽在上耳聞公言顧雖不武敢怠勉旃銘詩脱草遽遣薦陳獨慙荒蕪曷詔不冺貽書平甫期守公訓告于二子罔墜厥命惟元晦君實公所敬無求于外惟晦是聽公之息女當擇于歸顧予雖逺願與聞之凡公所命當以復公薄奠是將告于公宫祭唐待制立夫惟公清夷粹温抗志千古文辭深嚴穆我王度獻納雍容有感無忤遇民如兒伊教匪怒及臨事㑹不改平素人方忽忽已獨有裕嗚呼惟公之賢世或知之而鮮克窺其微盖據梧隱几獨得忘言之妙故飢食渇飲俱不外乎天機没無怛化則亦其宜先君與公道義之交豈獨賔客之敬藐然孤生早辱過聽推其所懐於公莫隱方抱鉅痛公復云亡東望鄱水有涕淋浪免䘮之初念篤先友敢遣蕪祠侑此巵酒祭王詹事惟公天與勁特世推忠純正色立朝姦邪所憚其於當今大義胷中見之甚明非茍然假竊者比也盖自發䇿大廷至於没齒凡十五年凛如一日去年之春復來造朝身雖已病愛君冞篤惟昔先人雅器重公藐然孤生晚蒙公知去違朝路曽未幾日遽聞來訃越在道塗迄今定止始克遣一觴之奠盖惟兹世痛公之亡而非獨下交之私情也祭張舍人安國某率某官某就城北袚禊亭為位致祭于亡友舎人張公之靈嗚呼去年此時送公湘濵豈期今兹哭公失聲英爽在目交情不忘邈不復見我涕以滂惟公天姿邁偉發越而不夀考以昌王國今兹之哭豈吾黨私醴肴匪多公其臨之再祭嗟乎如君而止斯耶其英邁豪特之氣其復可得耶其如長江巨河奔逸洶湧𣺌然無際而獨不見其東滙溟渤之時邪又如驊驑綠耳追風絶塵一日千里而獨不見其日暮税駕之所耶此某所以痛之深惜之至而哭之悲也惟君起布衣被簡遇十年之間入司帝命出領數路文章之煒煌政事之超卓多士之所共知亦不待某之賛歎惟其孝友恂恂朝夕則人有不得而盡知者方自荆州歸某以書抵君謂及此閒暇專意承志實進德脩業之要君深以為然孰謂曽未數月乃有此聞某傾盖荷知乆而罙篤言有勁切君不以為迂此意何可忘也道阻且長不得徃哭遣致一奠孰知予悲祭姚端明惟公早試劇煩見才猷之敏劭晚登廊廟都寵數之便蕃方新十國之瞻遽作九原之隔凡兹民吏孰不傷嗟某昔歳朝班嘗奉笑言之欵如今官守幸遵規畫之餘念託契於交承敢異情於生死逺將一奠少見鄙誠祭王侍郎嘉叟惟靈强毅自立克大其門進登王朝無所附麗從容造膝有見不隱帝稱其直士歎其忠豈期卧家遽以訃告凡百君子孰不嗟痛矧惟交舊嘗辱論心為國惜賢揮淚無已道阻且逺莫獲走前一奠不腆少致此誠嗚呼哀哉祭黄侍郎仲秉嗚乎孰謂仲秉而止於斯耶念言鄉曲之契萬里相遇意好特深迨兹朝著志同有幾握手憂國言靡及私僕之去國君則愴然謂子之行予胡可乆本期有補寧為㓗身嗟乎斯言琅琅猶昨日事耳去年君歸道荆鄂間數寄手書眷焉不舎豈期抵舎遽以訃傳始聞其疑已乃深痛善類之䘮士所共嗟矧惟下交情其能已嗟乎仲秉温厚而文立朝有忠益之譽為政有平理之稱逺業未乆中道遽止嗟乎痛哉敬遣薄奠逺致鄙誠執事占辭隕淚盈紙祭查少卿嗟嗟元章而止斯邪修短有命亦奚以悲惟其所有未克究施昔之觀人驗于其私君之在家孝友融怡出而臨民則具是依人之有才患不克勝惟君敏才遇事風生而能自持以蹈凖繩愽見洽聞貫穿古今發於文辭温潤老成尤長論事纚纚可聽蚤登道山嘉言有稱持節蜀道撫循春温中外踐更名實攸敦前年之秋萬里來歸徃臨秦淮軍民具宜人曰賢勞君靡難辭云何一疾遂以訃家逮兹踰年竟老煙霞訃音初傳駭愕嘆呀念昔幕府傾盖情親朅來同朝友誼罙深憂時許國則識君心解后歸舟班荆共語覺君病餘未渠復故恠君臨别感慨如許嗟嗟元章有志未遂尚約卜廬湘水之涘豈期一别而乃永已君弟在荆銜血星奔君孤藐然孰誨孰存哭遣此奠君乎不聞祭吕郎中嗚呼前年之春識公嚴陵望其容藹然有慈祥豈弟之氣知其臨民之不苛也聽其言纚然多故家遺俗之事又知其世守之不㤀也别後之書情何篤也訃音之傳痛何遽也况於令子友義為深一奠之禮敢以薄而廢耶祭費檢正惟公植德敦靜蓋徐公之有常秉心曠夷實師德之無競奉職外服去愈見思列官王朝乆不改度方矚持符之拜遽遭偃月之疑猶冀䕶藩豈期易簀某夙䝉睠予託在葭莩秖增百感之深莫前一酌之慟禮雖不腆情則可知南軒集巻四十三
