body:
  text: 南軒集卷三十三宋張栻撰題跋題李光論馮澥劄子臣伏見臣僚上言推尊王安石為名世之學乞榜朝堂欲以傾動海內流播天下鼓惑衆心事係安危義難循默臣已具論列繳奏外臣訪聞為此説者乃諫議大夫馮澥澥誠腐儒不達世務浸淫王氏之説深入骨髓平居議論以安石為孔孟之流元符末上書獨入正等力詆鄒浩以為哲廟逐臣不當復用懷姦造謗老而無識止緣崇寧曽有湟鄯棄地之謀為蔡京所逐因得虛名考其素節無可稱道究其學問誠為頗邪臣觀王安石在熙寧元豐間神宗皇帝大有為之日創立制置三司條例司司馬光爭論神考之前因邇英閣進讀至蕭何曹參事光曰參不變何法得守成之道故孝惠高后時天下晏然衣食滋殖神宗曰漢常守蕭何之法不變可乎光曰何獨漢也使三代之君常守禹湯文武之法雖至今存可也書曰無作聰明亂舊章武帝用張湯言取高帝法紛更之盜賊半天下元帝改宣帝之政而漢始衰由是言之祖宗之法不可改也獨安石專任已能排卻衆論當時大臣如韓琦富弼諫官御史如范鎮吕誨范純仁之流信所謂名世大賢盡遭斥逐不仕以去而任用吕惠卿舒亶李定皆一時傾邪小人不畏天下之公論不恤百姓之愁苦不顧宗社之安危馴至蔡京蔡卞合為死黨操述作之説禁錮天下忠賢掃除祖宗法度五十年間言路有防川之蔽海內多敢怒之民愁痛無聊至此極矣伏自陛下即位以來破拘攣之説掃末習之蔽躬履素朴持循典故發政施仁無一不合人心當天意者士大夫思稅駕之地百姓望息肩之期王氏之學尚復忍聞之乎澥職在論思獻納之地不能以道義禆贊聖聰返以安石為大賢託中道以濟其偏説假公論以遂其私情懷姦不忠熒惑主聽伏望陛下察其回邪洞照讒慝特賜睿斷罷澥諫職斥使居外儻臣所論未合聖慮臣亦不敢復冒言路亦乞重行黜責以為妄言之戒冒犯天威臣不勝惶懼激切之至取進止六月日朝奉郎守侍御史臣李光劄子御批祖宗之法子孫當守之如金石蔡京首唱紹述變亂舊章至於今日可作一詔付吳幵臣栻創見靖康翰墨拊膺痛哭不知涕泪之橫流也竊惟國家自王安石壞祖宗法度以行其私意姦凶相承馴兆大釁至靖康初元國勢蓋岌岌矣而馮澥輩猶敢封殖邪説庇護死黨如此傳曰為國家見惡如農夫之務去草焉芟夷藴崇之絶其本根勿使能殖則善者信矣正誤國之罪推原安石所謂芟其本根者紹興詔書有曰荆舒禍本可不懲乎大哉王言也乾道三年秋八月戊戌臣栻拜首謹書題趙鼎家光堯御筆比覽元符諫臣任伯兩章疏論列章惇蔡卞詆誣宣仁聖烈太后欲追廢為庶人誰無母慈何忍至此賴哲宗皇帝聖明灼見不從所請向使其言施用豈不蔑太母九年保佑之功纍泰陵終身仁孝之德自朕纂服是用疚心昭雪黨人刋正國史雖崇寧之後迷國猥衆推原本始實自紹聖惇卞竊位之時而讒慝未彰將何以仰慰在天稱朕尊嚴宗廟之意可令三省取索議藁來上當正典刑布告天下早來朕所諭卿章惇蔡卞事此二人罪惡貫盈須是盡追官爵子孫親戚並不得與在內差遣若如此施行甚不過當卿更看如何覽卿奏只欲罷黜子孫不及親戚卿仁恕過人朕甚嘉之然利害極大若留親戚在朝但恐紛紛不已為善類患前日卿嘗留身奏陳曲折恐當絶其本根勿使能殖則善者信矣卿可熟思勿復後悔早來章僅除外任指揮未得施行臣栻伏覩聖詔所云蓋撥亂反正之宏綱天下古今之公理足以貽訓無窮敢頓首以志卷末乾道八年三月己巳朔具位臣張栻謹書題太上皇帝賜陳規手敕臣伏覩太上皇帝賜順昌守臣陳規手敕下拜感歎蓋自紹興以來艱勤積纍至是時敵勢已屈我師既捷聲搖京輔而朝廷講解之議已成矣臣在省中太常適上規事臣以為彰善疸惡有國之典規官雖未應諡功則當諡正以是役為重也仰惟昭回之章所以待遇臣下與夫風厲振作之意誠足以詔萬世也跋泰陵祭溫公文藁蘇軾玉堂藁嗚呼此泰陵誄司馬丞相之辭也歲未及期綱紀略定用賢之有益於國也如此蓋此未期歲之間非特足以開元祐一時之治而所以培植邦本祈天永命者至矣嗚呼盛哉後八十有六年具位張某謹書跋中庸集解右石􅗐子重所編集解兩卷某刻于桂林郡學宫子重之編此書嘗從吾友朱熹元晦講訂分章去取皆有條次元晦且嘗為之序矣桂林學宫舊亦刻中庸解而其間雜亂以他懼其反誤學者於是漫去舊版而更刻此書竊惟中庸一篇聖賢之淵源也體用隱顯成已成物備矣雖然學者欲從事乎此必知所從入而後可以馴致焉其所從入奈何子思以不睹不聞之訓著于篇首又於篇終發明尚絅之義且曰君子之所不可及者其惟人之所不見乎而推極夫篤恭之效其示來世可謂深切著明矣學者於此亦知所用其力哉有以用其力則於是書反復紬繹將日新而無窮不然譬諸枵腹而觀他人之食之美也亦奚以益哉通書後跋濓溪周先生通書友人朱熹元晦以太極圖列于篇首而題之曰太極通書某刻于嚴陵學宫以示多士嗟乎自聖學不明語道者不覩夫大全卑則割裂而無統高則汗漫而不精是以性命之説不參乎事物之際而經世之務僅出乎私意小智之為豈不可歎哉惟先生生乎千有餘載之後超然獨得夫大易之傳所謂太極圖乃其綱領也推明動靜之一源以見生化之不窮天命流行之體無乎不在文理密察本末該貫非闡微極幽莫能識其指歸也然而學者若之何而可以進於是哉亦曰敬而已矣誠能起居食息主一而不舍則其德性之知必有卓然不可掩於體察之際者而後先生之藴可得而窮太極可得而識矣乾道庚寅閏月謹題跋遺書二先生遺書近嵗既刋于建寧又刋于曲江于嚴陵今又刋于長沙長沙最後刋故是正為尤密始先生緒言傳于世學者每恨不克睹其備私相傳寫人自為本及是書之出裒輯之精亦庶幾盡矣此誠學者之至幸然而傳之之廣得之之易則又懼夫有玩習之患或以備聞見或以資談論或以助文辭或以立標榜則亦反趨於薄失先生所以望於後人之意為逾甚矣學者得是書要當以篤信為本謂聖賢之道由是可以學而至味而求之存而體之涵泳敦篤斯須勿舍以終其身而後已是則先生所望於後人之意也敢敬書之附于卷之末跋西銘人之有是身也則易以私私則失其正理矣西銘之作懼夫私勝之流也故推明其理之一以示人理則一而其分森然自不可易惟識夫理一乃見其分之殊明其分殊則所謂理之一者斯周流而無蔽矣此仁義之道所以常相須也學者存此意涵泳體察求仁之要也辛卯孟秋寓姑蘇書以示學生潘友端跋西銘示宋伯潛人惟拘於形氣私勝而迷其所自生故西銘之作推明理之本一公天下而無物之不體然所謂分之殊者蓋森然具陳而不可亂此仁義之道所以立人之極也學者深潛力體而後知所以事天事親者其持循之要莫越於敬而已乾道八年七月己卯敬書以遺宋剛仲伯潛父跋三家昏喪祭禮右文正司馬公橫渠張先生伊川程先生昏喪祭禮合為五卷竊惟道莫重乎人倫教莫先乎禮禮行則彛倫敘而人道立先王本天理因人心而為之節文其大體固根乎性命之際而至於毫釐曲折之間莫不各有精義存焉當是時人由於其中涵泳服習敦龎淳固蓋有不期而然者自先王之制日以缺壞情文之不稱本末之失序節乖而目踈甚至於雜以異端之説淪胥而入於悖風俗之所以不厚人才之所以不振職是故歟夫冠昏喪祭人事之始終也冠禮之廢久矣未能遽復也今姑即昏喪祭三者而論之幸而有如三公之説其可不盡心乎三公之使定雖有異同然至其推本先王之意罷黜異端之説是則未嘗不同也司馬氏蓋已著書若橫渠伊川二先生雖嘗草定而未具然所與門人講論反復其所發明深矣抑嘗謂禮之興廢學士大夫之責也有能即是書探考而深思深思而力行宗族相觀朋友相輔安知風俗之美不由是而作興乎妄意可助聖時善俗之一端於是刻於桂林郡之學宫云淳熙三年六月甲戌朔旦跋符君記上蔡語録符君生於逺方及遊京師乃能從上蔡謝先生問學得先生一語隨即記録今傳於家者九十有七章若符君者亦可謂有志於學矣豫謂當表而出之以為逺方學者模楷故附志於兵部侍郎胡公銘詩之後使來者當有考焉跋希顔録某己卯之歲嘗裒集顔子言行為希顔録上下篇今十有四年矣回視舊編去取倫次多所未善而往往為朋友所傳寫於是復加考究定著為一卷又附録一卷蓋顔子之事獨載於論語易中庸孟子之書其間顔子之所自言與夫見於問答者抑鮮矣特聖人之所稱及曽子孟子之所推述者其詳蓋可以究知也自孟子之後儒者亦知所尊仰矣而識其然者則或寡焉逮夫本朝濓溪周先生橫渠張先生出始能明其心而二程先生則又盡發其大全於是孔子之所以授於顔子顔子之所以學乎孔子與學者之所當從事乎顔子者深切著明而無隱於來世者矣故今所録本諸論語易中庸孟子所載而參之以二程先生之論以及於濓溪橫渠與夫二先生門人高弟之説列為一卷又采家語所載顔子之言有近是者與夫揚子雲法言之可取者並史之所紀者存之於後蓋亦曰學者之所當知而已既已繕寫則撫而歎曰嗟乎顔子之所至亞於聖人孔門高弟莫得而班焉及考魯論師友之所稱有曰不遷怒不二過而已有曰以能問於不能以多問於寡有若無實若虛犯而不校而已自學者觀之疑若近而易識然而顔子之所以為善學聖人者實在乎此則聖門之學其大略亦可見矣必實用其力而後知其難知其難而後有可進之地也然則後之學者貪高慕逺不循其本者終何所得乎故豫願與同志之士以顔子為凖的致知力行趨實務本不忽於卑近不遺於細微持以縝密而養以悠久庶乎有以自進於聖人之門牆是録之所為作也乾道元年八月九日謹書題周奭所編鬼神説後鬼神之説合而言之來而不測謂之神往而不返謂之鬼分而言之天地山川風雷之屬凡氣之可接者皆曰神祖考祠饗於廟曰鬼就人物而言之聚而生為神散而死為鬼又就一身而言之魂氣為神體魄為鬼凡六經所稱蓋不越是數端然一言以蔽之莫非造化之迹而語其德則誠而已昔者季路蓋嘗問事鬼神之説矣夫子之所以告之者將使之致知力行而自得之故示其理而不詳語也至於後世異説熾行譸張為幻莫可致詰流俗眩於怪誕怵於恐畏胥靡而從之聖學不明雖襲儒衣冠號為英才敏識亦往往習熟崇尚而不以為異至於其説之窮則曰焉知天地間無有是事委諸茫昧而已耳信夫事之妄而不察夫理之真於是鬼神之説淪於空虛而所為交於幽明者皆失其理禮壞而樂廢人心不正浮偽日滋其間所謂因其説而為善者亦莫非私利之流亂德害教孰此為甚故本朝河南二程子橫渠張子與學者反復講論而不置夫豈好辨哉蓋有所不得已也若夫程子發明感通之妙張子推極聚散之藴所以示來世深矣學者誠能致知以窮其理則不為衆説所咻克己以去其私則不為血氣所動於其有無是非之故毫分縷析了然於中各有攸當而不亂然後昔人事鬼神之精意可得而求德可立而經可正也不然辨之不明守之不固眩於外而怵於內一理之蔽則為一事之礙一念之差則為一物之誘聞見雖多亦鮮不為異説所溺矣湘鄉周奭考鬼神之説凡夫子之所嘗言見於易禮傳魯論者悉集之又取近世程子張子之書上及於濓溪周子下及於兩家門人凡語涉於此者合為一編以與朋友講求其故某嘉其志因書于後跋杼山書少陵歌行帖杼山風流蕭散如晉宋間名人其書法亦然覽之者猶可想見從容談笑時也南軒集卷三十三
