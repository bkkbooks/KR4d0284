body:
  text: 南軒集卷二十三宋張栻撰書答朱元晦某黽勉于此亦復一載幸人情粗相安惟是思為久逺之計早夜不敢遑寧耳本路鹽法正緣諸州荒寂都無甚所入全仰漕司撥鹽息以為嵗計往年行客鈔賣數極不多却有折米錢甚重民深病之因此致盜賊後來故改為官搬而罷折米中間廣東以為不便而爭之再行客鈔然所賣數多蓋要足漕司嵗計與諸郡之用只一二年鈔大積壓諸州例窘急而漕計亦不足於是復行官搬只以靜江言之若無此便無以支梧今靜江措置頗有倫緒不抑賣不增價公私皆便之鹽價反賤於客鈔之時若諸州俱能如此則當不至為害但諸州漕司撥得息少彼無以自足則增抑之事從此而生故某有前日論奏後來漕司蔽護不肯增給近頗得要領已再言之恐可遂也大抵此路窮薄祖宗時全仰外路應副今每嵗反應副外路鄂渚大軍錢靖州嵗計錢及買馬錢合二十一萬緍則安得不費力極本窮源而論之須於此減得然後鈔法可行不然則立致敗闕也恐欲知曲折略此布之虞帝廟碑已求得季克字甚古磨崖比舊刻處乃大勝蓋舊刻多鏬縫填補今缺文皆是填補處脫落今所磨却甚平完見議下手刋刻也所寄孟子數義無不精當某近頗得暇再刪改舊說方得十數段俟旋寫去求教可欲之謂善誠當指人而言如橫渠之說蓋凡可欲者善而不可欲者惡也人之所為有可欲而無不可欲者則之人也謂之善人信字亦如來諭曽是指人而言如此下語如何金聲玉振之說條理云者只是有倫緒而不紊之謂始條理者析衆理於毫釐也終條理者備衆理於一貫也若指條理為脈絡却恐未順中庸大學章句亦已詳讀有少商量處須更子細反復也易說未免有疑蓋易有聖人之道四恐非為卜筮專為此書當此爻象如此處之則吉如此處之則凶聖人所以示後世若筮得之者固當如此處蓋其理不可違而卜筮固在其中矣如蜀莊則專用之於卜筮者也然亦不敢輕論俟更深考山中諸詩紆餘淡泊諷之不能已但覺其間猶時有未和平之語此非是語病正恐發處氣稟所偏尚微有存也更幸深察之游誠之官期到行已旬日其人明决有力向來良得其助但義理儘少涵泳辭色間多與人忤正須深下工夫乃佳耳陳擇之今却留此通曉民事好商量但講論多有成說為礙耳近見季克寄得蘄州李士人周翰一文來殊無統紀其人所安本在釋氏聞李伯諫為其所轉可慮可慮方耕道聞氣象差勝舊書辭亦然可喜但適遭府公新政科配諸州錢物不少渠雖力與之辨不肯承當恐蹤迹或不能久安耳又某黽勉所職無補是懼目前幸嵗稔盜息人情相安但環視一路可為寒心者多亦切考究以其大者控陳矣伯恭相聚計講論彼此之益甚多恨不得從容于中也寄示學者講論一紙所論萬物皆備一段意亦近裏大抵不能反身則自不與已相干它人飽食何與已事反身而至於誠則樂莫大矣誠則實能有之也又論未感時四端混為一理却有未安未感時雖是渾然而所謂四端之理固已具於中及其感則形見也聖智巧力某後來改舊說頗詳續録呈武氏事誠有難處維州之說正是鄙心尚有少曲折後便併盡久假不歸當從晦叔韓曽用財之說甚善甚善某此間應接賔客民事通近兩時又將兩時退而考究紬繹訪問此外尚得讀書餘暇有可見教不惜示及又出處之計竟何如須著一出否孟子解等鋟版得遂漫去非兄致力豈能便爾感幸感幸向來固屢䝉諭及是時已復不能收拾要是因循皇恐耳近年讀書頗覺平易中意味向來多言徒爾為贅欲下手痛加刪正終以官守事奪不敢草草耳所部自增給鹺息之後頗可支梧橫斂苛征得以嚴戢比復有請漕司輒增撥鹽數諸州輒增鹽價並以違制論諸州將鹽息撥入公庫充燕飲饋送等費並坐贓論已䝉如請行下又請以見在二十萬緡專樁充漕司買幹鹽本二十萬緡專備借諸州搬鹽本此乃是一路根本一毫不得妄動每嵗終申省蓋無此鹽法便倒了一路便受害向來幾為妄吏羡獻是絶一路命根也可懼可懼此情亦已行下同運司措置樁管應濟矣趙若海若得疏通曉事便自見此今日正要漕臣得人庶幾一定之論可以凝固也諸邉悉寧但未隂雨之計不可不素整今靜江教兵頗成次第矣邉頭所患少財亦已有請庶幾規摹悉定有可繼之實耳偶有一項錢為三邉州請為回易之本若得此三年之間招補將兵闕額修堡塞利器械可有永久隱然之勢無南顧之慮矣適㑹新憲到官未一月而殂拙者復通攝兩臺事緒雖多然凡事血脈究見不敢不竭鄙心也續候聞出處定論别專人修問次又某丐祠乃不獲命一味皇恐已再具請度必䝉矜允黽勉于此且三年矣此間氣燥而風烈久處其間豈得無所傷加以災患悲悼之餘尤覺費調護又况事理自當間退此請若尚未遂當更力言耳然未去間種種不敢少忽逺近幸寧靜人情相安頗覺省力但義不得不求歸顧惟主恩曽未有毫髮之報區區何敢有懷安之念哉兒子護亡室之喪已抵長沙以此月葬事卜地得之湘西山間某頃嘗見之頗為穩密惟是自失梱助家事細大無不相關今凡百悉從痛省只覺恬靜之為安矣論語日夕玩味覺得消磨病痛變移氣質須是潛心此書久久愈見其味舊說多所改正它日首以求教向來下十章癸巳解望便中疏其繆見示兄間中想得專精於文字間殆亦天意也中庸大學章句極涵蓄有味它解想皆用此體通鑑工夫今何如有相從者否近東廣一二士來相見篤茂可喜此間士人似未及之良才美質何處無也又學中重刻責沈納一軸并十本去近思録方議刻欲稍放字大耳詹漕體仁孜孜講學每相見職事之外即商確義理殊為孤寂之慰其趣向亦難得也本路州縣間人才尋常不敢忽有思慮有才力者亦得數人有雍州倅吳稱者雖是粗疏然忠義果斷疾惡如讐緩急可用亦謾及之又石子重陳明仲魏應仲三書煩為自使轉達林擇之久不聞問今何如近復有何人相從長逺者誰誠實肯作工夫耐久者極難得也鄭自明直言亦不易容受其直固是可喜事但未見用其言而自明兩遷矣在言者亦更須審顧也趙若海固為才健但近來出按諸郡拘核錢物殊有過當處凡郡之財悉拘入漕司寄樁庫遂致有無錢支俸散衣處昨日報却與廣東詹漕兩易渠尚未歸也詹却頗有氣味舊熟識之但渠素主張行鈔法渠未見此路利害得其來同作一家事共議其至當尤幸耳本路緣數劇盜皆就擒逺近殊恬靜邉上緣向來多是姑息不立壞却綱紀近頗修正二三矣大抵議論往往墮一偏孟浪者即要功生事委廢者一切放倒為害則均耳又諭及大學中人之其所親愛而辟焉處當讀作僻字反復詳之甚顯然且是上下文義貫穿無可疑者其理則於修身齊家極為要切易傳所謂妻孥之言雖失而多從所憎之言雖善為惡亦是意也想靜中玩繹多所發明恨未得盡扣耳某數年來務欲收斂於本原處下工覺得應事接物時差帖帖地但氣習露見處未免有之一向鞭劈不敢少放過久久庶幾得力耳冬夜殊得讀書之暇溫繹舊說見得其間縱有說得是處亦復少味益恨向來言之容易甚思得間從頭整頓過所欲面承者蓋非一事也自甲午病後雖痛節飲但向來有酒積在腹間才飲一兩杯便覺隱隱地遂禁絶不復飲蓋亦效賢者之决也以此益覺精力勝前耳於所講論皆無疑獨易說未得其安亦恐是從來許多意思未能放下俟更平心易氣徐察之也所謂若稍作意主張便為舊說所蔽此豈獨讀易為然凡書皆爾豈獨說書為然凡事皆爾理道本平鋪放著只被人起意自礙了然此是非要它不思量蓋只為正有害於思耳又某比者䝉誤恩因任辭而不獲極用悚皇但再三思之事理有不容久冒昧于此想兄亦悉其詳身之利害非所問正恐或至貽害一路蓋帥司事動涉邉防而皆係屬密院耳少俟開正後當力控陳其間曲折逺書未易具布也兄何以幸教之本路諸事幸粗定諸州例頗舒若得計臺以根本為念不為新竒不迫以舊逋庶乎可以望休息但他人所見類多不與此意同奈何然在區區不敢不竭誠盡力也茍一日未去此則不敢少忽耳又某新嵗來即欲申前請適以買馬事方興不免少待近已畢事即日走價控陳執事者漠然不以為意今力具劄子至上前度可必得得想當在後月來也如或尚未得隨即更請以得為期非惟已分時義所當退間兼久處炎方某頑軀雖幸差健然恐氣血未免為所蒸薄兒子素來氣弱哀苦之後遂得肺疾尤非熱地所宜殊為之憂慮耳逺方之人似頗相信凡百易於號令比初到甚省力但朝廷既無相知者脫有意外深懼不相應此尤冝速去耳詹體仁慤實肯講學不易得但未免弱蓋膽薄而少决今日善類多有此病在此每力扶之終似覺難以此思剛明之資誠不易得相與任重行逺要須得若人輩耳來諭闕之病鄙意政謂然亦屢告之覺得似安於此然力針救之不可已也氣禀與家學之說誠然不能矯正只是剛明不足耳闕一種議論後生輩淪入心府已覺流弊甚害觀闕意亦近之渠一對之後又復且隨衆而處亦何能為有無哉此特為尊兄言之可耳近得劉子澄書云闕正似范淳父避世金馬此是何議論金馬豈避世之地耶范淳父當時同溫公修書事自不同溫公所稱意自别耳尊兄閒靜中玩理甚精每得來書論學及政及評品人才未嘗不犁然有當而躩然有省且慨然有歎也吾曹豈私於所好哉自覺理有不可易者要當相與貞固勉厲而已數年來尤思一㑹見講論未知何日得遂耶中庸大學中三義復辱詳示今皆無疑但截取程子之意似不若只載云程子曰此一節子思喫緊為人處讀者其致思焉則已是拈出此眼目使人不敢容易看過矣如易傳中多有如此等意思誠解經之法也如云感通之理知道者默而觀之可也更幸詳之學記得兩石甚堅潤且厚見磨治刻字當檢㸃子細日俟額字之來耳所要碑刻文字寄去數具别紙林擇之可念當時似不必如此逺去耳今亦分俸薄助之附此便告幸為轉達吳門蹤跡亦見别紙陳鄭兩書已付吳德夫但鄭君已赴銓矣吳晦叔已葬子殊幼弱耳湘中士人有周奭者舊嘗相從近來此相訪頗覺長進似是後來可望者蓋天資元來剛介今却肯作工夫耳以母老不得久留今歸矣有新貴州守陳唐弼過此頗有志於事為於邉防兵法屯田等事皆曽講究乃一有用之才其父規紹興間與劉信叔同守順昌者也亦恐欲知游誠之時得書否心極不能忘之然要須更加鋤治之功耳亦幸時因書告語此等資質宜有以成就之石子重之對如何後來有何學子及人才中有可見語者因書却幸筆及英州兩遣人看之數日前得書頗似悔前非有欲間中讀書之意未知如何又恐為釋氏乘此時引將去也義利交戰卒為利所奪君子小人相好卒為小人所汨蓋亦理勢之必然此渠前日之為亦不勝其責也然誠是終可憐耳建康數通問否近日意思作為復如何此僻逺終是疏得音書且都不知事耳又此間歸長沙一水甚便只數日陸行到清湘登舟春夏間不十日可泊城南書院堤下矣學中見刻易傳湖廣間難得此本耳近思録中可惜不載得說舉業處幸寫示尚可添入是兄一手所編書此不欲自添也舍弟數數拜書否隱齊著語願亟見之又前時承書中諭及狄梁公書法甚善使梁公親聞之亦當為法受惡無所辭此義烏可不立也管寧之徒亦誠如所示栻近因讀春秋胡氏傳覺其間多有合商量處程先生之說雖少然總領略具矣本路新漕詹君儀之體仁豈弟愛民凡事可以商量又趨向正孜孜以講學為事時過細論殊慰孤寂舊在嚴陵相見頗惑佛學今却不然亦得伯恭之力其人恐有可望也二廣亦有二三士人肯思慮能自立者但向來無師承方告以所當循之序耳又尊嫂已遂葬事否卜其宅兆固當審處然古人居是邦即葬是邦蓋無處無可葬之地似不必越它境費時月泛觀而廣求也君子舉動人所師仰近世風俗深泥隂陽家之論君子固不爾但恐聞風失實流弊或滋耳更幸裁之又游掾後來曽相見否計今已還也晦叔不知尚留彼中否中庸後解想已付渠來甚欲見也如道不逺人章鄙意以為須將人字做人心說亦是旋添入不若更平易看只是道初不逺於人之身人之為道而不近求之於其身尚何所為道故有伐柯睨視之譬知道之不逺人則人與已本均有也故以人治人如此看似意味為長不識如何南軒集卷二十三
