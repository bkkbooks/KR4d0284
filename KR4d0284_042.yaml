  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0284_WYG_042-1a, image: WYG1167/WYG1167-0762c.png}
body:
  text: 南軒集卷四十二宋張栻撰祝文祈雨服嶺以南土剛而農惰夏秋之交數日不雨已或告病求神雖瀆理不容緩伏惟矜惠下民早沛甘澤周及四境俾克大濟豐年之報敢不敬修謝雨近以農夫望歲有請于神䝉神降沐沛為甘澤浹洽周遍一稔有期更惟神惠終以幸賜吏當䖍恭益思不懈以承靈貺堯山灕江自降沐下云應不旋踵沛澤周洽祈晴霖雨連仍勢猶未己深虞浸溢有害秧麥早夜不遑用走控告伏惟矜此下民賜以開霽惟神之惠俾克敬承吏之不恭敢不修省祈雨春且盡矣民將蒔田而時雨少靳土膏不滋歲事所係甚重是用奔走控告明神伏惟矜憐沛以甘澤周遍浹洽克濟南畝實惟神休吏之不恭敢不修省謝雨涉春以來時澤未應深虞農事之艱奔走控告神答如響雷行雨霈連日未己民得以服事南畝吏得以少寬百憂神之賜其何以報雖然苗既蒔矣將秀之既秀矣將實之實而堅穫而周始得以遍充吾民之腹而克應公之須然則自今以往歷夏及秋雨暘之節各適其可無或少愆而後吏之責塞不至數瀆于神某實惴惴焉惟民之凋瘁方歲之豐猶或不舒惟神之聰明其所臨饗實依乎民吏或有罪願止罰于身而無貽于民也祈雨惟今之歲賴神之休早稻既穫矣而彌旬不雨禾之晚者秀而未實一簣之功正在今日是用奔走控告沛澤之賜惟神終惠之祈雨惟兹晚稼既視其生長以至于今亦且穗矣必待一雨之沛而後成實乃或靳焉害于垂成惟神之仁獨不矜此豈人事有以干隂陽之和歟政有不平刑有不中驕怠之或萌實長民者之責惟民之寡弱獨何與此盍降罰于吏而苦其民今兹一日不雨則有一日之傷事既迫矣號呼于神惟神其哀念之謝雨近以時雨有愆祈請于神䝉神降休應以甘澤尚祈終賜俾遂有秋敢不殫誠仰祗神惠祈晴維時初冬氣當揫斂乃者癸酉之夕雷電交作陽縱不收繼為霖雨亦既彌旬榖之登場者未暴深虞其積而壞也用走祈于神所冀開霽以成其終導和致順無為民災敢不敬省人事以承休嘉謝雪此用之祭社其祭稷神前四句云惟稷有神司我下土斡旋生育功用莫禦餘同惟邦有社實司其土闔闢隂陽呼吸風雨民所憑依國有彛禮凡我命吏敢不敬事兹冬而溫氣或乖忤陽驕不收壤燥靡附來牟何貽癘疫是懼奔走以告俯伏傴僂先以嚴霜知神意許釀隂連朝雲同天宇粲然雪花上下飛舞風無虐號氣有和豫載積載零逺近周溥沴氛一空嘉祥來下音户物意昭蘇土膏沮洳既釋近憂亦寬逺慮嗣歲其有兆端己豫何以報神正直是與勿替引之神日聽汝俾我大田有富無窶嗚嗚其歌坎坎其鼓農夫之誠神所惠顧祈雨維兹之歲己屇暮春時澤未洽麥苗就稿穀種不入人心皇皇吏用恐懼奔走以告惟神之仁哀此下民沛以甘雨雷動風行周溥霑足以開有年敢不敬恭克承休德謝雨近以時澤未應控告于神惟神哀民之生賜以甘雨俾克舉趾于南畝為惠曷勝惟是自兹以往農事日興所望雨澤相繼仍迄開于有年惟神幸賜之以不倦惟吏恪承之弗敢怠惟民欣戴之何有極謝雨近以雨澤未溥荐有控告賴神之靈連獲嘉應久燥之壤悉得就耕謹再拜以謝惟是農事之難自兹以往苗而秀秀而實所仰於雨澤大霈蓋源源也惟神幸終賜以成有年謹再拜以祈謝雨祈晴夏至之日某以南畝望雨控告于神賴神之靈應不旋踵今既半月沛澤不翅有餘矣而連綿不已隂氣未收復懼為下田之菑是用再有請于神望即開霽以終其賜夫久晴而祈雨積雨而丐晴其為請誠若無厭者惟神矜此下民赦吏之瀆而有以俯狥之自今以往伏願五六日至于旬時雨暘相須無過與不及保我嘉榖以迄于有秋則實拜神之大惠吏之修省其敢弗䖍秋祭兹以素秋恪修常事在禮所當報而不祈惟是中秋以來久愆雨澤今稻之傷者雖不及事然土壤堅燥澤氣不升實預懷嗣歲之慮敢因以請早賜甘澤兆開豐穰實惟神之休社壇某被命來守此邦政有闕謬願降灾於厥躬而無以疵癘于斯民惟明神實鍳臨之社壇某恭承皇命來守遐藩視事之初祗見壇壝惟神克相惠綏此民政有乖戾罰止某身社壇惟雨暘寒燠之時與不時雖司乎神而實係於人之為某以不敏來守此邦懼智慮有所弗逮惟神寬之至其自作之愆則願降罰于身而無以傷乎民則惟神之明楚望名山大川神靈莫測望祀之典敢不敬恭肇始二壇用伸祈報惟神歆格佑我下民俾雨暘時若歲事登濟罔有菑害以闡神之休惟吏謹當率民奉事自今以往終古無斁烏龍山神竊惟古者諸侯各祭境內之山川嚴其壇壝潔其幣牲以致吾誠焉耳後世立之棟宇設為像貌其失甚矣仁安之山實鎮兹土風雲變化雨我百穀是為神靈民所依賴而嚴祀之所曠然未講其何以收聚誠意克有感通肇建兹壇亦既訖事謹率僚屬再拜以祠惟神昭相俾雨暘以時嘉生無癘吏雖不敏敢不率民敬事永以無替亦惟神之休諸廟某被天子命來守此邦靖共爾位正直是與顧雖不敏敢不敬斯言惟神實鍳臨之祭勾芒神惟時新春陽氣肇舒乃出土牛以首農士致祀于神實曰彛典惟神孚祐時其雨暘順乃嘉生賜以豐年其敢忘神之德祭海陽山嗚呼海陽之山呼吸雲氣維邦之望而民所恃嗟嗟晚稼亦既成穗屬時驕陽垂成莫遂惟神至仁矜此憔悴觸石膚寸一境是庇沛為甘澤成我豐歲孚于下民永答神惠祭諸廟惟兹稼穡幸底有年戴神之休敢忘思報謹以季秋聿修常事惟神鍳臨終惠賜之唐虞二帝兹以素秋恪修常事威顔不逺俯伏祗承灕江堯山在禮諸侯得祭其境內之山川惟山川之靈能出雲雨故為禱祀之所依堯山灕江此邦之望也而壇壝未立修敬無所兹以夏秋之交近旬不雨農夫望歲之切用敢瞻望再拜以致悃誠且遣官僚捧祝以告伏惟神靈惠孚沛為甘澤俾克有年圖報之修其敢復後秋祀堯山兹以季秋萬寶告成謹遣官僚敬修常事仰惟神靈賜以鍳格堯山灕江二壇惟江山之神實為此邦之所瞻依而壇壝禱祀無所某用是懼䖍度高明之地肇新規模及兹而成謹率官僚俯伏以告惟神孚鍳佑此下民俾歲屢豐物無疵癘吏當率民敬事其永無斁虞帝祠惟斯民之所以生斯世之所以立翳人倫之教是賴而聖人實人倫之至也帝之盛德冠冕萬代固豈下臣所敢贊述蒼梧之野謂帝嘗臨寅緣此邦獲奉廟祀某蒞官之初適修常事周祀棟宇缺壞弗稱悚栗汗下不敢荒寧肇新規模兹焉獲考敬率官僚俯伏以告惟帝之澤化育並行動植䝉賴何有窮極敢云此邦獨私其賜有虞氏二妃惟神唐帝之女嬪于有虞協德聖神垂則萬代新宫肇建內閫是嚴修祠于春敢率彛典大成殿某以愚陋被命臨民早夜恐懼未知所濟惟當精思聖經之法言體而行之庶幾萬一得寡於罪悔視事之始敢祗見于學宫文宣王某恭承皇命來守遐藩視事之初祗見于廟為政之方備嚴經訓雖曰不敏敢不夙夜敬思力行庶幾萬一先聖某以承學濫兹為邦視事之初祗見于廟佩居敬行簡之言推學道愛人之志雖曰不敏敢不夙夜庶幾萬一先聖廟學新成謹率僚吏與鄉之士行釋菜禮敢不再拜稽首思所以祗若明訓先師廟學新成謹率僚吏與鄉之士行釋菜于先聖敢以先師兖國公配先聖兹新棟宇亦既告成敬奉神像即安于宫蜀漢昭烈帝祠孱陵惟帝痛宗國之荒墜憤讐賊之憑陵顛沛百罹信義不舍至於賢哲願為之佐英雄樂效其死規模宏逺夫豈偶然天若祚漢豈無其成雖曰不終正理曷泯眷言兹地昔所遲回風烈猶存焄蒿悽愴有廟以祀典禮則宜藩臣經從敢不修敬嚴子陵祠某以愚陋被命來守此邦竊仰先生高風於千載之上視事之始恨拘印紱不得躬走祠下敬遣迪功郎嚴州州學教授鄭某往致一奠祭嚴先生某竊惟此邦之所以重於天下者以先生高風之所存也雖舊隱之地祠像具設而學宫之中蒸嘗獨曠其何以慰學士大夫之思乃闢東偏肇始祀事嗟乎世逺道散寵利相希而事君之義益以不明惟先生曽不以一毫動其中啓世祖貴德尊士之心成東京砥節厲行之俗施澤逺矣翳我多士克承繹之丞相萊國冦忠愍公祠公安國有大議發言盈庭紛紛鄙夫蹙縮經營豈國之愛惟謀厥身從違之間興喪所分不有英哲孰相其成一言之决九鼎莫傾允矣萊公社稷之臣定計澶淵功垂日星匪功之艱其見克明惟見之獨勇莫我嬰黃蓋一張聾聵震醒是曰廟勝豈幸之云彼纎雖巧寧屈其伸是非之公久焉益新蕞爾兹邑公所嘗經民之愛公孔悲以忱有翦者竹為之發生我來拜公闕南軒集卷四十二
