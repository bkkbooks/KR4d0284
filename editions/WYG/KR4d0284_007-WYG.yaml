body:
  text: 南軒集巻七宋張栻撰律詩次韻趙漕中宵憂歲不成寐一雨為霖敢自虞應是行臺借餘潤故教均澤及樵蘇雨聲歴歴來庭户喜色津津到澤虞撃壌徑思同野老名亭詎敢學坡蘇和答鄭憲分贈米帖字中有筆米慱士片紙人間什襲藏好帖袖歸終日㸔從渠車馬閙康莊是日中元傾城出逰偶作世情易變如雲葉官事無窮類海潮退食北䆫凉意滿卧聽急雨打芭蕉偶成至前公庭過午無餘事退食歸來黙坐時晴日半䆫香一縷陽來消息只心知送鄭憲酒晴日南山几杖俱躋髙選勝不須扶也知坐上多佳客可着青州從事無再和想得經行與客俱身强寧復要人扶晩來山色應難盡十里青蒼看有無韓廷玉築亭於官舎之旁園中故多梅㑹有飛雪予因題其扁曰梅雪蓋取少陵詩語而劉公貢父送劉長官掌廣西機宜嘗用此事有雪片梅花五嶺春之句今廷玉適為此官于以名亭抑其宜也亭邊花木多吾弟定叟舊植故予首章及之城隂一徑自深窈花木成行菊遶籬細說當時經始事夢回春草費相思南州要是梅開早北客巡簷偏眼明一夜飛花來㸃綴新亭扁復得佳名眼底風光正自佳滯留何必歎天涯日長况是文書省且與閑吟對落花立春日禊亭偶成律回歲晩氷霜少春到人間草木知便覺眼前生意滿東風吹水綠差差和陳擇之春日四絶花落花開揔可憐嶠南亦復好風煙雨餘起我故園夢漠漠浮鷗水拍天年華冉冉春將半花事怱怱雨滿城想復東郊變新綠未妨携酒趂初晴泗上當時皷瑟人風雩豈是樂閑身言外黙傳千聖旨胷中長有四時春日長漸有簡編樂春半巳將櫻笱來無數青山相慰藉有時明月共裴徊元日古史書元意義存春秋掲示更分明人心天理初無欠正本端原萬善生從鄭少嘉求貢綱餘茶貢包餘壁小盤龍獨占人間第一功乞與清風行萬里為君一洗瘴雲空茗事蕭踈五嶺中修仁但可愈頭風春前龍焙令人憶知與故人風味同初食荔枝開奩未暇論香味便合令居第一流細擘輕紅傾瑞露周南端復且淹留照水依山秪自竒櫛風沐雨借光輝氷肌不受紅塵涴頳頰從教酒暈肥嶺南荔枝不可寄逺龍眼新熟輙以五百顆奉晦叔或可與伯逢共一酌也荔子如今尚典刑秋林圎實著嘉名雖無頳玉南風面却耐筠籠千里行手自封題寄故人聊將風味赴詩唇千年尚憶唐羗䟽不汙華清驛騎塵壽定叟弟聞說清朝對紫宸君王側席屢咨詢惟應民瘼開陳切故遣分符驗撫循聞說嚴人愛貳車呻吟赴愬頼携扶從今充擴應無倦千里疲民待子蘇聞說年來更老成清心寡欲厭紛紜固知造物有深意端享脩齡㸔䇿勲秋風想巳治歸裴吾亦扁舟具碧湘世味秪應諳歴遍何如兄弟對方牀年年桂綻菊開時長憶芳樽共一巵請誦周人和樂句全勝三歎陟岡詩丙申至前五日復坐南牎憶去年詩又成兩章依然紅日照牎楣還是去年消息時妙理不須尋轍迹只於生處驗新知新晴物物有春意正值一陽來復時變化無窮俱是易探原宻處起乾知題雉山禊亭一曲清江正可憐隔江新竹露姢姢好風成我曲肱夢起㸔飛雲度碧天夢乘大舸卧泛江湖波濤甚壯醒乃悟其為雨因成小詩平生得意白鷗外歲晩歸心鴻鴈俱蕉葉雨聲喧曉枕夢成風楫泛江湖南嶽庵僧寄上封新茶風味甚髙薄暮分送韓廷玉李嵩老浮甌雪色喜初嘗中有祝融風露香徑欲與君同晤賞短檠清夜正相望䟦王介甫逰鍾山圖林影溪光静自如蕭踈短鬢獨騎驢可能胷次都無事擬向山中更著書歲晩烹試小春建茶陽月藏春妙莫窺靈芽粟粒露全機煑泉獨啜寒牎夜已覺東風天際歸昨過漕䑓庭前荼䕷盛開已而詹體仁海棠和章及此因用前韻賦兩章玉立春深雪不如生香透骨雪應無莫遣飄零雜塵土芬芳留入碧琳腴紛紛花片逐風飛緑幄藏春自一竒不入時人紅紫眼却須我軰與題詩所思亭海棠初開折贈兩使者將以小詩未須比擬紅深淺更莫平章香有無過雨夕陽樓上㸔千花容有此膚腴東風着物本無私紅入花梢特地竒想得霜䑓春思滿一枝聊遣慱新詩廖憲送牡丹用海棠韻復走筆戯和之緑葉滿園風雨餘君家花事嶺中無眼眀見此復三歎京洛名園憶上腴報荅春光須着語年來老我不能竒風前姢好有餘態未必此花如此詩定叟弟頻寄黄蘖仰山新芽嘗口占小詩適灾患亡聊乆不得遣寄今日方能寫此瘴雨昏昏梅子黄午牎歸夢一繩床江南雲腴忽到眼中有吾家棠棣香集雲峯頂風霜飽黄蘖洲前水石清不入貢包供玉食秪應山澤擅髙名坡公貶章茶未為磪論予謂建茶如䑓閤勝地章茶之佳者如山澤髙人各有風致未易疵也益陽南境松杉夾道鬱然父老相傳忠定張公為邑時所植也其間亦有旣剪而復生者作詩属來者䕶持之夾道松杉半老蒼前賢餘澤未應忘君㸔直幹連雲起豈但當年蔽芾棠登楚野亭見張舎人題字英豪自昔多遺恨人物于今正渺然來訪舎人題字處淡煙莎草滿平川城南雜詠二十首納湖原原錫潭水匯此南城隂岸花有開落水盈無淺深東渚團團凌風桂宛在水之東月色穿林影却下碧波中詠歸橋四序有佳趣今古蓋共兹橋邊獨㣲吟囬首忘所之船齋窻低蘆葦秋便有江湖思乆巳倦埀綸㳺魚不須避麗澤長哦伐木篇佇立以望子日暮飛鳥歸門前長春水蘭澗藝蘭北澗側澗曲風紆餘願言植根固芬芳長慰予山齋疊石小峥嵘脩篁髙下生地偏人迹罕古井轆轤鳴書樓髙樓出林秒中有千載書昔人不可見倚檻意何如䝉軒開軒僅尋丈水竹亦蕭䟱客來須起敬題榜了翁書石瀨流泉自清寫觸石短長鳴窮年竹根底和我讀書聲巻雲亭雲生山氣佳雲卷山色静隠几亦何心此意相與永柳堤前年種埀柳已復如許長長條莫攀折留待映滄浪月榭危闌眀倒影面面湧金波何處無佳月惟應此地多濯清亭芙蓉豈不好濯濯清漣漪采之不盈把怊悵暮忘飢西嶼繫舟西岸邊幅巾自來去島嶼花木深蟬鳴不知處琮琤谷幽谷竹成隂懸流着石清不妨風月夕來此聽琮琤梅堤亭亭堤上梅歴歴波間影歲晩憶夫君寂寞煙渚静聽雨舫風吹渡頭雨摵摵蓬上聲欣然㑹心處端復與誰評采菱舟散策下亭阿水清魚可數却上采菱舟乘風過南浦南阜湘水接洞庭秋山見遥碧南阜時一登搔首意無斁㳺嶽尋梅不獲和元晦韻眼㸔飛雪洒千林更着寒溪水淺深應有梅花連夜發却煩詩句寫愁襟十三日晨起霜晴用定王臺韻賦此晴嵐開嶽鎮雲雨㫁陽臺日出寒光逈川平秀色回興隨天際鴈詩寄嶺頭梅盛事它年說憑君記玉杯用元晦定王臺韻珍重南山路驅羸㡬度來未登喬嶽頂空說妙髙臺曉霧層層歛竒峯面面開山間元自樂澤畔不須哀馬上口占向來一雪壓霾昏曉跨征鞍傍水村七十二峯俱玉立巍然更覺祝融尊馬上舉韓退之語口占擾擾人心墮𣺌茫更於底處問穹蒼今朝開霽君知否春到無邊花草香和朱元晦韻一見瓊山眼為青馬蹄不覺渡沙汀如今誰是王摩詰為寫清新入畵屏登山有作上頭壁立起千尋下列羣峯次第深几几籃輿自吟詠白雲流水此時心和元晦馬跡橋便請行從馬跡橋何須乘鶴簉叢霄殷勤底事登臨去不為山僧苦見招方廣道中半嶺少憩半嶺籃輿小駐肩眼中已覺𣺌雲煙山頭更盡無窮境非是人間别有天道中景物甚勝吟賞不暇因復作此支笻石壁聽溪聲却㸔雲山萬疊新揔是詩情吟不徹一時分付與吾人崖邊積雪取食清甚賦此隂崖積雪射寒光入齒清甘得味嘗應是山神知客意故將瓊液沃詩膓和元晦後洞山口晩賦石裂長藤瘦山圍野路深寒溪千古思喬木四時隂更得尋幽侣何妨擁鼻吟笑㸔雲出岫誰似此無心和元晦雪壓竹韻山行景物揔清竒知費山翁㡬許詩雪急風號聮騎日月明霜净倚闌時和元晦懐定叟戯作路入青山小作程毎逢佳處憶吾人山林朝市休闗念認取臨深履薄身方廣聖燈隂壑傳聞烱夜燈㡬人髙閤費追尋山間光景秪常事堪笑塵寰萬種心賦羅漢果黄實纍纍本自芳西湖名字著諸方里稱勝母吾常避珍重山僧自煑湯和元晦詠畫壁松杉夾路自清隂溪水有源誰復尋忽見畫圖開四壁悠然端亦慰予心和元晦方廣版屋葺蓋非陶埴年深自碧差如何亂心曲不忍誦秦詩和擇之賦泉聲試問今宵澗底聲何如三歎有餘音堂中衲子還知否月白風清底處尋和擇之賦霜月月華明潔好霜天遥指層城㡬暮煙妙意此時誰與寄羙人湘水隔姢姢和擇之賦枯木隂崖虎豹露鬚牙元是枯槎着蘚花不向明堂支萬祀𤣥冬苦節未須誇聞方廣長老化去有作夜入精藍意自真上方一笑政清新山僧忽復隨流水可惜平生未了身賦蓮花峯玉井峯頭十丈蓮天寒日暮更清妍不須重詠洛神賦便可同賡雲錦篇和元晦詠雪兀坐竹輿穿澗壑仰㸔石徑接煙霞是間故有春消息散作千林瓊玉花自方廣過髙臺兩寺清聞磬羣峯石作城風生雲影亂猿嘯月華明香火逺公社江湖鷗鳥盟是中俱不着俯仰見平生賦石廩峯巋然髙廪倚晴天獨得佳名自古傳多謝山中出雲氣人間長與作豐年道傍殘火溫酒有作隂崖衝雪寒膚裂野路燃薪春意回旋暖提壺傾濁酒陶然絶勝夜堂杯和元晦林間殘雪之韻眼中光潔盡瓊瑶未覺鬱藍宫殿遥石壁長林氷筯落鏘然玉佩響層霄和擇之㸔雪嶽背三冬雪真同不夜城野雲何晃蕩澗水助空明行橐多新句青山有舊盟堂堂身世事渠謾說三生和擇之福巖回望嶽市回首塵寰去渺然山中别是一風煙好乘晴色上髙頂要㸔清霜明月天福巖讀張湖南舊詩兹逰竒絶平生事只欠瀛仙氷雪姿元是經行題品地却從山際誦新詩和擇之登祝融峯口占祝融髙處好拂石坐林端雲夢從渠小乾坤本自寛回眸増浩蕩出語覺髙寒明日重來㸔寧應取次還和元晦晩霞早來雪意遮空碧晩喜晴霞散綺紅便可懸知明旦事一輪明月快哉風過髙臺携信老詩集蕭然僧榻碧雲端細讀君詩夜未䦨門外蒼松霜雪裏比君佳處讓髙寒和元晦贈上封長老上方元自好一榻有餘清秪趂晨鐘起寧聞山鳥聲髙僧足幽事野客冨詩情試問峯頭景今朝作麽生和元晦醉下祝融雲氣飄飄御晩風笑談嘘吸滿心胷須臾歛盡還空碧露出天邊無數峯和元晦十六日下山之韻歸袂隨雲起籃輿趂雪明山僧苦留客世故却闗情小倚枯藤杖聊聽絶澗聲如何山下客一笑已來迎和擇之韻山中好景年年在人事多端日日新不向青山生戀着秪縁身世揔非真和擇之韻舊說峯頭寺真成杖屨來却尋泥路滑更喜野雲堆寒積三冬雪陽生九地雷城中㡬親友為說㸔山回題曽氏山園十一詠尚絅堂昔人為巳學深旨妙隠㣲三復尚絅章服膺願無違夕陽臺日暮天無風岸巾夕陽中回首發遐想明月已升東橘沜我家湘水濵年年賦徠服君家百畝田晩歲千樹綠霜傑種松苦難長松長還耐乆莫作目前思但種門前柳菊隠不肯競桃李甘心同艾蒿徳人一題品愈覺風味髙君子亭嘉蓮秉嘉質觧后逢賞音翁豈玩物者寄意一何深蓼歩扁舟横薄莫渺渺蓼知秋家山有江湖何必賦逺逰北山南山煙雨霏北山風露多衣沾非所惜屨濕知如何梅沼寒梅只自芳野水有餘清山空歲云暮妙意相發明桃花塢花開山與明花落水流去行人欲尋源只在山深處吟風橋橋邊風月佳俛仰有餘思無忘履氷心方識吟風意昨日與周伯壽别終夕雨小詩追路夜雨虚簷響徹明地蒸衣潤欲生雲想君渚路頻回首我亦書䆫倍憶君自西園登山日光射崖氷雪色風壑傳響松龍吟但忻耳目得所遇不覺山髙㡬許尋南軒集巻七
