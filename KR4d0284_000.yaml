body:
  text: 南軒集别集類三宋提要臣等謹案南軒集四十四卷宋張栻撰栻字敬夫廣漢人丞相浚之子以蔭補官孝宗時厯左司員外郎除祕閣修撰終於荆湖北路安撫使事迹具宋史道學傳栻歿之後其弟杓裒其故稿四巨編屬朱子論定朱子又訪得四方學者所傳數十篇益以平日往還書疏編次繕寫未及蕆事而已有刻其别本流傳者朱子以所刻之本多早年未定之論而末年談經論事發明道要之語反多所佚遺乃取前所搜輯參互相校斷以栻晚嵗之意定為四十四卷併詳述所以改編之故辨於書首即今所傳淳熙甲辰本也栻與朱子交最善集中與朱子書凡七十有三首又有答問四篇其間論辨齗齗不少假借如第二扎則致疑於辭受之間第三扎辨墓祭中元祭第四札辨太極圖説注第五六七札辨中庸注第八札辨遊酢祠記第十札規朱子言語少和平第十一札論社倉之弊責以偏袒王安石第十五札辨胡氏所傳二程集不必追改戒以平心易氣第二十一札詳論仁之説有流弊第四十四札論山中諸詩語未和平第四十九札論易説未安是從來許多意思未能放下第五十四札規以信隂陽家言擇葬地與胡季隨第五札又論朱子所編名臣言行録未精細朱子並録之集中不以為忤又栻學問淵源本出胡宏而與朱子第二十八札謂胡寅讀史管見病敗不可言其中有好處亦無完篇又第五十三札謂胡安國春秋傳其間多有合商量處朱子亦並録之集中不以為嫌足以見醇儒心術光明洞達無一毫黨同伐異之私後人執門戶之見一字一句無不回護殊失朱子之本意至朱子作張浚墓志本據栻所作行狀故多溢美語録載之甚明而編定是集乃削去浚行狀不載亦足見不以朋友之私害是非之公矣論張浚者往往遺議於朱子蓋未核是集也劉昌詩蘆浦筆記駁栻堯廟歌指堯廟在桂林失於附會其歌今在集中蓋取其尊崇帝德而略其事實昌詩又録栻慤齋銘稱栻奉其父命為其弟杓作本集不載檢之良然然栻集即杓所輯不應反漏考髙斯得恥堂存稿有南軒永州諸詩跋曰劉禹錫編栁子厚集斷至永州以後少作不録一篇南軒先生永州所題三亭陸山諸詩時方二十餘嵗興寄已落落穆穆如此然求之集中則咸無焉豈編次者以栁集之法裁之乎然則栻集外詩文皆朱子刪其少作非偶佚矣乾隆四十三年恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書集部四南軒集目録别集類三宋卷一詞賦古詩上卷二古詩中卷三古詩下卷四律詩一卷五律詩二卷六律詩三卷七律詩四卷八表啓卷九記一卷十記二卷十一記三卷十二記四卷十三記五卷十四序上卷十五序下卷十六史論上卷十七史論下卷十八説卷十九書一卷二十書二卷二十一書三卷二十二書四卷二十三書五卷二十四書六卷二十五書七卷二十六書八卷二十七書九卷二十八書十卷二十九答問一卷三十答問二卷三十一答問三卷三十二答問四卷三十三題跋上卷三十四題跋中卷三十五題跋下卷三十六銘針贊卷三十七墓志銘一卷三十八墓志銘二卷三十九墓志銘三卷四十墓志銘四卷四十一墓志銘五卷四十二祝文卷四十三祭文上卷四十四祭文下南軒集原序孟子沒而義利之説不明於天下中間董相仲舒諸葛武侯兩程先生屢發明之而世之學者莫之能信是以其所以自為者鮮不溺於人欲之私而其所以謀人之國家則亦曰功利焉而巳爾爰自國家南渡以來乃有丞相魏國張忠獻公倡明大義以斷國論侍讀南陽胡文定公誦説遺經以開聖學其託於空言見於行事雖若不同而於孟子之言董葛程氏之意則皆有所謂千載而一轍者若近故荆州牧張侯敬夫者則又忠獻公之嗣子而胡公季子五峯先生之門人也自其幼壯不出家庭而固巳得夫忠孝之傳既又講於五峯之門以會其歸則其所以默契於心者人有所不得而知也獨其見於論説則義利之間毫釐之辨蓋有出於前哲之所欲言而未及究者措諸事業則凡宏綱大用巨細顯微莫不洞然於胸次而無一毫功利之雜是以論道於家而四方學者爭鄉往之入侍經帷出臨藩屏則天子亦味其言嘉其績且將倚以大用而敬夫不幸死矣敬夫既沒其弟定叟裒其故藁得四巨編以授豫曰先兄不幸蚤世而其同志之友亦少存者今欲次其文以行於世非子之屬而誰可豫受書愀然開卷亟讀不能盡數篇為之廢書太息流涕而言曰世復有斯人也耶無是人而有是書猶或可以少見其志然吾友平生之言蓋不止此也因復益為求訪得諸四方學者所傳凡數十篇又發吾篋出其往還書疏讀之亦多有可傳者方將為之定著繕寫歸之張氏則或者巳用别本摹印而流傳廣矣遽取觀之蓋多嚮所講焉而未定之論而凡近嵗以來談經論事發明道要之精語反不與焉豫因慨念敬夫天資甚髙聞道甚蚤其學之所就既足以名於一世然察其心蓋未嘗一日以是而自足也比年以來方且窮經會友日反諸心而驗諸行事之實蓋有所謂不知年數之不足者是以其學日新而無窮其見於言語文字之間始皆極於髙逺而卒反就於平實此其淺深疏密之際後之君子其必有以處之矣顧以序次之不時使其説之出於前而棄於後者猶得以雜乎篇帙之間而讀者或不能無疑信異同之惑是則豫之罪也巳夫於是乃復亟取前所搜輯參互相校斷其敬夫晚嵗之意定其書為四十四卷嗚呼使敬夫而不死則其學之所至言之所及又豈豫之所得而知哉敬夫所為諸經訓義唯論語説晚嘗更定今巳别行其他往往未脫藁時學者私所傳録敬夫蓋不善也以故皆不著其立朝論事及在州郡條奏民間利病則上意多鄉納之亦有頗施行者以故亦不著獨取其經筵口義一章附于表奏之後使敬夫所以堯舜吾君而不愧其父師之傳者讀者有以識其端云淳熙甲辰十有二月新安朱熹序
