body:
  text: 南軒集卷十宋張栻撰記潭州重修嶽麓書院記潭州嶽麓書院開寶九年知州事朱洞之所作也後四十有五年李允則來為請於朝因得賜書藏焉是時山長周式以行義著祥符八年召見便殿拜國子主簿使歸教授始詔因舊名賜額仍增給中祕書於是書院之稱聞天下紹興初更兵革灰燼十一僅存已而遂廢乾道元年建安劉侯珙安撫湖南既剔蠧夷姦民俗安靖則葺學校訪儒雅思有以振起之湘人士合辭以書院請侯竦然曰是固章聖皇帝所以加惠一方勸厲長養以風天下者而可廢乎乃屬州學教授金華卲頴經紀其事未半歲而成大抵悉還舊規某從多士往觀焉愛其山川之勝堂序之嚴裴徊不忍去喟而與之言曰侯之為是舉也豈將使子羣居族談但為決科利祿計乎抑豈使子習為言語文詞之工而已乎蓋欲成就人才以傳斯道而濟斯民也惟民之生厥有常性而不能以自逹故有賴於聖賢者出而開之是以二帝三王之政莫不以教學為先務至於孔子述作大備遂啓萬世無窮之傳其傳果何與曰仁也仁人心也率性立命知天下而宰萬物者也今夫目視而耳聽口言而足行以至於食飲起居之際謂道而有外夫是烏可乎雖然天理人欲同行異情毫釐之差霄壤之繆此所以求仁之難必貴於學以明之與善乎孟子之得傳於孔氏而發人深切也齊宣王見一牛之觳􅑌而不忍則告之曰是心足以王矣古之人所以大過人者善推其所為而已論堯舜之道本於孝弟則欲其體夫徐行疾行之間指乍見孺子匍匐將入井之時則曰惻隱之心仁之端也於此焉求之則不差矣嘗試察吾終日事親從兄應物處事是端也其或發見亦知其所以然乎誠能默識而存之擴充而逹之生生之妙油然于中則仁之大體豈不可得乎及其至也與天地合德鬼神同用悠久無疆變化莫測而其則初不逺也是乃聖賢所傳之要從事焉終吾身而後已雖約居屏處庸何損得時行道事業滿天下而亦何加於我哉侯既屬某為記遂書斯言以厲同志俾無忘侯之德抑又以自厲云爾二年冬十有一月辛酉日南至右承務郎直祕閣賜紫金魚袋廣漢張某記堯山灕江二壇記古者諸侯各得祭其境內之山川山川之所以為神靈者以其氣之所蒸能出雲雨潤澤羣物是故為之壇壝立之祝史設之牲幣所以致吾禱祀之實而交孚乎隱顯之際誠之不可掩也如此後世固亦有山川之祠而人其形宇其地則其失也久矣夫山峙而川流是其形也而人之也何居其氣之流通可以相接也而宇之也何居無其理而強為之雖百拜而祈備物以饗其有時而應也亦偶然而已耳淳熙二年之春某來守桂按其圖籍覽觀其山川所謂堯山者蟠據于東氣象傑出環城之山大抵皆石而兹山獨以壤天將雨則雲氣先冒其顛山之麓故有唐帝廟山因以得名而灕江逶迤自城之北轉而東以逹于南清潔可鑑其源發于興安與湘江同本而異𣲖故謂之灕而以水嫓之凡境內之水皆匯焉以是知堯山灕江為吾土之望其餘莫能班也歲七月彌旬不雨禾且告病先一日齋戒以夜漏未盡望奠于城觀之上曽未旋踵雷電交集一雨三日均浹四境邦人歡呼穡以大稔伏自念山川為吾土之望而壇壝未立禱祀無所其何以率吾民嚴昭事之意用惕然不敢寧乃俾臨桂縣尉范子文度髙明爽塏之地得于城之北疊彩巖之後隱然下臨灕江而江之外正與堯山相直面勢回環表裏呈露對築二壇以奉祀事為屋三楹于壇之下以備風雨其外則繞以崇垣踰時而告成乃十有二月丁酉率僚吏躬祭其上以祈嗣歲事畢裴徊喟然歎息退而述所以為壇之意以告邦之人與來為政者使知事神之義在此而不在彼庶有以致其禱祀之實且得以傳之於無窮云楚望記禮諸侯望祭其境內之山川必有壇壝以為歲時祈報之所今之為郡古諸侯國也江陵據舊楚一都會其山雖去郡為逺然迤邐聮絡以屬于當陽巫峽之間有自來矣而其浸則有如蜀江波濤吐吞瀰亘千里長吏所當率民敬事弗怠而望祭之地乃或有闕始度寸金堤之會平曠爽塏爰築二壇既髙既堅繞以周牆扁曰楚望蓋取傳所謂江漢沮漳楚之望也於其成率僚屬以告惟神之靈佑此下土時其雨暘茂乃嘉生使永無水旱厲疫之憂惟吏與民各端乃心以承以引無替於厥初無使非鬼得以紊我常祀神人相保終古曷窮遂書以貽來者淳熙六年正月道州重建濓溪周先生祠堂記宋有天下明聖相繼承平日久元氣胥會至昭陵之世盛矣宗工巨儒磊落相望於是時濂溪先生實出於㫪陵焉先生姓周字茂叔晚築廬山之下以濂名其溪故世稱為濂溪先生㫪陵之人言曰濂溪吾鄉之里名也先生世家其間及寓於他邦而不忘其所自生故亦以是名溪而世或未知之耳惟先生仕不大顯於時其澤不得究施然世之學者考論師友淵源以孔孟之遺意復明於千載之下實自先生發其端由是推之則先生之澤其何有窮哉蓋自孔孟沒而其微言僅存於簡編更秦火之餘漢世儒者號為窮經學古不過求於訓詁章句之間其於文義不能無時有所益然大本之不究聖賢之心鬱而不章而又有顓從事於文辭者其去古益以逺經生文士自岐為二塗及夫措之當世施於事為則又出於功利之末智力之所營若無所與於書者於是有異端者乘間而入橫流於中國儒而言道德性命者不入于老則入于釋間有希世傑出之賢攘臂排之而其為説復未足以盡吾儒之指歸故不足以抑其瀾而或反以激其勢嗟乎言學而莫適其序言治而不本於學言道德性命而流入於虛誕吾儒之學其果如是乎哉陵夷至此亦云極矣及吾先生起於逺方乃超然有所自得於其心本乎易之太極中庸之誠以極乎天地萬物之變化其教人使之志伊尹之志學顔子之學推之於治先王之禮樂刑政可舉而行如指諸掌于是河南二程先生兄弟從而得其説推明究極之廣大精微殆無餘藴學者始知夫孔孟之所以教蓋在此而不在乎他學可以至於聖治不可以不本於學而道德性命初不外乎日用之實其於致知力行具有條理而詖淫邪遁之説皆無以自隱可謂盛矣然則先生發端之功顧不大哉舂陵之學舊有先生祠實紹興某年向侯子忞所建至於今淳熙五年趙侯汝誼以其地之狹也下車之始即議更度之為堂四楹併二程先生之像列於其中規模周密稱其尊事之實既成使來謁記某謂先生之祠凡學皆當有之豈惟舂陵特在舂陵尤所當先者趙侯兹舉知急務矣故為之論述如此以告後之人衡州石鼓山諸葛忠武侯祠記自五伯功利之説興謀國者不知先王仁義之為貴而競於末塗秦遂以勢力得天下然亦遂以亡漢髙帝起布衣一時豪傑翕然從之而其所以建立基本卒滅項氏者乃三老董公仁不以勇義不以力之説也相傳四百餘年而曹氏篡漢諸葛忠武侯當此時間關百為左右昭烈父子立國於蜀明討賊之義不以強弱利害二其心蓋凛凛乎三代之佐也侯之言曰漢賊不兩立王業不偏安又曰臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆睹嗟乎誦味斯言則侯之心可見矣雖不幸功業未究中道而殞然其扶皇極正人心挽回先王仁義之風垂之萬世與日月同其光明可也夫有天地則有三綱中國之所以異於外域人類之所以别於庶物者以是故耳若汨於利害之中而忘夫天理之正則雖有天下不能一朝居此侯所以不敢斯須而忘討賊之義盡其心力至死不悔者也方天下雲擾之初侯獨髙卧昭烈以帝室之胄三顧其廬而後起從之則夫出處之際固已有大過人者其治國立經陳紀而不為近圖其用兵正義明律而不以詭計凡其所為悉本大公曽無纎毫姑息之意類皆非後世所可及至讀其將沒自表之辭則天下之物欲舉不足以動之所養者深則所發者大理固然也曽子曰士不可以不𢎞毅若侯者其所謂𢎞且毅者歟孟子曰富貴不能淫貧賤不能移威武不能屈此之謂大丈夫若侯者所謂大丈夫非耶侯既沒蜀人追思時節祭于道後主用廷臣之議立廟沔陽使得申其敬去今千有餘歲蜀漢間往往有祠奉祀不替侯之澤在人者深矣衡州石鼓山舊亦有祠按蜀志昭烈牧荆州時侯以軍師中郎將駐臨蒸督零陵桂陽長沙三郡調賦以供軍實臨蒸今衡陽縣是也蒸水出縣境徑石鼓山之左會于湘江則其廟食于此固宜考昌黎韓愈及刺史蔣防詩碑祠之立其來逺矣宋乾道戊子之歲湖南路提舉常平范君成象始以圖志搜訪舊迹得廢宇于榛莾中乃率提點刑獄鄭君思恭知衡州趙君公邁乃徙于髙明而一新之移書俾某為記某謂侯之名不待祠而顯而侯之心亦不待記而明然而仁賢昔時經履之地山川草木光采猶在表而出之以詔來世使見聞者竦然知所敬仰師慕當道術衰微之際其為益蓋非淺也惟某不敏不足以推本侯胸中所存萬一是則愧且懼焉耳撫州重立唐魯郡顔公祠記唐魯郡顔公在大歷中嘗為撫州刺史宋至和二年知州事聶侯厚載始立公祠于郡之圃南豐曽公鞏為之記而其地狹隘歲久宇且敝壞紹興十二年某之伯父滉為守即圃之地相其髙阜而徙焉比三十年復以頽廢廢之二年今趙侯曄實來考視歎息因其基而一新之以淳熙三年正月辛酉落成廟貌儼如升降俯仰不迫不陋使來請記某惟念公之大節終始凛然足以風厲後之為人臣者其所嘗蒞廟食是宜趙侯之舉知政所本當有文字登載金石惟是南豐曽公之文於公行事論述為詳學者之所誦習故某不復贅於言獨推本君臣之義而顯詩之俾時節侑饗亦庶幾公之志云其詞曰於皇大倫首曰君臣惟天所敘而敕乎人忠貴無隱義寧偷生敢有或踰紊我常經粵惟斯人林林而羣匪斯之綱孰條其棼允毅顔公千載之特是篤是明終始無忒方在平原獨嬰賊鋒紏厥義旅孰不恱從洎登王朝剴言歷陳治忽攸關敢毖于音彼姦眴側三斥在外百折彌堅之死靡悔汝州之使人諭厥指公曰君命豫奚可避凛然其辭豺狼所憚云何其行終以不返身雖可隕義則不磨用雖不究益則巳多立懦激頑于訓于式翼彼大倫詔于罔極惟是臨川公所嘗臨焄蒿悽愴英烈猶存有嚴其宫于今幾秋圯傾蕪荒新自今侯嗟爾君子來拜來祠瞻彼言言盍伏以思人之好德相爾秉彛豈惟思之無或泚之擷芳于豆酌清于巵祈侑蒸嘗聲以歌詩永州州學周先生祠堂記零陵守福唐陳公輝下車之明年令信民恱乃思有以發揚前賢遺範貽詔多士它日偕通判州事贑上曽公迪詣郡學顧謂諸生曰永雖小郡而前輩巨公名德往往辱居之如本朝范忠宣公范內翰公鄒侍郎公皆既建祠于學宮矣惟濂溪周先生嘉祐中嘗倅此州而獨未有以表出之豈所以為重道崇德示教之意乎於是教授廬陵劉安世率諸生造府請就郡學殿宇之東廂闢先生祠前通判武岡弋陽方公疇以書走九江求先生像于先生諸孫得之陳公命零陵宰歷陽髙析董其事而成之繪像儼然欄楯周密既成屬某為記某以晚生屢辭不獲敬誦所聞以廣其意先生諱敦頥字茂叔舂陵人歷官凡六遷至通判永州用吕正獻公薦擢廣南東路轉運使判官改提點刑獄所臨力行其志晚以病丐分司築居廬山下有溪流其旁名之曰濂溪故世稱為濂溪先生某嘗聞程公大中倅南安先生為獄掾大中公視其氣貌非常人與語果知道者因與為友故明道自十五六時聞先生論道遂厭科舉之業慨然有求道之志伊川年十二三亦受學焉惟二程先生唱明道學論仁義忠信之實著天理時中之妙述帝王治化之原以續孟氏千載不傳之道其所以自得者雖非師友可傳而論其發端實自先生豈不懿乎先生著通書及拙賦皆行於世而又嘗俾學者求孔顔所樂何事噫以此示人亦可謂深矣後之登斯祠者暏先生之儀容讀先生之書賦求先生之心真積力久希聖希賢必有得顔子之所樂者矣濂溪周先生祠堂記韶州淳熙二年冬廣南東路提點刑獄公事詹君儀之以書抵某曰儀之幸得備使事念無以稱上德意始至披考故籍熙寧中濂溪先生實嘗為此官今壁之題名具存儀之雖不敏敢不知所師慕且念宜有像設以詔後世庶幾來者感動焉乃度地于治所曲江郡城之內唐相張公故祠之東為屋三楹以奉祀事且崇其門垣大書揭之嚴其扄鑰以時啓閉十有一月告成願請記某讀其書喟然而歎曰詹君下車首為是舉可謂知所先務矣其意豈不逺哉則不敢辭而為之書按廳壁記所書先生以熙寧四年正月九日抵官下是年八月朔且移知南康軍在官僅踰半載耳考其行事其見於先生之墓志者曰自廣東轉運判官改提點刑獄不憚瘴毒雖荒崖絶島人迹所不至皆緩視徐按以洗寃澤物為巳任未及盡其所為而已告病求守南康以歸而著作郎黃公庭堅作濂溪詞亦稱先生為使者進退官吏得罪者人自以為不寃以是二者觀之亦可以想見當時施設之大槩矣雖然凡先生之所施設皆其學之所推非苟然也某嘗考先生之學淵源精粹實自得於其心而其妙乃在太極一圖窮二氣之所根極萬化之所行而明主靜之為本以見聖人之所以立人極而君子之所當修為者由秦漢以來蓋未有臻於斯也故其所養內克暗然而日章雖不得大施於時而蒞官所至如春風和氣隨時發見被飾萬物百世之下聞其風者猶將咨嗟興起之不暇然則即其所嘗臨之地而繪像立祠以昭示來世豈非有志於名教者所宜汲汲者乎使後之人睹先生睟然之容而考法其行事因先生詳刑之心而究極其淵源則是祠之建其為益固有不可勝言者矣抑嘗聞先生之論刑曰刑者民之司命情偽微曖其變千狀苟非中正明逹果斷者不能治也夫中正者仁之所存而明逹者知之所行果斷者又勇之所施也以是詳刑本末具矣詹君之立祠為詳刑者設也故某復以此繫於終焉詹君嚴陵人嘗為御史臺主簿云十有二月丁酉記南康軍新立濂溪祠記淳熙五年秋詔新安朱侯熹起家為南康守越明年三月至官慨然思所以仰稱明天子德意者首以興教善俗為務力立濂溪周先生祠于學官以河南二程先生配貽書其友人張某曰濂溪先生嘗領是邦祠像之立視他州尤不可以緩子盍為我記其意某既不克辭則以平日與侯習講者述之以復焉自秦漢以來言治者汨於五伯功利之習求道者淪於異端空虛之説而於先王發政施仁之實聖人天理人倫之教莫克推尋而講明之故言治若無預於學而求道者反不涉於事孔孟之書僅傳而學者莫得其門而入生民不克睹乎三代之盛可勝嘆哉惟先生崛起於千載之後獨得微旨於殘編斷簡之中推本太極以及乎隂陽五行之流布人物之所以生化於是知人之為至靈而性之為至善萬理有其宗萬物循其則舉而措之則可見先生之所以為治者皆非私知之所出孔孟之意于以復明至於二程先王則又推而極之凡聖人之所以教人與學者之所以用功本末始終精析該備於是五伯功利之習無以亂其正異端空虛之説無以申其誣求道者有其序而言治者有所本其有功於聖門而流澤於後世顧不大矣哉春秋奉嘗遍於學校禮則宜之而况此邦嘗為先生所領之地祠像久焉未設誠缺典也今朱侯下車未遑他議而首及乎此可謂得為政之本矣詩曰髙山仰止景行行止朱侯之所以望於來者豈不在於斯乎雖然某又有説焉蓋自近嵗以來先生之書遍天下士知尊敬講習者䆮多而其間未免或失其旨妄意髙逺不由其序遊談相夸不踐其實反以病夫真若是者適為吾道之罪人耳夫惟淳篤懇惻近思躬履不忽於卑下而審察乎細微是則為不負先生之訓其於孔孟之門墻庶幾乎可以循求而進也此又豈非朱侯所望於來者之意乎三先生祠記淳熙二年靜江守臣張某即學宫明倫堂之旁立三先生祠濂溪周先生在東序明道程先生伊川程先生在西序繪像既嚴以六月壬子率學之士俯伏而告成退則進而諗之曰師道之不可不立也久矣良才美質何世無之而後世之人才所以不古如者以夫師道之不立故也凡所謂為士者固曰以孔孟為宗然而莫知所以自進於孔孟之門墻則亦沒世窮年倀倀然如旅人而已幸而有先覺者出得其傳於千載之下私淑諸人使學者知夫儒學之真求之有道進之有序以克於異端之歸去孔孟之世雖逺而與親炙之者固亦何以相異獨非幸哉是則秦漢以來師道之立宜莫盛於今也而近世學者誠知所信慕者蓋鮮間有號為推尊則又或竊虛聲以自髙而不克踐其實顧反以為病是則師道雖在天下而學者亦莫知其立也桂之為州僻處嶺外山拔而水清士之秀美者夫豈乏人惟見聞之未廣而勉勵之無從故某之區區首以立師道為急繼自今瞻三先生之在此祠也其各起敬起慕求其書而讀之味其言考其行講論紬繹心存而身履循之以進於孔孟之門墻將見人才之作興與灕江為無窮矣此某之所望也且獨不見濂溪先生之言乎曰師道立則善人多善人多則朝廷正而天下治嗟乎某之所望又豈特於邦之士云哉敢記而刻諸石瀏陽歸鴻閣龜山楊諌議畫像記宋興百有餘年四方無虞風俗敦厚民不識干戈有儒生出於江南髙談詩書自擬伊傅而實竊佛老之似濟非鞅之術舉世風動雖巨德故老有莫能燭其姦者其時私説一行而始紛紛多事反理之評詭道之論日以益熾邪慝相乘卒兆裔夷之侮考其所致有自來矣靖康初龜山楊公任諌議大夫國子祭酒始推本論奏其學術之謬請追奪王爵罷去配饗雖當時餘黨猶夥公之説未得盡施然大統中興論議一正到如今學者知荆舒禍本而有不屑然則公之息邪説距詖行放淫辭以承孟氏者其功顧不大哉是冝列之學宫使韋布之士知所尊仰而况公舊所臨流風善政之及祀事其可缺乎瀏陽實潭之屬邑紹聖初公嘗辱為之宰嵗飢發廪以賑民而部使者以催科不給罪公公之德於邑民也深矣後六十有六年建安章才卲來為政慨然念風烈咨故老葺公舊所謂飛鴻閣繪像於其上以示後學以慰邑人之思去而不忘也又六年貽書俾某記之某生晚識陋何足以窺公之藴惟公師事河南二程先生得中庸鳶飛魚躍之傳於言意之表踐履純固卓然為一世儒宗故見於行事深切著明如此敢表而出之庶幾慕用之萬一云爾昭州新立吏部侍郎鄒公祠堂記故尚書吏部侍郎鄒公諱浩字至完學者稱為道鄉先生而不敢斥其名字在元符中為右正言以直諌顯聞初貶新州建中靖國之元入朝為天子從臣崇寧二年又貶昭州處昭凡四嵗歸沒于常州其立朝大節載在史官播在天下固有不待紀述而傳者某獨嘗謂人臣不以犯顔敢諌為難而忠誠篤至之為貴士君子不以一時名節為至而進德終身之可慕若公始所論諌蓋亦他人之所難言而考味其平生辭氣曽微一毫著見再位于朝憂國深切重斥炎荒凛不少沮至於病且死語不及它獨以時事為念方其少時道學行義已有稱於世晚嵗益為中外所尊仰而公不居其成講究切磋惟是之從蓋嘗從伊川程先生論學而上蔡謝公良佐龜山楊公時皆其所友也其任重道逺自強不息如此所謂忠誠篤至而進德終身者若公非邪故其樂為天下後世誦之淳熙二年秋青江王光祖為昭州道桂問政所宜先某告以道鄉先生當有祠盍圖之則應曰諾明年春使來告成且曰郡故有公祠紹興中守臣陳廷傑所建荒蕪久矣故其地卑陋亦不足以奉蒸嘗按郡城之西北有所謂得志軒者公所嘗遊歷也下臨長塘曰木梁廣數十畝羣山環於前其秀曰龍嶽舊為郡士張雲卿之居公實名而記之棟宇今無復存者乃即其地為屋四楹繪公像於中門廡悉具又葺茅其下俾張氏之後人居而世守之敢請記某既為之説而且有感焉國家列聖相繼以納諌容直為家法人臣雖甚觸忤亦不至於前代加以重辟間有暫貶徙者旋即復還且又進用俾得以名節始終顧扶持公論培固邦基雖有賴於多士之助而其長養成就實非一日皆自列聖深仁厚澤中來也聞公之風者亦復有感於斯乎南軒集卷十
