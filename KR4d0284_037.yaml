body:
  text: 南軒集卷三十七宋張栻撰墓志銘少傅劉公墓志銘公姓劉氏諱子羽字彥修世為京兆人八世祖避五季之亂徙家建州曽祖太素贈朝議大夫祖民先任承事郎贈太子太保再世以儒學教授鄉里考韐任資政殿學士贈太師諡忠顯公以門䕃入仕宣和未忠顯帥浙東盜發睦州陷諸郡直抵越越兵不滿千而盜且數千公以主管機宜文字佐忠顯募民守卒全其城入為太府簿遷衛尉丞忠顯帥真定復辟公以從女真兵至圍城數匝父子相與死守部分方略多公之謀敵不能拔而去名聞河朔間除直祕閣忠顯率兵入援京師與敵戰力屈死城下方是時為國死難者蓋鮮獨忠顯之節甚白公痛家國讐恥之大義不與敵共戴天免喪以祕閣修撰知池州改集英殿修撰知秦州未行召赴行在所除御營使司參贊軍事時太上皇帝即位三年苗傳劉正彥甫伏誅有平冦將軍范瓊擁兵入覲瓊在靖康變故中附讐逆亂知樞密院事忠獻張公與公謀誅之張公召瓊詣都堂公叱縛之致于理懷敕榜出撫其衆曰所誅止瓊爾輩皆御前軍也衆頓刃應諸悉麾𨽻它軍頃刻而定忠獻益竒公及領川陜宣撫處置使遂辟公參議軍事公雅意欲圖敵念關陜要地而張公一見相知非偶然者遂不辭而從宣撫司至關據秦州號令五路㑹聞敵窺江淮議為牽制合五路兵進至富平與敵遇我衆不能支敵乘勝以前宣撫司退保蜀口官屬震恐有建議當保䕫州者公曰議者可斬也宣撫司豈可過興州一步係關陜之望安全蜀之心收散亡固壁壘以為後圖則可與張公意合公單馬直抵秦亭分遣腹心訪諸將所在時敵騎四出道阻不通將士無所歸忽聞公在近宣撫司留蜀口乃各引所部來㑹軍復振公命驍將吳玠柵和尚原守大散關敵不敢逼紹興元年夏始聚兵來攻玠敗之秋復來又大敗之俘獲以數萬計宣撫司徙治閬中公留關外護軍上知其勞除徽猷閣待制明年玠以秦鳯經略使戌河池王彥以金房鎮撫使戌金州二鎮皆饑而興元帥過為守備閉關塞褒斜二鎮病之張公亟召玠彥議事皆願得公鎮興元乃承制拜公利州路經略使兼知興元府公至之日盡弛其禁通商輸粟二鎮乃安公謂彼用騎兵利衝突在我當先柵要地以徑弓弩待之蔑不濟者且以是約二將獨彥頗易公之說是歲十二月敵由商於犯金州正月至上津彥出不意逆戰不能卻遂焚金州退保石泉公遣將馳告玠玠曰事迫矣當亟徼于險諸將不能辦我當自行不然是負劉待制即越境馳一日夜凡三百里中道少止公移書曰敵旦夕至饒風嶺下不亟守此是無蜀也公不前某當往玠即復馳至饒風敵急攻數日死傷如積更募死士犯祖溪關以入出玠後玠還漢中公與玠謀守定軍山玠憚之遂西公退守三泉從兵不及三百與士卒同粗糲至取草木芽蘖食之遺玠書曰某誓死於此與公訣矣玠得書泣其愛將楊政大呼軍門曰節使不可負劉待制不然政輩亦舍節使去玠乃從麾下自仙人關由間道與公㑹于三泉敵遊騎甚迫玠夜視公方酣寢旁無警何者玠曰此何等時而簡易乃爾公慨然曰吾死命也夫何言玠泣下復往守仙人關公獨留為壁壘於潭毒山上下六日而成又數日而敵至中夜斥堠將遣人報曰敵至矣諸將皆失色入白事公曰始與公等云何今冦至欲避耶下令蓐食遲明上馬先止戰地據山角坐胡床諸將奔至皆泣曰此某等駐軍處而公先之耶豈可使敵矢傷公即爭代公處頃之復有來報曰敵退矣乃還方敵入梁洋蜀大震宣撫司官屬爭咎公有為浮言相恐動請徙治潼川軍士聞者皆怒公力為書為張公言某在此敵决不能越無為輕動搖張公用公言乃定敵遣十五輩齎書與旗來招公及玠公斬其十四人令一人還曰為我言於爾主來戰即來我有死何招也先是梁洋官私之積公悉已徙置敵無所得糧日匱前後苦攻死傷十五六涉春已深癘疫且作遂遁去為我師掩擊及墮溪谷死者不可勝計敵之去四月也其餘衆不能自拔者悉降凡十數柵敵之喪失蓋莫甚於此役方是時敵中大帥撒離喝兀术輩垂涎于蜀日夜聚謀所選士卒千取百百取十其戰被重鎧登山攻險每一人前輒二人擁其後前者死後者復被其甲以進又死則又代之如初其為必取計蓋如此惟公與張公協心戮力毅然以身當兵衝將士視公感激爭奮卒全蜀境公還興元分遣官吏安集勞來凡潰卒之乘時怙亂山谷間者悉捕斬以徇自是兵勢日振方更恢逺略然張公己困於讒公亦尋被罪矣是歲除寶文閣直學士四年責授散官安置白州始吳玠為偏將公竒之言於張公張公與語大恱使盡護諸將卒得玠力至是玠上疏納節贖公罪士大夫多玠之義而服公之知人明年還故官奉祠時張公相矣召公赴在所又還集英殿修撰知鄂州權都督府參議軍事宣諭陜蜀朝議欲合諸道兵大舉公自蜀還歷諸邉盡得虛實謂且當益繕治廣營田以俟時朝廷欲遂用公顧親年浸高力請歸養以徽猷閣待制知泉州泉素難治畨商雜居公下車肅然無敢犯有事涉權幸者立論奏釐正之亡何張公去位言事者觀望論公復責散官安置漳州以郊祀恩得歸㑹江上擇守起公為㳂江安撫使知鎮江府敵兵至公建請清野盡徙淮東之人于京口填拊得宜人情不搖謂樞密使張俊曰異時此輩入境飄忽如風雨今更遲回是必有它意已而果欲邀和及遣使來揭旗于舟大書江南撫諭公見之怒夜以他旗易之翌日接伴使索之甚急公曰有死耳旗不可得及其歸遣還之境外張俊以公料敵及治狀聞有㫖復待制和議成公謂宜及無事時講修淮漢守備厲器械治舟楫其言甚悉宰相秦檜忌之諷言者論罷復以祠祿歸十四年十月二日遇疾沒于正寢享年五十積官右朝議大夫以子貴贈太師娶熊氏贈福國夫人再娶卓氏贈慶國夫人子珙克世其家後復以忠義識略被今上眷遇嘗為同知樞密院事識者不以劉氏三世宦達為衣冠之盛而以忠義相傳不替愈大為家國之光淳熙四年珙為建康留守病且革自力作書與其友張某以銘公墓為屬某蓋公所從忠獻張公之嗣子也奉書而泣且無所從辭於是取公弟子翬舊所狀行實掇其大節次第之如此惟公慷慨自許每有捐身殉國之願當事之難衆人惶撓失措公色愈厲氣愈徑遇事立斷凜不可犯尤長於兵料敵決機殆無遺算得將士心皆願為盡死其為政發姦摘伏若神所治不畏强禦而天性孝友恂恂接人樂易開口見肺肝輕財重義緩急扣門無愛于力振人乏絶傾資倒廩無吝色姻親鄉䣊昏喪悉任其責闢家孰延名士以教鄉之秀子弟吏部郎朱松疾病以家事託公築室買田居之舍旁教其子熹與己子均卒以道義成立平生再貶徙處之怡然不以介意而其許國之誠則至于沒而不懈也嗚呼偉哉公以是嵗某月某日葬于崇安縣五夫之原某之為銘蓋後公沒三十有五年也公孫二人學雅承務郎學裘尚幼孫女二人長適將仕郎吕欽幼未行銘曰寒沍凜洌喬松挺節人危反側志士秉烈允毅劉公孤忠嶪嶪國恥家讐刻骨泣血誓不同天心焉如鐵縛袴從戎思奮其伐敵方鴟張闖蜀門闑紛紛鄙夫縮避一轍惟公矢謀克贊于決身當兵衝橫遏力折衆駭失色我怒貫髮驍將突兵怙以奮發北師力窮麕走竭蹶迄全蜀疆如器無缺伊人是恃豈險難越不寧蜀全關輔可挈投機于征以冀日月巧言害成健手孰掣空令父老談說嘖嘖和戎議興公膺如噎守臣舉職妖旗莫揭歸卧于家忠憤曷泄嗚呼中年竟隕此傑嵗踰再紀精爽森列嗣德有光公志益晰我為銘詩追勒其碣吏部侍郎李公墓銘淳熙三年九月庚戌祕閣修撰知䕫州兼䕫路安撫使臨川李公以疾沒于州治之正寢五年其孤鞏以同郡曽李貍所狀公行義來請某銘平時蓋欽公之為人且在廣右與公相望僅再嵗接公行事為詳既不克終辭乃叙而銘之公諱浩字德逺一字直夫家本建昌人其徙臨川方再世曽祖之遇祖玩皆不仕考彥以公贈朝奉大夫公自幼入鄉校嶄然異常兒未冠有文名中紹興壬戌進士第是嵗秦熺挾宰相子以魁多士同年多往見之或拉公行毅然卒不往調饒州司户參軍以歸連丁內外艱中間為襄陽府觀察推官僅踰年及免先大夫喪調全州州學教授改監行在雜買場門實二十七年之冬時秦檜蓋死矣明年主管刑工部架閣文字改敕令所刪定官論者爭言秦檜時事無巨細一切更改公白宰相執政蚩尤五兵李斯篆𨽻茍便於世亦不當以人廢方檜在時公義不為之屈及其身沒事變所論乃如此則公存心平實蓋已可見矣又明年改秩除太常寺主簿尋兼光祿丞輪對首陳無逸之戒且論宿衛大將恩寵太過嬰兒過飽恐非其福太上皇帝感其言宿將旋就第自檜扼塞言路士風寖衰及太上總攬萬機激厲忠讜而餘習猶未殄朝士多務緘默至是百官轉對公與王十朋馮方查籥胡憲始相繼有所開陳聞者興起太學之士至為五賢詩以述其事然公自是亦不安于朝請祠以歸主管台州崇道觀今上即位之嵗以太常丞召至闕首論聖學以為人主務學則其餘嗜好無間而入矣時忠獻張公督師江淮而宰相有異議者從中多所沮抑公引張仲孝友之詩及仁宗用韓琦范仲淹詔章得象等故事祈戒諭朝廷同寅共濟俄兼權吏部郎官御史尹穡附宰相湯思退以公故嘗為思退所知欲扳引共擠忠獻於是薦公及對乃明示不同之意思退穡皆不樂踰歲始正除吏部員外郎兼皇子恭王府直講其後宰相召同為郎者四人欲有所進用最屬意於公公不發一語明日同舍皆遷公如故其在王府多所禆益且因事以及時政書之于冊幾上或見之王亦愛重公它日公補外纍年以歸王聞之欣然謂僚屬曰李直講來矣蓋公之誠意有以感動也為郎踰年㑹浙河水灾詔郎官管職以上條時政闕失公歎曰上憂勞求言此豈可失也即日奏書指論近密且併及宰執奉行臺諫迎合百執事顧忌畏縮之罪反復數千言近世論事傾倒剴切未有其比聞者皆縮頸上優容曽不以為忤而執事者忌之甚白外補得知台州州有揀中禁軍五百人朝廷置訓練之官其人貪殘失衆心不逞者乘間謀作亂露刃立堂下公曰若等欲為亂乎請先殺我衆色駭曰不敢乃徐推其為首者四人黥徒之迄無事公倉卒應變坐折姦萌聞者益歎儒者誠有用於世也天子以為能除直祕閣並海有宿冦久不得公募其徒自縛以贖罪即得其渠魁未幾召還復為故所居官初公在台有豪民鄭憲以資給事於權貴人之門為一郡害㑹姦利事發械繫死于獄盡籍其家徙其妻子至是權貴人者教其家訟寃且誣公以買妾事言者用是擠公它日宰執將進呈文書同知樞密院兼權參知政事劉珙越次奏李某為郡疾惡太過獲罪豪民為其所誣臣考視其本末甚白上顧曰守臣不畏强禦豈易得耶珙曰士氣不振久矣若更沮李某是終不復可振矣上問章安在珙袖出之遂留中不下而大理觀望權貴人猶欲還其所沒資併以為台州議刑太重上親批其後曰台州所斷委得允當鄭憲家資永不給還流徙如故公乃安明年遷司農少卿時朝廷和糴米凡八萬石而董事者有所憑恃賤糴濕惡以欺沒官錢户部不敢詰公視事即奏請下有司治大理附㑹聽户部以支為盤公力爭曰是非徒惠姦且虧軍食上是其議㑹大理奏結它獄上忽顧輔臣曰棘寺官當得剛正如李某者為之已而卿缺又曰無易李某遂除大理卿兼同詳定一句敕令故事寺獄空上表賀公獨不奏先是公在司農時嘗因面對陳經理兩淮之䇿至是為接伴使還奏曰臣親見兩淮可耕之田盡為廢地心實痛之條畫營田便利甚悉且併謂近日措置邉事甚為張皇一時誕謾之徒言敵勢衰弱踴躍自奮甚者為剽攘以桃境外此何益徒有害願戒將吏嚴禁防無速近功無規小利日與大臣修明治具固結人心持重安靜以待敵釁公之意以謂主上英明有大有為之志執事者所當奉承講究為務實經久之計以卒成聖志廷臣中誕謾者但為欲速之說而其茍且者又欲一切不為適足以害逺謀玩歲月故再三條陳營田便利以為是恢復根本之䇿在今日所當汲汲而為之也上每改容嘉納宰相方議遣泛使公與辨其不可至以官職訹公公怒以語觸之且力求外以直寶文閣知靜江府主管廣南西路安撫司公事命下之日尚書郎有入對論擇帥事者上欣然顧之曰如廣西朕已得人矣李某也又諭大臣曰李某營田議甚可行而大臣莫有應者公至鎮勤於民事郡舊有靈渠通漕運且溉田甚廣近嵗頗堙塞公命疏治之民賴其利立石以紀雍管所𨽻羈縻安平州其酋恃險凶橫聚兵謀為邉患公遣單使開心見誠諭以禍福引赦使自新即日叩頭謝過焚撒水柵受約束前帥建議於宜州境南丹州置買馬場朝廷用其議下經略司公力爭其不可遂止衆謂南丹買馬之議若行其為廣西生事取釁有不可勝言者非公言之力朝廷亦未悉其利害如此也朝廷又令市象于交趾公復力爭及公去經略司竟往市交趾遂因此驅以入貢所過為擾人始服公之明治廣二年召還入對論俗不美者八其言曰陛下所求者規諫而臣下專務迎合陛下所貴者執守而臣下專務順從所惜者名器而僥幸之路未塞所重者亷恥而趨附之門尚開儒術可行而未免有險詖之徒下情當盡而未免有壅蔽之患期以氣節而偷懦者得以茍容責以實效而誕謾者得以自售上嘉納之且詢所謂誕謾之人公以實對翌日謂宰相曰李某直諒遂擢權尚書吏部侍郎時政府有怙寵竊據者又有附之同升者從臣中又有為之役者公之造朝已甚側目且巧為語以鉤致公皆厲色辭以拒之於是相與謀使言者論以公謂置之近列必變亂白黑未及正謝而罷是嵗冬提舉太平興國宫明年夏䕫州路以缺帥聞上顧念公乃除祕閣修撰以寵其行部有思州亦羈縻也其守田氏與其猶子為二者不協且起兵相攻親草檄遣官諭之二人感悟㰱血家廟盡釋前憾邉以妥安蓋與廣西安平州一律公之為謀大抵欲以誠意銷患於未然也在鎮踰年以疾請祠改提舉隆興府玉隆萬夀宫命未至而公沒矣享年六十有一積官至朝奉大夫監司奏公盡瘁其職以死特贈集英殿修撰公之葬在撫州金溪縣歸德鄉靈谷山之原娶饒氏封宜人後公八月而卒子男四人鞏修職郎潭州司理參軍肅迪功郎潭州益陽縣主簿蔚將仕郎遵未仕女六人長適奉議郎知袁州萍鄉縣事王謙次適降授迪功郎前湖南安撫司准備差遣曽撙次適鄉貢進士姚彬餘未嫁孫四人孫女三人有文集奏議王府講議藏于家公少時力學為文章及壯嵗更留意義理其仕于朝慨然以時事為已任見政有缺失用人有憸佞忠憤感激所言多切至生平不事表暴未嘗勉强色詞故不知者多以為傲或以譛公上曰斯人無它在朕前亦如此非為傲者也小人憚之謀所以害公者無所不至獨賴上終始照見保全之其為郡奉法循理律已甚嚴自嶺右歸裝無南物視其奉養自為布衣至侍從未嘗有異風望整整人不敢干以私然以是故恱公者少不恱者衆及聞其死則識與不識皆歎息曰奈何失一正人蓋以天資質實不徇于外而涵養渾厚不以利害動心故遇事有力奮發忠言無所回撓所謂古之遺直者若公非耶銘曰士或不競枉尺直寸以同為和以怯為巽垂紳立朝噤莫肯言就有欲言亦弗究宣謂豫有待實則患失曽是詭隨乃曰弗激此風流行非國之福不有君子孰振孰篤我觀李公披腹敷陳反復無隱心乎愛君衆駭縮頸君則容之媢恚實繁聚而攻之是保是用惟天子明匪天子明臣言曷伸嗟哉若人古之遺直我作銘詩以詔罔極南軒集卷三十七
