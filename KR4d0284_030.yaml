body:
  text: 南軒集卷三十宋張栻撰答問答朱元晦王歡一段解之甚精大抵王歡無足與言者獨使事若有未至則當正之而歡既克勝任矣此外復何言哉故曰夫既或治之豫何言哉本一而已二本是無本也以愛為無差等而愛親亦以為施耳是非無本歟儒者之言曰立愛惟親又曰立愛自親始曰立云者則可見其大本矣和靖曰脫使窮其根源謹其辭説茍不踐行等為虛語石子重云愚以為人之所以不能踐行者以其從口耳中得來未嘗窮其根源無著落故耳縱謹其辭説終有疏謬若誠窮其根源則其所得非淺自然欲罷不能豈有不踐行者哉范伯崇云知之行之此二者學者始終之事闕一不可然非知之艱行之惟艱也知而不行豈特今日之患雖聖門之徒未免病此如曽點舞雩之對其所見非不高明而言之非不善也使其能踐履實有諸已而發揮之則豈讓於顔雍哉惟其於踐履處未能純熟此所以為狂者也又况世之人徒務知之而不以行為事雖終身汲汲猶夫人也矧知之而未必得其真歟和靖之言豈茍云乎哉和靖之言固有所謂然諸君之説意皆未究也孔子觀上世之化曰大哉知乎雖堯舜之民比屋可封亦能使之由之而已知者凡聖之分也豈可易云乎哉傅説之告高宗高宗蓋知之者恭默思道夢帝賚豫良弼非知之者有此乎此舊學于甘盤之所得也故君奭篇稱在武丁時則有若甘盤而未及乎傅説蓋發高宗之知者甘盤也知之非艱行之惟艱説之意亦曰雖已知之此非艱也貴於身親實履之此為知之者言也若高宗未克知之而告之曰知之非艱則説為失言矣自孟子而下大學不明只為無知之者耳若曰行者學者事父兄事上何莫不行也惟其行而不著習而不察耳知之而行則譬如皎日當空腳踏實地步步相應未知而行者如暗中摸索雖或中而不中者亦多矣曽點非若今之人自謂有見而直不踐履者也正以見得開擴便謂聖人境界不下顔曽請事戰兢之功耳顔曽請事戰兢之功蓋無須臾不敬者也若如今人之不踐履直是未嘗真知耳使其真知若知水火之不可蹈其肯蹈乎叔京云經正則庶民興蓋風化之行在上之人舉而措之而已庶民興則人人知反其本而見善明見善明則邪慝不能惑也既人之不惑則其道自然銷鑠而至於無也歐陽永叔云使王政明而禮義充雖有佛無所施於吾民也亦此意也經乃天下之常經所謂堯舜之道也經正則庶民曉然趨於正道邪説不能入矣但反經之妙乃在我之事不可只如此説過也只如自唐以來名士如韓歐輩攻異端者非不多而卒不能屈之者以諸君子猶未能進夫反經之學也如後周李唐及世宗蓋亦嘗變其説矣旋即興復而愈盛者以在上者未知反經之政故也第一章此天人性命之分人物氣質之稟所以雖隱顯或不同而其理則未嘗不一也此語似欠如云在天人雖有性命之分而其理則一在人物雖有氣稟之異而其體則同則庶幾耳言率夫性命之自然是則所謂道也是則是自然然如此立語學者看得便快了請更詳之修道之謂教後來所寄一段意方正但尋未見幸别録示修道之君子審其如此以下此一段覺得叢疊有剩句處以鄙意詳經意不睹不聞者指此心之所存非耳目之可見聞也目所不睹可謂隱矣耳所不聞可謂微矣然莫見莫顯者以善惡之幾一毫萌焉即吾心之靈有不可自欺而不可以掩者此其所以為見顯之至者也以吾心之靈獨知之而人所不與故言獨此君子之所致嚴者蓋操之之要也今以不睹不聞為方寸之地隱微為善惡之幾而又以獨為合是二者以吾之所見乎此者言之不支離否此一節因論率性之道以明修道之始恐當云因論率性之道以明學者循聖人修道之教之始也此一節推本天命之性以明修道之終恐當云推本天命之性以明學者循聖人修道之教之終也大抵天命之性率性之道聖人純全乎此而修道立教使人由之在學者則當由聖人修道之教用力以極其至而後道為不離而命之性可得而全也洪範之初一至正與此意合洪範之説固亦有此意然似不須牽引以證所言五行五事皇極三德然則八政五紀之在其間者復如何引周子之所論亦似發明其意未盡轉使人惑不若亦不須引也或曰然則中和果為二物云云此數句却須便連前文庶順且偹耳第二章隨時為中為字未安蓋當此時則有此時之中此乃天理之自然君子能擇而得之耳第四章道之不行也至不肖者不及也所釋恐未安某嘗為之説曰知者慕高逺之見而過乎中庸愚者又拘於淺陋而不及乎中庸此道之所以不行也賢者為高絶之行而過乎中庸不肖者又安於凡下而不及乎中庸此道之所以不明也道之不行由所見之差道之不明由所行之失此致知力行所以為相須而成者也不識如何第五章執其兩端用其中于民兩端者凡物之全體皆有兩端如始終本末大小厚薄之類識其全體而執其兩端然後可以量度取中而端的不差也此説雖巧恐非本旨某謂當其可之謂中天下之理莫不有兩端如當剛而剛則剛為中當柔而柔則柔為中此所謂執兩端用其中于民也第十章強哉矯矯強貌詩曰矯矯虎臣是也每句言之所以深嘆美之辭雖煩而不殺也此説初讀之似好已而思之恐不平穩疑聖人之辭氣不爾也然此句終難説吕楊諸公之説雖亦費力然於學者用工却有益爾第十一章素隱素空也無德而隱無位而隱皆素隱也素隱恐只是平日所主專在於隱者也第十二章夫婦之愚可以與知焉夫婦之不肖可以能行焉君子之道造端乎夫婦男女居室人道之常雖愚不肖亦能知而行夫婦之際有人所不睹不聞者造端乎此乃所以為戒慎恐懼之實此固切要下工夫處然再三紬繹恐此章之所謂與知能行者謂凡匹夫匹婦之所共知如朝作夕息飢食渴飲之類凡庶民行而不著習而不察在君子則戒慎恐懼之所存此乃所以為造端如所謂居室人道之常固亦總在其中若專指夫婦之間人所不睹不聞者却似未穩兼亦未盡也第十三章人之為道而逺人不可以為道人心之安者即道也此語有病所安是如何所安若學者錯會此句執認己意以為心之所安以此為道不亦害乎庸德之行庸言之謹有所不足不敢不勉有餘不敢盡言顧行行顧言君子胡不慥慥爾君子知道之不逺人至豈不慥慥爾乎此説費力某以為有所不足不敢不勉有餘不敢盡惟遊子定夫説得最好當從之若夫大意則謂道雖不逺人而其至則聖人亦有所不能雖聖人有所不能而實亦不逺於人故君子只於言行上篤實做工夫此乃實下手處道不逺人至倣此費隱之意第十一章子思子發明之至矣來説固多得之若此二字凡聖賢之言皆可如是看似不必以為下數章皆是發明此二字也大抵所定章句固多明析精當者但其間亦不無牽挽處恐子思當時立言之意却未必如此爾蓋自此章以下至二十章元晦所結之語皆似強為附合無甚意味觀明者之意必欲附合使之釐通縷貫故其間不免有牽強以就吾之意處以某之見其間聨貫者自不妨聨貫其不可強貫者逐章玩味意思固無窮似不須如此費力章句固合理會若為章句所牽則亦不可耳自二十一章而下其脈血自是貫通如所分析無甚可議者近有人疑但能存心自無不敬而程子言敬乃以動容貌整思慮為言却似從外面做起不由中出不若直言存其心之為約也某詳程子教人居敬必以動容貌整思慮為先蓋動容貌整思慮則其心一所以敬也今但欲存心而以此為外既不如此用工則心亦烏得而存其所謂存者不過強制其思慮非敬之理矣此其未知內外之本一故也今有人容貌不莊而曰吾心則存不知其所為不莊者是果何所存乎推此可見矣為佛學者言人當常存此心令日用之間眼前常見光爍爍地此與吾學所謂操則存者有異同不某詳佛學所謂與吾學之云存字雖同其所為存者固有公私之異矣吾學操則存者收其放而已收其放則公理存故於所當思而未嘗不思也於所當為而未嘗不為也莫非心之所存故也佛學之所謂存心者則欲其無所為而已矣故於所當有而不之有也於所當思而不之思也獨慿藉其無所為者以為宗日用間將做作用其云令日用之間眼前常見光爍爍地是弄此為作用也目前一切以為幻妄物則盡廢自利自私此其不知天故也論語何有於我哉文義述而子罕吕與叔謂我之道舍是復何所有某舊只解作勉學者之意後來詳與叔此説文義為順亦正合程子聖人之教常俯而就之之意如曰吾有知乎哉無知也之類也至子罕篇所云尤引而示之近門人果能於此求聖人於此學聖人則夫高深者將可馴至矣範圍天地之化而不過曲成萬物而不遺通乎晝夜之道而知故神無方而易無體此言聖人事而結之以神無方而易無體亦猶中庸述仲尼之德而結之以此天地之所以為大也神無方言其妙萬物而無不在也易無體言其變易而不窮也聖人之功用是乃神之無方易之無體者也蓋與之無間矣西銘謂以乾為父以坤為母有生之類無不皆然所謂理一也而人物之生血脈之屬各親其親各子其子則其分亦安得而不殊哉是則然矣然即其理一之中乾則為父坤則為母民則為同胞物則為吾與若此之類分固未嘗不具焉龜山所謂用未嘗離體者蓋有見於此也似更須説破耳執其兩端用其中于民當從程子之言前託遊椽舉者非答胡廣仲心有所覺謂之仁此謝先生救拔千餘年陷溺固滯之病豈可輕議哉云云夫知者知此者也覺者覺此者也果能用理居敬無時不覺則視聽言動莫非此體之流行而大公之理在我矣尚何憤驕險薄之有元晦前日之言固有過當然知覺終不可以訓仁如所謂知者知此者也覺者覺此者也此言是也然所謂此者乃仁也知覺是知覺此又豈可遂以知覺為此哉以愛名仁者指其施用之迹也以覺言仁者明其發見之端也愛固不可以名仁然體夫所以愛者則固求仁之要也此孔子答樊遲之問以愛人之意復卦下面一畫乃是乾體其動以天且動乎至靜之中為動而能靜之義所以為天地心乎至靜而動不窮焉所以為天地心也答陳平甫不可息者非仁之謂歟仁固不息只以不息説仁未盡程子曰仁道難名惟公近之不可便以公為仁須於此深體之性太極太極不動不動則不見其所以為仁心則與物接矣與物接則是心應之矣此古人所以直指心要曰仁人心也未與物接時仁如之何心無內外心而有內外是私心也非天理也故愛吾親而人之親亦所當愛敬吾長而人之長亦所當敬今吾有親則愛焉而人之親不愛有長則敬焉而人之長不敬是心有兩也是二本也且天之生物使之一本而二本可乎此緊要處不可毫釐差蓋愛敬之心由一本而施有差等此仁義之道所以未嘗相離也易所謂稱物平施稱物之輕重而吾施無不平焉此吾儒所謂理一而分殊也若墨氏愛無差等即是二本伊川先生答楊龜山論西銘書當熟玩味奔逸絶塵在乎思如此等語皆涉乎浮夸不穩貼夫思者沈潛縝密優遊涵泳以深造自得者也今而曰奔逸絶塵則有臆度採取之意無乃流入於異端一聞便悟一超直入之弊乎非聖門思睿作聖之功也推此類察之吾心純乎天理則身在六經中矣或曰何謂天理曰飢而食渴而飲天理也晝而作夜而息天理也自是而上秋毫加焉即為人欲矣人欲萌而六經萬古矣此意雖好然飢食渴飲晝作夜息異教中亦有拈出此意者而其與吾儒異者何哉此又不可不深察也孟子只常拈出愛親敬長之端最為親切於此體認即不差也平居以利物為心然後此道廣若曰常以利物為心是外之也曰公天下萬物而不私其已焉則可矣人者天地之心經以論禮而五峯以論仁者自其體言之為禮自其用言之為仁仁其體也以其有節而不可過故謂之禮禮運人者天地之心之言其論禮本仁而言之也欲請足下本六經語孟遺意將前所舉十四聖人槩為作傳繫以道統之傳而以國朝濓溪河南橫渠諸先生附焉洙泗門人至兩漢以下及國朝程門諸賢凡有見於道有功於聖門者各隨所得表出其人附置傳末著成一書某晚學懼不克堪也若曰裒類聖賢之言行聚而觀之斯可矣欲請足下以已精思探三聖人之用心又會以河南龜山漢上之説續成上下繫説卦序卦雜卦解五篇傳之以貽後代某近裒集伊川橫渠楊龜山繫辭説未畢亦欲年嵗間記鄙見于下如漢上之説雜而不知要無足取也欲請足下本聖人遺意將禮記雜漢儒説處重加刪定其所刪去文義亦勿截然棄之宜各附置篇末仍著所以刪去之意於語下以昭示後學禮記亦正欲考究若曰刪定則某豈敢欲請足下一言諭猶子然令往石室等處物色明道橫渠之後挈與偕行於綿竹義庒內月加廩給或於崇慶上院割田與之經紀其生庶幾大賢之後不至竟日窮年有飢寒之憂然後隨其資性漸教以學此事深可嘆者蓋有位為政者之責某輩在間又不當竊取而任之若與之相識則或周之教之可也然來諭則不敢忘五峯先生所著皇王大紀五峯未易簀半年前某見之求觀此書云此書千瘡百孔未有倫序未可拈出若病少間當相與考訂之後來某得本于其家殊未成次第然其論數十篇可得後便録寄南軒集卷三十
