body:
  text: 南軒集卷三十六宋張栻撰銘囦乎齋銘趙郡李東老結茅于江南榜之曰囦乎求豫為銘豫聞東老之居植竹千本溪流其間地偏而趣幽子將以是為囦乎東老蚤從名士遊詩法甚高方其得意不復知有塵世事子將以是為囦乎以豫觀之殆不然也嗚呼囦乎性命之微言之實難孰探其源匪言之艱天高地下而人其心在躬者神統乎高深其端伊邇曷睨以視當落其華而究斯理嗚呼信其為囦乎也己克齋銘夫子告顔子以克己復禮為仁揚子雲曰勝己之私之謂克子雲蓋未知所以為克者故其言迫切而不近廣漢張某曰夫子所以告顔子乃終之之事學者必卓然有見而後可以用力於克也清江陳擇之燕居之齋曰克敢衍其義而為之銘惟人之生父乾母坤允受其中天命則存血氣之萌物欲斯誘日削月朘意鮮能久越其云為匪我之自營營四馳擾擾萬事聖有謨訓克己是宜其克伊何本乎致知其致伊何格物是期動靜以察晨夕以思良知固有匪緣事物卓然獨見我心皎日物格知至萬理可窮請事克己日新其功莫險於人欲我其平之莫危於人心我其安之我視我聽勿蔽勿流我言我動是出是由涵濡泳遊不競不絿允蹈彛則靡息厥修逮夫既克曰人而天悠久無疆匪然而然為仁之功於斯其至我稽古人其惟顔氏於穆聖學具有始終循循不舍與天同功請先致知以事克己仁逺乎哉勉旃吾子艮齋銘艮齋建安魏元履燕居之室也在易艮為止止其所也某嘗考大學始終之序以知止為始得其所止為終而知止則有道矣易與大學其義一也敬為之銘物之感人其端無窮人為物誘欲動乎中不能反躬殆滅天理聖昭厥猷在知所止天心粹然道義俱全是曰至善萬化之源人所固存曷自違之求之有道夫何逺而四端之著我則察之豈惟慮思躬以達之工深力到大體可明匪由外鑠如春發生知既至矣必由其知造次克念戰兢自持事物雖衆各循其則其則匪它吾性之德動靜以時光明篤實艮止之妙於斯為得任重道逺時不我留嗟我同志勉哉勿休繄我小子懼弗克力咨爾同志以起以掖敬齋銘乾道四年建安劉公自樞庭出鎮豫章闢室于聽事之側朝夕燕處扁曰敬齋廣漢張某聞而歎曰公之志逺矣夫敬者宅心之要而聖學之淵源也敢為之銘以廣公意銘曰天生斯人良心則存聖愚曷異敬肆是分事有萬變統乎心君一頽其綱泯焉絲棼自昔先民修己以敬克持其心順保常性敬匪有加惟主乎是履薄臨深不昧厥理事至理形其應若響而實卓然不與俱往動靜不違體用無忒惟敬之功協乎天德嗟爾君子敬之敬之用力之久其惟自知勿憚其艱而或怠遑亦勿迫切而以不常毋忽事物必精吾思察其所發以會于微忿欲之萌則杜其源有過斯改見善則遷是則天命不遏于躬魚躍鳶飛仁在其中於焉有得學則不窮知至而至知終而終嗟爾君子勉哉敬止成已成物匪曰二致任重道逺其端伊邇毫釐有差繆則千里惟建安公自力古義我作銘詩以諗同志敦復齋銘復卦之義以初爻為重於畫為陽於義為善於人蓋君子之道也二比於初故為休復四應於初故為獨復而三之頻復而厲則以其非比非應開其遷善而危其屢失也上之迷復而凶則以其處極而最逺往而不返也觀諸此則可見以初爻為重矣然則五之敦復奈何五體順而居中以中自考者也故為敦篤於復夫能敦篤於復宜曰吉曰亨矣而獨曰無悔奈何無悔者戒辭也以其柔而逺於陽故為之戒辭謂如是乃無悔也南徐陳希顔舊名其齋曰敦復嵗壬辰與豫相遇于長沙屬豫銘豫知希顔有取於警戒之意也為之銘曰惟聖作易研幾極深惟卦有復於昭天心六爻之義各隨所乘其在於五敦復是明其敦如何篤志允蹈順保其中而以自考我觀爻義厥有戒辭君子體之敬戒是資人欲易萌天理難存毫釐之間消長所分凡百君子奈何不敬祗於夙宵以若天命惟積惟久匪俟乎外敢曰無悔庶幾寡悔恕齋銘潭州右司理之治海陵周俊卿請豫名其齋豫名之以恕為之詞曰刑成不變君子盡心明動麗止象著羲經所存曷先其恕之云自盡於己以察其情意有所先則弗敢成見雖云獨亦靡敢輕幽隱之枉是達是申毫釐之疑是析是明俾爾寡弱無有或困于爾強慝靡訹靡遁及得其情又以勿喜古人於此恕有餘地我銘于齋意實在兹嗟嗟來者尚克念之蒙齋銘番陽余端蒙請豫銘蒙齋至于再三豫未有以言也它日因有感于果行育德之義乃為之辭曰乾坤既畫八卦是生八卦相乘萬象以明下坎上艮其卦曰蒙其蒙伊何源泉在中泉之始萌其行未達雖則未達而理孰遏君子體之于以果行黽勉躬行動畏天命泉之始萌其勢則止止乃日澄源源遏已君子體之于以育德篤敬不渝靜保天則惟養于中大本攸立惟敏于外達道攸飭內外交修相須以成久而有常則能日新我銘蒙齋敢越斯義惟言之難實以自厲凡百君子有觀於斯毋忽乎近尚其懋之虛舟齋銘詹體仁闢齋於便坐屬豫名以其虛且長也則題之曰虛舟他日體仁謂豫曰漆園之説道而離吾無取焉耳在易之中孚利涉大川乘木舟虛將於是焉體之豫歎其善思也則又為之銘心本虛理則實應事物無轍迹來不迎去不留彼萬變我日休行斯通險可濟孚豚魚貫天地曷臻兹在克己去其窒斯虛矣主一齋銘成都范文叔以主一名齋豫嘉其志為銘以勉之人之心一何危紛百慮走千岐惟君子克自特正衣冠攝威儀淡以整儼若思主于一復何之事物來當其幾應以專匪可移理在我寧彼隨積之久昭厥微靜不偏動靡違嗟勉哉自邇卑惟勿替日在兹南劒州尤溪縣學傳心閣銘乾道九年知南劒州尤溪縣事石􅗐既新其縣之學復建閣于學之東北買書五千卷藏之其上而命工人繪濓溪周先生河南二程先生之像置于其中使學者得共朝夕瞻仰焉新安朱熹為之名曰傳心之閣而􅗐又以書請銘于廣漢張某某竊惟念自孟子沒聖學失傳歷世久逺其間儒者非不知尊孔孟而誦六經至考其所得則不越於詁訓文義之間而已於聖人之心所以本諸天地而措諸天下與來世者蓋鮮克涉其藩而況睹其大全者哉惟三先生生乎千載之後乃能考諸遺經而得其不傳之妙以相授受然後六經之言羣聖之心全體大用晦而復明如日之中萬物皆覩嗚呼盛矣某愚不敏夙嚮往焉敢以建閣之意命名之説洗心拜手敘而銘之銘曰惟民之生厥有彛性情動物遷以隳厥命惟聖有作合乎天心修道立教以覺來今孰謂道逺始卒具陳俾爾由學而聖可成鄒魯云邈章句有師一經皓首語道則迷惟子周子崛起千載熟探其源以識其大立象盡意闡幽明微聖學有傳不曰在兹惟二程子實嗣其徽既自得之又光大之有渾其全則無不總有析其精則無不中曰體曰用著察不遺曰隱曰微莫間其幾於皇聖心如日有融於赫心傳來者所宗有屹斯閣尤溪之濵翼翼三子繪事孔明儼然其秋溫然其春揭名傳心詔爾後人咨爾後人來拜于前起敬起慕永思其傳于味其言于考其為體于爾躬以會其歸爾之體矣循其至而爾之至矣道豈異而傳心之名千古不渝咨爾後人無替厥初顧齋銘廣漢張某名華陽宇文紹節之齋曰顧且為之銘人之立身言行為大惟言易出惟行易怠伊昔子聿思其艱嚴其樞機立是防間於其有言則顧厥為毫釐之浮則為自欺克謹于出內而不外確乎其言惟實是對於其操行則顧厥言須臾弗踐則為己愆履薄臨深戰兢自持確乎其行惟實是依表裏交正動靜迭資若唱而和若影而隨伊昔君子胡不慥慥勉哉勿渝是敬是保讀書樓銘醴陵丁􅘔明發請於某曰家有小樓為羣從講習之所敬求其名某以讀書名之而因銘以告洪惟元聖研幾極深出言為經以達天心天心煌煌聖謨洋洋有赫其傳惠我無疆嗟哉學子生乎千載孰謂聖逺遺經猶在孰不讀書而昧厥旨章句是鑿文采是事矧其所懷惟以祿利茫乎四馳其曷豫暨嗟哉學者當知讀書匪有所為惟求厥初厥初惟何爾所固然因書而發爾知則全維誦維歌維究維復維以泳遊勿肆勿梏維平乃心以會其理切于乃躬以察以體積功既深有燁其明逈然意表大體斯呈聖豈豫欺實發豫機俾豫自知以永于為若火始燃若泉始達推之自兹進孰豫遏若登泰山益高益崇維理無形維經無窮嗟哉學子盍敬念兹以是讀書則或庶幾葵軒石銘張子銘葵軒之石于以出入觀省焉正爾衣冠毋惰爾容謹爾視聽毋越爾躬爾之話言式循爾𠂻爾之起居式蹈爾庸敬爾所動毋窒其通貞爾所存毋失其宗外之云肅攸保于中中之克固外斯率從天命可畏戒懼難終勒銘于石用警爾慵筆囊銘司馬文正公貯筆黃囊又紅管筆一枝今藏太史范氏文正親題其上實治平中賜物淳熙六年敬銘厚陵之賜文正之澤傳之方來見者改色筆端吐辭穀粟萬世豈惟改色公心是繼在昔魏公世保其笏謹哉斯藏惟德其物周奭硯璞銘靡飾于外含章在中以時發舒翰墨之功君子觀象于以蓄德韜其光芒惟貞靡忒針主一針伊川先生曰主一之謂敬又曰無適之謂一嗟乎求仁之方孰要乎此因為針書于坐右且以諗同志人稟天性其生也直克順厥彛則靡有忒事物之感紛綸朝夕動而無節生道或息惟學有要持敬勿失驗厥操捨乃知出入曷為其敬妙在主一曷為其一惟以無適居無越思事靡它及涵泳于中匪忘匪亟斯須造次是保是積既久而精乃會于極勉哉勿倦聖賢可則四益針先君晚嵗嘗大書四言以詔枃弟曰無益之言勿聽無益之事勿為無益之文勿觀無益之友勿親枃受而藏之惟謹先君既沒之九年則以請于某曰伏自惟念大懼無以承先君之意既以四益名堂願兄追述其義將列之坐右朝夕警戒以庶幾乎萬一某奉書而泣退而為針以告之若古有訓聽德惟聰聞過以改聞善以從匪是之聞則為無益諂言溺心姦言敗德嗟哉勿忘敬共朝夕卓爾有定聽斯不惑朝夕之間何莫非事事所當事是為君子惟欲之動則亂于為營營何益擾擾孰知止之有道當收放心曷喻其工履薄臨深異説害道我則弗邇浮文妨實我則弗貴而況末俗骫論俚辭當絶于前勿亂于思潛心聖賢博考載籍聞見之多于以蓄德大倫惟五友居其一我觀昔人敬戒無斁以狎而比以順而同德惟日喪友亦曷終必端爾心忠信是親神之聽之終和且平贊漢丞相諸葛忠武侯畫像贊惟忠武侯識其大者仗義履正卓然不舍方卧南陽若將終身三顧而起時哉屈伸難平者事不昧者幾大綱既得萬目乃隨我奉天討不震不竦維其一心而以時動噫侯此心萬世不泯遺像有嚴瞻者起敬濓溪先生於惟先生絶學是繼窮原大極示我來世明道先生於惟先生會其純全天理之揭聖學淵源伊川先生於惟先生極其精微俾爾立德循循有歸于湖畫像贊是于湖君英邁偉特遇事若然如箭破的談笑翰墨如風無迹惟其胸中無有畛域故所發施橫達四出雖然此固衆人之所識也今方袖手于湖之上盡心以事其親而益究其所未及則其所至又孰知其紀極者耶己丑夏廣漢張某書于湘中館書伊川先生易傳復卦義贊天地之心其體則微于動之端斯以見之其端伊何維以生生羣物是資而以日亨其在於人純是惻隱動匪以斯則非天命曰義禮智位雖不同揆厥所基脈絡該通曷其保之日乾夕惕斯須不存生道或息義則無害敬立義集是為復亨出入無疾觀虎丘劒池有言湛乎淵停其靜養也卓乎壁立其自守也歷四時而無虧其有常也上汲而不窮其用不膠也其有似於君子之德乎吾是以徘徊而不能去也南軒集卷三十六
