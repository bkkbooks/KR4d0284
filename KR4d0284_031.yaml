body:
  text: 南軒集卷三十一宋張栻撰答問答宋伯潛明道云志動氣者什九氣動志者什一所謂氣動志者非獨趨蹶藥也酒也亦是也若止以藥與酒與蹶趨言之謂之少可也明道又云氣專在喜怒豈不動志夫人為私欲所勝喜怒不公以移奪其志者多矣而謂氣動志者什一此則未諭所以有喜怒亦志動氣也但因喜怒之氣而志益不能自寧是氣復動志也蓋常人志動氣而氣復動志無窮已耳然自其始動而言只可謂之志動氣也惟趨蹶與藥也酒也則是氣先之也孟子曰可欲之謂善伊川謂與元者善之長同理又曰乾聖人之分也可欲之善屬焉剛仲嘗謂孟子言可欲非私欲之欲也自性之動而有所之焉者耳於可與不可之際甚難擇姑以近者言之如飲食男女人之所大欲人孰不欲富貴亦皆天理自然循其可者而有所之如飢而食渴而飲以禮則得妻以其道而得富貴之類則天理也過是而恣行妄求則非天理矣故書曰敬修其可願孟子又曰無欲其所不欲是也乾聖人之分豈謂聖人之動皆循天理而然歟以坤為學者之事莫是有馴致之意否元者天德也孟子所謂善豈指天理而言歟橫渠又曰明善必明於未可欲之際未可欲謂大本未發者否見於可欲則性之苗裔已發見者未可欲則本性全體渾然不容一毫之偽明之之功何自而先莫亦當先從事於可不可之際審擇而固執之否愚見如此中心亦未安恐伊川引乾元處别有深意人具天地之心所謂元者也由是而發見莫非可欲之善也其不由是而發則為血氣所動而非其可矣聖人者是心純全渾然乾知大始之體也故曰乾聖人之分可欲之善屬焉在賢者則由積習以復其初坤作成物之用也故曰坤學者之事也有諸己之信屬焉今欲用工宜莫先於敬用工之久人欲寖除則所謂可者益可得而存矣若不養其源徒欲於其發見之際辨擇其可與不可則恐紛擾而無日新之功也答周允升王通謂夫子與太極合德若如先生之説則人與物莫不有太極詎止合而已通顧為是言殆將太極别為一物耶奭竊疑焉於是反復思之意夫通之説蓋指其初者言之也當其三才未判兩儀未分五行未布而太極已固存矣逮夫太極動而生陽動極而靜靜而生隂隂陽分而兩儀立陽變隂合而五行生無極之真二五之精妙合而凝乾道成男坤道成女二氣交感化生萬物而人始具此太極矣逆通之意其指夫生物之初者言之耶今夫人莫不具是性也而盡性者誰歟性中皆有天也而配天者誰歟是以中庸之論惟天下至誠為能盡性惟天下至聖故曰配天太極亦猶是也儻曰太極吾所固有何合德之云則配天之説亦非耶奭嘗譬之日光凡世間一切物能容光者莫不具日光焉畢竟空中之日光自若也今曰能容光者非日光也固不可也謂日光盡在是而空中者無與焉亦不可也是故物生之初太極存焉生物之後太極具焉人雖各具太極要其初者固自若也此通所以有合德之説歟昔者馬上所聞尚有未諭者故此諄諄幸賜指教使渙然氷釋為荷天可言配指形體也太極不可言合太極性也惟聖人能盡其性太極之所以立也人雖具太極然淪胥陷溺之則謂之太極不立可也程子曰萬物皆備於我不獨人爾物皆然都自這裏出去只是物不能推人則能推之雖能推之幾時添得一分不能推之幾時減得一分萬里俱在平鋪放著幾時道堯盡君道添得些君道多舜盡子道添得些子道多元來依舊又曰萬物皆備於我此通人物而言禽獸與人絶相似只是不能推然禽獸之性却自然不待學不待教如營巢養子之類是也人雖是靈却椓喪處極多只有一件嬰兒飲乳是自然非學也其他皆誘之又曰萬物皆備於我矣反身而誠樂莫大焉不誠則逆於物而不順也又曰學者必先識仁仁者與物渾然同體孟子曰萬物皆備於我須反身而誠乃為大樂若反身未誠則猶是二物有對以已合彼終未有之又安得樂此四段皆程子之説前二説謂人與物皆然後二説則獨指人而言據孟子謂萬物皆備於我未嘗曰物皆備萬物也如前二説則人與物更無差别與告子生之謂性何異夫惟物不能備萬物故止有一物之用所以不能推者只為合下不曽備得人則備矣所以能參贊化育也至於椓喪處雖多這裏元來何曽增減庶民自去之爾故謂物莫不有天命莫不有太極則可謂物皆備萬物則似恐未可既曰物莫不皆有太極則所謂太極者固萬物之所備也惟其賦是氣質而拘隔之故物止為一物之用而太極之體則未嘗不完也子貢謂夫子曰學不厭智也教不倦仁也中庸曰成己仁也成物智也學之與成已教之與成物蓋無二事而或曰仁或曰知孰為定體耶中庸與子貢之言互明仁智之體用也龍塘辱指教學而時習之當如程子説時復紬繹浹洽于中今人讀語孟六經若先賢遺書時復潛泳玩味因其所啓端發其所固有久久涵養是保是積此誠可説也當夫子時六經未出聖人教人者亦不至多言士從之遊者或一言而終身行或數語而終身誦或以愚魯而竟得之不知所紬繹者何事又如語孟精義諸先生之説或各不同而皆不悖於理將孰從之則是紬繹者謂理也義也不必止為文字諸先生之説有不同處通書論德愛曰仁伊川則謂仁是性愛自是情語録亦引力行近乎仁云力行關愛甚事易傳復之六二曰仁者天下之公善之本也語録皆以公為近仁未嘗斷以愛為仁也然則愛特仁之一事耳而通書乃云然近世朱丈之論亦然此是則彼非二者必居一于此欲俾學者識仁之本體厥道何繇力行近乎仁力行者敦篤切至故也便以愛為仁則不可然愛之理則仁也觀過斯知仁矣舊觀所作訥齋韋齋記與近日所言殊異得非因朱丈别以一心觀又别以一心知頃刻之間有此二用為急迫不成道理遂變其説乎奭嘗反復紬繹此事正如懸鏡當空萬象森羅一時畢照何急迫之有必以觀他人之過為知仁則如觀小人之過於薄何處得仁來又如觀君子之過於厚則如鬻拳之以兵諫豈非過於忠乎唐人之剔股豈非過於孝陽城兄弟之不娶豈非過於友悌乎此類不可勝數揆之聖人之中道無取焉耳仁安在哉若謂因觀他人之過而默知仁之所以為仁則曷若返之為愈乎奭於先生舊説似未能遽舍更望詳教後來玩伊川先生之説乃見前説甚有病來説大似釋氏講學不可潦草蓋過須是子細玩味方見聖人當時立言意思也過於厚者謂之仁則不可然心之不逺者可知比夫過於薄甚至於為忮為忍者其相去不亦逺乎請用此意體認乃見仁之所以為仁之義不至渺茫恍惚矣書以中庸名篇而首論中和之道然則中和與中庸當何如分中庸統言道之體用中和就人身上説小人之中庸也小人而無忌憚也當從王肅説是從上蔡説是脫一反字論舜之大知也曰執其兩端用其中於民而不及庸述夫子之忠恕也曰庸德之行庸言之謹而不及中何也意其互見耶亦各示其用也言各有攸當且用其中于民固所以言庸也庸德庸言此庸字輕看既曰中庸不可能也又曰君子依乎中庸遁世不見知而不悔唯聖者能之必聖者而後能無乃絶學者之望耶抑其義異自不相通耶言中庸不可能乃所以勉學者唯聖者能之盡其道為難仁者人也親親為大義者宜也尊賢為大先後自有定秩九經之序則先尊賢而後親親二者當何如通即人心而論則親親為先就治體而言則尊賢是急堯典克明俊德以親九族亦是意答彭子夀中也者天下之大本也和也者天下之達道也朱編修云大本者天下之理皆由此出道之體也達道者由此而出無所不通道之用也龜年竊謂大本者即此理之存達道者即此理之行謂之中和已是説出性情之理若曰大本者天下之理由此而出無所不通則是大本達道之外又有所謂理也不識此言如何大本者理之統體會而統體理一而已散而流行理有萬殊若曰大本即此理之存達道即此理之行却恐語意近類釋氏萬殊固具於統體之中致中和天地位焉萬物育焉朱編修云敬而無失則極其中而天地位矣義之與比則極其和而萬物育矣龜年竊謂未有極其中而不和者未有天地位而萬物不育者亦不必如此分説不識如何分説無害固未有天地位而萬物不育者然天地位言其體萬物育言其用體用自殊要須分看但元晦之語不若龜山云中故天地位焉和故萬物育焉為得解經之法君子時中朱編修云以其有君子之德而又能隨時以取中也龜年竊謂君子精義故能時中謂之時中者以其全得此理故無時而不中非是就時上取中也今曰以其有君子之德而又能隨時以取中心切疑焉隨時以取中非元晦語乃先覺之意此意甚精蓋中字若統體看是渾然一理也若散在事物上看事事物物各有正理存焉君子處之權其所宜悉得其理乃隨時以取中語然元晦云以其有君子之德又能隨時以取中語却有病不若云所貴於君子之中庸者以君子能隨時以取中也大學曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意欲誠其意者先致其知致知在格物自物格而后知至自國治而后天下平如自本而葉沿流而下學者用力之處莫切於格物致知而此篇之書自誠意至平天下條析甚明而獨於格物致知無説朱編修以為闕文是也然龜年嘗以為自平定天下遡而求之其極至於格物致知自物格知至順而達之其極至於國治天下平其間雖節目繁夥而其道甚要所謂要道蓋不過格物致知而已耳然聖人自誠意而下又各疏其説焉非謂格物致知之外又别有所謂誠意正心修身齊家治國平天下之道此蓋聖人深指人以格物致知者然也故聖人於齊家之條引書曰若保赤子心誠求之雖不中不逺矣此格物致知之最近者也不識是否自誠意正心以至平天下固無非格物致知事也然疑致知格物一段解説自須有闕文答彭子夀非禮勿視非禮勿聽主一則視聽有其則矣人心惟危人心因血氣而動蓋危而難安也喜怒哀樂未發謂之中喜怒哀樂之未發無所偏倚中之所以得名中者所以狀性之體段若曰目視耳聽手舉足履則是已發矣其無不當者乃是中節所謂時中也鳶飛戾天魚躍于淵言其上下察也鳶飛魚躍指道之體用無乎不在也盡心知性因盡心體之本然為盡其心非善窮理者莫之能也無極而太極此語只作一句玩味無極而太極存焉太極本無極也若曰自無生有則是析為二體矣堯舜豈無所用其心哉豈可謂堯舜無所用心特動無非天耳過化存神存神體也過化用也存神故能過化君子行法以俟命行吾法則聽天所命故富貴貧賤夷狄患難無不安也答吳德夫孟子曰形色天性也惟聖人然後可以踐形説者謂踐者履踐也如非禮勿視聽非禮勿言動之類謂之踐形如此説恐只是賢人事一説謂聖人猖狂妄行蹈乎大方衆人則為形所役聖人則能役形恐踐字説得費力又一説形者事之初萌色者事之著見惟聖人能踐之於其初賢人則不待著見而後用力於其間此恐説天性字不出天之生斯人也有物必有則凡具於吾身者皆物也而各有則焉踐如踐言之踐實履之也凡人雖有形色而不能踐也感物而動不知所以踐之者也賢人則能踐之矣由己故也以我視以我聽以我言以我動也聖人盡性從容自中與天地相流通故動容周旋無非至理曰能則猶似用力也曰可以則見其自然而化非聖人莫能與也上繫曰可久則賢人之德可大則賢人之業此一段論乾坤易簡至於可久可大可謂極矣何故止言賢人德業或謂非聖賢之賢乃賢於人之賢可久可大賢人之德業也久大則聖人也矣舜明於庶物物或説謂物則之物或説謂萬物之物然則明庶物者奚獨舜哉且考之經何以見舜之明庶物也道外無物物外無道舜明於庶物則萬理著察一以貫之卓然大中之域非生知其能然乎夫舜起於畎畝之中一旦加乎羣工之上徽五典而五典從納百揆而百揆敘賔四門而四門穆納于大麓而烈風雷雨弗迷非明於庶物其能然乎孟子曰口之於味也目之於色也耳之於聲也鼻之於臭也四肢之於安佚也性也有命焉君子不謂性也仁之於父子也義之於君臣也禮之於賔主也知之於賢否也聖人之於天道也命也有性焉君子不謂命也口之别味目之别色耳之别聲鼻之别臭四肢之便於安佚豈人所為哉是性然矣而口蘄於美味目蘄於好色耳蘄於鐘鼓鼻蘄於芳馨四肢蘄於安佚則是感動於物而為性之欲矣故有命焉而君子不謂性也蓋貴賤有定分窮達有定數隨其所遇無不得焉而無欲之之意則是天理也故不謂性者乃所以成性也父子之恩主仁而仁不得於父子君臣之分主義而義不得於君臣賔主以禮而不接我以禮賢者冝以知見於世而邦無道有不得而知焉天道在聖人而聖人固有不遇者命則然矣然而是可斷以無可奈何乎斷以無可奈何則人道息矣故有性焉而君子不謂命也仁不得於父子吾致孝以感而已如舜是也義不得於君臣吾致誠以格而已如周公是也彼不以禮待我而在我者盡其待之之道而已孔子之於陽貨可見也知不得自見吾雖退藏益精其知以樂其道伊尹在莘野未聘之時可見也天道在聖人而夫子不得如堯舜文武周公施而達之天下然著之六經傳於門人兼善萬世天道流行蓋無終窮矣故不謂命者乃所以立命也如前所説若流其性而不本於命則人欲肆矣如後所説若委於命而不理其性則天理滅矣孟子之言所以極性命之微而同天人之用也雖然所以成性而立命者何歟一則不謂性一則不謂命而心之道行乎其中矣非知仁者其孰能明之且聖人之於天道立言與上辭不同所以然者蓋明天道即聖人之道而聖人即天也孔子之謂集大成集大成也者金聲而玉振之也孟子言孔子不名一德而集羣聖之大成非三子之所可及而又以樂之大成明之蓋樂之一變謂之一成大成則其節奏之大備也金聲而玉振之節奏可謂備矣蓋又各有似焉金聲有洪殺清濁之殊聖人之智無所不周者然也玉振始終如一聖人之德無所不備者然也此其先後固自有倫然自其成者言之則金玉並奏知行皆極不見其始卒之有異也金聲也者始條理也玉振也者終條理也始條理者智之事也終條理者聖之事也伊川先生云此孟子為學者言始終之義由其能始條理故能終條理猶知至即能至之知終即能終之又曰致知智之事行其所知而極其至聖之事也據此一節乃是言學者之事所以學於聖人者故因上文金聲玉振而言言學之序如此蓋聖人則聖智合一無始卒之異學者則必知所先後然後有以入德也故孟子於此一節特分而言之明聖人之智學者所當先務必明盡衆理咸極其至然後力行以造夫聖人之所以聖者始終各有條理而不可亂也智之事聖之事猶言學智聖之功夫非便以為智聖也智譬則巧也聖譬則力也猶射於百步之外也其至爾力也其中非爾力也此一節復言聖人之事以明夫子所以異夫三子者夫子智聖合一至而且中矣然所以至者其力也所以中者非力也是巧之功也是聖人雖曰合一而智聖亦未嘗不偕極也若三子徒恃其力而巧不足焉則雖至而不能以中矣若顔子者智足以中矣其力未及至者一息爾天假之年孰謂其不為孔子哉西銘云知化則善述其事窮神則善繼其志其旨何如西銘發明仁孝蓋仁人之事親也如事天事天也如事親須臾不在焉則失其理矣神是心化是用然須默識所謂神則化可得而言矣能繼志乃能述事也南軒集卷三十一
