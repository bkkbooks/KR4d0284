body:
  text: 南軒集卷二十八宋張栻撰書與曽節夫撫幹某二十四日到郡適當紀綱解弛之餘未免一一整頓今條目粗定當以身先之財計空虛亦頗得端倪數月之後民力可寬邉防尤所寒心方别為規模以壯中權之勢約束邉郡務先自治以服逺人盜賊紛然初無賞格亦已明立示信當有為效力者自昧爽到日夕未嘗少暇雖差覺倦然不敢不勉有齊名緩帶日所燕處惡其名弛惰易曰無倦取夫子答子張子路之語今早方到英英堂已略行銓量沙汰矣其它事未暇一一報去但自諸司而下不免愛之以德不敢以姑息正恐其間須有咈意者然亦無如之何又茶賊在禾山二十日諸軍環視曽不得一正賊今日兵將誠足用耶今聞復出禾山深慮其越逸彼中有聞時幸示報王樞耄及而繆悠貶未足以塞責又不知汪汝嘉能辦乃事否頃見此人生得有福命亦好恐為福將也壽翁攝帥一路之幸且勸令持重凡百號令審詳明信乃佳蓋彼中失信於人久矣此賊其初失於不招某蓋嘗入文字於五月初今既殘害許多將與兵却不可招若合大軍五千而不能擒此則亦無以為國矣所論嶽祠及與王樞劄子皆好有以見吾友守義不茍也夀翁雖不易肯略言但恐言之不入亦不濟事耳此間土剛而農惰自前月二十八九有雨至今近旬已嘗祈求舊例祈禱無義理盡削之只到社壇風雷雨師壇及於湘南樓望拜堯山灕江遣官寮奉祝板瘞山間及投江中今日五更登湘南樓雷電倐興下樓雨已下須㬰大集滂沛過午方止庭下水深數尺四郊盡遍今雨意未已也一稔可望幸事幸事庶幾使此邦之人益信土偶之非所當事而山川是為神靈也因書謾及不必語它人急發至夀翁欲其排日發探報來更幸贊之又某昨方奉書中辱示忽聞有罷命深所歎息彼蓋欲借左右以自解免尚何恤乎公議想目前得失不以置胸中某亦不復道相勸解之辭吾曹惟有益勉其在我者耳但今之達官鮮能受盡言向來所以奉書亦有不可與言之戒詳其當時差出便非好意正欲尋事相中耳它日必有能與君辨之者但辨與不辨亦不足問歸家閉户勉學此有餘地也又左右天資之美間處正宜進步工夫不可悠悠且須察自家偏處自聲氣容色上細細檢察向在長沙見或者多疑左右以為簡忽此雖是愛憎不同要之致得人如此看亦是自家未盡涵養變化異日願有觀焉某日接事物恐懼之不暇甚思城南從容之味也又某到官已半月覺人情頗相安綱紀亦粗定日間事隨手即遣並不付吏輩頗似省靜但如學校軍政財計色色廢壞未免一一料理要為著實可繼者耳諸司向來相與不以誠而以術府中遇諸縣亦然今先務立信上下似亦頗相應也邉蠻有互相讐殺者具令逐州以國家好生大德諭之俾無以小忿自戕生靈忠信可行蠻貊拙者所守惟此而已惟是凡事不敢不奉法度上下曠弛陵夷之久未免少覺拘束久亦當安習也又前日春祭親往舜廟廟負竒峰唐人磨崖在石壁中貌象甚古行禮既終環視堂廡則有庳之神在焉固已甚懼而唐武后亦勦入廡下幡帳甚盛又僧伽一部落亦在焉不免即日盡投畀廟前江中庶幾一廟之內四門穆穆耳此事獨可為李夀翁言之又得暇想不廢玩繹鬼神之說橫渠正䝉中宜深味之此直須使胸中了了無疑不然它時恐或為異說搖動也又某承乏亦且一載矣佩心誠求之之訓味哀矜勿喜之言黽勉之不暇所幸去嵗一稔嶺民謂數年所無而積年狡盜悉就擒勦人情頗安惟是區區不敢茍目前為之久逺之慮日夜在懷保伍法先行於靜江境內極得其效非惟弭盜亦且息訟因漸教以相親睦扶持之意繼復推之一路有數州者能料理有方今又得朝廷斟酌降下尤幸事也靜江財賦適承空乏之餘初交割時府中借經司漕司緡錢共幾四十萬經司亦坐是費力一年之間痛節浮冗謹密滲漏今幸支吾兼支還兩司錢十餘萬緡去冬米賤亦頗收糴為備幾二萬石惟招軍治甲不敢惜費所收拾强壯刺將兵效用者已近五百輩部勒教閲合摧鋒及效用并帳前親兵千二百餘人頗成軍伍蓋此路控扼非一此為急務也今郡事極簡日間多得暇但環視一路思慮不能暫釋耳㑹議財賦事朝廷雖已行下而共議之人與人異見商量未成比不免以所見定論再列于朝矣諸州須得此事定然後有濟也諸邉悉幸無它向來䕫州李丈所忌憚之人今甚帖然然羈縻之地與夫蠻獠之鄉種類實繁一以為赤子一以為龍蛇豈容少忽而邉備未實每為憂耳士人中亦漸有知向方者每呼其秀者與之講論端倪一二更看久之如何環城勝處誠多但絶懶出公務之餘焚香默坐閒翻書數葉為况如此耳恐節夫欲詳知不覺縷縷建安公救荒之政聞江東之人極賴之常通問否此以僻逺難於相聞也節夫間中想進修不輟察偏矯習當有新功中庸謹獨大學誠意乃是下工夫要切處不可悠悠放過也彼中去崇安不逺聞欲以暇時一往元晦處甚善甚善示及山園圖反復不厭便若身履其間今再賦五章奉寄雖然園亦既廣矣美矣若求增不已却恐亦為玩物溺志要不可不察也與吳晦叔元晦書來云近看大學中之其所親愛而辟焉辟字皆當讀作僻字反復細看誠如其說蓋非惟文義上下相接兼此篇中其餘辟字皆當讀作僻不應此字獨異又其理於修身齊家極為緊切乃易傳中妻孥之言雖失而多從所憎之言雖善為惡之意也幸更詳之又擇之後來頗肯放下舊說第於鬼神生死之故終是疑惑書來却云姑欲且置此疑專一持敬某謂此疑方深動輒有礙雖欲持敬豈不間斷分裂乎窮理持敬工夫蓋互相資耳可齊銘見攜在此大意皆正但恐說可欲未甚分明可欲乃動之端良心本體也故伊川謂與元者善之長同意如何又告子之說某向來解孟子此段正與來諭同近因在舟中改舊說見伊川有云不得於言勿求於心此觀人之法心之精微言有不可便謂不知此告子淺近處明道云人必有仁義之心然後仁義之氣達於面故不得於心勿求於氣可此亦似以為觀人之法也故有疑焉幸更詳之見教又可齊銘俟更詳之續布聞告子一段大意固然看伊川之意以為觀人之法為告子說云爾也某解得一段容續遣呈求教近來玩味紬繹大抵多覺向來看得偏處始知所謂善學者求言必自近易於近者非知言者也其至言哉又示教久假不歸之說論甚正向來解中之語誠有未安後來亦略有更改處今復刪潤録呈但來諭固正矣然如所解烏知其非有也謂懵不自知却恐意義及文勢皆未順身之假之固逈然不同孟子此語要甚和平謂使其能久假而不歸烏知其非已有蓋非便謂其能有之亦寧知其不能有耳語意蓋圓也假雖是有名無實若能不歸則安知其非舍舊而更新乎解中故云義不係於假而係於不歸故孟子斯言蓋進之於善道而非絶之之辭文定春秋中一段及此併録呈幸更深思之却以見告某今夏以來時時再看語孟說又多欲改處緣醫者見戒未欲多作文字近日方下筆改正語說次當及孟子恐因見其間未安處不惜一一疏示相助開發也所欲言者甚多每以懷渴所幾以時自厚又舟梁之論誠有益於學者向來所疑只恐辭氣間微有過處耳某已作嶽下書欲遣人問忽得舍弟信報廣仲下世傷歎淚落不能以已不謂盛年一疾遽至於此又念其有志古道朋遊中所難得平時相與講論意望逺大一朝有今古之隔使人重痛惜之不獨為胡氏歎息也晦叔交義篤至尤當為之動懷此病只緣湘隂醫者下甘遂撅了根本豈有廣仲之弱反謂腎氣有餘又從而瀉之耶如此庸醫公然妄投劑理當痛懲之如何專遣人去匆匆僅能作此它皆未暇及也又季隨處人便辱書甚慰醇叟遂爾使人感傷挽章甚佳近來詩律良進也某亦作兩首蚤晚寄去孟子解向來老兄先要盡心今録呈煩細看有以見告是所望也某近日無事亦頗作論語章句方畢學而篇續亦旋寄元晦中庸數章俟答書了併往相去不逺未即合并無日不奉懷何日遂成此來耶力行近乎仁之說甚緊要更須細味近字為深長也克伐怨欲之說曽細味二程先生之說否仁字須是如此看伯逢所類遺書中語已領劉樞得書聞十二月間遷入新第但傳說頗華耳子飛可傷之甚前書已報去不知諸喪今誰與殯葬孤遺誰與收拾似亦劉樞之責也近報黃仲秉以集撰守鎮江未知何故它遲後訊又某比來展省先塋昨曉至止松楸日茂永慕之感惟以涕零耳本意欲畢事往山前與親舊相欵適舍弟嚴陵之闕成見任初與劉樞共勸渠對換此間或近地一闕而其意堅欲往已索迓兵念兄弟相别在即且欲相聚不欲久出故復不果又恐重厪晦叔不敢屈來此相望一山徒極悵然後早即還轅矣近連得元晦書亦寄所解中庸草藁來看猶未及詳閲也伯逢前在城中頗欵某所解太極圖渠亦録去但其意終疑物雖昏隔不能以自通而太極之所以為極者亦何有虧缺乎哉之語此正是渠緊要障礙處蓋未知物則有昏隔而太極則無虧缺故也若在物之身太極有虧缺則是太極為一物天將其全與人而各分些子與物也此為於大本甚有害前臨來未及詳此從容間更以告之可也劉樞近日論交趾進象事又以上江多旱處以五萬緡往荆南糴米就彼輸軍此却截留合發之數此等事皆是誠心愛民之實也求田之說未嘗忘但未有穩當不敢奉告耳又某比復奏請邉州久逺之弊似聞朝廷已議施行若得此事濟則庶幾有可繼之迹非直一時計耳新漕凡事却似肯商量不敢不推誠更看如何李伯諫為異說所惑遂下喬木而入幽谷兼其說亦甚淺陋不知伯諫何為便為所動要是天資窒塞元晦當時期待之太過耳又别紙數條一一以鄙見書其下未知然否幸精詳之長物之說正所欲聞近來只是買得一石屏及得一觥其它皆向來几案間日用者也經營之說傳者過矣但健羡之意雖曰知防然未免其根在尚時發見得來誨極有助當深加窒治也欣感欣感以此蓋思相聚之樂益間凡有所傳聞無論虛實細大幸一一見告非吾晦叔而誰望耶幸甚又元晦謂略於省察向來某與渠書亦嘗論此矣後便録呈如三省四勿皆持養省察之功兼焉大要持養是本省察所以成其持養之功者也又和章三復幸甚如所謂花栁共日暖桑麻經雨滋語意佳也所諭氣稟之說言語誠恐人致惑今更云如羊躡虎其生已知其滅宗之類以其氣稟而知其末流至此謂惡亦不可不謂之性言氣稟之性也如何日與諸人理㑹詩方到唐風向來元晦所編多去諸先生之說某意以為諸先生之說雖有不同然自各有意思在學者玩味如何故盡載程子張子吕氏楊氏之說其他諸家有可取則存之如元晦之說多在所取也此外尚或有鄙意即亦附之于末繫辭說亦已裒集程子精微之論多見遺書中如論孟精義編類得好極宜習讀但書多不帶來耳近為曽幹作一記并數詩録呈嶽陽附克己銘來亦附一本去又示及元晦伯逢觀過知仁說正所欲見某頃時之說正與伯逢相似後來見解經義處惟伊川先生之言看得似平易而研窮其味無斁此段伊川但以謂君子之過過於厚傷於愛小人之過過於薄傷於忍經解本云人之過也各於其類君子常失於厚小人常失於薄君子過於愛小人傷於忍近來嘗下語云君子之失於厚過於愛雖曰過也然觀其過而心之不逺者可知矣若小人之過則失於薄傷於忍夫所謂薄與忍者豈人之情也哉而其失若此則其所陷溺者亦可知矣以此自觀則天理在所精人欲在所遏也以此觀人則亦知人之要也未知兄看得如何若如舊日所說恐傷快了聖人論仁不如是耳更幸思之講之却以見教示諭所過者化之說才讀一過覺程子之說為有功用也俟少定更詳之聞見思慮所及并廣西利害有可見告者不惜逐項筆記以俟面請某獨任一路之責蚤夜不遑所幸今夏雨澤尤以時目前逺近頗安帖向來數事悉已得請前書已報去今諸州既少寬橫斂苛訊悉從禁戢庶幾民力之漸紓也除諸郡既添鹽息外海旁數郡乃煮海之地而官敷賣鹽數益增於舊亦為鐫削區處以至海南悉施行矣區區心力之所及不敢不盡亦幸朝廷察見肯相從耳前書所諭權攝事向來正求者多而經司闕殊少不足以給想多不滿者漕司却有闕多然近來指揮例罷違法權攝如廣中用八路法但可差在本路得替寄居待闕官耳罷者甚衆亦有利有害也陳擇之本欲立秋後歸自聞此報不復可留此公明審有思慮此處置本路久逺根本之計一二事極賴其助甚惜其去也誠之病痛多未肯下手醫治近亦力告之矣又兩日行善化寧鄉道中境界可畏使人不忍開眼大抵十室五六空矣其見存者無人色有位者終未肯沛然拯濟坐視天民之擠壑為之奈何前在城中不勝饒舌昨復移書力說且封民所食草根去未知吪動否又歉傷衡山猶為庶幾者晦叔猶未見善化寧鄉界中耳不可言不可言某向在城中亦無緣知得子細振民之事蓋有二端振濟也振糶也振濟須官中捐米以救之振糶即用上户所認可也今官中吝米不肯捐專仰上户之糶可乎今潭城諸倉受納已有米近八萬斛前勸陳帥借此上供米均濟農民乏食者或借與亦可却一面具以奏聞待罪比至獲罪而十數萬生齒已活矣况未必獲罪耶未知渠能辦否耳若待常平司全永州糴米來濟則索我於枯魚之肆矣如何如何南軒集卷二十八
