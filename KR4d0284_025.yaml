body:
  text: 南軒集卷二十五宋張栻撰書寄吕伯恭某讀書先廬粗安晨夕顧存養省察之功固當並進然存養是本覺向來工夫不進蓋為存養處不深厚存養處欠故省察少力也方於間暇不敢不勉但良朋在逺每誦一日不可無俟無可之言未嘗不引領東望也所示讀書次第皆著實蓄德喪志之分誠不可不察易傳所謂考迹以觀其用察言以求其心此語極緊要近來讀諸先生説話惟覺二程先生完全精粹愈看愈無窮不可不詳味也來教有云平時徒恃資質工夫悠悠殊不精切此可見體察之功某每思尊兄於尋常人病痛往往皆無之此在資質固為美然在學問不可不防有病它人所有病痛却不干學問事若只坐在此上却恐頽墯少精神惟析夫義理之微而致察於物情之細每存正大之體尤防己意之偏好事上一毫才過便是私意如要救正此人盡吾誠意以告之從與不從固不可必也若必欲救正得便有偏推此類可見擴而充之則幸甚幸甚相從諸人多長進者否有書來者各隨其説以鄙見答之矣薛士龍及陸徐薛叔似諸君比恨未及識士龍正欲詳聞其為人但所舉兩説甚偏恐如此執害事事功固有所當為若曰喜事功則喜字上􅴲有病元晦數通書講論比舊尤好語孟精義有益學者序引中所疑曽與商確否但仁義中正之論終執舊説濓溪自得處渾全誠為二先生發源所自然元晦持其説句句而論字字而解故未免返流於牽強而亦非濓溪本意也觀二先生遺書中與學者講論多矣若西銘則再四言之至太極圖則未嘗拈出此意恐更當研究也此間士子資質好有意於學者亦四五人每教以著實於主一上進步耳晦叔已兩來相見非久欲遷城居嶽下相識如胡廣仲伯逢亦留意但向來多是想像懸度殊少工夫故病痛多不精進亦數有書往來也孟子解雖已寫出其間毛病改綴不停正如春草旋剗旋有且欲自家體當遽敢傳諸人見録一本它時欲奉寄求益也仁説所題數段極有開警别紙奉報并後來改正處亦録去祭儀向來元晦寄本頗詳亦有幾事疑後再改來往往已正今録去但墓祭一段鄙意終不安尋常到山間只是頓顙哭灑掃而已時祭只用二分二至有此不同耳家間方謀建家廟異時廟成定祭禮庶幾正當伯恭所考因來却幸見寄也它懷非逺書所可盡有便不惜寄音又自歸抵此亦既半嵗省過矯偏但覺平日以為細故粗迹者乃是深失銷磨雖庶幾兢兢焉惟恐乘間之竊發耳深味論語一書聖人所以教人與學者所當用力者蓋可以見著實務本乃為至要才不帖帖地便使有外之心也來書所自察向來之病其間有云以私為公以情為性者可見察之之精更宜深勉於篤敬之功也向來每見衣冠不整舉止或草草此恐亦不可作小病看古人衣冠容止之間不是要作意矜持只是循它天則合如是為尋常因循怠弛故須著勉強自持外之不肅而謂能敬於內可乎此恐高明所自知但不可以為小病耳語學者躐等之病鄙懷近來正謂如此敢不深思而謹之也今世學者慕高逺而忽卑近之病為多此間有肯來講論者今殊不敢泛告想渠輩聽某以前説話覺得有滋味今却鈍悶若信得及却可與講習也其言也訒之説誠然彼中諸人如何今次寄來問目却覺子約會思量雖是泛然且須令思量要是須從此過耳此亦是自已見得曽如此也元晦仁説後來看得渠説愛之理之意却好繼而再得渠書只拈此三字却有精神但前來所寄言語間終多病兼渠看得某意思亦老草後所答今録呈但渠議論商確間終是有意思過處早晚亦欲更力言之又學而篇數段甚有滋益三段已改過别録去巧言令色章前已曽改今送言仁一册去父沒觀其行却恐文意只當於居喪説若謂泛言行則父在固亦當觀其行但有所不得行要以觀志為主耳論子思摽使者之説甚有味停蓄鎮重之戒敢不深佩以不當憂責為幸近世士君子墮在此病為多此意殊不厚非惟先自隔絶無由感通存心既爾若一旦臨事豈復更有力乎詳味考槃之詩與夫志在君也之辭使人三歎也元晦向來詩集解必已曽見某意謂不當刪去前輩之説今重編過如二程先生及橫渠吕楊之説皆載之其他則采其可者録之如此備矣而其間或尚有餘意則以己見附之觀魯論中教人以詩為先蓋興起情性使人深篤於人倫之際學者須是先教存忠厚之心也又某前月半間積寒成疾勢極危諸事亦已處置順聽之耳一夕氣復諸證盡退蓋服熱劑灼艾之力今幸已復常病中念平日頗恃差壯嗜欲少故飲食起居多不戒生冷不避風寒此亦是自輕觀鄉黨中聖人衛生之嚴豈是自私蓋理合如是耳尋常忽略亦是豪氣中病痛也每得來書未嘗無所開警所謂威儀辭氣間豈特兄所當勉某日從事于此而每恐其不逮也曽子所以告孟敬子者最為親切每覺上蔡所解語録中所説猶似未精穩此要須自家子細下工夫耳某自覺向來於沈潛處少工夫故本領尚未完一二年來頗專於敬字上勉力愈覺周子主靜之意為有味程子謂於喜怒哀樂未發之前更怎生求只平日涵養便是此意須深體之也氣質居處之説甚善當深察之不敢虛來意此間士子目今亦有向方者但看長逺如何文字小小開解誠不濟事著實肯做工夫者乃有可望耳去年聞從學者甚衆某殊謂未然若是為舉業而來先懷利心豈有就利上誘得就義之理今已謝遣甚幸但舊已嘗謝遣後來何為復集今次須是執得定斷得分明不然猶有絲毫牽滯恐復因循於它日也亦非特此事大抵覺得老兄平日似於果斷有所未足時有牽滯流於姑息之弊雖是過於厚傷於慈為君子之過然在它人視我則觀過可以知仁在我自檢點則終是偏處仁義之道常相須要知義不足則所謂仁者亦失其正矣又如論朱元晦出處亦似未安周之則可受謂不使飢餓於土地只是來相周故可受今乃是受加之官寵豈有安坐于家而坐享之理元晦辭不敢當為合義但當時説一二不同志者使之宛轉求遂已之請却似不消得如此添加耳更幸思之某舊在臨安已覺兄之病有此今復因此二事詳及推此可以概見也如何如何又來書所謂辭氣務令平和然實處不可回互此語盡之矣須見相識間有好為調護審細之論退而察之其實畏怯名曰憂國恐只是為身耳故臨利害則氣懾志喪而縈於寵利見不己焉知人之難恐不可以不察也蓋直前妄發固為不是然於所當然而不然又别為之説恐終不免為姦而已矣此論不須為它人説思慮所及因來諭有發于中故及之耳答彪德美垂諭之詳再三誦之政所望於良友者但鄙意不能無疑如自滅天命固為己私一段恐錯斷文句故失先生之意己於季立書中言之矣想必須見幸更深思平心易氣無為已私橫截斷庶乎其有取也知言序可謂犯不韙見教處極幸但亦恐有未解區區之意處故不得不白如云夫子未嘗指言性子思中庸首章獨一言之此蓋是設或問之辭故以或曰起之然云指言則謂如天命之謂性是指言也其它説話固無非性命之奧而非若此語指而言之也故於答之之辭中引子貢之語以為夫子之言無非天命之流行發見也意則可見矣更幸詳觀却以見教若夫辭氣不足以發則誠陋之故也來書雖援引之多愈覺泛濫大抵是舍實理而駕虛説忽下學而驟言上達掃去形而下者而自以為在形器之表此病恐不細正某所謂雖闢釋氏而不知正墮在其中者也故無復窮理之工無復持敬之妙皆由是耳某近來反復思之不可不為盡言惟天資慤茂必能受朋友之實攻若忽而置之曰吾所得自高妙矣則僕亦不敢進説于前也然某之見亦豈敢以為便是哉願更講之耳答吕子約來書猶未免欲速逼迫之病任重道逺要須𢎞毅為先循循有常勿起求獲之意乃佳理義固須玩索然求之過當反害於心涵泳栽培日以深厚則玩索處自然有力也勉之勉之平時病痛所貴求以銷磨矯揉之却不可徒自悔恨於胸中反添一病遺書中所謂罪己責躬不可無却不可留在胸中為悔是也希顔録舊來所編不甚精切顔子氣象但當玩味於論語中及考究二程先生所論則庶幾得所復求矣又諭及邇來工夫足見不輟但所謂二病若曰荒忽因循則非遊泳之趣若曰蹙迫寡味則非矯揉之方此正當深思於主一上進步也要是常切省厲使凝斂清肅時寖多則當漸有向進不可求近功也别紙亦各答去區區固未必能深益高明加以所懷非書可究惟幸深思有以見復又所謂近日之病却不在急迫而懼失於因循此亦可見省察之功然此亦只是一病不失之此則失之彼矣以至於閨門之間不過於嚴毅則過於和易交遊之際厚者不失於玩則失於過紛紛擾擾滅於東而生於西要須本源上用功其道固莫如敬若如敬字有進步則弊當漸可減矣楊龜山所舉富公崇深之説固為有益於學者然特拈出此二字却似未穩更幸思之侍旁雜務于職所當任豈容少有厭煩忽細之意惟主敬以立本而事事必察焉學之要也答胡伯逢中庸解録未畢今先寫三段去大綱規摹如此也未知如何垂諭性善之説詳程子之言謂人生而靜以上更不容説才説性時便已不是性繼之曰凡人説性只是説繼之者善也孟子言人性善是也但請詳味此語意自可見大抵性固難言而惟善可得而名之此孟子之言所以為有根柢也但所謂善者要人能名之耳若曰難言而遂不可言曰不容説而遂不可説却恐渺茫而無所止也知言之説究極精微固是要發明向上事第恐未免有弊不若程子之言為完全的確也某所恨在先生門闌之日甚少兹焉不得以所疑從容質叩于前追悵何極然吾曹往返論辨不為茍同尚先生平日之志哉熱甚近郊已復覺旱彼中何如更幾以逺業自重答胡季立垂諭足見講學之勤至所願幸某愚惟不敢不深潛其思時有所見亦未必是也惟願與朋友共論焉夫天命之全體流行無間貫乎古今通乎萬物者也衆人自昧之而是理也何嘗有間斷聖人盡之而亦非有所增益也未應不是先已應不是後立則俱立達則俱達蓋公天下之理非有我之得私此仁之道所以為大而命之理所以為微也若釋氏之見則以為萬法皆吾心所造皆自吾心生者是昧夫太極本然之全體而返為自利自私天命不流通也故其所謂心者是亦人心而已而非識道心者也知言所謂自滅天命固為己私蓋謂是也若何所斷句則不成文義失先生意矣更幸思之却以見教答胡季履承諭觀史工夫要當考其治亂興壞之所以然察其人之是非邪正至於幾微節目與夫疑似取舍之間尤當三復也若以博文見助文辭抑末矣此間士子輩觀通鑑嘗令先將逐代大節目會聚始末而觀之頗有意味如高祖入關滅項誅功臣之類皆作一門備其源流此亦編得有次第方欲取前輩議論之精者入於其間也又所諭讀書欲自博而趨約此固前人規摹其序固當爾但旁觀博取之時須常存趨約之意庶不至溺心又博與雜相似而不同不可不察也有所發明毋惜示教答胡季隨辱惠書審聞侍奉平達武林履候勝福極以為慰諭及日讀二程先生遺書甚善要當平心易氣優遊涵泳所讀其間談性命處讀之愈勤探義愈晦無怪其然若只靠言語上求解則未是須玩味其旨於吾動靜之中體之久久自别也歸來所作洙泗言仁序主一針録去所要詩亦寫在别紙彼中過從為誰歲月易邁人心易危華盛之地奪志者多惟敬自勉以承先世之業更祝厚愛所見所疑便中不惜頻示還轅當在何時耶又録示序文三復足見所志雖然升高自下陟遐自邇善學者志必在乎聖人而行無忽於卑近不為驚怪恍惚之見而不舍乎深潛縝密之功伊洛先覺謂學聖人當以顔子為凖的誠明訓也德門令質惟益勉之又元晦所編遺書只是裒聚逐家所編全入之都無所刪也其間傳録失指者固有之正要學者玩味耳若便刪去却殊無意味也得此等文字且當服膺沈浸其間未冝以已意直斷輕議也又所諭二先生遺書其間固有傳寫失真者向來龜山欲刪正而迄未下筆要須究極精微無所憾者乃可任此未容輕議也今元晦所集皆存元本在學者亦好玩味其間真偽在我玩味之久自識别之耳所謂未容輕議者非是為尊讓前輩蓋理未易明不應乘快便據目前斷殺須是潛心若果下工夫方覺其未易也只據前人所辨亦須自家胸中自見得精神乃可不然亦只是隨人後贊歎而已某頃年編希顔録如莊子等諸書所載顔子事多削去先生以書抵某云其它諸説亦須玩味於未精當中求精當不可便容易指以為非而削之也此事是終身事天地日月長久今十有二年矣愈覺斯言之有味願吾友深體之它希篤沈潛之功以輕易為戒勉茂逺圖厚自愛又諭及曰閲致堂史論甚善秦漢以來學道不明士之見於事業者固多可憾然其間豈無嘉言善行與一事之得者乎要當以致逺自期而於人則一善之不廢是乃擴𢎞恕之方而為聚德之要也正惟勉之名臣言行録未有别本可寄得之即附往但此書編得未精細元晦正欲更改定耳又承諭夸勝之為害可見省察之功正當用力自克也克之之道要須深思夸勝之意何自而生於根源上用工銷磨乃善若只待其發見而後遏止將見滅於東而生於西也正惟勉之季隨邇來下工如何聞時往見晦叔甚有講論否君子之所不可及者其惟人之所不見乎要須深惟尚絧之義鞭劈儘覺有味也又邇來玩繹想自不廢有可見告者否若入浙因一見伯恭甚善近來士子肯向學者亦時有之但實作工夫耐久者極難得也且是要鞭劈向裏如此下工方自覺病痛多耳垂諭浩然之氣工夫正在集義當於慊餒處驗之集義以敬為主孟子此一段雖不説著敬字勿忘勿助長是乃敬之道也答陳擇之伏蒙賜書陳義粲然重惟兹世講學之緒不絶如帶有如高致感歎何勝而某荒疏不足以辱來問姑以其所從事焉者試共論之左右謂異端之惑人未必非賢士大夫信哉斯言也然而今日異端之害烈於申韓蓋其説有若高且美故明敏之士樂從之惟其近似而非逐影而迷真憑虛而舍實拔本披根自謂直指人心而初未嘗識心也使其果識是心則君臣父子兄弟夫婦是乃人道之經而本心之所存也其忍斷棄之乎嗟乎天下之禍莫大於似是而非似是而非蓋霄壤之隔也學者有志於學必也於此一毫勿屑而後可得其門而入也然而欲逰聖門以何為先其惟求仁乎仁者聖學之樞而人之所以為道也有見於言意之表而後知吾儒真實妙義配天無疆非異端空言比也孟子曰思則得之又曰求則得之左右試取魯論所載精思而深求焉某也不敏尚庶幾切磋之益答謝夢得凡人之病必有受病之處雖風雨暑寒燥濕之不同而氣行無間隙不在焉惟其日引月長浸而不已故良醫之治病必先望其顔色切其脈理而究其腑臟之變以會其微而投之砭劑如郢人之運斤甘蠅飛衛之射發無不如意不幸而秦扁和緩之不遇而至於病矣則將何救嗟乎病之在身猶將不逺秦楚之路而求以治之病之在心顧獨不思所以救之者乎左右謂病散在一身而莫知其病之處此惟弗察之故也語曰觀過斯知仁矣觀云者用力之妙也引繩而絶之其絶必有處左右試詳思而察焉凡心之病固多端大抵皆由其偏而作自一勺而至於稽天則若人雖生無以異於死也聖賢之經皆妙方也察吾病之所由起而知其然審處其方專意致精而藥之則病可去病去則仁仁則生矣如某者蓋三折肱而未得為良醫也方汲汲然自治之不暇而何以起人之廢哉孟子曰子歸而求之有餘師多言不足以答盛意答劉炳先昆仲某求去未得尚爾黽勉春來城南花栁每見夢寐中也聞昆仲相處益雍怡諸郎亦皆孝謹知公家門户方昌未艾耳此間士人伍氏兄弟本章貢人亦以友睦為鄉閭所稱重每延接慰勞用以風厲其俗也南軒集卷二十五
