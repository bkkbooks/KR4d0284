body:
  text: 南軒集卷二十九宋張栻撰答問答吳晦叔遺書云自性之有形者謂之心自性之有動者謂之情又曰心本善發於思慮則有善不善若既發則可謂之情不可謂之心夫性也心也情也其實一也今由前而觀之則是心與情各自根於性矣由後而觀之則是情乃發於心矣竊謂人之情發莫非心為之主而心根於性是情亦同本於性也今曰若既發則可謂之情不可謂之心然則既發之後安可謂之無心哉豈非情言其動而心自隱然為主於中乎又孟子曰乃若其情則可以為善矣若發得是善固可為善脫有不善如何為善哉是皆可疑也此精微處望明賜剖析又曰人須知自慊之道自慊者無不足也若有不足則張子所謂有外之心不足以合天心也此有外之心與禮經以其外心也與文定春秋傳云心不外者乃能統夫衆理皆不同豈非本心未瑩猶有人心者乎抑懷不足之意乎自性之有動謂之情而心則貫乎動靜而主乎性情者也程子謂既發則可謂之情不可謂之心者蓋就發上説只當謂之情而心之所以為之主者固無乎不在矣孟子謂乃若其情則可以為善者若訓順弗克若天之若人性本善由是而發無人欲之私焉莫非善也此所謂順也情有不善者非若其情故也無不足者天理之安也本心也若有不足則是有所為而然杜撰出來此人欲也有外之心也規正韋齋意思有偏誠為確論山間同志亦頗有此歎者如孟子云凡有四端於我者皆知擴而充之豈可欲救一時之偏勝而自墮於一偏併令人不可有仁字而為學乎豈非略於省察之過乎若使人敬以致知不妨其為是也若不令省察苗裔便令培壅根本夫苗裔之萌且未能知而遽將孰為根本而培壅哉此亦何異閉目坐禪未見良心之發便敢自謂我巳見性者故胡文定公曉得敬字便不差也明道説曾子告孟敬子之語誠是坦明所謂於公字上研究仁字為最近信然公則能愛矣不知苗裔固未易培壅根本然根本不培則苗裔恐愈濯濯也此話須兼看大抵涵養之厚則發見必多體察之精則根本益固未知大體者且據所見自持如知有整衣冠一思慮便整衣冠一思慮此雖未知大體然涵養之意巳在其中而於發處加察自然漸覺有功不然都不培壅但欲省察恐膠膠擾擾而知見無由得發也敬以致知之語以字有病前書中巳見此語未及奉報不若云居敬致知公字只為學者不曽去源頭體究故看得不是觀元晦亦不是略於省察令人不知有仁字正欲發明仁字如説愛字亦是要人去所以愛上體究但其語不欲無偏却非閉目坐禪之病也更幸思也程子語録云復非天地之心復則見天地之心兹乃道非隂陽所以隂陽者道也理明辭瑩無可疑者而於其後又云復其見天地之心一言以蔽之天地以生物為心者也而於易傳亦云一陽復於下乃天地生物之心也如此則是以一陽為天地之心大於前言相戾甚非反復其道七日來復之旨也望為精剖以祛所疑易傳所謂一陽復於下乃天地生物之心也此語言近而指逺甚為完全蓋非指一陽而言也言一陽復於下乃天地生物之心也細味之可見一言以蔽之天地以生物為心者也不知在遺書中甚處檢未見但見微言中載此句而文亦不備便中幸詳示諭當更思之耳畢竟覺得此語未安反復其道七日來復不知晦叔如何説明道云道即性也若道外尋性性外尋道便不是又嘗曰揚雄規模窄狹道即性也言性巳錯更何所得夫二人之品固不可同日而語然其説則一而其義所以不同者何也道即性也此明道先生語揚雄初無此語也後段文意乃是謂道即性也揚雄既不知性則於道更何所得耳子文文子之事聖人以清忠目之就此事言只可謂之清忠此洙泗言仁之所極是也然遺書有謂聖人為之亦只是清忠兹又不能無疑夫聖人無一事之非仁而乃云爾何也又况程子於博施濟衆之下乃云今人或一事是仁亦可謂之仁至於盡仁道亦謂之仁此通上下言之也則又與忠清之説不同請明之遺書中之意大要以為此事只得謂之清忠然在二子為之曰忠曰清而止矣仁則未知也在聖人事或有類此者以其事言亦只得謂之清忠然而所以然者則亦不妨其為仁也如伯夷之事雖以清目之亦何害其為仁乎看先覺説話切忌執殺不知如何程子云視聽思慮動作皆天也但其中要識得真與妄耳伯逢疑云既是天安得妄某以為此六者人生皆備故知均稟於天但順其理則是真違其理則是妄即人為之私耳如此言之知不膠否有物必有則此天也若非其則則是人為亂之妄而已矣只如釋氏揚眉瞬目自以為得運用之妙而不知其為妄而非真也此毫釐之間正要辨别得如伯逢病正在此耳所答之語大意已得之西銘天地之帥吾其性帥有主宰之義不曰心而曰性何也帥是統率之意原本而言之謂之性則可耳答胡伯逢明道先生曰上天之載無聲無臭其體則謂之易其理則謂之道其用則謂之神其命於人則謂之性率性則謂之道修道則謂之教又曰民受天地之中以生天命之謂性也人之生也直意亦如比又曰孟子曰仁也者人也合而言之道也中庸所謂率性之謂道是也詳此兩説則是中庸首兩句明道便屬人説矣而伊川先生乃曰天命之謂性率性之謂道者天降是於下萬物流形各正性命者是所謂性也各正性命而不失是所謂道也此亦通人物而言循性者馬則為馬之性又不做牛之性云云所謂率性也修道之謂教此則專在人事伊川之説則自首兩句已兼人物而言之矣吕遊揚之説則同乎明道侯子之説則同乎伊川二先生之説所以不同者如何某竊詳所録明道先生之説蓋明性之存乎人者也伊川先生之説蓋明性之統體無乎不在也天命之謂性者大哉乾元人與物所資始也率性之謂道者在人為人之性在物為物之性各正性命而不失所謂道也蓋物之氣稟雖有偏而性之本體則無偏也觀天下之物就其形氣中其生理何嘗有一毫不足者乎此性之無乎不在也惟人稟得其秀故其心為最靈而能推之此所以為人之性而異乎庶物者也若元不喪失率性而行不假修為便是聖人故惟天下之至誠能盡其性而人之性物之性亦無不盡惟其有所喪失則不能循其性故有修道之教焉所以復其性之全也明道於人身上指出要人就已體認耳然亦豈遂謂物無天命乎伊川發明其統體可謂完備矣侯子解稱兼人物而言者為明道説恐此亦必有據或曰天命獨人有之而物不與焉為是説者但知萬物氣稟之有偏而不知天性之初無偏也知太極之有一而不知物物各具太極也故道與器離析而天地萬物不相管屬有害於仁之體矣謂之識太極可乎不可不察也伊川不獨解天命之謂性一章有此意遺書中如此説處極多如説萬物皆備於我處亦然幸詳考而深思之區區所見未知然否且辭不逮意惟高明察之曰心有知覺之謂仁此上蔡謝子之言也此言固有病切謂心有知覺謂之仁此一語是謝先生傳道端的之語以提省學者也恐不可謂有病夫知覺亦有深淺常人莫不知寒識暖知飢識飽若認此知覺為極至則豈特有病而已伊川亦曰覺不可以訓仁意亦猶是恐人專守著一箇覺字耳若夫謝子之意自有精神若得其精神則天地之用即我之用也何病之有謝上蔡之言固是要指其發見以省學者然便斷殺知覺為仁故切以為未免有病伊川先生所謂覺不可訓仁者正謂仁者必覺而覺不可以訓仁侯子師聖亦嘗及此矣若夫今之學者囂囂然自以為我知之者只是弄精魂耳烏能進乎實地哉此又上蔡之罪人也又曰以覺言仁固不若愛之切此亦似遷就之説切謂以愛言仁不若覺之為近也就愛人上窮究仁之所以愛宜莫親切於此所謂知覺者亦在其中矣大公之理得則天地之心即已之心此語善矣而其下語云萬物之體即巳之體却似未識仁大公之理四字亦恐未親切萬物之體即我之體立言者之意乃是仁者以天地萬物為一體認得為己何所不至之意大公之理四字也要人看解盡心首章云理之自然謂之天具於人為性主於性為心又於人之所不學而能者其良能也解云天命為性循性曰道而主於身為心何故言性心有不同且主於身者似專指軀殼之內言之主於性者似性外有主矣恐立言未瑩也主宰處便是心故有主於性主於身之言然兩處語亦當瑩之歸於一也又曰若夫為不善則是物誘於外而血氣隨之性無是也然則所謂不善者是性之所不為也夫論性不及氣則不備而謂不善者是血氣而非性可乎且謂性所不為夫誰為之性無不善謂性有不善者誣天者也夫水搏而躍之可使過顙激而行之可使在山是豈水之性也哉此前日所以有不善者性所不為之論而不自知其過也夫血氣固出於性然因血氣之有偏而後有不善不善一於其偏也故就氣稟言之則謂善固性也惡亦不可不謂之性也則可即其本源而言之則謂不善者性之所不為乃所以明性之理也若如來説則是混天理人欲而莫别其故何異於性可以為善可以為不善之論哉萬物皆備於我矣解曰凡有是性者理無不具是萬物無不備也故程子曰非獨人也物亦然却於親親而仁民處解云人與人類則其性同物則各從其類而不得與吾同矣有抵牾否竊謂萬物皆備於我乃仁之道與天下歸仁之義同蓋謂人能備之耳我者指人而言也昨見言中有疑議切所未安若夫萬物素備之説則是一義此難以言語盡請無橫舊説於胸次玩味伊川先生之言而深體之南軒集卷二十九
