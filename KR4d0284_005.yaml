body:
  text: 南軒集巻五宋張栻撰律詩喜聞定叟弟歸吾弟三年别歸舟半月程瘦肥應似舊歡喜定如兄秋日聯鴻影涼牎聽雨聲人間團聚樂身外摠云輕聞定叟弟已近適迫祀事未能出先遣姪輩徃迎書此問訊漸喜書題近懸知歸意忙才聞下湘水早已過衡陽雨洗秋山凈涼生桂樹香慇懃二三子䇿馬為迎將醇叟崇道之喪未得徃哭聞窀穸有期輙賦二章以相挽者慶席親賢冑心知道義尊如何着閑處終不近脩門三載成長别微言未細論人琴俱寂寞風雨閉丘園晩歲渾無事端居只自如氷霜澆塊磊日月老籧篨山寺留題墨晴牎罷巻書從今行嶽路忍復過公廬故太子詹事王公挽詩二首大節元無玷中心本不欺排姦力扛鼎憂國鬢成絲方喜三旌召俄興一鑑悲西風吹淚眼夫豈哭吾私睿主龍飛日如公舊學臣忠言關國訃清節映廷紳歲月身多外江湖澤在民當年遺直歎千古更如新詩送陳仲思參佐廣右幕府舊說桂林好君今幕府逰江山資暇日梅雪類吾州煑海何多說安邊更預謀政應勤婉畫不用賦離憂吕善化秩滿而歸兩詩贈行令尹三年政湘民去息思艱難捄菑歉憂瘁見云為薦牘今交上夷途去不疑正湏頻顧省御者可無辭伯氏相從舊歸來意若何從渠笑方拙還我自吟哦聖有詩書在人多歲月過德門好兄弟夜雨細研磨黙姪之官㐮陽兩詩以送之黙也相從乆吾心念汝多又為江漢别空覺歲年過氣習須消靡工夫在講磨惟應介如石人事易蹉跎潦雨彌旬月予方念鞠窮子行何草草别語又怱怱漢沔英靈在江山今昔同未須登峴首先合拜隆中送零陵賈使君二首藉甚零陵郡風流記昔賢宅存元水部人識范忠宣山近地宜竹溪清岸有泉官閒時訪古餘韻故依然孝友傳家法如君好弟兄秪應推此意便足慰民情間歲仍艱食新書督勸耕想今瀟水畔惟日望雙旌寄曽節夫曽子别經月相思如幾秋不應行役歎却為買人留雨後湖光滿梅邊春意浮須君細商略晴日共茶甌送周畏知二首秋冬仍苦雨旬浹喜霜晴木末樓臺見江頭橘柚明登臨方適意離别已増情後夜相思地寒梅影正横半世功名誤蒼顔幕府游文辭追楚些得失付陽秋薦牘方交上衡門豈重留青雲看穏去快處一回眸題伏龍寺壁少日憶曽到歸途得小留囘還山寺古蕭瑟柿林秋道路情無那琴書可細求從來士窮逹分付水悠悠送外弟宇文挺臣二首合族情尤重論交意復深還為萬里别未盡幾年心佳處應相憶書來儻嗣音及時須努力莫待鬢華侵漠漠灕江上怱怱送客情平原宵雨濕絶壁野雲横世路多新轍韋編有舊盟中流屹砥柱過浪豈能傾寄題周功父溪園三詠聞說亭花好居然似蜀鄉色深姿不俗香淡意能長髙燭留深夜輕隂䕶晩芳何心較桃李只擬荅春光右嫣然亭未識主人面先為溪上吟澄潭依近岸絶壁聳遙林領略襟期逺登臨歲律深想當軒冕外三歎有餘音右溪亭溪園平廣處雅稱雪中㳺疎宻看千變髙低共一丘寒知松節勁靜覺竹聲幽還有故人否當能着小舟右雪亭曽節夫罷官歸旴江以小詩寄别俗隘寧為異言深敢自欺如何幕中辯飜作暗投疑行李秋將半家園菊正滋反躬端得味當復有餘師寄趙漕想得昭潭上兒童夾道迎皇華今日使竹馬舊時情梅蘂冬前拆山光雨後清使君桃李客當為駐車旌送李新州清絶湘南地鄉閭見老成蔽棠方有望折栁却關情側聽輿人誦還新月旦評相望幸鄰壌猶得借餘明㳺誠之來廣西相從幾一年今當赴官九江極與之惜别兩詩餞行㳺子名冢後天資更敏强壯懷知自許逺業定難量幕府文書簡韋編趣味長悵然成闊别音寄莫相忘士學端成已工夫要自程聖門窺廣大中德養和平美玉資勤琢良才詎小成心期須後㑹栻目更増明寄宇文卭州寄語臨卭守相望萬里情有來詩句好足驗教條清好古從時訕為邦已政成無尋子虚賦忠厚詔諸生次陳擇之逰湖韻落日逰魚上青林白鳥過稻香來隔岸巖影占清波招隱何年賦尋幽此地多晩涼容縱棹聽我采菱歌送但能之守潯州循吏古猶少嶺民今未蘇丁寧煩詔旨推擇得吾徒根本誰深念詩書計不迂惟應敦此意豈但應時須送祖七姪西歸二首萬里逢猶子中年憶故鄉只知情話好豈覺去途長巫峽波濤壯秦山檜栢蒼何能從汝徃佇立看歸艎故國非喬木名家重典刑飄零念吾黨寂寞撫遺經菽水知何病芝蘭要滿庭汝歸應記取為我話丁寧中春過陽亭亭古危臨岸林幽巧近城煙容隨雨住花片着溪清春事巳如許客懷誰與傾亭前兩好樹滿意欲敷榮堯廟明祀崇千載荒山拱萬靈挿天巉絶壁飛瀑下空庭繪事存淳古真風寄杳冥蘋蘩何以薦帝德日惟馨户曹廬陵胡君引年求謝事予視其精力未衰留之踰半載乃今告去不復可挽為詩送别澹庵君之叔父也出守嗟何晩懷歸已倦㳺細㸔渾矍鑠可是畏伊優幕下傾三語山中賦四愁平生大小阮來徃足風流若海運使移節廣東賦詩贈别予毎過若海諸郎誦書于旁琅琅可喜為之重賦行止非人料驅馳未席温傳聞選膚使端為慰黎元瘴嶺農耕少山城海氣昏唯勤凋瘵慮此外更何言玉雪明人眼森然膝下郎原流知衮衮誦讀聽琅琅有子若何慕他年我莫量願崇詩禮訓勿近利名場送李崧老歸閩二首歴數勲賢後如君到眼希胷中藴金石筆下出珠璣傾蓋嗟何晩臨流又送歸他年儻相憶尋我釣魚磯公事妨開巻遐征念索居能來數月欵端為百憂紓師友洛川上人才元祐初歸來有新益不惜幾行書和定叟送行韻舊别情何限重逢意豁然相㸔疑似夢欵語不成眠但欲燈窓共其如事役牽固應囘首處秪在集雲前題益陽清修寺峯勢香爐直溪流峽水潺居然一蘭若喚作小廬山老木千崖表孤亭萬竹間明朝問征路囘首白雲閑故觀文建安劉公挽詩四首憶昨登廊廟忠言逹帝聦所思惟盡瘁敢復計成功半世江湖上千憂寤寐中汗青誰秉筆請攷衆言公又國恥臣當死公家二世心忍㸔垂絶筆誰續㫁絃音精爽今如在衣冠恨更深却嗟蜍與志處世漫侵尋又平日多竒節中間似富公天從廬墓請人說捄荒功辛苦培邦本雍容遏亂鋒文傳遺奏切更過子嚢忠又曽是南荆地他年竹馬迎旌旂嚴騎士弧矢盛民兵細攷規摹舊還知節制明思公如峴首同我淚縱横追餞馬憲膚使行原隰清風伴徃還詩情渾漫興雪意正相關許國心何壯憂民鬢易斑留連三日語解后十年間某以四十字送詳刑使君拙守荆江上無人共徃還能來慰牢落話舊幾間關冬壑龍蛇蟄風林虎豹斑相期㴠養力且到古人間除夕登仲宣樓懷土昔人志傷時此日心長江霜潦淨故國莫煙深訪古多遺恨憑欄更獨吟細㸔前浦樹生意已堪尋隔牆聞正父鄉飲甚樂偶畏風不預用前韻敬簡元日忻晴色新年秪舊心故人同客裏鄉話自情深儘說成都酒休為楚澤吟相逢須痛飲歲月易侵尋劉勝因自襄陽過予渚宫於其歸小詩贈别骯髒寧多忤棲遲乆倦㳺折肱諳世味袖手惜良籌日月隆中晩風煙峴首愁登臨應慷慨還解寄詩不光弼姪得邑西歸賦詩勉之併示光義二首共惟二百載詩禮一門中冷落吾憂甚扶持爾輩同傳心無異轍隨用不言功外慕知何極惟應念祖風得邑寧論小居官最近民中誠儻無倦同體㑹相親暇日書還讀清源政自新吾兄有遺訓爾輩足持循送曽裘父交舊間何闊能來浹日留還尋佳橘頌惜别仲宣樓探古書盈屋憂時雪滿頭絶思黄閣老招隱意綢繆樞宻劉公嘗欲以遺逸舉裘父帳幹周君桂林相從之舊已亥莫春出嶺迂道相過臨别求予言姑賦此江北逢新雨湘南憶舊逰能來慰岑寂恨不小遲留日月徒催老功名浪自愁惟應編簡樂在已可深求中秋與僚佐登江陵郡城觀月涼意今年早蟾光七澤多憑欄共懷古擁袂獨髙歌風物關山逺功名歲月過一樽聊復爾於此興如何遊章華臺楚國舊雄勝荒臺今是非平川留宿潦蕭寺掩斜暉木落秋聲急天髙鴈影微凄涼無處問騎馬踏堤歸和元晦擇之有詩見懷作别又如許何當置我旁巻舒書在手展轉月侵床合志師千載相思謾一方臨風三歎息此意渺難量送范伯崇堂堂延閣老遺範見斯人孝友傳家舊詩書用力新人心危易失聖學妙難親願勉思𢎞毅求仁可得仁定叟弟生辰清秋記弧矢舉酒頌年長别去今踰歲情親秪對床韋編閑玩味幕府小徜徉刮目它時看光暉映棣棠南軒木犀不隨秋月閟天香氷雪叢中見縷黄却得清寒惜花地少須梅影慰孤芳和安國送茶官焙蒼雲小卧龍使君分餉自題封打門驚起曲肱夢公案從今又一重賦鄭子禮壽芝堂莫向堂中覔壽芝主人心地本平夷子孫保此傳家瑞世享長年自不疑喜雨呈安國懸知雨意未渠巳一夜簷聲到枕間曉上髙樓望雲氣蟄龍千丈起西山早秧出隴蠶已絲眼中一雨正垂垂農家辛苦渠能識請誦周公七月詩向來惻怛哀矜意便覺雨滿乾坤間城東大士寧關汝民倚邦侯如㤗山涼生椽筆試烏絲妙語便作星斗垂我亦小䆫無一事細傾新酒和公詩自烏石渡湘思去歲與朱元晦林擇之偕行講論之樂賦此朝來一舸渡湘水山色横秋真可憐忽憶去年聯騎客沙邊搔首意茫然道間晩稻甚盛喜而賦此我行自喜有勝事夾道黄雲禾黍秋聞道今年罷和糴老農卒歲儻寛憂墳庵枕上追愴賦此秋氣惻惻侵户牖霜林風過猶餘音八年淚濕龍塘土展轉不眠中夜心晩晴昨日隂雲滿太空眼前不見祝融峯晩來風巻都無迹突兀還為紫翠重渡興樂江望祝融日上寧容曉霧遮須臾碧玉貫明霞人謀天意適相值寄語韓公不用誇仲秉再用前韻為梅解嘲復和之幾年身在水雲間愈見花邊下語難猶有故人相慰藉西山載酒未盟寒東君豈是結新知誰共羣芳較疾遲不但開花髙一世更看嘉實滿青枝有懷安國若人别去已經秋却見山間翰墨留獨對西風揩望眼試從雲際辨荆州自上封下福巖道旁訪李鄴侯書堂山路榛合不可徃矣石壁巉巖路已荒人言相國舊書堂臨機自古多遺恨妙䇿當年取范陽下山有作五日山行復下山愛山不肯住山間此心無着身長徤明歲秋髙却徃還廬陵李直卿以復名其齋求予詩乆未暇也今日雪霽登樓偶得此遂書以贈顧惟聖門精微綱領豈淺陋所能發秪増三歎李侯索我復齋詩此理難明信者稀要識聖賢端的意須於動處見天機萬化根原天地心幾人於此費追尋端倪不逺君看取妙用何曽間古今和張荆州所寄自古荆州通陸海秪今學士過青錢笑譚坐了安邊䇿取次成詩盡可編詩來千里作春妍尚記城南五畆園豈但苔㾗留屐齒故應石上有窪罇有時散䇿過西隣共向東風憶故人芙蓉亭下池水滿敬簡堂前楊栁春鍾陵未命千里駕洞庭亦繫沙邊舟閉門讀書卧歲晩世事敢云風馬牛共父安國皆欲相招未能徃也明時未可廢譚兵壯歲寧容便乞身何人為向沙頭去憑仗慇懃一問津正月强半梅猶未開黄仲秉作詩嘲之次韻孤芳未分落人間故向東風小作難眼底莫容蜂蝶亂好留明月趂春寒水邊踈影幾人知尚喜詩翁到未遲怪得尋花心眼别去年曽賦上林枝謝邢少連送葡萄豆蔲栽君家小圃占春光眼看龍鬚百尺長移向樓邊並寒井明年垂實更隂涼留取園中數畆賖擬栽靈藥謝紛華兒童今日知翁喜移得若家豆蔲花晩過呉伯承留飲推門野路竹毶毶落日天寒相對談可是主人風韻别自斟白酒擘黄柑南軒集巻五
