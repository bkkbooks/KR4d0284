body:
  text: 南軒集卷十一宋張栻撰記建寧府學遊胡二公祠堂記學者博觀載籍尚論古人考迹而有以觀其用察言而有以求其心則其相去久逺雖越宇宙猶恨其不得身親而炙之而况接吾耳目近出鄉黨而其模範典刑足以師表後學者哉建之為州素稱多士近數十年之間御史遊公文定胡公相繼而出其模範典刑皆足以師表後學而接於其人之耳目又未有若是其近者也是以比歲以來為政而知務者繼立二公之祠于學宫其所以開示學者尚論古人先於其近者之意亦云切矣蓋隆興癸未知府事陳侯正同始祠遊公於東廡之北端後六年轉運副使任侯文薦判官芮侯燀又以邦人之請命祠胡公且徙遊公之祠為東西室於堂上未畢而皆去又五年今轉運副使沈侯樞始因其緒而卒成之而教授王定方遂以書來屬某為記某生晚矣雖不及二公而躬拜之然論其言行以與同志者共講之則亦區區之願也昔者竊聞之二程先生兄弟唱明道學於河南東南之士受業于門見推髙弟有三人焉曰上蔡謝公龜山楊公而遊公其一也伊川先生嘗稱其德器睟然問學日進政事亦絶人逺甚而楊公亦謂公心傳自到誠於中形於外儀容辭令􅙾然有文望而知其為成德君子也元符三年冬為監察御史旋出守郡事業不得大施獨有中庸論孟説垂於世考其師友所稱味其話言所傳則夫造道之深流風之逺蓋有可得而推者矣至若胡公雖不及河南之門然與遊公及謝楊二君子遊而講於其説自得之奧在於春秋被遇明時執經入侍正大之論竦動當世所以扶三綱明大義抑邪説正人心亦可謂有功於斯文矣夫以二公之賢所立如此是豈獨建人所得私以為其鄉之先生哉今姑以其模範典刑接於耳目而論之則即夫建學而立祠焉亦其事之宜耳自今以來凡建人之遊於學與夫四方之士往來而有事於建之學者瞻二公之在此堂也必將竦然於中知所敬慕退而考其言行以泝其師友之淵源即其所至而益究夫問學之無窮則聖賢之門墻庶幾其可循而入矣然則為是祠者夫豈徒然而已哉靜江府廳壁題名記自秦戍五嶺漢開南粵踰嶺以南次第入中國為郡縣桂州本屬零陵郡梁天監中始建州名已而更易離合不常唐末升為靜江軍節度然是時嶺南已分為東西兩道而西道所領實在雍管桂獨得察州十餘宋有天下四方萬里罔不臣規模法制加詳於前代景祐二年詔桂州兼廣南西路兵馬鈐轄後十七年又詔兼經略安撫於是始得顓制一路地望隆重其後復建大都督府之號而紹興初遂以靜江易其州選帥滋不輕合一路所領郡二十有五其外則羇縻之州七十有二又其外則諸小蕃羅殿自杞特磨白衣之屬環之又其外則交趾大理等國屬焉其地南入於海去帥所治水陸幾四千餘里其所控御亦可謂雄且劇矣然其土素瘠多荒茅篁竹風氣異於北民之生理甚艱是以賦入寡少郡縣亦例以迫束而又並邊非止一面蠻夷之性不常赤子龍蛇交致其恩威乃克無事故其任責常重夫以選之不輕地之雄劇而任責之常重居其官者不亦既難矣哉蓋非特近者之察將逺者之無不燭焉非特目前之安將長久之計其益焉而後可也然常人之情往往忽於小而暗於大鋭於始而怠於終暏其著而不原於微望於人者常深而約於已者常不盡則其所以綱紀維持於數千里之間者烏得不曠乃事哉詩不云乎戰戰兢兢如臨深淵如履薄氷此先王之所以謹乎侯度者也日朝廷乏使使某斯帥事且將兩歲伏自念何所稱塞而猶得待罪于此夙夜是懼暇日視廳壁舊有刻悉書前任人名氏試考一二則輒差誤脫略乃俾僚吏諸葛昕吳獵與郡之士加定訂焉蓋自開寶三年王師平嶺南以樂繼能為守至于今凡二百有七載合七十有六人書之于石而重刻之夫考前政之名氏以詔其吏民亦後人之責也若其人之賢不肖指而問焉固不可得而掩亦足為方來者之警也因併書置州建牧之大略且述其所當任者而以自勵焉在嘉祐中轉運使李時中常攝帥事攝事本不當書以其政之美而人之思之也特附著其間又以見善善不忘之意云南樓記廣西轉運判官所治便廳之前故有樓棲官府之文書鬱而不治豫每睨而病之他日過之則煥然一新矣詹侯體仁觴豫於其上倚檻而觀凡四旁之嘉花美木悉獻其狀而遙岑寸碧挺然屋山之隅樓之下為堂堂之前為亭皆幽野有趣豫怪而問之詹侯笑曰吾皆因其舊云耳始吾闢樓之塞而觀之則其美已具易其楣桷之腐壞者與其窗户之隘狹者周以闌楯而吾樓成焉又視其下居然一堂也則敞其簷桯而重飾之前有茀地去其積壤而柱之礎存焉則又因之以為亭名吾樓曰南樓取其面勢所直也堂曰梅雪因吾治之故名也亭曰須友亭之旁植竹與梅與松吾將與之友亦且須吾友朋而共樂乎此也為我書其扁且記之豫嘆詹侯之智能因其故而損益不宿勞不重費不出户庭而得美觀是可志也豫於此竊有感焉嗟乎物之通塞固有其時哉向也人所賤棄弗顧之處一旦而吾曹相與談笑周旋於其間闢暗鬱為光明變荒穢為整治此非其時也哉通塞固有時然使其不遇詹侯則歸於廢壞而巳時固存乎人哉凡物皆然豈獨是邪且詹侯方以使指按行一路一路之郡邑亦廣且夥矣政事之隳弛人情之鬱拂與夫利之所壅而病之所生蓋不一矣詹侯將次第而振其弊導其鬱通其所壅而去其所病亦若為是樓因其故而損益不勞而有條也則斯人之所遇豈不在於斯時邪抑有待於詹侯者邪豫方賴侯以免於戾其涉筆而俟也又豈特記是觀覽之間而已邪樓之成以淳熙五年三月五日提點刑獄事廖侯季能實同豫來觀又十五日而豫為之記詹侯嚴陵人名儀之廖侯南劔人名蘧豫則廣漢張某也潭州重修左右司理院記獄重事也欽恤之義著於虞書其命咎繇曰明于五刑以弼五教蓋古者刑罰之設教化未嘗不存乎其中聖人之心固期于天下之無刑也孔子亦曰聽訟吾猶人也必也使無訟乎使之至於無訟者其必有道矣周衰先王之意不傳而其法日壞故又曰上失其道民散久矣如得其情則哀矜而勿喜夫得其情矣而繼之以哀矜而勿喜則反本之思深忠厚惻怛所以㴠養斯民者為如何哉嗟乎推是心也使之至於無訟可也國朝藝祖開基恫念庶獄首革厯世之弊其在諸郡者舊有子城院軍巡院開寶六年命子城院毋得收繫改軍巡為司冦始以士人為參軍天下巨鎮得置左右兩院者凡十有六太宗朝復更司冦為司理列聖相傳恤刑之令史不絶書雖有遭變故而基祚克鞏則祖宗所以培植根本者有自來矣長沙在南方為一都會乾道戊子之嵗上命吳興沈侯介來為牧侯以簡重惠肅臨民深為時詘舉嬴之義節約自已用財以制未踰年而爭訟衰庾庫實獨念左右院歲久屋敝煩蒸膠欎癘疫間作顧謂其屬曰不幸教化之未孚民罹于狴犴或者其情之未得而橫夭之適遭豈不甚痛議更撤而一新之捐錢肆百萬貿財于山募民為役民爭趨焉踰時而成堅久燥實凡以時汛掃滌治之宜無不具備某謂此可以窺侯仁恕之心矣侯屬某為記不獲辝因念治獄所以多不得其平者蓋有數説吏與利為市固所不論而或矜知乃以為聰明持姑息以惠姦慝上則視大官之趨向而重輕其手下則惑胥吏之浮言而二三其心不盡其情而一以威怵之不原其初而一以法繩之如是而不得其平者抑多矣無是數者之患郵罰麗於事而深存哀矜勿喜之意其庶幾乎在上者又當端其一心勿以喜怒好惡一毫先之聽獄之成而審度其中隱於吾心竭忠愛之誠明教化之端以期無訟為本則非惟可以臻政平訟理之效而收輯人心感召和氣其於邦本所助豈淺也哉遂書之以詔來者存齋記太極動而二氣形二氣形而萬物化生人與物俱本乎此者也原物之始亦豈有不善者哉其善者天地之性也而孟子道性善獨歸之人者何哉蓋人稟二氣之正而物則其繁氣也人之性善非被命受生之後而其性旋有是善也性本善而人稟天氣之正初不隔其全然者耳若物則為氣所昏而不能以自通也惟人全夫天地之性故有所主宰而為人之心所以異乎庶物者獨在於此也是以君子貴於存之存之則在此不存則孰知其極哉存之則有物不存則果何所有哉故主一無適敬之方也無適則一矣主一則敬矣存之之道曷要於此乎誠能從事焉真積力久則有所存者將洋洋乎察于上下而不可掩功用無窮變化日生性可得而全矣吾友吕季克敏而好義以存名齋其志逺矣屬豫為之記若豫者蓋矻矻自保之不暇而何以善於朋友然則斯記也非特以勉季克且將以自警歟弗措齋記金華卲元通名齋曰弗措以為朝夕講習居處之地而求豫為記其請厪甚豫焉能忘言也中庸論誠之之道其目有五曰學曰問曰思曰辨曰行而五者皆責於弗措蓋聖學與天地並髙明博厚而悠久無疆也學者竭終身之力勉勉不已猶懼不及而况於若存若亡暫作復輟其何益乎弗措之義大矣雖然入德有門户得其門而入然後有進也夫子之教人循循善誘始學者問之即有用力之地而至於成德亦不外是今欲求所持循而施吾弗措之功其可不深考之於夫子之遺經乎試舉一端而論夫子之言曰弟子入則孝出則弟謹而信泛愛衆而親仁行有餘力則以學文嗟乎是數言者視之若易而為之甚難驗之不逺而測之愈深聖人之言化工也學者如果有志盍亦於所謂入孝出弟所謂謹而信所謂泛愛親仁者學之而弗措乎學然後知不足其間精微曲折未易盡也其亦問之而弗措乎思之未至終不為已物盍亦思之而弗措乎思之而有疑盍亦辨之而弗措乎思而得辨而明又盍行之而弗措乎是五者蓋同體以相成相資而互相發也真積力久所見益深所履益固而所以弗措者益有不可以已髙明博厚端可馴而至矣噫學不躐等也譬諸燕人適越其道里之所從城郭之所經山川之阻修風雨之晦𡨕必一一實履焉中道無畫然後越可幾也若坐環堵之室而望越之渺茫車不發軔而欲乘雲駕風以遂抵越有是理哉且夫為孝必自冬溫夏清昏定晨省始為弟必自徐行後長者始故善言學者必以灑掃應對進退為先焉惟夫弗措之為貴也吾子母忽於豫言誠能服夫子之教而用力焉則希音至味吾子將自得於心矣擴齋記武夷胡廣仲扁其齋曰擴其友張某敢起古義以告曰太極混淪生化之根闔闢二氣樞紐羣動惟物由乎其間而莫之知惟人則能知之矣人之所以能知者以其為天地之心太極之動發見周流備乎已也然則心體不既廣大矣乎道義完具事事物物無不該無不遍者也而人顧乃局於血氣之內而自小之雖曰自小之而其廣大之體本自若是以貴夫能擴也然而知之之端不發則擴之之功亦無自而施故孟子謂凡有四端於我者知皆擴而充之矣夫惻隱羞惡辭讓是非一萌於中亦知其所以然乎知其所以然則良心見矣此所謂若火之始燃泉之始逹擴者擴乎此者也擴之之道其惟窮理而居敬乎理明則有以精其知敬立則有以宅其知從事於斯涵泳不舍則其胸中將益開裕和樂而所得日新矣故充無欲害人之心而至於仁不可勝用充無穿窬之心而至於義不可勝用仁義之不可勝用豈自外來乎擴而至於如天地變化草木蕃亦吾心體之本然者也故擴者生道也恕之功也仁之方也學者所以未盡其心者也今廣仲將體夫知之之端以致其擴之之力其進也孰禦焉雖然世固有不樂狹陋而求以自擴者不流於放肆則將窮大而失其所居蓋彼不知其有本也吾所謂擴者天理之素而彼所謂擴者人欲之為也學者又不可以不辨南軒集卷十一
