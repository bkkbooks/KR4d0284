body:
  text: 南軒集卷二宋張栻撰古詩陪舍人兄過陳仲思溪亭深有買山卜鄰之意舍人兄預以顓壑見名因成古詩贈仲思築居湘水濵歲月亦巳久寧知負郭東勝處入君手回環煙塢深有此溪十畝朝􅚐穿林薄荷氣薰戶牖堂堂吾州牧下馬喚賔友主人故喜事一笑具殽蔌汲泉泛崇蓮洗盞傾稚酒淋漓壁間書自可傳不朽我獨留薄莫並溪時矯首人言君不偶此豈落人後觀君眉宇間似亦挾所有隔溪更幽絶古木蔭髙阜却立望遙岑四序列鍾卣買山吾計決便欲剪榛莠居然顓一壑豈羡印如斗未知鄰家翁還肯見容否送然姪西歸堂堂希白翁共惟同出自百年詩禮傳名教有樂地嗟豫力未勝永抱蓼莪意積纍蓋百艱承家豈云易愓然履淵氷中夜耿不寐協心望爾曹勉力紹前志歲晚期有成庶或保無墜又自子來見我倐焉十六秋一聞沂上音此意便綢繆中間豈不别會合同轉頭今兹舍我去萬里不復留豈不能挽子懼子為親憂六月送歸船我思與悠悠愛子剛毅資不作繞指柔願子進問學琢磨須自修居然知見廣百病會有瘳誰謂道云逺行矣當深求送黃子默元祐不復見太史今諸孫人物尚論世典刑故猶存酣歌拓金戟三年佐雄藩超然車馬中髙韻獨孤騫永懷白鷗盟修竹滿故園得句見眉睫外慕何足言顧以感知巳跋馬向修門朝開英俊途王度待討論小試翰林手乘槎薄崑崙我懶卧衡麓秋風擷蘭蓀交逰歎益落拭目看騰掀軒冕豈足貴政爾名義尊執手念相聞此意古所敦過胡文定公碧泉書堂入門認溪碧循流識深源念我昔此來及今七寒暄人事幾更變寒花故猶存堂堂武夷翁道義世所尊永袖霖雨手琴書賁丘園當時經行地尚想語笑溫愛此亭下水固若玻璃盆晴看浪花湧靜見潛鱗翻朝昏遞日月俯仰鑑乾坤因之發深感倚檻更忘言次韻德美碧泉感舊之什且約胡廣仲伯逢季丘來會上封相逢傾蓋地回首歎川上士窮不足怪但喜氣愈王凛然歲寒姿儒林有龍象棲遲似隱君矍鑠真詩將惟應一彈指欲了四大藏舊習想氷消豈復留餘恙新篇更紆餘和氣與醖釀却思東魯逰幾載南陽葬風霜摧宰木日月隨過浪豈期經世心晚歲成獨往蕭然屋半欹使我懷抱愴獨有千載傳此事可憑仗細觀宇宙間何得復何喪尚期浮雲開衡嶽來見狀秋壑采蘭蓀霜林收栗橡曉看日浮空夜賞雪侵帳更憐二三友前山屹相望文會儻來尋勝踐天所相妙理須細論長歌却雄放褰裳詩勿疑當仁應不讓自西園登山雨後溪重碧木落山增明西風肅羣物感此秋氣清振衣千崖表俯瞰萬籟生匪云幽遐慕政爾未忘情路出祝融背仰見上封寺遂登絶頂我尋西園路徑上上封寺竹輿不留行及此秋容霽磴危霜葉滑林空山果墜崇蘭供清芬深壑遞幽吹不知山益髙但覺冷侵袂路回屹隂崖突兀聳蒼翠故應祝融尊羣峰拱而侍金碧雖在眼勇往詎容憩絶頂極遐觀腳力聊一試昔逰氷雪中未盡登臨意兹來天宇肅舉目淨纎翳逺邇無遁形髙低同一視永惟元化功清濁分萬類運行有機緘浩蕩見根抵此理復何窮臨風但三喟中夜祝融觀月披衣凜中夜起步祝融巔何許氷雪輪皎皎飛上天清光正在手空明浩無邊羣峯儼環列玉樹生瓊田白雲起我旁兩腋風翩翩舉酒發浩歌萬籟為寂然寄言平生友誦我山中篇晨鐘動雷池望日浮氣列下陳天淨澄秋容朝􅚐何處升倣佛認微紅須臾眩衆采閶闔開九重金鉦忽湧出晃蕩浮雙瞳乾坤豁呈露羣物光芒中誰知雷池景乃與日觀同徒傾葵藿心再拜御曉風道旁見穫者腰鎌聲相呼十百南畝穫婦持黍漿饋幼稚走雀躍辛勤既百為幸此歲不惡王租敢不供大室趣逋約雖云粒米多未辦了升􅕛姑寬目前飢詎有卒歲樂樂歲尚爾為一歉更何託書生獨多憂何以救民瘼臘後一日尋梅東門外馬上遇雪羸驂出東郭靜與幽意期尋梅冷入眼野路信所之寒蕚靳未吐我自愛橫枝雪花忽排空成此一段竒歲晚故人闊天寒鴻鴈稀南國少霜霰北山多蕨薇坐看節物改莫遣心事違角巾風獵獵日暮獨吟歸雪中登樓分韻得未字南州冬多溫一雪已可貴今年臘三白故足蘇品彚朝來並危欄舉酒聊自慰翩翩著客衣漠漠亂雲氣圭璧滿天地造物初不費更邀二三友晤賞見風味燭至僕尚更酒苦飲亦既仍遣探梅花巳折南枝未笋脯一平馳寄因和去歲詩為一笑春笋未盛尚續致也權門極珍羞未辦食龍肉我家湘楚山籜龍飫奴僕淮南戶户有黃虀公今徑歸亦不癡更包笋脯贈行李定應笑殺長安兒湖南使者邵公召赴在所寓客張某敬賦以餞行李公來使湘州氣象日淳美不為察察明自謂平平耳未須走原隰但使心如水儻無耳目蔽庭戶即千里頃聞上封章便欲返桑梓其如矍鑠姿難著湖山裏春風一札下趣往覲天咫新渌渺滄洲揚舲一何駛士方處逺外憂國抱藴底寧應立君前輔車有或柅煌煌四門開側席問民疻百慮願畢陳髙風泚餘子次韻元晦擇之雪中見懷流水浩無息遊雲去不休我思在何許起步三徑幽男子四方志胡為守一丘盍簮未可期此意空綢繆平生子朱子砥柱屹橫流探古獨遐觀萬象供雙眸結友得林子苦心事窮搜看渠清介姿便可披羊裘昔者千里駕共我風雪遊永言清絶景祗以好語酬居然隔年别却喜翰墨留詩來尚記憶知子不我尤講習今難忘離索古所憂但當勉耘耔歲晚儻可收送甘甥可大從定叟弟之桂林季也有行役我思獨悠悠親朋非不多子能從之逰挂席上湘水青山挾行舟籃輿問嶺路政爾荔子秋人言桂林好頗復類中州近郊多勝槩雉堞冠層樓待渠幕府暇時與同𡨕搜吾子有令姿胸中富九流處世多齟齬但當付滄洲超然擴遐思詎可耳目謀願為百錬剛莫作繞指柔昔人不吾欺子盍試反求預想他年歸此地復綢繆刮目看二子一笑紓百憂湘中館餞定叟弟分韻得位字江樓倚夜門樽酒留客醉挽衣更小語不盡今夕意吾家德義尊此豈在名位勉哉嗣芬芳停此寬别思廣漢黃仲秉即轉運使治之東作亭扁以楚翠蓋取杜陵所謂楚岫干峯翠者屬客賦詩維衡屹南荒作鎮自開闢蟠根結地厚面勢倚空碧陂陀數州境髙下相接迹麓山乃其趾神秀固未極定王十里城處處見山色知誰長在眼嗟此塵中客觀風君獨暇延納到几席得句恍忘言寄興渺今昔自君之東來民瘼極探索仁言徹九關寧懼虎豹厄諏詢遍南畝民肥吾則瘠築亭一舒嘯逮此百憂隙看山儻不愧隱几亦聊適寄語後來者此意當無斁三茅觀李仁父劉文潛員顯道趙溫叔崔子淵置酒分韻得髙字節物歲云暮九衢塵滿袍起我二三友招要步林臯仰看𡨕飛鴻俯覽千丈濤石徑上深窈竹風更蕭騷杯槃自真率更起㵼濁醪歎我會合難慰我涉歷勞薰然鄉社逰飲少意巳陶我亦壽長者萬里欣所遭嗟哉士業艱逝矣日月滔古義重金石外物真秋毫願言共勉勵勿負岷山髙寒食前三日野步烏龍山中石上往往多新芽手擷盈掬酌玉泉煮之芳甘特甚有懷伯承兄賦此以寄披雲得新腴煮泉聽松風香永味自真不與餘品同悠然泊莫留歸來隱疏鐘念昔湘濵遊年年擷芳叢遲日照髙嶺新雷驚蟄龍落磑快先啜鼓腹欣䇿功夜燈紫筠窗香生編簡中誰與共此樂臭味有鄰翁朅來七里城日月轉飛蓬山川豈不好豫憂日忡忡酌此差自慰思君復無窮六月晦發霅川廣德兄與諸友飲餞于漁山已而皆有詩贈别寄此言謝平生苕霅夢邂逅此登臨青山秀而逺溪水潔且深浮玉千古色飛鳯何年音小丘闢茺薈修竹初成林居然得此客領略還披襟巳歌棠棣詩更作伐木吟兄嗟弟行役友念朋盍簮情深語更質意到酒自斟荷風生泊莫涼雨洗遙岑翻然放舟去别緒故難任我行日以逺佳處長會心作詩寄余韻併以謝幽尋逰靈岩我登姑蘇臺笑指前溪水水從具區來古色映清泚明朝泛舟去兩岸雜蘋芷縈紆知幾曲舉目皆可喜稻熟千頃黃秋入四山紫疏鐘度橫塘青簾穿野市忽驚秀氣逼突兀平地起飛閣出林顛穹石滿山趾褰裳上深徑鳴蟬聲聒耳木罅露遐觀欲進足屢止梵宫開何年金碧煥相倚上方納湖光千里淨如砥中峯何亭亭正爾當燕几沙闊鷗鷺微水落魚龍徙雲繞闔閭邦草迷於越壘琴臺俯香徑不念前王侈兹山自古今詎此能為疻老松獨堅卧根株互盤峙頺然閲滄波愛此青未巳我來三日留幽事付行李領略寧有窮登臨聊可紀遊惠山兹泉幾歲月復此慰渴心諒惟獨鍾秀源委來何深在昔抱幽獨邂逅逢賞音希聲聽者難至味乃可尋兀坐正亭午涼風度清隂於焉有深晤三歎復微吟遊池州齊山舊聞齊山勝抱病來登臨蒼然俯平湖秀出幾百尋穹石天與巧修篁近成林髙攀極巉巖俯探窮窈深愛此堅貞姿摩挲會豫心憶行西湖岸亦復多嶔崟頗恨人力勝刻畫時見侵誰知醜石面乃亦變孔壬何如榛莾間屹立長森森天然抱幽獨妙質逢賞音支笻到絶頂孤亭指遙岑樊川有留詠兀坐一長吟齊山石壁間見林擇之題字緬懷其人賦此平生子林子一别今幾春寧知林壑中忽見題墨新巉巉屹蒼石恍若對其人徘徊不忍去我懷誰為陳自子來江東相去亦巳邇謂當復相逢跂首日望子云何竟差池又此隔千里憑髙久佇立飛鴻渺煙水過馬當山千秋馬當廟千尋獅子磯寒風起崖腹慘淡含隂威孤帆駕巨浪瞬息洲渚非忠信儻可仗神理兹不違題乖崖堂平生乖崖公及此邦仿像凜然風埃外餘子避英爽憶公昔正色抗論指邪枉念當絶其根所畏日滋長晴空轟雷霆下土走魅魍云何廊廟姿半世江海上徒令治郡聲迄今滿天壤論相危及公亦豈坐倔強嗟哉彼隘俗利欲扼其吭聞公卓絶風吐舌仍儻恍豈知古之人事業係所養臨機隨手應如爬適苛癢李侯亦髙世希蹤自疇曩萬里見丹青髙堂闢虛敞琅琅壁間記讀者興慕仰我來歲云莫霜林振餘響嘆息重徘徊題詩詔吾黨張子囦携二子西歸求豫詩為賦此以致鄉黨之義窮冬泝荆江風急波濤怒張君一葉舟追逐任掀舞時從古岸邊頗得班荆語君家岷山下須眉挾風雨萬里垂橐歸問君自何苦兩兒才過膝秀色隱眉宇昨者試省中旁觀正如堵誦書聲琅琅亦復記訓詁呼前與酬答進止良應矩我為三咨嗟每見必摩拊祝君須愛惜事業貴有序美質在陶冶如器無苦窳道逺方愁豫速成戒自古可使利欲風居然熏肺腑良心人所同愛敬發端緒岷江本一勺東流貫吳楚但當養其源日進自莫禦君歸閉門思豫言或可取過洞庭城頭雞一號浩蕩風腳回篙師起相呼牽帆上髙桅我亦推枕聽波浪聲轟豗窗間試一覘萬頃銀山開附火且安坐念此亦快哉良久天平明巳見金沙堆泊舟古廟底喜色動輿臺我行正長夏及此歲律摧通籍恨亡補敢賦歸去來所至有何忙妙處姑徘徊險阻元自平鷗鳥亦不猜萬事有定理渠謾費安排明朝上湘水雪意正栽培行矣一杯酒好在故園梅次韻陳寺丞建除體建議了亡補歸來謝馳驅除荒城南丘有田十畝餘滿城車馬喧得此逃空虛平湖永晝靜泉聲雜塤竽定自非偶然供我耳目娛執熱者誰子來浣塵土褕破顔為我笑共看雲卷舒危機起於中胡越生司車成功妙克已八荒元一區收心試參此得失竟焉如開緘得君詩嗜好如我迂閉門君未可出處本非疏湖南參議宋與道奉祠歸崇安里中賦此以别憶昔歲丙寅束書從吾翁驅車服嶺南弭節湟江東湟江地僻左窮年少過從邂逅傾蓋友一笑蠻煙空秋水泛孤艇春郊支短笻琴書適有餘酬唱寫不供豈惟吾曹歡固足愈親容日月遽如許于今再星終中間亦會面别去復轉蓬歸來洞庭野乃此相迎逢回首歎風樹欲語悲填胸愛君堅忍姿凜凜霜後松徐公真有常意味與曩同而我學不進長大加愚蠢幸蒙故人惠苦語相磨礲梅霖漲宿潦行李何匆匆自云洞庭樂逺勝千戶封將兒更抱孫綵衣映諼叢搜竒萃圖刻考古羅彛鐘知君頗挾此詎信詩能窮同里有佳人抱獨環堵中未妨間暇日更共討論功他時有新得為寄冥飛鴻嚴慶胄射䇿南歸迂途相訪六月二十有一日同遊城南書院論文鼓琴煮茶烹鮮徘徊湖上薄莫乃歸明日作别書此為贈炎暑盛三伏駕言得清遊城南才里所便有山林幽崇蓮炫平堤修竹緣髙丘方兹閔雨辰亦有清泉流舉網鮮可食汲井瓜自浮絲桐發妙音更覺風颼颼喜無舉業纍獨有講學憂逮子間暇日微言要窮搜譬彼治田者黽勉在勿休但勤穮蓘功勿作刈穫謀雖云千里别豈無置書郵祝子時嗣音慰我日三秋長沙歷冬無雪正月十日與客登卷雲亭望西山始見一白莫夜復大作竹聲蕭然是日坐上分韻得雲字冬溫氣苦盩玄冥未書勳薄雪殿餘臘一夜收楚氛歡欣想農圃潤澤到蒿芹我亦破曉出喚客來卷雲蒼蒼西山樹棲此萬鶴羣爽氣入病眼幽懷愜前聞意到自舉酒語多秪論文薄莫勢未巳飛花復繽紛還將蕭瑟聲一一付竹君洗盞且更酌清絶未酣醺次韻周畏知問訊城東梅塢七首城東幽事如許一見定勝百聞苦雨斜風無奈斷橋流水餘芬誰知牛鐸黃鍾寡和陽春白雪如君句法飽參妙處不關言説春意新回庭樹角聲莫起江城更著水仙為伴真成難弟難兄可是看花不厭城南更欲城東多謝諸君著語莫教孤負春風堤上已垂新栁屋邊尚有殘梅雪盡春生湖水野航竟日悠哉人情自爾變遷此道不渝燥濕未妨靜處間觀要知二五即十短笻遍歷溪山欵段時尋鄰里遇酒聊一中之得句亦偶然耳别離情所鍾十二章四句送定叟弟之官嚴陵别離情所鍾會合意無斁如何僅踰歲復賦弟行役歲律亦巳暮風烈雪漫漫去路阻且長念子衣裘單嚴之水淪漪其山復蒼蒼子陵釣遊地草木有餘光我昔臨此州民容拙使君子行為多謝慰彼無毫分别駕亦何事休戚理則同但使民受惠無論别駕功巍巍孤髙亭念我昔所喟子也時一登千載起立志某在嚴陵嘗為宋廣平立孤髙亭義路本如砥利徑劇羊腸何以書子紳世德不可忘自昔謹交際人情易因循敬始以念終君子貴守身鄰邦吕正字質疑時以書校官有袁子苦語莫厭渠藐兹遺體重相對子與豫祝子以自愛念不忝厥初雲滿南陽陌書藏善和宅行行重回首無使歸思隔送子目力短朔風吹我裾心焉獨如結子也當念豫平時兄弟間十三章章四句送定叟弟之官桂林平時兄弟間未省别離味别時巳不堪别後何由慰庭萱既荒蕪綵綬委塵土子嘆豫咨嗟寒窗夜風雨逮此間暇日賴有先世書與子共紬繹舍去情何如嗚呼忠獻公典則垂後裔遺言故在耳夕愓當自厲何以嗣先烈匪論達與窮永惟正大體不逺日用中履度如履氷猶恐有不及毫釐儻不念放去如決拾事業無欲速燕逸不可求速成適多害求逸翻百憂南山有佳木柯葉正敷榮願圖歲晚功大用寧小成歲晚豈不念風雨漂搖之但當護本根紛紜爾何為嶺海坐清靜府公金玉姿幕府省文書簡編可委蛇十步有茂草會府宜多賢親仁古所貴更誦伐木篇聞之元城公南州宜止酒止酒縱未能少飲還得不子行日以逺我思日以長政或少間暇書來不可忘芭蕉茶送伯承伯承賦詩三章次韻與子藝蘭九畹勝渠賜璧一雙更碾春風白雪同看明月清江正色可參官焙妙香還近稽山草木叢中清絶天教散在人間春去雲藏嶽麓梅黃雨漲昭潭政爾倚欄無那一甌喚起清談賦遺經閣生世豈云晚六籍初未亡向來言外旨瞪視多茫茫隱微會見獨如日照八荒始知傳心妙初豈隔毫芒絶學繼顔孟淳風返虞唐讀書無妙解數墨仍尋行況復志寵利荆榛塞康莊自云稽古功此病真膏肓君家屹飛閣面對羣山蒼匪為登臨娛牙籖富書藏邀豫為著語會意詎可忘一洗漢儒陋活法付諸郎三友堂寒窗政爾念蕭瑟況復故人疏近音憑欄為子賦三友便覺氷霜千古心初春和折子明歲前兩詩古今同活法妙處在阿堵浮雲不作祟白黑可坐數窮冬掩關卧豈為作詩苦挑燈讀韋編至味可深咀新春風雨中日日鳩鳴屋小園政可步奈此泥涴足却坐問樽酒知足乃不辱一杯徑陶然敢羡車載麴和德美韓吏部笋詩籜龍春雨後得勢類乘軒驟長寧嫌速駢生詎厭煩錯連非異族蒼老見玄孫色並蒲葵扇香侵老瓦盆靜依花影轉新帶蘚文昏外美看彪炳中虛驗晏溫出欄俄競秀侵徑恍孤騫顙脫錐囊見森嚴武庫存風回飄粉霧龜拆露坤垠生理知無息神功本不言牙籌誰數箇玉斧莫傷根錯立環兵衛周羅儼翰藩危岑遙寸露暏浪忽驚奔徑節回青眼齊觀壯小園嚴凝難奪志霡霂合知恩蛟鰐蟠深宅牛羊隱半垣委蛇隨戶牖撑拄動荃蓀愛惜滋千畝髙低辨兩番藐真應莫稱著譜欲重論豈止同苞茂真成後嗣繁兒童防戲折口腹謝空飱深夜共椽燭清朝列戟門於莬真筆楗季子屢髯掀北海雖頻設南山可盡髠深培資後賞獨倚莫消魂看取炎歊侯清隂蔭午暾生辰謝卲廣文惠仁者壽賦左弧念當辰藐此卧歲晚重雲不豫蔭敢望滋九畹南鄰有良朋敏質快瓴建進道方駸駸吐辭看衮衮妙語極吹噓至理屬關鍵嗟豫淡泊好學植自穮蓘豈能益涓埃感子意繾綣昭然隱微中當念仁豈逺起知妙乾體實理踐坤簡大易乃在我亘古當一本期君得真傳永以息邪遁南軒集卷二
