body:
  text: 南軒集卷四十宋張栻撰墓志銘通判成都府事張君墓表君張氏諱椿字大年漢州綿竹人曽祖諱紘贈太師冀國公祖諱鉞舉孝亷考諱濩隱德于鄉閭贈朝散大夫妣宜人蔡氏君幼孤家徒四立壁備極艱苦而挺然有志於為善某之祖妣秦國夫人實收而教育之逮長能自立鄉䣊稱之忠獻公既貴鄉里家事俾君任責君謹守家訓杜門讀書身率宗族公租及時先輸無一事至官府輕財好施勇於為義視親姻之祭祀昏葬不能自給甚者即助之後生子弟之不率訓者切厲之紛爭不能自決者平處之小大畏伏屢試進士不遂後亦不復往忠獻公知其可以居官遂使來南用叔父徽猷公滉致仕恩補將仕郎君時年五十餘矣旋授右迪功郎都大提舉坑冶鑄錢司檢校官未上會省員罷故開府儀同三司劉公錡帥荆南辟為松滋縣令縣更兵火之餘重以水潦湮墊徙治田萊多荒又地産茶方春他路惡少私貨者執兵器旁午甚至剽略殺人官為屯禁旅守要隘盜益羣行抵捍莫可遏止令闕官且十年君得檄數曰世豈有不可為之邑哉至則以撫輯為先罷橫斂絶關禁令商旅通行自如榜諭盜使速自新反其業其烏合遊手願從軍者請於府為效用願耕者官給牛以為營田盜以是衰則又推廣保甲法而行之民欣然從令盜無所措足則上其事於朝朝下之府略施行於它縣荆南至今民兵之盛發端自此然君於此思慮極詳密猶恨其説未得盡用於時也縣歲調夫築堤費不資吏並緣為姦旋即決壞君詳視向所築率退就淺近不當其衝更進塞要害冒大雪躬臨之迄于堅實明年秋大水堤不沒數尺比退無尺寸圯邑人謳歌焉乃新夫子廟宫率諸生講誦公居庫庾次第一新松滋自是始成官府會府增戍官軍符諸邑治舍君獨以不擾集事敵冦邊它邑人例多逃徙境內獨倚君按堵及將去庫有餘資以代下户租既去人思之轉從事郎中書舍人劉公珙薦君可任繁劇差如建康府江寧縣縣在府下應接期會急星火君先立科條示以恩信卒以整治聞兵部尚書虞公允文制置荆襄辟君為準備差遣用薦者改宣教郎幕府事有未便輒盡言公命提舉激賞庫掌庫者武吏公所親信異時無敢孰何君獨勾稽究治或以為過既代公者乃小人搜剔費用隱微卒不可得公始歎得君助為多授夔州路轉運司主管文字會轉運判官周升享傅會大官以舟運蜀馬一路騷動且將盡核羡財以獻君推誠勸止非一事至其甚不能遏則不敢署文書且與之辨曰昔稱善理財者不過知取豫耳今知取而不知豫獨奈何使者大怒捶吏逼公署迄不可則無如之何時敷文閣待制王公十朋帥夔素以剛正自任每多君曰使為屬者人人如張君上之人寧患過舉耶終身稱道推揚不置已而馬運卒不可行使者以罪罷且死君致其孥則盡力君在職嘗以臺檄攝知大寧監半載逺人安之秩滿通判成都軍府事連帥吏才有餘第所尚或偏寮屬少年爭為刻新以求媚君居其間處以靜厚其怙勢妄動者輒面折之帥亦頗憚焉屺山之下堰水為利最全獨歲一葺君適董其役盛冬勞苦不減松滋治堤時或以君年高勸少休君曰民命所繫使身可寒亦為之何勞耶在職二歲堰獨完方是時虞公已為相其親䣊有為邑府下者自帥以下反曲意奉之君行縣獨問以職事叱責之不顧平生大抵直諒不回例如此使得高位以行志則其卓然表見者又可量哉以乾道六年九月七日微疾沒于官舍享年六十有九纍官至承議郎以八年十月甲子葬于綿竹永祚鄉之原配范氏城都華陽人儉順之德實宜于家後公三年沒子男三人然迪功郎次熙次畇長女適鄉貢進士范子修䇿二女適迪功郎宇文紹莊其仲季夭孫男四人淳熙三年冬熙以然所記録其言行走桂林請豫為表豫與君同曽祖惟銘之義始於鍾鼎然與史異記曰銘之義稱美而不稱惡此孝子孝孫之心也至於後世溢美過甚而無以取信然則宗族之間自為之抑可信乎豫謂惟其實而已實之所在雖親何嫌抑其親者又觀之審也若夫誕書妄紀雖踈庸何信故豫有此不復辭而如吾兄之賢豫實親見而熟誦之於兹之述蓋有所不能盡也嗟夫訓武郎趙公醇叟墓志銘君諱師孟字醇叟胄出昌陵燕懿王之七世孫也懿王生冀康孝王康孝生丹陽僖穆王僖穆生南康修孝王修孝生崇溫獻公五世皆居嫡長溫獻諱令圖是為君之曽祖考祖考諱子野終襲慶軍承宣使考諱伯莊繇宫邸為外官終右朝請大夫知道州君生而秀異長無貴驕之習以孝友稱用承宣公恩補官紹興壬子歲調監永州祁陽酒稅秩滿用宗室恩得監潭州南嶽廟自是之後寓居南嶽蕭寺中屋僅數椽被服不減寒士無他嗜好獨與簡編對潛思博考矻矻忘晝夜其於國朝法度興革廢置利害靡不周悉至於天文象數卜筮篆籕亦無所不通論古今事纚纚可聽間即遊歷溪山以自娛適蓋無復後進意也逮于壬午歲之春先公忠獻留守建康薦君才可以任事操可以厲貪願易文階擢置清近以為公族勸有旨令赴在所而君時已抱疾喟然曰固願一見君父效愚忠其如疾何且幸得托公族竊厚廪召而不行國則有刑乃扶持越數驛引疾以歸蓋自始求退以至于終凡任嶽廟者五主管台州崇道觀者四其恬於進取如此始君來南嶽會文定胡公之家在焉君聞所講伊洛餘論而心慕之與文定季子仁仲先生逰餘二十年其間講論問辨固非一端而君自謂吾斯終未有所安也故先生之沒君哭之尤哀然而君方年少時性剛而氣鋭遇事輒發不可少忤及見先生長者以來間暇靜養至於終歲意象循循寬厚和易未嘗有忿色愠辭見於外識君者皆謂與疇昔為易人則學力之所變化亦可知矣于後有室家之戚歷時而情未能遣君頗病之一日晨起灑然有喜色家人怪而問焉則笑不答已而語其友曰吾今而後始為不負此生平時滯吝氷解雪消其樂有不可名言者矣蓋自是以為所得不疑有隱几據梧之意家事亦不甚經念時獨旁觀老釋之書囅然一笑晚苦末疾以乾道壬辰九月十七日終于所寓之正寢享年六十有四其年冬君之友胡實狀其行使來告曰醇叟不幸死而無子將以十二月壬寅葬于衡山蘭橋之原惟是所以詔來世者敢請某念往來湘中熟君舊矣義固有不得辭者重惟習俗之弊搢紳大夫往往競於寵利而不能自克如君近出公族抱負才業而退然終身孜孜求道無所歆慕乎外抑亦可尚也已是宜銘君積官敦武郎配王氏先八年卒獨有二女長適將仕郎張衍次適右迪功郎栁州洛容簿范子文君無恙時或勸宜以時定嗣子君曰兄弟有子先人不乏祀是亦足矣而識者尤悲之銘曰世俗爭騖已獨處兮公族烜赫已踽踽兮天資剛強變寬裕兮夫豈偶然學所致兮生以其常死曷悸兮勒名于丘示來世兮教授劉君墓志銘前贑州教授開封劉君靖之淳熙五年四月二十四日以疾沒于家後三月其弟前太常寺主簿清之葬君于廬陵先墓之側書來請銘頃豫居長沙聞章貢有學官始至登講肄之堂視其旁列繪像凡五六皆近歲太守部使者即日撤去進諸生而告之曰若亦知濓溪周先生嘗通判是邦乎先生百世師也學者所當尊事於是以其處為先生祠使誦習其書問其姓名而知君之為賢今得清之所寄行録一編大抵皆贑之士紀述君之言行謂君之教人首務正其趨向月校其士以行義為先視其文論治道而尊管商談學問而涉佛老言時事而忘讐敵者必痛抑力排之終日坐直舍雖休沐亦或不出講質問辨者相踵與之反復無少倦有一善輒屢奬而申勸之有不善為之愀然曰吾教之不至也以故多所感動凡學之事小大悉有條理致其鄉之老成者使分教席下向有濫居其職者輒漸自引去士爭趨于學益市書它州使之讀而丐增其廪以食之自太守部刺史以下見其懇惻無敢有紊其學政者故君得以行其志贑之士知有為己之為重恥言利而趨於義君之教為多故其去官爭欲留之而不能比其死奔走往哭又爭為紀其言行欲其有傳夫豈偶然也哉豫於是而歎君雖在下位而能不苟於職如此且觀其所以教而知其志之逺且大也則為按其録而書之君字子和本臨江人五世祖太子太保式自臨江歸京師曽祖斁故朝議大夫贈太中大夫祖武賢故承議郎考滁故通直郎致仕母趙氏君資稟沖淡而溫厚中紹興甲戍進士第初任吉州司户參軍兼掌獄事即不為詭隨更尉邵武上官文符之下有病民者不輕以行及得贑學教授待次凡五年益用力於經史講論先覺師友淵源及其居官則推已之所從事者而與其士共之秩滿改官遭繼母裴氏憂未及禫而君死矣病且革戒其家曰喪事勿用異説享年五十有一娶趙氏有子曰仁季女一人惟劉氏自國朝開基以至于極盛之際世有顯人名在國史忠厚雍睦之風相傳以至於今世系益逺而家法不衰君之兄弟又能克篤其敬相勉以道義藹如也大家子孫能世守如此者其亦鮮矣豫雖未識君兄弟而與君之弟相與書辭往來有講論之好來求銘君墓至五六辭甚苦有不得而辭焉銘曰世之論者以郡教授為不急之官以豫觀之使得其人則於其州可以成才而善俗顧不急哉贑之學自紹聖間有賢者曰李朴先之實臨其官今八十有餘年矣而士猶稱之不衰及君又見稱曰是可繼先之也豈不賢哉豫故表而出之欽州靈山主簿胡君墓表惟建州崇安胡氏至文定公而始大其上世皆居里中文定公宦遊荆楚歲久皇考宣義公淵沒葬于荆門紹興初因徙家衡嶽之下於是二弟實從仲曰安止仕為朝奉郎生子實字廣仲是為君君雖生晚不及親受文定之教而自幼敏茂氣識異於常兒年甫十五從家孰習辭藝從兄五峯先生宏察其質之美也從容告之曰文章一小技於道未為尊所謂道者人之所以生而聖賢得之所以為聖賢也吾家文定之業子知之乎君拱而作曰某不敏故竊有志乎此願有以詔之先生嘉其志樂以告語君雖素羸多疾而矻矻自力不肯置由是所見日以開明先生之沒君獨念前賢淪落且懼緒業荒墜慨然發憤見於辭色孜孜訪友惟恐不逮講辨反復以求至當議論貴決白不為含糊摸稜態其居家雍睦而有制閨門內外無不敬愛之或諏其所以致此則曰家道之失和平皆由小知自私害之吾一以公心惻怛居其間故無事耳始朝奉公沒時幼子寓僅垂髫君撫育教訓恩意甚力輕財好施意氣豁然舅之子貧無所依君收養之終身以至族姻之不能自振者賴君區處調護非一而其好善疾惡亦本於天資親朋有過盡言不隱雖甚愚窒不忍棄必反復開導至其以非意相犯則恬不與較平時誦習文定公春秋之説尤患末俗統系殽辭每舉莒人滅鄫之義言意深切其操心主於忠厚為學謹於人倫貴實用而恥空言行事之可見者大抵如此早以門蔭補將仕郎殆將二紀約居恬然不急仕進近歲始就廣西銓選得欽州靈山縣主簿亦未上也乾道九年秋因事至湘隂得疾堅痞在腰股間醫者誤以快藥下之則益甚亟歸舊廬以十月庚辰沒于正寢享年三十有八娶黃氏知鄂州抗之女子男二人大同大有皆幼一女才及笄君之沒士之識君者莫不為德門惜君之賢至其所居鄉里之細民亦曰何善人之不夀也豫與君交幾十五年志意相合歲時會遇與夫書尺往來無非以講論切磋為事則豫之惜君又豈常情可比哉嗟夫學者之病固非一端以豫觀於近世其大者有二焉貪高慕逺則不能循序而有進負已自是則不能降心以從善是二者抑學者之所甚病也數年以來瞷君熟矣蓋務實趨本自反於卑近而虛中求益不私其故常豫是以知其所造將不可量也孰謂天之降年止於斯邪學力而未極其成才高而未著於用豫之所深痛也豫豈不知修短之有命耶是歲十二月癸酉葬于衡山縣雲密峯之東從其先君之兆其友同郡吳翼以狀來求表墓明年乃克為之淳熙改元九月戊申述吳監廟墓志銘豫自為兒童時即識吳君子通胸中坦夷善談論豈弟人也平時遊公卿間以忠信自將一見即欵熟久不以榮悴改自豫先公與丞相趙公當國開督府嘗辟君蒞軍士之食及有疾病者逮豫家居湘中君還自北即復來登門先君貶陽山陽山窮僻多癘氣時秦檜擅權熖烈原火忌疾特甚先公屏居闔關不與人相聞雖向來故吏亦有莫敢以書至前者君獨屢入嶺求見見必留久而後去年歲間必復來太夫人在長沙君來南必待安問復視先公飲食顔色寧健否歸以告君又與樞密折公善折公貶郴君亦每道郴問勞欵曲方憸人帥潭網羅善類搜抉細故以諗檜君堂堂往來遷客間自若不顧也先公與折公皆作詩稱道之其激義蓋如此君諱芾子通字也其先自武夷徙家湘潭曽祖惟忠祖仁信父仲明皆業儒君少而孝友既孤事母訓弟有聞于其鄉母病瞽踰紀君精意療治一日復明如初人以為孝誠之感也遊京師聲譽籍籍縉紳間廣西經略使吕源辟君自布衣補官為屬凡所以資源者甚至其可知者如料莫公晟有它意欲消患未然及并省平觀二州以寬支移之擾力行法禁以革泉貨出徼外之弊廣人稱之盜曹成破臨賀餘黨未去君以檄疾馳入城保其資糧數十萬得無失使者議狀其功君力辭焉出嶺調官既入督府復就版曹辟為諸路回易總領司主管文字已而從路公允迪往南京陷于敵深自晦其能亦屢以疑似坐獄不為屈竟得脫歸請祠返故居遂不復出仕矣君論事纚纚聽者忘倦練習典故法令以至山川險易財賦本末出入皆甚悉而又特精於醫始君少時父病瀕死而醫無良且玩視邀重利君慨然閲素問岐伯盧扁之書久而得其妙視脈如洞見五臟詳察其所以然而投之劑無不應如甘蠅飛衛之射郢人之運斤蓋心悟神解非庸醫守紙上語者所能睥睨髣佛也計所全活不可勝記在京師時士大夫私識其治法成書相傳以為異及歸湘中鄉黨尤賴之人有持金帛報者即謝不敢受家四壁立處之淡然紹興辛巳八月五日終于家享年七十有五是歲是月祔于先塋實衡山武陽鄉娶黃氏先君卒再娶陳氏子以宗林宗元宗孫伯騏伯熊伯驥女長適奉議郎李茆次適左迪功郎鼎州教授王起宗季適進士曠楊林宗屢來求豫志豫自念往在瀟湘君每登堂拜太夫人豫以綵衣侍重親俯仰十五年間風木之悲遂成永感撫事追昔痛如何言而於君之志有不得辭也又念豫嘗從先公旁聞君道敵事甚詳云人心厭金思念我宋不忘見父老屏處聚語有或至流涕者嗟乎此非國家它日恢復之本邪近世士大夫計較利害強弱畏之如虎曽不思天下莫強於義理況祖宗德澤滲漉之深耶豫因敘君事憶君所嘗道者而喟然有發於斯言云銘曰嗟乎體魄藏於斯魂氣則無不之也咨爾子孫歲時瞻省以謹以護致饗于家以敬事以無忝於嗣教授魏元履墓表故台州州學教授魏君元履之喪新安朱君熹既為之志以內諸隧而其子孝伯復以書來請表于墓某雖聞元履之風而未及識獨時以書往來相與之意蓋有不待傾蓋而得者又聞元履將沒若以此屬於豫則於孝伯之請反之於心誠有不能已者故不復敢以荒陋辭元履諱掞之舊名挺之後更今名則字子實然以元履行今為建寧府建陽縣人父大名隱德不耀故禮部侍郎胡公寅嘗志其墓述其世系甚詳元履自幼立志不羣方是時建寧多儒先長者元履始入郡庠事籍溪胡先生憲先生器之已而遍從諸長者遊間又適四方所交一時名卿賢大夫多大人行故聞見日廣而聲稱亦日著其為學慨然企慕古先於書無所不講而於歷世治亂興亡得失之故與夫本朝故事之實尤所諳究為文章長於論議善談説聽者無倦其居家孝犮恂恂謹喪祭重禮法於親䣊恤死字孤雖貧極其力而為之其居鄉遇歲飢則為粥以食餓者且請於官為之移粟閭里賴之視鄉人有不葬其親者請富與之期貧與之費賴以掩者亦以千計其有不舉子者則為文以告戒之細民亦多為之感動其與人交盡其情然不為茍合長善救失惟恐不及後進有一長必亟稱而力推之位望尊重者茍有不合已意亦面質不置大抵其為人於義最隆也方年壯時遊江浙間過衢客郡守章傑之家會故相趙忠簡公之喪歸自海外傑雅以私怨趙公且希秦檜意逮治其家人勢烈如火元履獨慨然以書譙傑長揖而去傑亦無以害也其天資疾惡勇於為義類如此元履兩以鄉舉試禮部不第福建路安撫使汪公應辰知建州陳公正同知其賢相與論薦復為時相所尼不得召居數歲詔舉遺逸轉運判官芮公曄率其僚與帥若守六人者以鄉人所狀行義聞有旨特徴之時宰相陳公俊卿實當國也元履辭既不獲乾道四年十二月用布衣入見條當世之務首論修德為立政之本繼以正人心養士氣為言以為恢復之道要必以是數者為先上奬歎開納勞問移晷翼日詔賜同進士出身授左迪功郎守太學録異時學官多養望自高不與諸生接亦不復省學事元履就職則日進諸生而誨語之視其屋有弊壞弗支者亟請于朝而葺之其春釋奠于先聖職當分獻先賢之從祀者則先事白宰相王安石父子以邪説亂天下不當祠而河南程氏兄弟倡明絶學以訓方來其功為大請論奏屏去王安石父子而追爵程氏列於從祀為允它日又白太學之教豈當專以浮言取人宜隆德行尚經術其次猶當使之通習世務以備官使皆不聽元履念上恩厚言雖不見用未忍去也於是時事有係安危治亂之幾而自宰相以下無敢救正指陳者懷不自已每抗疏力言之至於三四不報則移疾杜門以書切責宰相宰相病之遂因元履之請豫告使歸既行則罷為台州州學教授五年六月也元履歸而喟然曰幸得遇明主學力未至無以感悟效報萬一當益自勉而已舊榜其書室曰艮齋至是日處其間紬繹舊學將來其所未至士子有從之遊者亦不之拒而元履病矣病且革顧念君親處理家事無一語謬其母遊氏視之不巾不見也戒其子母以僧巫俗禮凂我招其友朱君熹至則盡以終事為託以九年閏月壬戍沒于正寢年五十八娶劉氏同郡徴士勉之兄女先十九年卒再娶虞氏子男二人孝伯長國學進士孝聞尚幼所為文章及論議合數十卷藏于家嗟乎習俗之弊久矣惟一已之便利是圖而其它有不遑恤也若元履平日制行以急病讓夷為心一旦起布衣有列於朝則無隱君父言衆人之所不敢言其比於區區自謀者相去豈止十百而已哉而世或以近名訾之抑昌黎韓子所謂怠與忌者非邪雖然使元履而天假之年益充其所志以進其所願學則其所成就發見又豈止於是而已邪豫是以歎惜而書之淳熙元年五月戊申廣漢張某述南軒集卷四十
