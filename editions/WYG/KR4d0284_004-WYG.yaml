body:
  text: 南軒集巻四宋張栻撰律詩和石通判酌白鶴泉談天終日口瀾翻來乞清甘醒舌根滿座松聲聞金石微瀾鶴影漾瑶琨淡中知味誰三嚥妙處相期豈一樽有本自應來不竭濫觴端可驗龍門憩清風峽扶疎古木矗危梯開始知經幾攝提還有石橋容客坐仰看蘭若與雲齊風生隂壑方鳴籟日烈塵寰正望霓從此上山君努力瘦藤今日得同携讀李邕碑荒榛日莫倚笻時歎息危亭北海碑後輩但知尊字畫當年不得戍邊垂豈關貝錦能成禍祗恐干將不自竒杜老惜才千古意如今誰詠六公辭登法華臺山間景物轉流年臺上風光處處傳放目便應雲夢小憑欄平挹祝融巔忽尋故國占天際誰看孤舟繫岸邊百感還將山下去肯同槁木墮深禪謝楊文昭主簿寄詩楊之父紹興間倅建康不屈於烏珠而死迺翁詈賊氣如虹千載衣冠起愞庸雙廟已應同卞壺佳兒今喜見甄逢傳郵贈我凌雲句㫁簡知君學古胷忠孝可全須力勉策勲寧復羡侯封楊公血食金陵政與卞將軍祠相望喜廣仲伯逢來㑹二阮向來俱莫逆支笻為我到山巔濁醪共飲聊復爾勝集于今亦偶然人立千峯秋色裏月生滄海暮雲邊髙談此地曽知幾一笑歸來對榻眠和黄仲秉喜雨雨後清泉遶舎流懸知耘耜遍南州占相歲事端無恙勞苦農人亦少休好句收功經百錬彌旬不見便三秋閑來只願長豐稔江海白鷗盟共求遊道塲山次沈國録韻玻瓈盆外起干鬟路入空濛紫翠間心逺最便天宇逈眼明偏見野雲閑寒泉宰木留千載清磬疎鐘度兩山我亦湘城三徑在湖邊歸去洗塵顔早秋湖亭澤國今年秋氣蚤湖亭清晩獨裴徊翩翻荷蓋隨風舞蕭瑟松聲帯雨來靜處豈云身計得吟邊但覺歲華催悠悠逺思憑誰冩多病新來罷酒杯賦周畏知寓齋知君隨寓即能安乆矣家山詠考槃幕府漫㳺從鬢秃竹牎寄傲有書觀此身詎可忘三省世路何妨閱萬端俯仰周旋皆實理未應秪向寓中看送甘可大子陵溪水千年緑猶憶登臨日暮時子去定能尋勝槩書來當復慰相思簡編有味寧論晚得失從渠莫自疑也學迂疎教似舅不應空賦渭陽詩送胡伯逢之官金陵相望數舎已云疎逺别何因執予袪漫仕想應同捧檄舊聞當不廢觀書月明淮水空陳迹山繞新亭有故墟暇日更須頻訪古因來為我道何如寄題建安公梅山堂梅公山色近庭除勝日供公几杖餘千古謾傳棲迹地當年誰憶愛君書丹心烱烱元無間白髪星星不用鉏待得斯民俱奠枕歸來端亦愛吾廬重九陪詳刑䕶漕東西樓之集獵獵西風滿角巾登臨秋思與雲平山圍四野髙低碧江遶東城今古清莫恨寒花未堪摘且忻樽酒得同傾政須客裏頻囘首細話家山此日情次趙漕贈王昭州韻煌煌金節按江城驛路梅花正小春聞說爭迎來滿道定將何術慰斯民憩棠異日誇南國懷橘歸時拜壽親流澤㑹看均一路要令治象復熙淳九日登千山觀清晨領客上巉巖野路衣襟濕翠嵐九日開樽仍絶景西風欹帽且髙談地形盤薄一都㑹山色周遭萬玉簮却指飛鴻煙漠漠故園茱菊老江潭和正父㳺榕溪韻隔岸髙低露碧山眼明便作故園看直從榕影度輕舫更傍溪光撫曲欄鴻鴈來希空悵望梅花開早未初寒喜君萬里同情話明月清風足佐觀仲冬朔日登湘南樓復用正父前韻歴遍江南處處山嶠南還得倚樓看化工此地無餘巧爽氣窮冬更逼欄官事隨時寧解了書盟平日未應寒相逢自有論文樂只把空杯未礙歡六月二十六日秀青亭初成與客同集亭成勝日好風光佳客携將共一觴蒼壁挿空千古色髙松䕃堤三伏涼網魚縷膾寒水玉剥蓮煑鼎甘露漿便覺故園渾在眼秪應灕水似瀟湘送韓宜州頃年未識宜州面已信諸賢品藻公幕下從容逢益友胷中骯髒本家風一麾且與寛凋瘵華髪應無慕勇功從古安邊須自治人情初不間華戎鹿鳴宴從昔山川夸八桂只今文物盛南州秋風萬里携書劒春日端門拜冕旒聖世取才先實用儒生報國豈身謀且看廷䇿三千字為冩平時畎畆憂送宇文正甫重來能復幾旬餘臨水登山又送渠夜雨巳知農事好春寒未放小桃舒眼前佳處應難盡别後書來詎可疎我亦相將歸舊隱杖藜時復訪樓居雨後同周允升登雪觀一雨端能減百憂肩輿徑上最髙樓山容淨洗無窮碧江水新添自在流已覺春隨花片老不應身似賈人留煙蓑風笠南山下正好歸歟看麥秋題邢使君釣隱使君卜築占芳洲短檻疎籬處處幽風月隨時供燕几笑談終日在中流翩翩影落來賔鴈漠漠寒生欲下鷗城市山林俱寓目問君底處足消憂某辱歸父丈惠貺新詩謹次韻末章為别淮海相從幾歲年南州鴈不到西川重逢影落煙沙外却喜身如金石堅莫歎武城資莞爾且看平楚正蒼然剸繁自是君餘事毫髪難逃止水淵和查仲文雪中即席所賦方帽衝泥有客來九衢俗眼莫驚猜一樽相對十年外兩脚新從萬里囘壯志未隨衰鬢改孤懷良為故人開雪中細放梅花發不用匆匆羯鼔催和宇文正甫探梅天與孤清逈莫隣秪應空谷伴幽人千林掃迹愁無那一㸃横梢眼便親顧影莫驚身易老哦詩尚覺句能新幾多生意氷霜裏說與夭桃自在春襄州䕶漕使者張侯寄示所作快目亭記辭多慷慨予讀而壯之且想斯亭觀覽之勝為賦此聞說君家快目亭湓江直上起千尋昔人事業規摹在故國山河草木深世態從渠翻覆手壯圖還我短長吟㑹須一展平戎䇿始稱平生灑落襟送舜臣撫幹表兄赴部疇昔相看意便傾重逢便覺眼増明半生漫仕壯心在五月長江去棹輕龜櫝乆藏千乘寳鵬風方快九霄程公朝兼用名門選外氏傳家舊有聲壽定叟弟為邦和氣滿郷閭袖手還家樂有餘案上簡編元好在閑中日月更寛舒功名且要身長健尋尺何求計不疎好泛菊英斟壽酒扁舟吾欲賦歸歟重九日與賔佐登龍山曉風獵獵笛横秋澤國名山九日㳺萬里煙雲歸老眼千年形勢接中州丘原到處堪懷古萸菊隨時豈解愁此日此心誰共領朝宗江漢自東流贈樂仲恕老子曽從先覺逰後來文采繼風流胷中有意窮千古筆下成章映九秋塵世利名無着算聖門事業要精求詠歸消息今猶在魚躍鳶飛㑹得不小園茶䕷盛開伯承以詩見督置酒于此為増不敏之歎留連紅紫計無從晩惜芬芳萬卉空枕上幾囘清夢㫁風前政可碧紗籠春隨夜雨但三歎韻入香醪尚一中長有花開消息在不應鳴鼔便相攻再和閉門謝客少過從獨倚脩篁傲碧空忽喜千條發瓊蘃紛如萬鶴出樊籠與君前日徘徊乆得句懸知慘淡中胷次本無愁可著何為苦要酒兵攻又和夜讀韋編起欲從門前流水落花空春同心事應長在月當燈光不用籠弔古誰能嗟澤畔髙吟且欲效隆中君詩似玉無瑕玷豈有他山石可攻又和市朝車馬列雲從君有危樓出半空但覺乾坤増老眼不妨日月轉空籠花開花落關何事江北江南只此中互出新詩殊未艾長城尚許短兵攻和楊教授道在無今昔才難有屈伸青編知了意白眼付時人鏡裏顔容舊胷中事業新絶歎知味鮮渠自說甘辛客少從蒿長深居懶户開孤城嵗云莫瘦馬子能來長策憐葵向新詩更雨催相看前日事此首忍重囬送少隱兄赴興元幕出手寧嫌晩論心本不欺五年江左客萬里故園思肯枉洞庭棹來尋棠棣詩固知名義重豈但慰朝飢邊塞連闗隴貔貅罷戰征幕中須預計堂上乃竒兵漢水追前䇿秦原憶舊耕書生亦多事慷慨試經行亷州何使君挽詩橘井登賢籍槐宫並俊㳺姓名題鴈塔文字上瀛洲公嘗進巻召試詞科青簡窮千載朱轓但一州有懐終未試眼看落山丘又憶昔湟江上相逢意便傾胷中元浩蕩筆下更縱横士伏徐公德人言景倩清定應鄉里敬枌社祭先生和張晉彦逰嶽麓齋舫凌煙浦雲屏入畫圖日烘花炫晝風定水明湖布榖催春種提壺勸客沽湘中無限景賦詠繼三都送臨武雷令詔舉循良吏時資撫字功人情平易看治道古今同綠野新耕盛潢池舊習空便應君課最名姓御屏中去路連崇嶺扁舟下漲濤不違將母願敢歎獨賢勞境静歸鳬鴈庭空長艾蒿不妨頻拄頰千里寄風騷喜雨呈安國望歲民心切為霖帝力均崇朝變炎暑舉目盡清新坎坎連村鼔熙熙萬室春北牎涼枕簟安穏到閑人十二月十六日夜枕上聞雷已而大雪春信梅邊動雷聲枕上驚忽看牎紙白頓覺竹聲清江海空餘夢壺觴起自傾朝來倚樓處玉樹滿湘城過湘潭劉信叔舊居有感北渚留行客東陵憶舊侯池蓮半枯折風葉正颼飀事業留千載英雄去一丘平生許國志歲晩詎悠悠題唐興寺湘江亭寺廢蒼崖聳江囘逺岸明風霜摧翰墨有唐大中記及詩刻兵火後沉于潭中歲月老絲緡寺右有釣磯兀坐知茶味閑行忘去程長哦伊水句囘首若為情鄭都官嘗題詩云湘水似伊水湘人非故人彪德美來㑹于泉有詩因次韻君臥衡山北我行湘水濵相逢還莫逆清絶兩無塵勝集追前日輕隂近小春濯纓聊復爾舉首謝簮紳上封有懷元晦憶共朱夫子登臨氷雪中劇談無俗調得句有新功别去鴈横浦重來月滿空遙憐今夕意清夢儻相同題福巖寺擲鉢峯前寺肩輿幾度來樓臺還舊觀杉檜撫新栽湘水堂堂去秋山面面開裴徊千古思風壑有餘哀題南臺寺相望幾蘭若勝處是南臺閣逈規摹穏門空晝夜開囘風時浩蕩髙嶺更崔嵬謾說石頭滑支笻得徃來寺多風二門不可置扉寺之側有石頭庵由西嶺行後洞山路西嶺更西路雲嵐最窈深水流千澗底樹合四時隂幽絶無僧住閑來有客吟山行三十里鐘磬忽傳音過髙臺寺着屋懸崖畔開牎疊嶂秋半欹雲榭冷不㫁石泉流茗椀味能永竹風聲更幽平生版庵老得句似湯休寺之前有雲莊榭舊車轍亭侍郎胡公以其妄謬易今名記刻不存必惡其害巳者所去也長老了信有詩名宿方廣寺俗塵元逈隔景物自天成山近四圍碧泉鳴永夜清月華侵戸冷秋氣與雲横曉起尋歸路題詩寄此情和黄漕雪中將至長沙吾道元如砥人間謾畏途未容舟泝峽且泛雪平湖子孝寧投抒天囘看脫弧不應從我懶欲老豆麻區人日逰城東晩飯陳仲思茅亭分韻得香字絶憐梅事晩與客到林塘瓦椀村醪釅杯羮野菜香舊逰看壁字新歲尚他鄉一笑俱真率悠然意未央二月十日野步城南晩與呉伯承諸友飲裴臺分韻得江字春日煙沙岸禪房風竹牎有時傾綠酒隨處見清江世路紛多轍吾生老此邦千林看不盡白鳥去雙雙與弟姪飲梅花下分韻得香字日多色愈正春和天與香提携一樽酒問訊滿園芳嗣歲詩多思懷人心甚長更須多秉燭玉立勝紅粧十四日陪黄仲秉渡湘飲嶽麓臺上分韻得長字支笻穿百級把酒問春光喬木依然在幽蘭秪自芳未當湘水滿更覺橘洲長暝色猶回首天涯話故鄉王長沙約飲縣圃梅花下分韻得梅字平生佳絶處心事付江梅縣圃經年見芳樽薄暮開朗吟空激烈燒燭且徘徊未逐徴書去窮冬尚一來湯總管邢監廟約逰城東酒間求詩為賦此春事巳如許客愁空自多梅花成莫逆樽酒付亡何楚楚邢郎子耽耽老伏波定應容我醉耳熱更髙歌謝胡掾惠詩一見知心事旋觀慰月評慈祥漢循吏儒雅魯諸生莫作周南歎終期冀北程新詩連夜讀梅影伴孤清除夜立春積雪隂難解新梅凍未開誰知殘臘底已報早春來一氣元無息羣兒浪自猜短檠非守嵗百感政交懐送趙節卿昭代才難歎宗盟世有人千鈞定晩試一角信逄真政擬尋梅共還經折栁新青雲看稳上囘首楚江春二月二十五日登裴臺坐上口占朝來風雨好抱病亦登臨故國江山在荒城花栁深憂時空百慮望逺只微吟春事如櫻筍幽盟可重尋上已日晩登裴臺自仲春凢三登前日看花地重來對落暉雨餘山着色沙沒水初肥寒食家家出殘紅樹樹飛還同二三子及此詠而歸長沙郡丞丁君挽詞亷吏今尤重朝家詔舉頻方看千里駕忽盡百年身職業憂勞甚逰從笑語真空令行路歎沒後見清貧和黄仲秉喜雨雨涼牎戸好佳木正隂隂畎畆憂時念乾坤濟物心引泉聊自照移竹更親臨尚想皇華使風前擁鼻吟寄侯彦周塞鴈仍南去慇懃問耒陽催科應獨拙理髪詎能長邑古絃歌地年豐魚稻鄉婆娑還得不三徑未云荒過長橋西風吹短髪復此渡長橋木落波空闊亭孤影動揺徘徊念今昔領畧到漁樵儻有山中隱憑誰為一招多景樓疇昔南徐地登臨北固樓平原迷故國滄海接江流木落煙莎晩城孤鼔角秋寄言鷗鷺侣吾已具扁舟金山萬頃洪濤裏巍然閱古今雲煙三島接花木四時深亂石維舟住西風倚檻吟朝宗知不斷凄切此時心重陽前一日九日明朝是清樽强自開蕭蕭疎雨暗滚滚大江來野菊開無數沙鷗靜不猜何須騎臺飲此興亦悠哉十五日過小孤山沃野逈千里巋然突孤標崖分勢亦裂江靜影頻搖栖鶻巢何險盤柯凍不凋吾行足觀覽未覺客程遙新亭風景自今古斯亭今是非絶憐江水去還有故山圍得失同千慮成虧共一機所思惟謝傅不但勝淮淝庚申過青草湖巳越重湖險張䑺勝順流亂雲藏野寺横網閙漁舟物色湖南好風霜歲晚謀未知荒歉後得似向來不南軒集巻四
