body:
  text: 南軒集卷十五宋張栻撰序南嶽唱酬序某來徃湖湘踰二紀夢寐衡嶽之勝亦嘗寄跡其間獨未得登絶頂為快也乾道丁亥秋新安朱熹元晦來詢予湘水之上留再閱月將道南山以歸廼始偕為此逰而三山林用中擇之亦與焉粤十有一月庚午自潭城渡湘水甲戌過石灘始望嶽頂忽雲氣四合大雪紛集湏㬰深尺許予三人者飯道旁草舎人酌一巨盃上馬行三十餘里投宿草衣巖一時山川林壑之觀已覺勝絶乙亥抵嶽後丙子小憩甚雨暮未已從者皆有倦色湘潭彪居正徳羙來㑹亦意予之不能登也予獨與元晦决䇿明當冐風雪亟登而夜半雨止起視明星爛然比曉日升暘谷矣徳羙以怯寒辭歸予三人聮騎渡興樂江宿霧盡巻諸峯玉立心目頓快遂飯黄心易竹輿由馬跡橋登山始皆荒嶺彌望已乃入大林壑崖邉時有積雪甚快溪流觸石曲折有聲琅琅日暮抵方廣氣象深窈八峯環立所謂蓮花峯也登閣四望霜月皎皎寺皆版屋問老宿云用瓦輙為水雪凍裂自此如髙臺上封皆然也戊寅明發穿小徑入髙臺寺門外萬竹森然間為風雪所折特清爽可愛住山了信有詩聲云良夜月明䆫牖間有猿嘯清甚出寺即行古木寒藤中隂崖積雪厚㡬數尺望石凛如素錦屏日影下照林間氷墮鏘然有聲雲隂驟起飛霰交集頃之乃止出西嶺過天柱下福巖望南臺厯馬祖庵由寺背以登路亦不至甚狹遇險輒有石磴可歩陟踰二十餘里過大明寺有飛雪數㸃自東嶺來望見上封寺猶縈迂數里許乃至山髙草木堅瘦門外寒松皆拳曲擁腫樛枝下垂氷雪凝綴如蒼龍白鳳然寺宇悉以版障蔽否則雲氣嘘吸其間時不辨人物有穹林閣侍郎胡公題榜蓋取韓子雲壁潭潭穹林攸擢之語予與二友始息肩望祝融絶頂褰裳徑徃頂上有石可坐數十人時烟靄未盡澄徹然羣峯峭立逺近異態其外四望𣺌然不知所極如大瀛海環之真竒觀也湘水環帯山下五折乃北去寺僧指蒼莾中云洞庭在焉晩歸閣上觀晴霞横帯千里夜宿方丈月照雪屋寒光射人泉聲隔䆫冷然通夕恍不知此身踞千峯之上也巳卯武夷胡實廣仲范念徳伯崇來㑹同游仙人橋路並石側足以入前崖挺出下臨萬仭之壑凜凛不敢乆駐再上絶頂風勁甚望見逺岫次第呈露比昨觀殊快寒威薄人呼酒舉數酌猶不勝擁氊坐乃可支湏臾雲氣出巖腹騰涌如饙鎦過南嶺為風所飄空濛杳靄頃刻不復見是夜風大作庚辰未晩雪擊䆫有聲驚覺將下山僧亦謂石磴氷結即不可歩遂亟由前嶺以下路已滑甚有跌者下視白雲滃浡瀰漫吞吐林谷真有盪胷之勢欲訪李鄴侯書堂則林深路絶不可徃矣行三十里許抵嶽市宿勝業寺勁節堂蓋自甲戍至庚辰凢七日經行上下數百里景物之羙不可殫叙間亦發扵吟詠更迭唱酬倒嚢得百四十有九篇雖一時之作不能盡工然亦可以見耳目所厯與夫興寄所託異日或有攷焉乃裒而録之方己卯之夕中夜凛然撥殘火相對念吾三人是數日間亦荒扵詩矣大抵事無大小羙惡流而不返皆足以喪志扵是始定要束翼日當止蓋是後事雖有可歌者亦不復見扵詩矣嗟乎覧是編者其亦以吾三人者自儆乎哉作南嶽唱酬序廣漢郡張某敬夫云送張荆州序客問扵某曰張荆州之行子將何以吿之某應之曰吾將吿之以講學客笑曰若是哉吾子之迂也荆州早歲發䇿大廷天子親擢為第一盛名滿天下入司帝制出典藩翰議論風采文章政事卓然絶人上流重地暫兹徃牧所以寄任之意甚重而天下士亦莫不引領以當世功名属扵公也夫以位逹而名章任重而望隆吾子顧以講學吿之不亦迂乎某曰子以吾所謂講學者果何也邪蓋天下之患莫大扵自足自足則畫矣信如子言荆州若挾是數者以居則僕尚何道惟荆州方且退然若諸生曽無一毫見扵顔面此僕之所以歎息慕向而講學之說是以敢發也蓋天下之物衆矣紛淪轇轕日更于前可喜可怒可慕可愕所以盪耳目而動心志者何可以數計而吾以藐然之身當之知誘扵外一失其所止則遷扵物夫人者統役萬物者也而顧乃為物役其可乎哉是以貴扵講學也天下之事變亦不一矣㡬㣲之形節奏之㑹毫髮呼吸之間得失利害有霄壌之勢吾朝夕與之接一有所滯塞則昧㡬而失節其發也不審則其應也必盭一事之隳萬事之所由隳也豈不可懼乎是以貴夫講學也夫惟講學而明理則執天下之物不固而應天下之變不膠吾扵天下之物無所惡而物無以累我皆為吾役者也吾扵天下之事無所厭而事無以汨我皆吾心之妙用也豈不有餘裕乎又豈有窮極乎然所謂講學者寧它求哉致其知而已知者吾所固有也本之六經以發其藴泛觀千載以極其變即事即物身親格之超然會夫大宗則徳進業廣有其地矣夫然故富貴不能滛貧賤不能移威武不能屈居天下之廣居行天下之大道致君澤民真古所謂大臣者矣然則學其可忽乎詩云如切如磋如琢如磨此之謂也某旣以此吿客扵荆州之别也遂書以為獻送岳主管序岳大用求予贈行之言予惟大用先世有勲伐于王家不幸中遭竒禍海内所歎而大用兄弟落南之乆困厄流離亦云極矣險阻艱難亦嘗之備矣天日照臨舊誣昭白大用扵此時得以自申人皆為大用喜而予獨有說焉孟子謂生扵憂患而死扵安樂士之處憂患也日兢兢焉蹈難而履危有所恐而不敢肆生云者言其良心苖裔之發是固生道也若夫由乎安樂之中而不知省察狃扵安則怠流扵樂則肆怠且肆則放僻邪侈所由起其苖裔濯濯而本心淪喪矣雖然君子之處安樂也亦豈得而溺之哉素而行之心豈有二乎今大用比之曩時庶㡬日趨安樂之地矣獨願勿忘其初焉念先世之忠勤哀當時之禍變則夫孝愛之根于心者油然生矣感國家不貲之恩思報稱之無所則夫忠義之根于心者油然生矣一飲食一起居皆不忘乎是凛凛乎惟恐不得嗣其先也則是心常存怠與肆無自而滋長雖處安樂烏得而溺之哉以大用之敏爽試以是自勉逺業其可旣乎乾道五年二月甲午朔送曽裘父序予聞南豐曽裘父之名舊矣所謂直諒多聞古之益友歟今年秋始見之于長沙則非特如前聞抑有過焉蓋將潜心夫大學之源其所至未易度量也予念世衰共學者鮮天資秀羙之士徃徃為他岐所䧟溺而不反及見吾裘父立志之逺且大也願交之心豈不慰哉然㑹面未乆而裘父歸扵予心拳拳有不能已者雖欲無言得乎嗟乎道之不傳也乆矣維天之命扵穆不已無一息之或間無一氣之或停大和保合品彚流形則道豈有隠而不傳者乎其不傳也人自隔之耳人柰何而隔之物欲誘引偏倚滯吝拘扵形器而不能通也將以極夫上逹之事豈可不深惟之乎人受天地之中以生有是心也天命之謂性精㣲深奥非言所可窮極而妙其藴者心也仁者心之所為妙也仁之意至親切而親切不足以形之仁之體至廣大而廣大不足以名之然求之之方夫豈逺乎即吾視聽言動之著不可掩也有能扵此逹其端而㑹其源超然得之扵形器之表則洋洋上下體物不遺人仁而道不窮矣極其致則天也由孟子以來蓋干有七百餘嵗河南程子實聞而知之某也學乎程子之門者也豈能盡窺宫墻之羙哉以其所知而言之未知合與否也憂患不文獨以致朋友切嗟之義而因以求益云異時重逢相與察日新之得則斯言亦或有取焉爾送方耕道序莆陽方耕道為尉善化予瞷之熟矣天資耿介臨事不苟問于其所部則翕然稱其清未嘗擾民也間從予講論問辨扵其秩滿而歸旣惜與之别且將有望焉則從而告之曰人之性善然自非上智生知之資其氣禀不容無所偏學也者所以化其偏而若其善也氣禀之偏其始甚㣲惟夫習而不察日以滋長非用力之深末由返也故傳稱强矯强矯云者揉而正之也顧耕道無恃夫天資之羙必深察其所偏致知力行勉自矯焉異時相見當觀氣質變化之淺深而知學力之進否也耕道勉之哉耕道起而請曰某亦頗知病之所在矣其將何以藥之乎予又告之曰語所謂一言而可終身行之者其恕乎而其道乃在扵已所不欲勿施扵人而已要湏從事扵此乃知聖人之言真為要切也升髙自下陟遐自邇涵泳體察乆而勿舎則氣之暴者可得而平量之隘者可得而擴患其近扵薄者將日趨扵忠厚患其失扵易者將積而為敦篤是則强矯之功也氣質益化則天理寖存睟面盎背端有不可掩者學其有窮極哉如某者方朝夕自矯其偏之不暇異時亦望吾子有攷焉遂書為贈行之序送劉圭父序武夷劉圭父道長沙省其兄予獲識之扵其行也徴贈言之義至于再三顧予者方自藥其病之不暇而何足以問所宜嗟乎道二義與利而已矣義者亘古今通天下之正逵而利者犯荆棘入險阻之私逕也人之秉彛固有坦然正逹之可遵而乃不由之而反犯荆棘冐險阻顛㝠終身而不悔獨何歟血氣之動扵欲也動扵聲色動扵貨財以至扵爵禄之可慕則進以求逹知名之可利則銳扵求名不寧惟是凢一日夕之間起居飲食遇事接物苟私已自便之事意之所向無不趨之則天理滅而人道或㡬乎息矣其胸次營營豈得湏臾寧處扵斯世亦僥倖以苟免耳徒知有六尺血氣之軀而不知其體元與天地相周流也豈不可惜乎雖然義内也本其良心之不可以自己者反而求之夫豈逺哉以圭父之才又盛年其仕扵時也人固曰宜而以親疾之故求祠官方將杜門専意惟所以承顔節適者是念是圖而弗暇它顧也則圭父之心豈與世之長騖扵利者比乎願圭父以是焉觀之念慮之起必察其為義乎為利乎詭遇獲禽雖若邱陵吾弗屑也則所謂良心之不可以已者將日引月長旣乆且熟㡬㣲毫髪了然坐判扵胷中私逕永絶正逵大通駟馬駕安車而王良造父為之先後夫孰禦焉如僕不敏當䇿蹇以相與彷彿也送嚴主簿序吾友陳擇之為予言其鄉人章君嘗謁端明汪公請所以教汪公告以當以正大為本章君它日以語吕伯恭伯恭謂當守斯言某以為斯言信羙矣然道之浩浩要有下手處在學者扵正大若何而存之盍試思夫人之所以不正大者果何由哉抑嘗為之說曰有所偏黨則不正矣有所係吝則不大矣是二者皆私也纎毫之萌則正大之體亡矣是當涵泳乎義理之中敬恭乎動靜之際察夫偏黨係吝而克去之則所謂正大者蓋可存其體而得其用矣不然則扵此雖歎羙想象之不暇終亦莫由進也㑹吾友嚴慶曽當赴官清湘扵其行也書以為贈言淳熙二年至前十日送鍾尉序善化尉鄱陽鍾彦昭官滿吿歸求予言予頃為彦昭賦淇澳之首章請更推其義昔者洙泗之上蓋嘗舉是詩矣子貢問貧而無謟富而無驕何如夫子以為未若貧而樂富而好禮子貢則舉如切如磋如琢如磨以對而夫子以為可與言詩嗟乎子貢誠深扵詩者也然氣質雖羙而有限天理至㣲而難明伊欲化其有限而著夫難明其惟學而已矣學也者所以成身也無以成其身則拘扵氣質而不能以自通雖曰有是善而其不善者固多矣抑其所謂善者亦未免日淪扵私意而不自知也就其中雖間有所禀特異扵衆者其事業終有盡量為可惜何者天理不明本不立故耳嗟乎恃羙質而不惟進學之務是亦自棄者也夫貧而無謟富而無驕質羙者可能至扵貧而樂富而好禮非有見乎天理者不能然也蓋所謂樂者果何樂也耶而其好禮何以謂之禮也以樂與好禮視無謟無驕其氣象不翅羙玉之扵碔砆也夫子開之以大道而進之以天理賜所以自省者深矣故引切磋琢磨以對賜知夫樂與好禮非學則不能也若賜亦可謂逹也已矣故大學傳曰如切如磋者道學也如琢如磨者自脩也大學之云道學猶言致知也而云自脩則力行也致知力行互相發也蓋致知以逹其行而力行以精其知工深力乆天理可得而明氣質可得而化也彦昭慤而靜質可謂羙矣然其謂無以羙質為可恃誦歌淇澳之詩而玩味子貢之所聞而力進乎大學之道一朝喟然而嘆曰淵哉天理乎大哉學乎聖人不吾欺也則其趣將無窮而不可以已矣某之不敏相觀而善政有望焉送猶子煥炳序姪子煥炳扶持母喪西還求予言以自警煥炳之祖四十一伯父雍公第三子也先公嘗言伯父天資俊邁勁特十三四操筆為文章即有聲入上庠諸老生爭見之識度不凢方先公兒時毎期以公輔且貽之詩有曰文武兼資真丈夫又曰許身莫譲稷與契其意蓋可見也見京師繁盛竊有翁仲銅駞之歎指當時貴人京甫軰謂朋友曰此軰行亂天下矣所志甚逺不幸才踰三十奉廷對未及唱第而沒先公撫予兄仲隨如子仲隨亦僅及中嵗嫂氏守節復不登壽予兄弟雖不敢忘先志愛存給育惟力是盡在此行也然亦豈無望扵二姪哉予家起寒素豫公雍公以儒學顯至扵我魏公逢時之難身任天下之重徳業光顯予兄弟藐然惟懼荒墜不克承抑望扵我宗共勉勵以羽以翼以無替我家二百年之軌範上焉親師求仁發明天地之全古人之大體居則講業傳道出則繼我魏公之業次焉尤當服孝弟忠信之訓飭身謹行無為門户羞吾姪之歸于鄉也治喪事奉祭饗事長撫幼予將有觀焉念祖先積累之艱勤而朝夕悚惕毋放于欲毋狃于逸毋交非朋毋從事于奢靡則予有望予又將察焉其能乆守是也則復有進焉嗚呼尚深念哉諭俗文權發遣靜江軍府事當軄到任訪聞管下舊來風俗不羙事件理合先行告諭下項一訪聞愚民無知遇有灾病等事妄聽師巫等人邪說輙歸罪父祖墳墓不吉發掘取棺栖寄它處謂之出祖動經年嵗不得歸土契勘在法犯他人墳墓刑禁甚重豈有自己祖先旣已歸土妄謂扵已不利自行發掘扵天理人情豈不傷害牓到日如有出祖未歸土者仰限一月各復收葬過限不葬及今後有犯上項事節並許人陳吿依條施行一訪聞愚民無知喪葬之禮不遵法度装迎之際務為華飾墟墓之間過為屋宇及聽僧人等誑誘多作縁事廣辦齋筵竭産假貸以侈靡相誇不能辦者徃徃停喪不以時葬曽不知喪葬之禮務在主扵哀敬隨家力量使亡者以時歸土便是孝順豈在侈靡無益亡者有害風俗一訪聞婚姻之際亦復僣度以財相狥以氣相髙帷帳酒食過為華靡以至男女失時滛辟之訟多徃徃由此曽不知為父母之道要使男女及時各有所歸婚姻結好豈為財物其侈靡等事一時之間徒足以欺眩鄉閭無知之人而在身在家所損不細若有不悛當治其尤甚者以正風俗一訪聞愚民無知生子多不舉在扵刑禁至重前後官司舉行戒諭非不丁寧徃徃習俗未能悛改人各有生莫親扵父母児女之愛何忍至此男女雖多它日豈不能相助營緝生計寧有反患不給之理以利滅親悖逆天道如有不悛許人吿捉支賞依條施行一訪聞愚民無知病不服藥妄聽師巫滛祀謟禱因循至死反謂祈禱未至曽不之悔甚至卧病在床至親不視極害義理契勘疾病生扵寒暑衝冐飲食失時自合問醫用藥治療親戚之間當興孝慈之心相與照管其鄰里等人亦合時來存問至扵師巫之說皆無是理只是撰造恐動使人離析親黨破損錢物枉壞性命上件誑惑百姓之人本府已出榜禁止捉押决定依條重作施行一訪聞郷落愚民誘引他人妻室販賣他處謂之捲伴詞訟到官追治監錮押徃尋覔縁此破蕩者前後非一不知懲戒其捲伴之人官司自合嚴行懲治外亦縁細民徃徃不務安業葺理農事多徃南州興販逐錐刀之利動經年歲不返鄉閭妻室無依以至為他人捲伴前去自今各仰依分安常營生自守保其家室無致招悔右上件事理並仰鄉民反復思念逓相吿諭父老長上教勸子弟共行遵依以善風俗或致犯法後悔難追各仰知悉南軒集卷十五
