body:
  text: 南軒集卷三十二宋張栻撰答問答吕子約樊遲問知子曰敬鬼神而逺之可謂知矣所謂知者知鬼神之德是已知事乎此則敬敬則有事乎此矣有事乎此勿忘勿助則鬼神著矣故其洋洋如在者狀其昭著云耳於此知之有所未明體之有所未盡迫切而求的見則愈近而愈妄愈親而愈非計度想料妄而益妄所謂鬼神之德何從而可識乎其為不知孰大於是中庸論鬼神之德如曰視而不見聽而不聞而又繼之曰體物而不可遺觀乎此恐是敬而逺之之旨敢祈指誨遺書中有一段或問知鬼神之道然後能近能逺否曰亦未説到深處且大綱説當敬不惑也迫切而求的見則愈近而愈妄愈親而愈非此數語好但更當深思孔子答子路之意敬鬼神而逺之可謂知矣惑而信之非知也孟浪不信非知也能近能逺始謂之知敬而不能逺者則其敬也生於畏禍與福而已非所謂敬也逺而忘乎敬者則其逺也生於忘禍與福而已非所謂逺也二者均於疑以為有疑以為無非的實有見乎此兩句固大綱説示人以知之事然非知鬼神之情狀則安能敬而逺之乎敬鬼神而逺之或問伊川知鬼神之道然後能敬能逺否先生曰亦未説到如此深逺處且大綱説當敬不惑此是玩味經旨之法若更别生出事卻失了當時意氣聚則生氣散則死大化一移升於天者為魂氣落乎地者為體魄魂遊魄降形質安有其理固然然暗處獨行畏心或生則疑以為或有豈非緣於習俗而中主不立故耶又豈非隱微之中神明集舍而自有不可掩者耶今固不敢徇於流俗而返之於理然孟浪不信卒然撞出駭異之事安敢自保其不為所移乎如魂魄之影響奪胎受蔭之説理安有之然亦當了然無疑乃為可耳窺識髣佛何得於己此等事不可放過須窮究到實然無疑處不然被一兩件礙阻著或為異説動了未可知也君子上交不諂下交不瀆何以謂之知幾其神乎交際易於因循上交主於恭過其則斯為諂下交主於和過其則斯為瀆能持而不失非知幾其能之乎聖人論介于石之義而獨以上下交之事為言惟篤實為己者知其為甚切要也答嚴慶胄昔聞五峰先生曰心可潛不可用然孔子有曰羣居終日無所用心孟子有曰堯舜之治天下豈無所用其心哉然則孔子之言非歟又心所以宰萬物者如用之果誰用之耶言各有攸當細味其輕重可也孟子曰仁人心也則仁即心矣然又曰以仁存心似又以心與仁為二物何也夫心也仁也果可為二物歟自非中心安仁者須以仁存心若如所言是都不假用力也禮曰中心斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而易慢之心入之矣云入者自外之內之辭也心本在我何以言入心本無鄙詐易慢而鄙詐易慢生焉猶水本清為泥沙忽雜之也此須自體之知其自外入也答遊誠之明道先生曰發己自盡謂忠循物無違謂信表裏之謂也又曰盡己之謂忠以實之謂信忠信內外也九思思之所謂忠者無自欺也無自私也處閨門而為孝友處鄉閭而為謙恭交朋友而為信義推而至於日用之細者所謂出門如賔承事如祭坐如尸立如齊之類凡見於所言所為發於其中而著之於外者無有一毫不盡此心焉所謂信者是亦此心之發時因其應事於外而名之者也處閨門所當孝友則行其孝友處鄉閭所當謙恭則行其謙恭交朋友所當信義以至出門所當如賓承事所當如祭坐之容宜如尸立之容宜如齊因其理之有定當其可而無違是之謂忠信忠信本無二致自其發於內而言之之謂忠自其因物應之之謂信故曰表裏之謂也明道以此釋曽子之言曰為人謀而不忠與朋友交而不信為人謀則謀在我是亦發於中之意與朋友交則朋友在外是亦遇事而應之之意二先生論忠信內外大槩如此否盡於己為忠形於物為信忠信可以內外言亦可以體用言也要之形於物者即其盡於己者也玩程子之辭意義蓋包涵矣林放問禮之本伊川先生曰禮者理也文也理者實也本也文者華也末也理是一物文是一物注云此與形影類矣推此理則甚有事也發之於中有所見而不可見名之曰理故曰本行之於外皆得其稱粲然中理名之曰禮故曰文理譬於形禮譬於影形先正則影自正不知伊川之意如此否又謂甚有事者不知謂是每一事不問巨細便自各有本末否程子之意謂禮字上有理有文理是本文是末然本末一貫通謂之禮也然有理而後有文曰推此理則甚有事謂天地間莫不然也居敬而行簡不知敬存而簡自行為復居敬而尚當行其簡固是敬存而後簡行然亦須居敬而行其簡明道先生論持其志曰只這箇也是私然學者不恁地不得九思思之謂人之有志不能持之使常自覺其所在往往遇事則為氣所使顛倒失次而不能制與不自知其所以然者皆志不定故也使其志常定於內昭然不亂必不至遇事而失錯矣故志不可不持持之久而熟則必須自知以心驗之未見其為私明道謂只這箇也是私其意如何才涉人為便是私有箇持字便是人為然學者須從此用功由誠之進於誠煞有節次或問伊川先生必有事焉當用敬否曰敬只是涵養一事必有事焉須當集義只知用敬不知集義卻是都無事也九思思之若能敬則能擇義而行伊川謂知敬而不知集義為都無事不曉其旨又集義所生義生於心不知如何集居敬集義工夫並進相須而相成也若只要能敬不知集義則所謂敬者亦塊然無所為而已烏得心體周流哉集訓積事事物物莫不有義而著乎人心正要一事一件上集明道先生曰維天之命於穆不已不其忠乎天地變化草木蕃不其恕乎伊川先生曰乾道變化各正性命恕也侯子曰伊川説得尤有功天授萬物之謂命春生之冬藏之歲歲如是天未嘗一嵗誤萬物也可謂忠矣萬物洪纎高下短長各得其欲可謂恕矣九思謂維天之命於穆不已蓋一元之氣運行無息所謂天行健者也以其行健無息故能生生萬物而各稟此善意故曰恕其在人體之則曰乾乾誠意無毫髮間斷則發見於外斯能以已推之以心之所本既善則應人接物皆如其心可謂恕矣觀明道謂草木蕃於伊川言各正性命不見有差殊其在萬物得其所以蕃生便是正性命不知侯子何以分輕重兼謂維天之命為天授萬物者恐此天命只是天理伊川所謂在天為命不必須是授之萬物始謂之命故又謂春生冬藏歲歲如是未嘗誤萬物為忠恐此亦只是恕蓋已發者也九思所言忠恕與天命大意是否及所疑侯先生之言併乞詳教明道之言意固完具但伊川所舉各正性命之語為更有功忠體也恕用也體立而用未嘗不存乎其中用之所形體亦無乎不具也以此意玩味則見伊川之言尤有功處侯師聖所説忠字恐未為得二先生之意天命且於理上推原未可只去一元之氣上看孟子稱孔子曰操則存舍則亡出入無時莫知其鄉惟心之謂與或問伊川曰心出入無時如何曰心本無出入孟子只據操舍言之又問人有逐物是心逐之否曰心則無出入矣逐物是欲九思謂性之在人可以言不動心者性之已發已行安有無出入今人對境則心馳焉是出矣不必言邪惡之事只大凡遇一事而此心逐之便是出及定而返其舍是入矣兼孟子固已明言其出入為心矣而伊川謂心無出入不知逐日之間有出入者是果何物又有一處謂在人為性主於身為心謂在人為性則不可言出入既曰主於身為心凡能主之則在內不能主之則外馳是亦出入之意不知心之於性相去如何思慮之於心相去又如何心本無出入言心體本如此謂心有出入者不識心者也孟子之言特因操舍而言出入也蓋操之則在此謂之入可也舍則亡矣謂之出可也而心體則實無出入也此須深自體認未可以語言盡之耳孔子不恱於魯衛遭宋桓司馬將要而殺之微服而過宋伊川先生曰孔子既知桓魋不能害己又卻微服舜既見象將殺已而又象憂亦憂象喜亦喜國祚短長自有命數人君何用汲汲求治禹稷過門不入非不知飢溺自有命又却救之如此其急數者之事何故如此須思量到道並行而不相悖處可也注腳又謂今且説聖人非不知命然於人事不得不盡此説未是既曰並行而不相悖則是雖遇變與災自當盡其在我以為消變弭災之道變之消不消災之弭不弭則不可必然聖人隨事有以處之不歸之於命與數而不問者是謂並行而不相悖不知注腳何以再言此得非謂以命與人事為仁致歟若説聖人非不知命然於人事不得不盡是命與人事為二致豈足以明聖人之心哉當深惟聖人性命合一處答俞秀才修辭立其誠修辭所以立其誠意非從修飾為也若修飾則秪不誠矣平居亦當察此而聖人獨言於九三者蓋當危疑之地處人情之變辭危則易亢辭遜則易枉亦難乎有言矣於是焉而能修之則誠立矣修辭乃是體當自家誠意深味曽子之所謂出辭氣者則可知矣於九三言之者大抵謂君子之學如是故能盡乎處上下之道也不必云於是焉而能修之則誠立也蒙以養正聖功也蒙童之心純一而未發可與為善可與為不善在所以發其蒙者何如耳自此養之以正則易進於德及其至處則聖人也以純一未發之蒙而養其正可謂善矣若夫為不善則是為物誘而欲動非蒙之可與為不善也動則失其正矣蒙山下出泉蒙程先生曰水必行之物始出未有所之此意最深水由地中行行其性也遇險而止而行之性則未始止也若積盈則行矣故曰盈科而後進在人蒙昧之時而天命流通之理未始止也若果決其行涵養其明而至於盛乃養蒙之聖功也蒙之義只謂泉始出而遇險未有所之如人蒙稚未有所適貴於果行育德充而達之也育德之義尤當深體蒙之初六利用刑人人之昏蒙不教而誅之可乎蓋人之不善始發而絶之則易為力待其已發而後禁則扞格而難勝故曰童牛之牿元吉此爻且詳玩伊川之説韓愈所謂上中下三品者乃孟子所謂才也才雖不同而所以為性則一孟子論性善固極本窮源之論至謂非天之降才爾殊豈才果不殊耶抑所謂才者乃所謂性也才是資稟性是所以然性固行乎才之中要不可指才便謂之性然孟子所以謂之不殊者何也孟子之論才與退之上中下三品之説不同退之所分三品只是據氣稟而言耳孟子論才曰非天之降才爾殊也又曰若夫為不善非才之罪也蓋善者性也人之可以為善者才也此自不殊死生是氣之聚散鬼神是氣之精者耳萬物所以自形自色者即鬼神所見之迹也程先生謂往而不返謂之鬼則知方來不測謂之神鬼神之道即太極往來之實也即是觀之滿虛空中無非鬼神之妙用而人之所以齊明盛服以臨祭祀者蓋亦集自家精神其義固可體矣天下之理有則是有無則是無死生命也鬼神者託於幽者也然周公作書以告鬼神欲代武王之死世豈有是理耶無是理而周公乃行之亦必有道矣幸先生詳教之鬼神之義須更研究周公欲代武王之死只是渾全一箇誠意至誠可以回造化有是理也若夫金縢册祝之辭則不無妄傳者如元孫不若旦多材多藝不能事鬼神之類意者金縢之事則有之而册祝之辭則不傳矣九卦損德之修益德之裕復德之本履德之基井德之地恆德之固學者用工之實歟九卦有次序履德之基為先步步踏實地也答胡季隨遺書云有人胸中若有兩人焉欲為善如有惡以為之間欲為不善又若有羞惡之心者此正交戰之驗也持其志使氣不能亂此大可驗不知如何而持其志方其欲持志之時而二者猶交戰於胸中則奈何持志者主一之謂若曰欲持志之時二者猶交戰於胸中是不能主一也志不立也又云義理與客氣常相勝只看消長分數為君子小人之别嘗深思之謂誠然也而或云初不可如此分一言之善則天理矣一言之惡則人欲矣竊恐其言太快政如日月之運行寒暑之推移恐當進之以漸也所謂義理與客氣看消長分數為君子小人之别者謂一日之間察其所發孰多孰少爾天理只是天理人欲只是人欲都無夾雜念慮毫釐之間霄壤分焉此昔人所以戰兢不敢少弛也又云所見所期不可不逺大然行之亦須量力夫以學者力量較之聖人霄壤異矣若不一向自期以逺大而欲量力而行之恐或至於卑近而心之所期與身之所履分為兩段矣恐當先立學聖人之心日可見之行皆須為聖人之事然後內外貫通耳所謂行之亦須量力者恐學者貪高慕逺躐等以進非徒無益而又害之也大抵學者當以聖人為凖的而自邇自卑循序不舍斯有進益耳又云天下善惡皆天理謂之惡者非本惡又云事有善有惡皆天理也天理中物須有美惡孟子曰人之性善皆天理也既非本惡則人欲矣恐非天理中物天理中恐亦著惡字不得事物之始無有不善然二氣之運不齊故事物之在天下亦不容無善惡之異謂之惡者非本惡因其不齊而流為惡耳然亦在天理中也所貴乎人者以其能保其性之善不自流於惡為一物耳又云學者須敬守此心不可急迫當栽培深厚涵養於其間然後可以自得今於下工夫之時不痛自警䇿而遽栽培涵泳不知何所栽培涵泳恐或近於放倒也敬守此心栽培涵泳正是下工處若近於放倒則何栽培涵泳之有又答一日克己復禮天下歸仁蓋是積纍工夫到處非謂只勇猛便能如此如釋氏一聞一超之説也如云尚何序之循又何必待於自邇自卑而後有進此等語意全不是學者氣象切宜戒之所謂循序者自灑掃應對進退而往皆序也由近以及逺自粗以至精學之方也如適千里者雖步步踏實亦須循次而進今欲濶步一蹴而至有是理哉自欺自誤而已前日謂一氣之運不齊故事在天下不容無善惡之異云者論氣故不容無善惡之異且須將程子遺書詳考精思未可易而言也人固有秉彛若不栽培涵泳如何會有得古人教人自灑掃應對進退禮樂射御之類皆是栽培涵泳之類若不下工坐待有得而後存養是枵腹不食而求飽也南軒集卷三十二
