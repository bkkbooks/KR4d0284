body:
  text: 南軒集卷二十七宋張栻撰書答李賢良仲信比承奉對天陛正學以言歸拜親庭榮則多矣竊在遊從深用慰歎未及具問來教先貽佩戢至意即此春晚伏惟侍旁從容德履勝裕國家稽古建科得人為盛中雖廢於邪臣卒莫掩於公議逮兹舉首乃得昌言將必有聞風而起者幸甚幸甚雖然盛名之下難居而問學之方無窮責人者易為言而克己者難其功任重道逺惟益勉之以副蘄望某歸來舊廬已三閲月無事可以讀書玩味存察不敢墯弛惟孤陋少友是懼每馳情於公家父子兄弟間也因來尚警告之西泝未有日否臨紙更切依然重幾良食自厚答李叔文某自舟中草草具謝爾後不克嗣音辱近告從審侍履萬福慰甚某歲前抵舊廬應接殊不暇數日來方得從事簡編中但可與講論者極患其難得耳幸教以少康而下中興説敬已詳觀少康年次邵康節皇極經世中以寒浞滅相係於壬寅是嵗或癸卯少康生而克復舊物乃在癸未凡四十有一年方少康在襁褓而夏之臣靡固有滅浞而立之之心經營許久乃遂其志若靡者可謂忠之盛者矣方寒浞在上澆豷縱橫之時少康獨有田一成衆一旅其勢可謂湮微而卒用以興其間圖回謀慮必大有曲折惜不復傳於後猶幸有左氏傳所載耳要之靡與有鬲氏有仍氏皆佐少康以有為者也若使少康之君臣此數十年中不忍而欲速則身且不保而况國乎惟其潛也若深淵之靚故其發也如春陽之振動惟其時者也恐當以是觀之燈下布復它冀以時厚愛答李季修某别來無日不念辱近問為慰垂示浩氣集傳足見留意亦一再觀矣大抵論學之難如此等要切處須涵泳體認持之以久方能通達若只以已意懸斷則失之逺矣如蘇與秦之説辨則辨矣然只是以聰明揣量非講學之道也且是未識心之所以為心既未識心則所謂浩然之氣者安所本哉本源既差則其立言何適而非病縱使時有一二語摸度近是亦非是也後生顧豈當議前輩然講學不可不精於決擇雖毫髮亦不容放過况本源初未是者哉今當本孟子之意而參以程子之説孟子以集義為本程子以居敬為先皆其深造自得者然也學者於是二者朝夕勉焉循循不已則所謂浩然之氣者淺深當自知之若不於此下工遽欲想象強氣體使之充正是助長之甚者其為害反大矣以直養之説要將直來養氣便是私意有害於養故孟子只説養而無害不是將一物養一物也與涵養以敬自大不同敬便是養也敬者心之道所以生生也與直字義異須細味之所問大學正心之道克己所以治怒明理所以治懼程子固嘗言之至於憂患好樂所以治之者亦不越乎此蓋克已所以治好樂而明理所以治憂患也大抵用工處克己明理二端而已如前所云居敬則克己在其中集義則明理在其中亦是二端也汪玉山所謂二程語録嘗因探討一事即為刋正數處此論亦未然蓋在已若見未到看先生説話未出却便據已見刋正豈不為害要須平心易氣深潛默體於其疑則與師友講論問辨焉可也諸葛忠武傳録呈有當刪正及當增益者不惜示及家亦有集但殊不類諸葛公語當非本書王子思所編似太草草某中間所載公之語云吾心如稱不能為人作輕重乃得之貞觀政要中不知向前别曽有處載此否劉子澄亦得書仲信令兄必歸侍旁煩為致意某見吾友下問之誠據鄙懷不敢有隱切不必示它人也寒甚呵筆奉此更惟自愛又兩兄既皆歸子職良厪孟子論事親為仁之實蓋人心之至親至切孰尚乎此此實問學之根抵也所諭敬之説謂用力誠不可怠惰而向晦宴息亦須隨時某以為向晦入燕息乃敬也知向晦燕息之為非怠惰乃可論敬之理矣答胡廣仲向來臨行時所示講論一紙連日尋未獲然其略亦頗記得矣大抵某之鄙意以為民受天地之中以生均有是性也而陷溺之陷溺之則不能有之惟君子能存其良心故天性昭明未發之中卓然著見涵養乎此則工夫日益深厚所謂存心養性之妙然而其見也是心體流行上發見矣不是有時而心有時而性也此精微處須究極之只為世間人思慮紛擾百出故無未發之時自信不及此話須要以收放心為先此意非言語可盡逺書姑道萬一試更與伯逢德美共思不可以舊所安為至更不研窮也某所見亦豈敢自以為是亦幸往復焉又龜山所得誠甚𢎞裕但宣和一出在某之隘終未能無少疑如劉元城然以聖門論之恐自處太高磨而不磷涅而不淄在聖人乃可言自餘高弟如閔子騫蓋有汶上之言矣至於以世俗利心觀龜山者則不知龜山者也何足辨哉前輩未容輕看然吾人講學則不可一毫有隱爾又來書所謂性善之説於鄙意殊未安夫善惡相對之辭專善則無惡也猶是非相對之辭曰是則無非矣性善云者言性純是善此善字乃有所指若如彼善於此之善則為無所指而體不明矣而云如彼善於此之善非止於至善之善不亦異乎且至善之外更有何善而云恐人將理低看了故特地提省人使見至善之淵源無乃頭上安頭使人想象描貌而愈迷其真乎切幸更精思之也主一針之諭甚荷但某之意正患近來學者多只是想象不肯著意下工伊洛老先生所謂主一無適真是學者指南深切著明者也故某欲其於操舍之間體察而居毋越思事靡它及乃是實下手處此正為有捉摸也若於此用力自然漸覺近裏趨約意味日别見則為實見得則為實得不然徒自談高拽妙元只在膠膠擾擾域中三二十年恐只是空過了至善之則烏能實了了乎針之作亦以自警云爾更幸察焉却有以見教是望正作此書間又領葉家便價所持帖尤慰所諭大學知止知至之説大略是如此蓋知止是知其所止慮而後能得得是得其所止未至於得未可謂知至也然易所謂知至而曰至之此知至字却須輕看而至之者乃大學知至者也如何尺紙無由盡意加以私家有少修造未能詳幸察答直夫甚矣學之難言也毫釐之差則流於詖淫邪遁之域生於其心害於其政發於其政害於其事可不畏與世固有不取異端之説者然不知其説乃自陷於異端之中而不自知此則學之不講之過也試舉天理人欲二端言之學者皆能言有是二端也然不知以何為天理而存之以何為人欲而克之此未易言也天理微妙而難明人欲洶湧而易起君子亦豈無欲乎而莫非天命之流行不可以人欲言也常人亦豈無一事之善哉然其所謂善者未必非人欲也故大學之道以格物致知為先格物以致知則天理可識而不為人欲所亂不然雖如異端談高説妙自謂作用自在知學者視之皆為人欲而已矣孟子析天理人欲之分深切著明如云今人乍見孺子匍匐將入于井皆有怵愓惻隱之心非所以內交於孺子之父母也非所以要譽於鄉黨朋犮也非惡其聲而然也蓋乍見而怵愓惻隱形焉此蓋天理之所存若內交若要譽若惡其聲一萌乎其間是乃人欲矣雖然怵愓惻隱蓋其苗裔發見耳由是而體認其所以然則有以見大體而萬理可窮也內交要譽惡其聲亦舉一隅使學者推之耳日用之間精察不舍則工夫趣味將有非言語可及者某愚而所從事者在是願高明紬繹而反復焉庶幾其有益也念無以復來意不覺多言伏紙悚戢答范主簿伯崇書説比寄酒誥到元晦處曽見否某近讀諸誥反復其溫厚和平之氣深足以感發人若夫編簡脫誤可疑處則不必強為之説也垂諭仁之説若只將做周流無滯礙氣象看了却只是想象又云其所以然者乃仁也不知其所以然者果何歟願只於日用間更因其發見苗裔而深察默求之勿舍勿棄當的然見其樞機之所由發者矣答舒秀才周臣别紙之諭備見至意某向者受五峰先生之教浹于心腑佩之終身而先生所造精微立言深切亦豈能盡窺其藩向者元晦有所講論其間亦有與鄙見合者因而反復議論以體當在己者耳固吾先生所望於後人之意也如晦叔廣仲伯逢皆同志者故以示晦叔而晦叔復以示二公庶幾往返之有益耳蓋嘗丁寧不可示之非其人其間所論有前後之不同者蓋旋據窺測所到而言何敢執一而不惟其是之從也若世俗之人以私意淺量觀者亦無如之何但此議論只當同志者共紬繹所疑不當遽泛示以啓見聞者輕妄心也若左右謂以為成書而傳之則大誤矣答宋教授講聞令譽為有日矣兹辱過訪開慰可知且蒙委貺盛文退而三復非惟辭氣暢裕使人歎愛而有以窺所志之逺大欣幸曷勝第某不足以當之也自惟不敏雖有志於古道而晨夕自省矯偏救過之不暇其何能有益於人邇來愈覺論學之難蓋升高自卑陟遐自邇學者多忽遺乎所謂卑與邇者而渺茫臆度夫所謂高與逺者是以本根不立而卒無所進彼蓋未知聖賢本末精粗非二致而學之有始有卒也左右謂二程先生之説天下知誦之而不知習察之功謂之不傳可也斯言是也以左右之高明而欲從事乎此其何可量願因下問紬繹其端惟不以為卑與邇而忽焉則幸甚幸甚答俞秀才垂諭足見紬繹不輟所謂一隂一陽之道凡人所行何嘗須臾離此此則固然然在學者未應如此説要當知其所以不離也此則正要用工夫主敬窮理是已如飢食渴飲晝作夜息固是義然學者要識其真孟子只去事親從兄上指示最的當釋氏只為認揚眉瞬目運水般柴為妙義而不分天理人欲於毫釐之間此不可不知也自餘並見别紙幸詳之有以往復甚幸答喬德瞻觀來書有以見玩繹不廢甚幸近日學者論仁字多只是要見得仁字意思縱使逼真亦終非實得看論語中聖人所言只欲人下工夫升高自下陟遐自邇循序積習自有所至存養體察固當並進存養是本工夫固不越於敬敬固在主一此事惟用力者方知其難來諭謂舊雖知有主一無適之言至臨時又難下手夫主一無適正為平日涵養遇事接物方不走作非可臨時下手也諭及陸薛徐三君恨未之識敬亭記潘叔昌寄來方見之敬則實實則虛之意遺書中已有但虛則無事矣亦疑傷快了蓋無事字殺此段意思不了如明道云兩忘則澄然無事矣無事則靜靜則明便完全近看惟二先生説話完全精粹比其它先生不干事其次則尹又其次則楊方到謝上蔡後生何足以窺前輩但講論間又不可含糊耳更以其大者移於小物作日用工夫語大意固好亦疑立言有病也又所謂靜思與臨事有異要當深於靜處下涵養之功本立則臨事有力也某自覺病痛如此不敢不勉願與同志者共之耳又來諭克己之偏之難當用大壯之力誠然也然而力貴於壯而工夫貴於密若工夫不密雖勝於暫而終不能持於久而銷其端觀諸顔子沈潛積習之功為如何哉有不善未嘗不知知之未嘗復行非工夫篤至久且熟者其能若是乎别紙一一答去有以復之是望答潘叔昌來書所謂思慮時擾之患此最是合理會處其要莫若主一遺書中論此處甚多須反復玩味據目下看底意思用工譬如汲井漸汲漸清如所謂未應事前此事先在既應之後此事尚存正緣主一工夫未到之故須是思此事時只思此事做此事時只做此事莫教别底交互出來久久自别看時似乎淺近做時極難某比作主一針為一相識所刋其間亦有此意又所諭收斂則失於拘迫從容則失於悠緩此學者之通患於是二者之間必有事焉其惟敬乎拘迫則非敬也悠緩則非敬也但當常存乎此本原深厚則發見必多而發見之際察之亦必精矣若謂先識所謂一者而後可以用力則用力未篤所謂一者只是想象何由意味深長乎言不逮意更幸思之又來諭於主一用工此正所望若實下手乃知其間艱難曲折甚多要須耐苦辛長逺而勿舍焉則寖有味為仁由已而由人乎哉勉之勉之如某孤陋正有望於諸友講益也答潘叔度來書得以窺近日所存甚幸但以鄙見尚恐未免於迫切之病如云以是心事親則為孝以是心從兄則為悌視聽言動無非是心推之無所不用其極之類辭氣皆傷太迫切要當於勿忘勿助長中優遊涵泳之乃無窮耳孝弟為仁之本遺書中有一段説非是謂由孝悌可以至仁乃是為仁自孝悌始此意試玩味之又垂諭吕蘇所苦思慮紛擾之患大是難事可見近思之功主一之謂敬無適之謂一持守誠莫要乎此要是久益有味耳孝弟為仁之説某近來玩程先生為仁自孝悌始之意極為精切若如來説於事親從兄之時體孝悌所從出則仁可識却未盡蓋未免將一心體一心之病更幸深思之孟子論勿忘勿助長後引揠苗為喻言助長為多蓋學者雖或知忘之為害而未知助長之甚故返復言之也答潘文叔所諭雖間有平帖安靜之時意思清明四體和暢念慮不作覺無所把摸遇事接物則渙散矣此蓋未能持敬之故所謂平帖安靜者亦只是血氣時暫休息耳且既曰覺無所把摸烏得為安靜乎敬則有主宰涵養漸熟則遇事接物此意思豈容遽渙散乎主一之義且深體之答潘端叔細觀書辭有務實近本意味良愜所望致知力行要須自近步步踏實地乃有所進不然貪慕高逺終恐無益近來士子亦往往有喜聞正學者但多徇名遺實反覺害事間有肯作工夫者又或不奈苦辛長逺若非走作即成間斷亦何益也吾友勉之論語不可一日不玩味伊川易傳亦宜細讀某近年來讀此二書益覺有深味耳答周頴叔垂諭學者茍有一毫靠外之心其工夫未得為真實是也但才不近裏便是靠外分毫之間為難察正當用力不可易言也又謂今且據面前識得一字便勉行一字非敢求近功亦是也但未知今所識者何字而所行者何味也它時有便不惜詳示庶可往復蒙益耳又來諭學貴力行本無許多事何言之易也學固是貴力行然所謂力行者煞有事聖門教人循循有序始終條理一毫潦草不得工夫蓋無窮也計必常從正字講論惟深思而勉之答戚德鋭垂諭心量褊狹是已太重之病伯恭相勉看西銘善矣第某尋常切謂西銘須是全篇渾然體認涵泳之所謂理一而分殊者句句皆是也人只被去軀殼上起意思故有許多病痛須是體認公共底道理此所貴日用間實做工夫却不可想象臆度也又所諭居敬雖收斂此心乃覺昏昏不活而懈意漸生夫敬則惺惺而乃覺昏昏是非敬也惟深自警厲以進主一之功則幸甚答鄭仲禮許時過從别來懷想自到郡竭日夕之力不敢不勉䇿但恐終無補斯民耳連日沛澤早晚稻皆濟憂國願年豐此第一義也仲禮與伯壽想不廢講論湘中諸友樂聞者固多真肯下工夫者為誰使人憂之二友宜力勉也又承書審聞還自莆中起居一向清勝為慰某于此嵗半矣日夜黽勉將勤補拙未知還能及民萬分一否示及所講深喜相與不廢想共伯夀常常紬繹要須栽培深厚日用間絲髮勿放過不可只作説話也仍互相點檢為佳耳新刋兩書寄去中庸之説宜玩味諸友有可以見示者皆不惜頻寄南軒集卷二十七
