body:
  text: 南軒集卷六宋張栻撰律詩某敬采民言成六韻為安撫閣老尚書壽伏幸過目里胥不踏桑麻路桴鼓長間花柳村都在邦君和氣裏賣刀買犢長兒孫前時勸君出東郊父老歡呼望羽旄甘雨便隨車馬到眼看霑足遍蓬蒿清坐鈴齊公事稀春來風日更遲遲胸中水鏡渠自避却笑缿筒徒爾為蜀江東下接襄江揔是當年蔽芾棠此地回旋莫嫌窄且教春色滿三湘公今卧護足從容豈有扁舟欲便東少待政成歸帝所此邦還在化鈞中湘民清曉壽邦君下客慚無句語新敢述老農歌誦意一觴持上太夫人夜得嶽後庵僧家園新茶甚不多輒分數碗奉伯承小園茶樹數十許走寄萌芽初得嘗雖無山頂煙嵐潤亦有靈泉一𣲖香四月四日飲吳仲立家梅桐花下吳伯承以事不至寄詩來次韻翠蓋亭邊春色歸還來把酒及開時坐無車公歡意少猶得風前讀好詩題湘潭丞黃子辨哦松軒黃子官居多暇日吟哦薄暮一窗中雖無㶁㶁循除水但覺颼颼滿屋風筠州曽使君寄貺中州新芽賦此以謝黃蘖山前水繞沙春風吹石長靈芽午窗落磑飛瓊屑嗚碗翻湯湧雪花日長燕寢無公事忽憶故人雲水邊包裹甘芳慰幽獨使君風味故依然仲春有懷青山四面擁江城暮角聲中淡月明自倚䦨干生白髮無心行樂趂春晴西湖景物元瀟灑楊柳新來兩岸垂亦有遊人往來否不應間過看花時老木髙枝不可攀玉泉飛出半崖間如何借得清冷水一洗瘡痍為解顔楚翠亭邊花正開道鄉臺下石崔嵬主人今有此客否客亦思君日百回想見城南春水深春來夜夜動歸心隔墻李子應無恙為託飛鴻寄好音次韻無為使君尊兄見寄之什江山接境相望近風雨一春音問踈安得從公苕霅上幅巾一葉卧看書從呂楊州覔芍藥裁揚州風物故依然夢想他時楚水邊乞與靈根歸自種梢頭繭栗看新年鶴月底風前意味多不妨佇立勝婆娑軒中君子知多少遣汝乘軒看若何望廬山却望廬山倚柁樓半空宿靄未全收蒼然五老獨獻狀似欲勸人求一逰十二月乙卯登嶽陽樓丙辰再登維舟徑上嶽陽樓風雨排空暝不收明日重來天色好君山元自翠光浮舟行湘隂道中雪作歲晚歸來風雪裏有懷端復為誰開江清沙白湘隂路却似當年訪戴回登樓風雨經旬只閉門朝來倚檻巳春深不知花片飛多少但覺江城滿緑隂題城南書院三十四詠差差竹影連坡靜細細荷風透屋香午寂睡餘聊隱几人間何用較間忙新竹成林蕉葉青隔籬深處有蟬鳴晚凉更覺長堤靜自繞荷花待月明階前樹影開還合葉底蟬聲短復長睡起更知茶味永客來聊共竹風凉新凉物物有精神靜倚書窗聽雨聲忽憶豫綦元未解强分天籟太粗生凌晨騎馬路新凉來挹湖邊風露香妙意此時誰共領波間鷗鷺靜相忘林塘過雨不勝秋萬蓋跳珠寫碧流倚檻孤吟天欲暮更穿芒屩上方舟山色頓清秋欲半湖光更净日平西凉風獵獵低荷蓋歸翼翩翩度柳堤湖邊小築喜新成秋入西山照眼明不是厭喧來覔靜四時光景本均平秋風颯颯林塘晚萬緑叢中數㸃紅若識榮枯是真實不知何物更談空移得幽蘭幾本來竹籬深處手栽培芬芳不必紉為佩月白風清取次開今年少雨菊花遲青蘂方開三兩枝但得悠然真意在青山何處不相宜秋後冬前一月晴小園佳處日經行半山木落樓臺露幾樹霜餘橘柚明鐃鼓喧豗十里城人情正喜上元晴瘦笻獨立湖邊路却有白鷗同眼明和風習習禽聲樂晴日遲遲花氣深妙理冲融無間斷湖邊佇立此時心曉來天氣便清新獨倚闌干正暮春花落花開鶯自語東風吹水細鱗鱗花柳芳妍十日晴五更風雨送餘春莫嫌紅紫都吹盡新緑滿園還可人並湖數畝新疏闢便有魚兒作隊行我亦隨流浮小艇晚凉細看縠紋生無言桃李也成隂葉底黃鸝自好音一縷爐煙清晝永韋編卷罷短長吟化工生意源源在靜處詳觀揔不偏飛絮滿空春不盡新荷貼水巳田田野艇新成尋丈許栁堤橘浦足周旋添蓬不但為遮日凖擬乘凉聽雨眠暮從别墅跨驢歸風雨蕭蕭泥濺衣出門回首且按轡細聽泉聲和式微隂隂松竹影自轉午枕無人到北窗何許狂風來動地夢回波浪洶春江踈竹蕭蕭正雨聲眼中日影又還晴鈎窗燕坐夏將半荷葉已香湖水清莫道間中一事無間中事業有工夫閉門清晝讀書罷掃地焚香到日晡亭畔薰風盡日凉來從水面過新篁悠然但覺盈襟抱千古虞絃意未央拍堤水滿草茸茸盡日野航西復東欲去未須愁日暮月明波面更溶溶烏雲夭矯風作惡雷奔電掣雨懸河須臾天宇復清霽突兀西山紫翠多朝陽初上藕花香下馬虛亭一味凉山鳥自呼魚自樂誰云身世可相忘北窗竹簞午隂凉亦有清風到我旁還與陶公事同否未妨諸子細商量睡覺西山月正平荷香不斷曉凉生園中㕠鶴知人意已作金風警露聲西風夜半摧炎暑曉看雲橫天際秋時序轉移皆妙理惟應及早戒衣裘新凉修竹意愈靜初日芙蕖色倍鮮物態直須間裏見人情多向快中偏四面紅蕖鏡緑波晚凉奈此野情何慿城更覺看山穩入戶還欣得月多殷雷終日在前山風卷雲環意作難泊暮有懷空佇立忽然飛雨到闌干臘月二十二日渡湘登道鄉臺夜歸得五絶三年不作山中客才踏船舷眼便明曳杖直登千尺磴尚欣腳力慰生平舊日書堂倚翠屏只今棟宇尚髙明門前恍若聞絃誦㶁㶁繞牆流水聲道旁老松髙拂雲刳心取明彼何人說與往來須愛護雪霜時節看長身人來人去空千古花落花開任四時白鶴泉頭茶味永山僧元自不曽知湘江歲晚水清淺橘洲霜後猶青葱歸舟著沙未渠進且看漁火聽踈鐘次韻許深父日日經行只小園靜搘笻竹聽鳴泉此時心事何人共素壁題詩第幾篇西山老木正亭亭雲影參差隂復晴手卷殘書天欲暮聞君剝啄叩門聲却下斜坡並栁堤雙飛燕子正􅋦泥紛紛風雨春將半渌漲平湖橋柱低下瞰寒江百尺坡小松新種也婆娑栽培擬待凌雲日眼底浮花奈若何年中一稔願無餘漸喜微呼息里胥贏得間身學農圃未妨斜日帶經鋤初夏偶書江潭四月熟梅天頃刻隂晴遞變遷掃地焚香清晝永一窗修竹正森然墨梅眼明三伏見此晝便覺氷霜抵歲寒喚起生香來不斷故應不作墨花看日暮橫斜又一枝水邊記我獨吟詩不妨更作江南雨併寫青青葉下埀謝韓監芍藥一年春事雨聲裏十里揚州夢想邊眼底名花煩折贈君家風物自嫣然龍孫竹生辰陽山谷間髙不盈尺細僅如針而凡所以為竹者無一不具豫置石斛中暮春生數筍森然可喜為賦此小竹如針能具體方春茁筍更堪憐乾坤妙用無餘缺隱几旁觀為莞然葉夷中屢以書求豫記敬齊豫往年嘗為親舊為記及銘矣今獨成兩絶句寄之聰明用處翻多暗機巧萌時正自癡若識聖門持敬味臨深履薄更何之向來屢著敬齊語正恐多言意未明今日報君惟一句工夫端的貴躬行謝侯彥明惠白蓮栽添得湖光百畝餘湖邊早已長菰蒲更移玉井峯頭種還有花開十丈無青鞋不踏逺公社偶共濓溪嗜好同少待薰風開玉鏡與君來賊月明中周濓溪有愛蓮說書妙應庵壁窗前新竹淨姢姢借我風涼一搨眠試問莊周說鵬鷃何如洙泗舉魚鳶壽定叟弟今年黃菊開花早手擷芳新壽一杯不用南陽三十斛家山根蒂好栽培堂堂自昔源流逺衮衮方來事業長駟馬安車遵大道正須緩轡不須忙向來相望各天涯兩載團欒似舊時只恐桐江來趣駕明年把酒又相思嶽後步月衡嶽山邊霜夜月青松影裏看嬋姢正須我輩為領略寒入衣襟未得眠訪羅孟弼竹園籃輿嘔軋上荒坡奈此緣成修竹何歷眼向來誰復領買山未覺費金多林深谷窈路詰曲憀淡西山橫逺青想得天寒來獨倚空雲髣佛下湘靈江梅獨立䕃頺牆苔蘚封枝色老蒼手剪荆榛增歎息眼中春意滿三湘知君日來修竹底却課市樓朱墨程應是禪門嫌揀擇不論清濁要圓成是日見孟弼方校市樓薄書臘月二日携家城東觀梅夜歸前日看花正薄隂重來晴日更精神莫教容易飛花片且放千秋自在春元自陽春無間斷何人能識化工心梅邊把酒日近午鳥語風微花氣深晴日東山飽看花歸來野路已昏鴉坡頭認得疏籬處薝蔔林中李老家仰看鴻鴈思吾弟連日清遊只缺渠不知千里江南路亦有梅花似此無題庾樓南瞻廬阜北淮山下有長江萬頃寒往事無邊隨去浪西風有客傍䦨干城南即事活泉細引忽盈溝自繞書齊㶁㶁流添得眼前無限思石橋竹塢共清幽一春風雨水平湖更覺湖心月榭孤坐看百花開落遍依然山色對清盧東風吹得緑成隂積雨初收栁絮輕記取湘中最佳處橘花開時香滿城月榭當湖景最竒故人千里寄新題背欄看字成相憶何日能來步栁堤元晦新寄月榭題榜茅亭水溜四周遭花木經春一一髙却望西山隔江水徑思一葉泛雲濤新亭名東渚枕邊風雨過今春起步園林巳緑隂更向坡頭望湘浦水雲無際繞遙岑病起次韻劉樞密朔風漠漠低黃雲曉看繽紛萬鶴羣為應農祥眉一展更將餘力付斯文燕寢凝香意自長不須乘月據胡床新正更喜身强健和氣都歸柏子觴是日二使者出遊晚涼有作疏風細雨隨華節西浦東山揔勝遊拙守亦欣涼意好挑燈清坐讀春秋二使者遊東山酒後寄詩走筆次韻頗聞東山盛行樂坐想風前酒興豪領略正應胸次别吟哦更覺筆端髙繡衣雙節從天下文字皆稱一世豪桂山發地凜千尺新詩與之相並髙社歲幾成山水癖年來袖手不能豪忽傳燈底詩篇好但想雲間屐齒髙次韻范至能峽中見寄合綰絲綸對紫薇却捫青壁聽猿啼秪應許國心金石蜀道如天亦可梯前日從趙漕飲因得遍觀所藏書帖之冨既歸戲成三絶簡之烏雲夭矯天欲雨虛堂美䕃共徜徉開奩百軸驚傳玩更覺人間六月涼舊藏自是承平物新軸收從古道旁人間好事戒多得防有雷霆下取將李金之亂護漕為寧逺宰猶守邑不去以兵行縣郊視道旁卷帙零亂雜泥土下馬就觀多得佳帖今古驅馳翰墨場何人下筆到顔楊君侯知我有書癖乞與西臺字幾行題馬氏草堂復齊聽雪前鄰百鬼瞰髙明夜雨華榱歎昔人却愛君家鴻鴈集還能葺理草堂春今古茫茫浪著鞭誰知聖學有真傳請君細誦復齊記直到羲爻未畫前平生求友人千里永夜論心雪滿窗為問蒲團聽修竹何如一舸泛清江送林擇之遺篇寂寞論心少一見吾人意已傾氷雪持身金石志他年事業更光明南軒集卷六
