body:
  text: 南軒集卷十七宋張栻撰史論西漢儒者名節何以不競名節之稱起於衰世昔之儒者學問素充其施於用隨事著見不蘄於立節而其節不可奪不蘄乎徇名而其名隨之在巳初無一毫加意也至於世衰道微於陵遲委靡之中而有能拔然自立者則世以名節歸之而士君子道學未至則亦以此自負吁亦小矣然而名節之稱雖起於衰世而於衰世之中實亦有賴乎此使併與是焉而俱亡則亦無以為國矣西漢之儒者豫甚病之蓋自董相申公數人之外自餘往往以占畢詁訓為儒無復氣象上焉既不能推尋問學之源流而其次又不能以名節立於衰世其亦何所貴於儒也考其所自亦由上之人有以致之自髙帝鄙薄儒生文景則尚黃老武雖號為表章然徇其文而不究其實適足以為害至宣帝則又明示所以不崇尚之意矣則其挫抑摧沮之餘不復自振固冝然儒者之學豈必為一時貴尚而後免邪待文王而後興者凡民也漢之儒者自叔孫通師弟子固皆以利祿為事至於公孫丞相印封侯學士皆群然歆慕之其流如夏侯勝之剛果猶有明經取青紫之言况它人乎蓋其習俗胥靡之陋一至於此冝乎王莾篡竊之日貢符獻瑞一朝成羣而能自潔者班班僅有見於史也故光武中興力矯斯弊尊德義貴隱逸以變其風而中世以後人才輩出雖視昔之儒者有愧然在衰世之中守義不變蓋有足尚者矣至於桓靈之後國勢奄奄羣姦並起睥睨神器未敢即取者亦一時君子維持之力也然則名節之稱在君子則為未盡而於國家亦何負哉蓋不可不思也自元成以後居位大臣有可取者否西漢末世風節不競居位大臣號為有正論者不過王嘉何武師丹耳在波蕩風靡之中誠亦可取比之光禹則甚有間矣然西漢末年正如病者元氣先敗凡疾皆得以入之而皆得以亡之為當時大臣者要當力陳國勢根本之已蹶勸人主以自強於德多求賢才以自輔庶可以扶助元氣消靡沉痼若不循其本而姑因一事之謬一人之進而指陳之縱使一事之正一人之去亦將有繼其後者終無益也故哀帝之末董賢雖去而王氏即起遂以亡漢矣自成帝以來受病之痼且大者乃在王氏如丁傅董賢之徒又特一時乘間之疾耳在位者當深以王氏為慮以王氏為慮當如豫所言先勸人主以自強於德自強於德則不宜少有差失顧反尊傅氏寵董賢以重失天下之心是益自削而增助王氏之勢耳故莾得以拱手而乘其後惜當時論者皆不知及此也可勝歎哉自髙帝諸將之外其餘漢將孰賢漢將誠當以趙充國為最凡將之病患於勇而不詳也充國蓋更軍事多矣及聞西羌之事則不敢以遽而曰兵難遙度願馳至金城圖上方略其不敢忽如此蓋思慮之深經歷之多孔子所謂臨事而懼好謀而成者也將之病在於急近功也充國則圖其萬全陳屯田十二利持久而為不可動之計其規摹與孔明渭上之師何以異哉將之病在於果於殺而不恤百姓也充國任閫外之寄而為國家根本之慮要使百姓安邊圉強而西戎坐消焉此殆三代之將非戰國以來摧鋒折敵者所可班也反復究其規模味其風旨逺大周密拔出倫輩豫謂充國在宣帝時且不獨為賢將殆可相也使其為相必能為國家圖定制度為後世思安飬百姓為邦本計如魏相輩皆當在其下風耳光武比髙祖髙祖洪模大略非光武所及也髙祖起匹夫提三尺取天下光武則以帝室之胄因人心之思漢而復舊業其難易固有間矣而髙祖之對乃項籍亦蓋世之豪也光武所與周旋者獨張步隗囂公孫述輩其去籍蓋萬萬相逺矣至於韓信彭越之徒皆如泛駕之馬實難駕御而盡在髙祖掌握之中指麾使令無不如意使光武有臣如此未必能用也然而創業之難光武固不及髙祖而至於光武之善守則復非髙祖所及也大抵髙祖天資極髙所不足者學爾即位之後所以維持經理者類皆踈略雄傑之氣不能自斂卒至平城之辱一時功臣處之不得其道類皆赤族此則由其學不足之故也光武天資雖不逮髙祖而自其少時從諸生講儒學謹行義故天下既定則知兵之不可不戢審黃石存包桑閉玉關以謝西域之質安南定北以為單于久逺之計處置功臣假以爵寵而不使之任事卒保全其始終凡此皆思盧縝密要自儒學中來至於尊禮隱逸褒崇風節以振起士氣後之人君尤未易及此非特髙祖也嗟乎以髙祖之天資使之知學為當務則湯武之聖亦豈不可至哉是尤可歎息也光武不任功臣以事光武之不任功臣為三公蓋鑒髙帝之弊而欲保全之前史莫不以為美談以豫觀之光武之保全功臣使皆得以福祿終身是固美矣然於用人之道則有未盡也蓋用人之道先以一説橫於胸中則為私意非立賢無方之義矣髙祖之待功臣誠非也如韓彭黥布之徒雖有大功要皆天資小人在易之師開國承家小人勿用蓋於用師既終成功之後但當寵之以富貴而不可使之有國家而為政也髙帝正犯此義是以不能保功臣之終為光武者要當察吾大臣有如韓彭之徒者乎則當以是待之若光武之功臣則異於是至冦鄧賈復則又識明而行修量洪而器逺以光武時所用之大臣論之若三子者類過之逺甚與共圖政豈不可乎顧乃執一槩之嫌廢大公之義是反為私意而已矣抑光武之所責於大臣者特為吏事大臣之職顧如是乎惟其不知大臣所當任之職故不知用大臣之道而獨以吏事之督責為憂抑亦末矣方當亂定之後正冝登用賢才與共圖紀綱以為埀世長久之計而但知吏事責三公其貽謀之不競亦冝矣光武崇隱逸光武鑒西都末世之弊故汲汲然崇尚風節而不忘遺逸之舉亦可謂知所當務矣蓋自三代而降在上者以爵祿而驕士在下者慕爵祿而求君故上日以亢而下日以委靡人君而能降心以求遺逸則是不敢以爵祿而驕其士反有求乎士之意則於克巳養德所助固不細矣况風俗委靡之中而見時君所尊禮延納者乃在於恬退隱納之士豈不足以遏其奔競之風而息其僥幸之意於風俗所助又不輕矣在光武時雖曰舉遺逸然固有召而不能致致而不能用者而其流風餘韻猶足以革西京之陋而起名節之俗則其為益固豈淺淺哉語曰舉逸民天下之人歸心焉蓋不遺賢於隱逸則天下之賢才孰不歸心賢才歸之是天下之人舉歸之也豈非為治之揔要乎然嘗怪嚴豫陵竟不為帝少屈何邪考子陵之言論風旨亦非素隱行怪必欲長往而不反者彼與光武少而相從知其心度為最詳也以謂光武欲為當時之治則當時之人才固足辦之而無待乎已若欲進乎兩漢之事則又懼有未能信從者不然徒受其髙位饗其尊禮之虛名則非子陵之本心也故寧不屈就之然而以子陵為光武之故人名髙一世而竟髙卧不屈光武亦不敢以屈之其所以激頑起懦扶植風化助成東京風俗之美人才之盛其為力固亦多矣豈不美哉李固杜喬所處如何李杜二公精忠徑節不憚殺身百世之下凛乎猶有生氣其視胡廣趙戒輩真不翅如糞土也但恨於幾會節目之間處之未盡要是於春秋提綱之法講之不素耳李固方舉於朝即就梁商之辟商雖未有顯過然如固之志業其進也將以正邦殆不可以苟也一為之屬即涉梁氏賔客事必有牽制者矣此其失之於前也方質帝之弒也固為首相又質帝忍死有語之以被毒之事則任是責者非固而誰質帝既不幸固便當召尚書發冀姦正大義顯言于朝則忠臣義士孰不應固冀雖勢盛然名其為賊逆順理殊蓋可誅也此間不容髮之時而固昧夫大幾獨推究侍醫等舉動迂緩使冀得以措手大義不白人心日以解弛其幾既失故身據大位當大權持大義而返聽命受制於賊豈不惜哉此其失之於後也夫以冀之悖逆而固且奏記與議所立固豈不知冀心之所存哉失太阿之柄而陵遲至此耳度固之不白發冀罪非黨梁氏也恐事之不成無益故欲隱忍以待清河王之立庶幾可扶社稷而不知天下大變巳為冡宰理當明義以正之事之成與不成蓋非所問况如前所論逆順之理冀決無以逭死邪固之隱忍乃所以成冀姦謀殺身不足道而社稷受害矣若固者盡其忠國之心而無克亂之才可勝惜哉杜喬在九卿中若懷是見必贊固為之矣及繼固為相已制命於冀矣相與就死嗚呼悲夫黨錮諸賢得失如何東京黨錮諸君子蓋嘉其志氣之美而惜其所處之未盡重其天資之髙而歎其於學有所未足也方是時乾綱解紐隂邪得路天下之勢日入於頽敗矣而諸君子曽不少貶以徇於世慷慨所激視死如歸至於患難得喪寧復背顧其志氣可謂美矣雖然昔之君子其出處屈伸之際蓋各有義故當困之時則有居困之道當屯之時則有亨屯之法時不我用則晦處自修危行而言遜其進不可苟也若乃居位則思其艱而慮其周扶持根本漸其圖濟其為不可驟也黨錮諸君子在下則噓枮吹生自為題榜至圭角炫露昧夫處困之道矣及其有位於朝不過奮袂正色擊搏豪強數輩以為事業在是矣又進而居髙位則果於有為直欲一施之而不復顧身死非所問而國勢愈傾是又失亨屯之法矣是豈非有所未盡為可恨歟若諸君子之不為死生禍福易操其間如李膺杜密陳蕃輩卓然一時其天然可謂剛特不羣矣然惟其未知從事於聖門也故所行雖正立節雖嚴未免發於意氣之所動而非循乎義理之安出於惡其聲之所感而未盡夫惻隱之實處之有未盡固其冝也豈非於學有不足歟使其在聖門則當入於仲由之科聖人抑揚矯揉之其必有道矣或以為陳太邱之事為得其中以豫觀之太邱在諸君子之中持心最平蓋天資又加美焉耳而其所處張讓之事亦非中節在當時隱迹自晦豈無其方何至送宦者之葬此又為矯失之過以此免禍君子亦不貴也不然則郭有道乎識髙而量洪才優而慮逺足為當時人物之領袖然收斂之功猶未之盡要亦於學有欠也不然則黃叔度乎言論風旨雖不盡見然其氣象溫厚圭角渾然見之者有所感於心其為最髙乎使在聖門作成之當居顔氏之科矣竇武陳蕃得失竇武陳蕃雖據權處位而事當至難主弱一也政在房闥二也宦者盤錯其勢已成三也武等雖漸引類於朝而植根未固上則太后之心未明禍亂之原下則中外之情未識朝廷之尊而武等之謀但欲速決為誅小人之計夫當時宦者雖有罪然豈無輕重先後之倫乃一概欲施之舉動草草今日誅數輩明日誅數輩輕重失其權先後失其序非天討矣且使之人人自疑因反締其黨與而速其姦謀善處大事者顧如是邪觀朱瑀所謂中官放縱者自可誅耳我曹何罪而當盡族滅使蕃武施之有道行之有序則雖此曹蓋亦有心服者矣殱厥渠魁脅從罔治此待盜與小人之法而亦天心也況其所自處者又自有失方是時非衆志允從其何濟事宦者竊柄巳久人知有此曹而巳為大臣者要當深自刻苦至誠惻怛舉動無失而後人有以孚信而趨向於我人心向信則勢立而形成然後可以消弭禍亂而武於靈帝踐位之初一門三侯妄自封殖如此其誰心服乎故王甫後來亦得以藉口則可見此曹平日之所竊議而衆志之所不平者矣及難之作雖曰忠義而無或應之以張奐之賢猶且被紿而莫知逆順之所在則以武平日所為未有以慰士大夫故也蕃雖辭爵而不能力止武之封是亦潔身之為耳任天下之重顧止如是哉然豫每讀蕃辭爵之疏未嘗不三復歎息其辭達其義正東京之文若此者蓋鮮亦足以見其忠義之氣也可勝惜哉兩漢選舉之法所考兩漢選舉雖巳詳但陽嘉中左雄一事未曽拈出兩漢選舉猶有古意左雄之奏尤為責實當時雖以限年為嗤然是舉所得乃陳蕃李膺陳球輩卒為一代名臣然則雄之所行豈得為迂哉至如嚴謬舉也後世取士之法無復先王遺風有欲行古道如楊綰輩之所建明則類指為不可行胡不以雄之事觀之其效驗亦可見矣晉元帝中興得失為國有大幾大幾一失則其弊隨起而不可禁所謂大幾三綱之所存是也晉元帝初以懷帝之命來臨江左當時之意固以時事艱難分建賢王以為屏翰庶幾增國家之勢折姦宄之心緩急之際實賴其紏率義旅入衛王室其責任蓋不輕矣而琅琊之入建業考觀其規摹以原其心度之所安蓋有自為封殖之意而無慷慨謀國之誠懷帝卒以蒙塵迄不聞勤王之舉愍帝之立增重寄委制詔深切而亦自若也祖逖擊楫渡江聊復以兵應其請返從而制之使不得有為則其意不在中原也審矣坐視神州板蕩戎馬縱橫不以動其心不過欲因時自利云耳愍再蒙塵懼天下之議巳則陽為出師之勢遷延顧望終歸罪在運餉稽緩斬一無辜令史以塞責赤青之異亦深切矣吾誰欺欺天乎夫受君父之委託而坐視其禍變因時事之艱難而覬幸以自利三綱淪矣惟其大幾既失故其所以建國規摹亦復不競亂臣賊子如王敦輩不旋踵而起蓋其弊有以致之也使元帝痛懷愍之難篤君臣之義念家國之讐率江東英俊鼓忠義之氣北向討賊義正理順安知中原無響應者以區區一祖逖倔強自立於羣豪之間猶幾以自振况肺腑之親總督之任數路之勢何所不濟哉惟其不以至公為心而私意蔽之甚可歎息也其餘得失豫不暇論獨推其本而言之謝安淝水之功苻堅掃境入冦方是時晉室之勢亦甚殆矣梁益既非吾有而襄沔復為所破在他人冝恐懼失措之不暇而謝安方且從容應敵不過以江北軍事付之謝玄及劉牢之輩卒以成功蓋其方略素定非僥幸苟然也安明於用人考察既精不以親疏而廢玄有謀盧善使人而牢之勇鋭出衆安所施置各得其宜蓋用兵之道當以竒正相須使玄將重兵于後此正也使牢之將精兵迎擊于前此竒也秦兵既近洛澗牢之攖其鋒直搏而勝之固巳奪其心矣淝水之戰其勝算巳在目中故秦兵一退風聲鶴唳以至山川草木皆足以懼之惟牢之先奪其心故也安之方略可謂素定矣惟其素定故安靜而不撓其矯情鎮物豈固為是哉夫有所恃故耳至於却上流之兵又其一竒也得上流之兵不足以助益而適足以銷薄聲勢搖動人心桓沖是舉亦無謀矣吾慮既定一却其兵而戰士之心益固國內之情舉安安見之明且審矣嗟乎國之所恃者人才耳以當時晉室之勢獨任一謝安足以當苻秦百萬之師以豫觀之非特安方略之妙抑其所存忠義純固負荷國事直欲與晉室同存亡故能運用英豪克成勳業誠與才合故也大抵立大事者非誠與才合不足以濟若安者其在東晉人物中傑出者哉溫嶠得失溫太真忠義慷慨風節表著足以為晉室名臣古今所共推不待詳言然吾獨有所恨者絶裾之事也昔之人不以窮達得失纍其心聽天所命而行其性命之情故或仕或不仕皆非有所為也於其身所處之義當然也自後功名之裕興而遷就趨避之説起三綱始隳而不得其正雖豪傑之士一為功名富貴所誘失其性者多矣可勝歎哉太真少時嘗以孝友篤至稱一旦奉劉琨之檄將命江左毋崔固止之不可至於絶裾而行噫太真有毋若此身固不得巳許琨矣獨不見徐元直之事乎元直所謂方寸亂矣蓋其天性不可巳者也而太真獨忍於此乎若既以委質為人之臣當危難而無避可也將命之舉豈無他人太真念母獨不得辭乎度其意不過以江左將興奉檄勸進徼幸投富貴之機赴功名之會耳而其所喪不過甚乎或曰使太真不來江左則寧復有後世之事業太真固不得以兩全矣此殆不然昔人之事業皆非有所為而為之事理至前因而有成之耳若懷希慕求必之心則其私欲而巳苟可以就異日之事則凡背親賊性命皆可以屑為此三綱之所由壞而弊之所由生也故伯夷叔齊固不受其國夫子以為求仁而得仁商之三臣微子不得不去箕子不得不為奴而比干不得不死皆素其位而行也豈直太真之事業為不足道就使太真能佐晉室克復神州一正天下勳烈如此浮雲之過太虛耳豈足以塞其天性之傷也太真順毋之心而終其身雖泯滅無聞於後顧其所全者大於身無愧烏能以此易彼哉故豫謂太真稱為功名之士則可尚論古人則可憾矣南軒集卷十七
