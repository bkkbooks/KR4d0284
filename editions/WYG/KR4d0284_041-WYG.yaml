body:
  text: 南軒集巻四十一宋張栻撰墓誌銘宇文史君墓表君氏宇文諱師獻字徳濟世為成都人曽祖宗象贈太師魏國公祖邦彦任尚書屯田員外郎贈太師蜀國公考粹中任尚書左丞絫封南陽郡公贈少師宇文氏受姓系世之詳已見於少師墓碑故參知政事楊公椿之文始少師與其弟簽書樞密院事虚中俱以文學論議被遇固陵極翰墨之選􅂱然一時少師晚歳歸安于蜀盖倦於世故矣長子師牧賢而有文不幸早世少師念之甚君是時方童稚已挺然不凢日讀書講問娯侍于前少師每為慰釋謂是兒且長殆能繼二公之業少師故時賓客多英俊見者莫不竦然謂宇文氏復有子矣少師捐館舎君甫年十有二執䘮盡禮如成人事妣福國夫人黄氏奉承顔色不懈而自奉極儉薄人不知其為貴公子也季父直龍圖閣時中素重許可尤器君懋以問學先用樞密公恩補承務郎服除差監潭州南嶽廟考滿知漢州徳陽縣丞改知綿竹縣丞暇則慕崔斯立之為痛掃溉以種學績文為事且從其鄉之老成故工部尚書員外郎李公良臣及其秀士黄鈞李流謙游聞見益以廣聲稱益以著已而兩丞銓部以微文俱不報更從外銓擬監漢汁邡縣酒稅居其官惟謹改監漢州在城商稅務未上㑹詔從臣各舉所知楊公椿時為尚書兵部侍郎以君愽學有守聞有㫖召赴行在時紹興三十年也君念福國夫人年高不忍逺去力辭差潼川府路提舉常平司幹辦公事未上改成都府轉運司主管文字丁内艱哀慕㡬不能自全免䘮楊公已在政府力挽君陳下亦竟不前差四川安撫制置使司幹辦公事歴事兩帥其前者寛縱多慢君據義不撓其後者威嚴或過君彌縫其闕幕府歸重先忠獻公雅知君言於朝遷知簡州簡故少事君復臨以安静民甚便之歳歉饑民為盗連數郡君所部先事區處得食迄無從冦者以暇時掇論時事之要編白於朝宰相亟稱之未滿秩移知綿州緜為大州適承頹弛之後帑庾匱甚君獨整科條察蠧弊節用度未幾而經常不缺郡舊有寃獄佃人殺主之僕而誣其主外臺執偏見不釋主家死於獄者三人其它亡辜逮繫死者又以十數方春天為雨雪地為震歴兩使者不能决更送君所君詳究其牘得情數語折之佃人引服致之法人謂可以少謝死者寃也事益省即理緝學校舎其士者行鄉飲酒禮使敦長幼之節在郡再歳樞密使王公炎宣撫四川以請改知閬州錫賛書甚寵閬故嘗為宣撫使所治地尤重事且夥君先立之規模上下趨令惟恐後率以夜漏未盡數刻秉燭出視事不以為勞亦不覺有疾苦狀一夕與客評論書史自若既寢家人軰聞喘息若不屬亟視已不能語醫不及進藥而終享年四十有七實淳熈元年七月二十日積官承議郎以郊恩賜五品服娶郭氏故朝議大夫知辰州黄中之女子男一人曰紹訓女二人長適唐剛文次許適梁秩皆進士是歳十有二月晦歸葬于廣都縣靈溪鄉附于蜀國公塋側君天資忠厚平易與人交乆而不厭或少忤亦未嘗衰家居婢僕不見其惡聲厲色而至蒞官之際則簡嚴自守所謂柔而有立者伯兄既早世事嫂甚謹待猶子恩義無間言嗜讀書稽考至忘晝夜論事貫穿今古為文辭贍蔚有餘地所著甚多藏其家初君以二文世科為念刻苦習進士業為進士者多推稱之兩以鏁聽試類省輙下益力後雖已領州符猶不置盖終其身以是為歉某嘗以謂自先王教胄子之法壊大家世族不得盡成其才其下者茍從祿利不樂親文墨事至其間讀書欲自表見者則又不屑其世祿顧反以從進士覔舉得之為榮噫昔之人所望于胄子者豈為是哉若君居家孝友涖官廉平温厚愽雅于以進德孰能禦之顧區區猶以是為歉何哉某之先妣夫人實為君從女兄故某於親䣊間講聞君行義為詳紹訓奉其母命萬里致書請銘不敢辭銘曰宇文入蜀三百年支垂派别族益蕃少師弟兄大厥門迭執鴻筆司皇綸二府聯登體貌尊君生其家愿而温被服儒素逺世紛編簡浩愽資剖論部符三州民所恩外若坦易守則敦人言餘慶兹實存誰其挽之排帝閽哀哉玉立歸丘原萬里方駕厄其轅尚有銘詩賁來昆承議郎呉伯承墓誌乾道六年七月十八日右承議郎浦城呉君卒于長沙之寓居年五十二其子洵以治命奉其襄袝君之母夫人方氏之兆其年冬遣書走告于尚書左司員外郎侍講張某曰先君藴蓄不克施懼遂泯没相與厚善莫如公惟是所以詔來世者敢再拜哭授使者以請某讀其書泣而諾之君諱銓字伯承大父朝議大夫獻可以科第起家父奉議郎知常㳺於諸侯幕以才術聞君以大父恩補官嘗兩試春官及宏辭科筮仕監潭州戸部酒庫其調江陵簿及知巴陵縣事皆以故不上而奉祠南嶽及崇道者前後凡五中間用薦者改秩暨覃恩遷官賜五品服所歴僅如此君事親孝謹終䘮即澹然無復仕進意不忍逺墳墓朔朢展省嗚咽迄終身不衰天資狷介質直疾惡如讐不妄交少不如已意輙拒不納親黨朋友有過不忍茹即告語之以此為賢者所重愛而其間不知君者亦徃徃怨訕君不恤也遇其急難困苦死䘮輙推衣食資財以助無吝色築居湘濱有亭榭華竹之勝而名其堂曰思親盖其終身之思誠敦篤乎此也嗜讀書吟誦日夜不息深於離騷為詩慕陶謝紆餘閑澹之趣其思甚苦至所得意心開目明忽不知歳月之度也以是居湘城盖幾二十年君娶万俟氏右僕射卨之女初僕射自沅州召還將倚以為相道長沙君為言天下事極剴切且勸以無畏縮不言負上及僕射得政數以書招君卒謝不徃親若舊有官於朝者即不欲以書徃來然其居閒每慨然有憂時之志為政于潭者徃徃就君問所宜君為言田畆間民所患苦未嘗不纎悉反復若有闕失亦未嘗隱方其仕時部使者雅聞其名交薦之其間有不可者輙謝不受方曰士固當擇所託也能自立盖如此病且革無它言獨勉其子以學且戒曰我死毋得用浮屠氏是亦可見其所存已長子洵將仕郎次沂幼未名女三人孫男梓予與君寓居鄰牆間一二日輙歩相過議論酬唱甚樂别未一載而遂志君墓悲夫銘曰有特其資不假其施有蔚其文不顯其聞歸于其宫曰從于親尚其孝思以永嗣人賈仲山墓誌銘乾道庚寅之歳新零陵守賈君訪予于休沐舎泣且言曰森之弟仲山不幸不起疾念其没且無聞以嘗獲從游敬請志率五六日一來請自予居湘中有年所矣始聞仲山兄弟居家友睦愉愉如也已而皆識之乆且厚予讀書城南仲山適亦葺其居與予鄰日相過也去年予來守新定仲山跨馬送予渡湘行數十里不忍舎予顧見其形色特瘁且丁寧勞勉之别未半歳而以訃聞予固悲之而其兄之請勤懇如此予雅重其兄弟平日相與之歡又不忍拒其兄之請於是乎書君諱林仲山其字也其先真定人後徙鄭自鄭徙鄆才四世曽大父公直仕為中散大夫大父諱節為顯謨閣直學士顯于時父澡為通直郎母張氏君蚤歳能屬文長而值靖康之亂奔馳江湖間晚以叔父瀛死事恩得初品官歴撫州宜黄縣主簿邵州軍事推官所至以能稱其聽訟剖折迎忍大抵得其情歴陽張孝祥治有聲于時其守撫及安撫湖南率致君任以事輙辦率部使者薦于朝改宣教郎調知常徳府龍陽縣事未及上享年五十有三君一子甚慧年甫十二而夭又一歳而君没為可傷也已君喜讀史居閒自抄凢數十萬字皆成誦云銘曰聚散氣也脩短命也始終理也氣不能不離命則不可違而理則萬古之真也張氏墓表建昌南豐曽氏近世有君子曰發字信道仕為吉州教授友睦之行推于其鄉鄉之人皆謂信道固賢抑有内助以成其德焉爾信道之配張氏其先舒州人曽祖鼎臣贈太子太傅祖復貫贈太子太師父激故朝散大夫知南安軍夫人幼孤鞠于叔父尚書右丞澂之家天資靜肅不妄笑語右丞公賢之親為擇配信道時為掾臨川中書舎人吕公本中尚書郎計公昕亟稱之遂以歸焉曽君之父樂施家以施而匱夫人自貴族入其門躬履勤儉不忽細故莊敬而順喜怒不見於色小大無間言信道既没教子持家弗墜厥訓晚歳家益饒而夫人約素不改其舊寢帷至四十年不肯易一簟亦更十餘年完緝殆徧今其家俱保藏之以訓示後人然在夫人秉徳有常非其所勉强然也淳熈二年天子奉觴前殿推恩海内夫人以子撙故得封太孺人後一年而寢疾一夕語家人軰曰吾病殆不瘳矣衣在某笥衾在某笥宜亟治具又曰某嫗吾嘗使之織未歸其直宜即償之明日又視具曰毋哭徒溷我迺終盖其平時專靜故死生之際能如此是歳十月甲申𦵏于其鄉龍水之原子男五人長曰持次撙登隆興元年進士第從政郎前荆湖南路安撫司准備差遣次挹擴擬女嫁文林郎洪蘩孫男八人克冕覽兊寛允餘未名孫女七人撙在湖南時從予逰狀夫人之行來請銘不得辭銘曰專靜而常惟婦之臧儉徳之光世篤勿忘宜人王氏墓誌銘淳熈二年秋安陸宋文仲與其弟剛仲書來告其母夫人八月辛酉没于袁州教授官舎以䘮歸葬求予銘予辭未果又書來曰閏月癸酉既畢窆事矣敢請立諸墓為辭甚哀予念文仲兄弟從予㳺有年矣其哀亡已誠不忍拒也則為之書夫人姓王氏六世祖太傅明佐藝祖有勲勞在太史曽祖臨事仁宗為寳文閣待制祖承提舉利州路常平事父恪為漢州雒陽令母解氏夫人適右朝議大夫知徳慶府宋許生兩男子文仲迪功郎全州清湘縣主簿剛仲迪功郎袁州州學教授一女適承事郎監饒州景德鎮稅万俟傳孫男女凡七人累封宜人享年五十有八徳慶君之没先夫人九年𦵏于衡州衡陽縣五馬山之原夫人之𦵏寔合祔焉夫人㓜孤事母稱孝既嫁事姑以恭肅聞相徳慶君周睦内外有恩意徳慶君没處家事嚴整教子有法度見族䣊飢寒者矜念施與惟恐不及平時待接長㓜一以忠信為主聞人有善喜見辭色再三為其子言之不置按文仲之述其大概如此徴諸親友之所聞無異乃係以銘銘曰惟宅之安無有後囏惟安且乆以右厥後故安人常氏哀詞晉原鮮于廣大任少母安人常氏大任在襁褓而常氏去其家既冠而知之則常氏没矣大任追念哀疚盖骨立䆠游四方中歳歸故里重惟生不得其養没又不知其處無以塞其悲也寄書友人張某俾為詞而紆之詞曰孰生無母兮予獨甚悲赤子婉孌兮母實鞠之哺乳以節兮燥濕是宜子不能言兮母實心之冬之洌兮母予温之夏之炎兮母予凉之母實瘁兮兒則肥嗟母之恩兮曷其報之子匍匐而欲歩子嘔啞而將語子未能識母兮母胡為而舎子而逺去子則於母兮何知諒母心兮念兒以忘饑年􅂱􅂱而浸長兮以思撫予躬兮曷自孰告予以所從兮乃始滂乎其以泗宗有承兮義則貞堂有君兮恩或難伸逮子既克知兮則母已逝而不可見矣予惟罔極之哀兮其曷予已嗟乎母生子不得婉愉於膝下母没子不得俯伏于幽宫徒白首兮鄉社滴清淚兮何窮地乆兮天長日升兮月常嗟乎此天下之至情也固爾難忘南軒集巻四十一
