body:
  text: 南軒集巻三宋張栻撰古詩五月十六日夜城南觀月分韻得月字梅收清風來宇淨寳鑑掲頻年城南㳺未有今夜月呼舟泛微瀾㳺魚亦出沒危榭倒影浮倚檻涼入骨舉酒屬西山寒光動林樾諸君興未巳南阜上突兀目極大江流髙情更超越三月七日城南書院偶成積雨欣始霽清和在兹時林葉既敷榮禽聲亦融怡鳴泉來不窮湖風起淪漪西山巻餘雲逾覺秀色滋層層叢緑間愛彼松栢姿青青初不改似與幽人期坐乆還起步堤邊足逶迤㳺魚傍我行野鶴向我飛敢云昔賢志亦復詠而歸寄言山中友和我和平詩四月二十日與客來城南積潦方盛湖光恬然如平時泛舟終日分韻得水字澤國盛梅雨漲潦彌兩涘常時侵溢患乃復到城市納湖迫西闉衝突固其理今年築隄防揵石細積累艱辛迄崇成龜魚亦歡喜節宣有程度盈縮無壅底昨宵水沒岸民居例遷徙走馬來問訊屹若堅城壘江濤從渺茫湖光自清泚小舟足㳺泳新荷方薿薿嘉我二三客共此風日美相期寂寞濵雅意淡如水念言隄防功得失乃如彼而况檢身者詎可忘所止明朝更我詩斯言或當紀展省龍塘有作十年衡山隂驅馬幾徃還山色如故人牧豎隨馬鞍俛伏長松下清晨涕汍瀾念昔初拱把兹焉影團欒白雲歸何時日月如轉環矯首祝融峯依前倚髙寒於焉百感集欲去良獨難田舎竹葉帯曉露茅簷起炊煙蛩吟枯草根犬吠壞垣邊田家亦何營生理固足憐風霜摧我稼稂莠長我阡卒歲復何念一飽未補前我思昔之人備豫理所先積倉徧郊野甘雨盈公田臨風重掻首復古何由縁舊聞長沙城東梅塢甚盛近歲亦買園其間念欲一徃未果也癸巳仲冬二十有八日始與客逰過東屯渡十餘里間玉雪彌望平時所未見也歸而為詩以紀之半生客荆楚歴覽非一隅寧知城東路有此梅萬株瘦馬路曉寒清風起菰蒲度溪上平坂頓覺景物殊霏雪下晴晝香霧迷前驅近坡與逺嶺玉立同一區老樹固瑰特小枝亦敷膄有如衆君子彚聚德不孤精粗無可揀酥酪與醍醐千株未覺多此語信不誣班荆或小憩沽酒時一㪺勝賞諒難盡昭質知不渝我有十畆園丘壑正盤紆念此縞袂侣歲晩足我娯來逰自今始琴書與之俱囘首桃李場冷淡莫邪揄平父求筍炙既并以法授之乃用徃歲張安國詩韻為謝輙復和荅知君友竹君寧使食無肉更我脯笋詩句妙騷可僕南公鮭菜傖父韲嗜好自爾元非癡君但將從力噉此大勝折腰鄉里兒題淮隂祠秦關昔先驅南鄭豈淹乆夜中丞相歸平明印垂肘古來豪傑人調度出窠臼登壇一軍驚六合已在手從兹㸔廓清指揮如運帚時艱思竒才廟古酹樽酒出門望長淮故國長稂莠風雲正慘澹人事極紛紏拘攣儻無累吾欲獻九九時為桂林之役斜川前一日刑部劉公置酒相餞曽節夫預焉既而劉公用陶靖節斜川詩韻見貽亦復同賦以謝通籍念無補先廬獲歸休所忻三載間暇日從公逰城中十畆園頗復依清流渺渺送歸鴈翩翩下輕鷗駕言欲南騖踟蹰眷林丘況且逺晤言公唱孰與酬祖席近佳日呼客仍我儔相與千載思誰復念此不新詩更紆餘用以寛離憂他年南阜約剥啄時相求城南有丘巋然名以南阜他年當與公歲講是逰也送劉樞宻留守建康整駕欲南騖乃復送公舟公行民所瞻願言勿淹留向來秉事樞正色有忠謀坐覺國勢尊巳騐權綱收如何霖雨澤偏使及南州新春紫詔下聞者寛百憂誰昇今重鎮百萬宿貔貅控江撫長淮聲勢接上流吾皇志經略此地合綢繆不應萬全䇿歲月空悠悠先當植本根次第施良籌未聞欲外攘而乃忽内修幕府方宏開人才要旁搜可不念葑菲惟當别薰蕕留鑰豈淹乆即歸侍前旒盡舒醫國手調瘵㑹有瘳還憶遐荒守時能寄音不淳熙乙未春予有桂林之役自湘潭徃省先塋以二月二日過碧泉與客煑茗泉上徘徊乆之下馬步深徑洗琖酌寒泉念不踐此境于今復三年人事苦多變泉色故依然緬懷德人㳺物物生春妍當時疏闢功妙意太古前屐齒不可尋題榜尚覺鮮書堂何寂寂草樹亦芊芊于役有王事未暇謀息肩聊同二三子煑茗蒼崖邊預作他年約扶犁山下田七月旦日晩登湘南樓文書稍去眼日夕進微涼髙樓一徙倚清風為我長漁父䕃深樾歸人度浮梁仰㸔河漢明俯視羣山蒼平生㑹心處於此故難忘舊聞水東勝巖巒發天藏豈無一日暇勇徃聊徜徉民瘼未渠補況敢懷樂康天邊雲物佳似復為雨祥秋成儻可期歲晩或自强當從農家鼔一歴水雲鄉望後一日與客自水鄉登湘南月色佳甚翌日用鄉字韻簡㳺誠之一雨五日餘南州三伏涼喚客近方沼笑譚引杯長相將復登樓月色在屋梁念我懷百憂忽忽髪變蒼及此少自舒觴詠未可忘孤光凛下照景妙無留藏沙邊數白鷺欲下仍翔徉羣動亦自得如我四體康平生子㳺子虛白生吉祥官舎並樓居登臨筋力强未可效王粲居然思故鄉誠之所㞐正在樓旁自中憂以來毎携書獨登定叟弟生朝遣詩為壽我昔在嚴城惟子桂林思舊㳺復更踐相望仍今兹行止不可期㑹合何參差況乃近重九清杯憶同持想子撫初度難忘蓼莪詩而我獨東向慇懃頌期頥祝子以愛身永佩過庭䂓勉子事逺業昔賢以為師安車按節度中道行逶迤他年老兄弟鶴髪仍龎眉歲晩話平生期以無媿辭及此良未易兢兢願同之八月既望要詳刑䕶漕㳺水東早飯碧虚徧觀棲霞程曽龍隱諸巖晚酌松關放舟過水月洞月色佳甚逼夜分乃歸賦此紀逰灕江即湘江戢戢清見石其東列羣峯秋色碧復碧日出霧露收草徑上逼側憑欄楷望眼巳足慰疇昔更窺巖穴勝創見為驚咋如何數里間竒觀相接迹寛同厦屋深劃若巨靈擘日月遞光景風雲變朝夕石橋幾年成乳竇時一滴神龍舊隱處仰視多辟易蛻迹凜猶存隱隱印霜脊下有澄湫深餘波潄蒼壁徃者巳仙去來者此其宅薄晩扣松關風過聲索索聊麾車騎退容我且散䇿郤望訾家洲輕舫度前磧囘首煙樹林已復掛蟾魄宇曠凈餘滓羣物被光澤何所寄遐思空巖皎虚白清輝可一規水色相激射天邊與川上亭亭如合璧居然廣寒㳺不用假六翮班坐依微瀾晤賞共佳客因之想千載詎有今古隔簫鼔歸夜闌觀者粲城陌徃徃羅杯柈班班見殽核諒因年歲豐人意少舒適視爾意少舒於予亦忻懌次韓機幕韻韓杜有佳句烱烱如辰星自昔此邦勝中土亦飫聽竒觀今愈多洞戸長不扃秀色真可餐腴澤到畦丁寒巖度輕舫瘦嶺着危亭固巳小鴈蕩寧復談錦屏自我來擁麾毎思御風泠如何半載間足迹才一經居然俯仰中便覺塵慮冥舊刻暗蒼蘚徃事過奔霆頗聞煙霞外徃徃接神靈向來羽衣士吐内誇竒齡終焉亦歸盡難留鬢毛青塞鴈度霄漢沙鷗飛逺汀大哉天壌間逍遙各隨形人生亦何有泛若水上萍勿作分外念但勉明德馨乘時各努力日馭不我停夢囘故園好蘭菊羅中庭從知靖節醉逺勝次公醒秘閣鄭公移節鄉部置酒餞别詩以侑之嗜僻寡同好意合難語離傾蓋今幾年盍簮愜心期況復王事同退食陪委蛇窺君肺腑中落落無藩籬獨有見義勇褰裳欲從之憂時多苦語懷古更餘悲坐使嶺海間氷雪映清規我拙倚君重孤懐良自知正如乘霧行不覺䝉其滋人生豈無别念此尤依依維閩號蕃庻今亦因繭絲平時里社㳺耳目到隱微想當入境初不待褰車帷畫綉匪所榮民瘼要深醫㸔培邦本强詎止鄉國肥還歸報明主廟論資扶持願堅歲寒節慰我别離思清明後七日與客同為水東之㳺翌朝賦此平生山水癖妙處只自知夙約常寡味邂逅愜心期幅巾與藜枤安步隨所之朅來坐官府頗覺此願違城頭望羣峯欲徃類絆覉三春苦風雨晴日一伸眉沙邊散車騎竹輿從嘔咿獨與三四客野服相追隨亭髙俯空曠洞古探瓌竒懸崖隱日月幽壑蟠蛟螭澗水雜鳴佩松風發清吹興來即傾酒語到亦論詩聊揩簿書眼償此閒暇時所歴固未厭所感多餘思昔逰木葉下今兹綠隂肥江山雖可識歲月迺如馳素餐豈不念懷安敢云私歸來耿不寐欹枕聽晨鷄題榕溪閣寒溪澹容與老木枝相樛其誰合二美名此景物幽太史昔南騖於焉曽少休想當下榻初清與耳目謀品題得要領亦有翰墨留我來訪遺址宻竹鳴鈎輈稍令舊觀復還與佳客逰樹影散香篆水光泛茶甌市聲不到耳永日風颼颼所忻簿書隙有此足夷猶平生丘壑願如痼不可瘳雖知等喧寂終覺靜理優更思濯滄浪榕根浮小舟送陳擇之君能千里來乃作觸熱去涼秋幸非遙歸計無已遽向來文字間講論有平素及兹共王事益得君佳處幾微獨深窺圭角本不露豈期寂寞濵獲此友朋助吾邦雖云僻山水足竒趣更期休沐晨相與窮杖屨匆匆何少悰咄咄出别語君懷負丞恩行矣當及戍我亦念歸歟霜天收栗芋後㑹未可期徃事屢囘顧贈言復何有獨以此道故寥寥千載前逹者同一路所趍固絶塵所履無虚步臨深覺居髙仰止有餘慕要須學滄溟匯此百川注他年儻相憶訪我城南圃無使歲月深永思編簡蠧止酒淵明通逹士止酒乃成詩終焉未能忘寄意良在兹勇哉典午君覆觴無再期念彼萬乘貴艱難有深思況乃一介士而或志可移祓齋揆前訓剛制聖所辭銘心諒無斁多言亦奚為斜川日雪觀所賦行客念故里勞者思少休如何歲華新尚爾天南㳺涉五遇佳日品題自名流聊復揩病眼沙邊玩輕鷗和風着冠巾春意動林丘緬懷千載人孤髙諒難儔亦有一二士舉酒相勸酬未知吾故園草木如此不政拙甘下考智短空百憂賜歸儻䝉幸舊盟良可求靜江歸舟中讀書南風駕小雨羣山凈如沐吾歸及新涼所歴慰心目軋軋柔櫓鳴卧見山起伏推枕意悠然還取我書讀平生領解處於焉更三復老矣百念疎但欲斯境熟向來五嶺㳺日力半吏牘小心了官事終覺媿惸獨世路自險夷人情費追逐翩翩孤飛翼息䕃望林麓張子真楊政光呉德夫追路湘源賦此以别驅車出嚴關觸熱歸路長一雨羣物蘇吾行亦清涼離水自南去湘流正洋洋眷言二三友䟦馬勤送將蕭然短長亭毎語夜未央張子名家駒千里方騰驤楊郎嶺中彦而能歛鋒鋩延陵舊所熟氣味固難忘向來幕府逰三秀麗齋房居然出别語分袂楚粤郷人生㑹有别勿悲參與商獨有贈言意臨岐更平章風俗易移人宦途劇羊腸千鈞有不守决去飛鳥翔要當勉自持詩書作金湯他年相㑹處刮目㸔増光為謝桂父老無澤留一方惟餘石間字時與洗苔蒼登江陵郡城觀雪黄雲澹四垂飛雪忽無際排空風力靜整整若有制穿林初着花㸃瓦已成毳低連七澤波逺接關河勢憑城領竒觀壯思起病滯四年領邊州氣候苦多盭清秋日昏昏仲冬雷虺虺雪花有時零轉首即開霽及兹洗瘴眸天公豈無意為邦抱百憂但願得豐歲對之一欣然不飲心已醉春前尚餘臘三白或可冀更約竹間梅共作歲寒計正甫還長沙復用斜川日和陶韻為别吾黨有佳士寡欲自日休眷言平生心從我萬里㳺披雲度嶺嶠犯雪臨江流顧我無定蹤飄然若輕鷗兹行雖云逺所忻近故丘況得與君俱豈患寡朋儔有酒君為飲有句君能酬如何舎我歸頗亦念此不我老百念冷獨有謀道憂臨岐無他祝簡編細研求子逺使君出守廣漢始獲傾蓋諸官賦詩贈别某廣漢人也故末章及之半生落南州分與岷峨疎朅來荆江上所忻近鄉閭吾鄉多雋豪雜遝來舟車時從說情話頗覺中懷舒中間識胡公粹美真璠璵心逺氣自靜語簡意有餘向來有推轂入校中祕書名場萬夫立人亟我則徐拳拳抱忠愛百慮纔一攄白雲已在望思親惜居諸乞州枌榆邊政以便版輿同舎挽不住清風挾歸裾觀君進退間此豈為名譽春㠶肯小駐論交良慰予愛君秉質髙且復富蓄儲任重則道逺願言勿踟蹰吾州得賢牧父老想樂胥我亦有一㕓徑思歸荷鋤李仁甫用東坡寄王定國韻賦新羅參見貽亦復繼作三韓接蓬萊祥雲䕶山頂涵濡雨露春吞納日月景美䕃背幽壑靈根發竒頴艱難航瀚海包裹走湖嶺仙翁閱世故未肯遽生癭相期汗漫㳺歲晩共馳騁願持紫團珍徃扣黄庭境想翁面敷腴玉色帯金井芸芸納歸根湛此方寸靜清規照濁俗不惑類楊秉懸知藥籠中此物配丹鼎從今談天舌不用更澆茗外弟信臣總幹西歸駐舟沙岸得半月之欵於其行口占道别外家源流逺文物被諸孫嗟我數年來頗識佳弟昆酥酪本同味蘭芷非殊根競爽有如此知當大其門信也來過我氣貌清而温方忻駐足地中有靜者存皎然明月光豈復受濁渾塤箎迭和時此理試其論廬山有勝處曰卧龍南康朱使君始築茅繪諸葛武侯像於其中以書屬予賦詩寄題此篇廬山僊靈宅佳處固非一頗聞卧龍勝幽深諒難匹懸瀑瀉琮琤石壁兩崒嵂草木被光輝波瀾動囘沒今年朱使君下馬恍若失徘徊領妙趣指㸃築茅室為愛卧龍名英姿慨超軼於焉儼繪事長風起蕭瑟髣髴梁父吟尚想翁抱膝慘澹風雲㑹飄忽日月疾獨存經世心千載詎可汨褰裳欲從之雲濤渺寒日淳熙四年二月既朢靜江守臣張某奉詔勸農于郊乃作熙熙陽春之詩二十四章章四句以示父老俾告于其鄉之人而歌之熙熙陽春既發既舒翼翼南畆是展是圖嗟爾農夫各敬乃事徃利爾器誡爾婦子惟生在勤勤則及時惟時之趨時不爾違祈祈甘雨膏我下土習習谷風和澤乃普徃即爾耕惟力之深徃蒔爾苖勿倦其耘于日于夕自遂自逹爾心勿忘彼生孰遏惟天之心矜我下民民不違天使爾有成既穟既實既堅既好爾穫既周先養爾老保爾家室撫爾㓜稺既迄有年復思嗣歲嗟爾父老其訓其誡俾務於本惟土物愛不念其本則越其思所思既越害斯百罹嗟爾父老其告其喻爾之有生君實覆汝尊君親上其篤勿忘小心畏忌率于憲章嗟爾父老教之孝悌孰無父母與其同氣反于爾心孰無愛敬即是而推烏徃不順嗟爾父老勿替諄諄其未率從驚厲其身告以禍患其使知懼無俾蹉跌以䧟罪罟惟國之法燁燁其垂使爾知避豈欲爾施爾或自䧟予疚予恫曷使予懷寘于爾𠂻於赫聖主敷德流澤布宣弗厪時予之責咨爾父老助予念兹豈予之助報國是宜粤以今日勸相于郊乃作此詩以懋爾勞咨爾父老尚演厥義其諷其歌于鄉于里俾一其心服我訓言擊鼓坎坎自古有年南軒集巻三
