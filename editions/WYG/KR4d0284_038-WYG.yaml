body:
  text: 南軒集巻三十八宋張栻撰墓銘工部尚書廖公墓誌紹興九年詔以延平廖公為御史中丞方是時宰相秦檜當國謀為植黨固位之計欲假臺諫之力斥逐異已者公先亦為相所薦及居言路偘然守正無所承望毎因奏事論君子小人朋黨之辨反覆切至相遣人風之則答曰有言責者不得其言則去枉道狥人非吾志也㑹有故從官嘗委質叛臣之廷以與相有姻故歸自北境除資政殿學士提舉醴泉觀使奉朝請公顯奏其惡愈觸相怒又嘗從容建白願起舊相之有人望者處之近藩重鎭相聞之曰是欲寘某何地耶公以言不行上章乞歸老改工部尚書其繼公為中丞者受風指劾公上念公忠直俾以徽猷閣直學士奉外祠其明年迄致其事於是廖中丞之名重於天下公諱剛字用中順昌縣人曽祖諱隱祖諱丕以公故贈承務郎考諱懋任朝請郎累贈通奉大夫三世皆以淳質自守孝義相傳樂善好施為鄉黨所親依公治家有法資稟靜厚濟以涵養自為布衣時嘗從其鄉人故諫議大夫陳公瓘㳺又嘗從侍講楊公時問學故其後立朝行已具有本末盖非偶然者初登崇寧五年進士第歴縣主簿州判官錄事參軍教授凡五任改秩調漳州司錄就除國子錄擢監察御史時方爭騖於進取公足跡未嘗及權門已而以親老引外得知興化軍靖康初以右正言召未赴遭通奉君憂服闋又以工部員外郎召以母疾辭㑹劇盜起旁郡樂旤者相煽縣之官吏悉逃去鄉民扣公門求活公以信義徧喻從盜者使反業既而復有群盜自旁縣來據井絡殺掠人勢熾甚部使者且以檄屬公公遣子遲入賊中喻以禍福其渠領素聞公名旬月間相率從命餘黨悉散遣先是朝廷遣制置使將重兵來玩賊不時討及聞公既撫定則欲攘其功遣偏將規圖傷害至則執遲注刃于頸公不為動卒悔謝而去除福建路提㸃刑獄公事未幾召為吏部員外郎遷起居舎人以撫賊事増一秩公曰以此受賞非本心也卒辭之上方向儒學公奏帝王之學不當如文士所為願去末學之無益專務正心誠意以福天下除權吏部侍郎兼侍講奏乞罷遣高麗使又條陳屯田便利皆切當時事宜遷給事中遭内艱服闋還𤨏闥舊職時紹興四年也朝廷旌别淑慝推究章惇蔡卞迷國本末追貶其身且召其子若孫不得官于朝於是章傑自郎官出知婺州章僅自寺丞提舉江東鹽事公封還詔書謂如此豈足以示懲有㫖悉與之祠明年遷刑部侍郎初公之曽大母享年九十有三大父享年八十有八皆及見耳孫餘亦多夀考累世以華髮奉養公舊嘗名堂曰世綵諫議陳公播之聲歌士大夫從而為詩者甚衆緝之盈編至是祈以所當遷官贈大父且曰臣逮事大父教以忠孝念無以報因述家世事始末上嘉歎而可之宰相忠簡趙公方務推廣上孝愛之志遂以世綵集進奏曰陛下以孝治天下凡人子之欲顯其親者莫不曲從固知陛下念親未嘗少忘今復覽廖氏事迹伏惟聖懐不無感歎上它日謂公曰觀世綵集誠人間美事也其書至今人間樂傳之又明年以乆在朝列力請外除徽猷閣直學士知漳州郡人素以侈靡相尚昏葬例踰制公下車首立條約且親為文以訓告之風俗為變在郡二年應詔上封事乞早以建國公正皇子之號大略謂惟誠足以動天地感人心今意雖有屬而名未之正恐未足以慰幽顯之望是歲以年將七十請謝事時已降詔㫖矣詔書趣行至闕則有中司之拜首奏臣職在搏擊姦邪當思大體若乃捃拾細故矜一得於狐兔之微則非臣本心又奏經費不支盜賊不息事功不立命令不孚及兵驕官冗之弊蓋不一其原則在於一人之身若意誠心正以臨照百官則是非不紊邪正洞見天下之弊可次第而革矣又奏人君之患莫大於好人從已若大臣惟一人之從羣臣惟大臣之從則天下事可憂矣又論當逺佞人且劾從臣中為佞之尤者時大將恃功希恩所請多廢法公隨事論列至于四至肅然知畏凡公奏論皆本於誠實務先大體踐其初言類如此方是時善類倚公少安至所言漸廣卒為時宰所擠去自公之去言事者類皆承望而搢紳竄逐者相繼矣公謝事三歲以十三年正月壬寅没于正寢累官左朝奉大夫封順昌縣開國男詔以中大夫告其第是歳十二月壬申葬于其居溪之南鳳山之原從治命也娶張氏封淑人子四人長遲嘗任朝散大夫知邵武軍後公二十七年卒次過今為朝散郎前知梧州次遂承議郎前知化州次蘧朝散郎廣南西路提㸃刑獄公事孫男十五人諸子遇郊恩累贈公少傅公自少時居母謝氏䘮已有聞於鄉黨長事繼母陳氏以孝謹稱撫育其弟甚恩先世舊産盡推以與弟及猶子居家儉約雖貴不改寒素居官以清簡率下不事威嚴人服而從之平時不觀無益之書不為無益之文蓋其所存毎貴於實用躬行而已某為兒童侍先公忠獻旁側聞公之名及添廣右帥事公三子適皆為郡於所部而其季又為朝廷選用以使㫖來治于桂暇日求公奏議讀之削藁之餘僅有存者一日愀然以公墓誌銘為屬某自念晚生其何敢任而請愈力顧不得而辭於是首著公之大節而次第其平生如此實淳熈四年冬十月蓋去公之没三十有四年矣銘曰廖氏之先家於太原唐季避難甌閩是遷惟閩之廖自公而著豈以其位惟德之故公之清德壯老一節持身立朝氷玉之潔人搴其華我掇其實躬行是尚如漢萬石靡慕于寵靡撓于勢進無隱言退不茹愧謝事于家而名益崇惟其守道是以亢宗有寧其宫公則命之溪山所環後則宜之奕奕其後孔蕃且昌克念其徳以篤不忘王司諫墓誌銘乾道已丑歲某被命守嚴陵驅車入境俯仰其山川而想子陵之風詠仰止之章且意夫人才代出當不乏也既視事則進長老諸生而問近世鄉先生大夫之賢者則得二人焉曰諫議江公司諫王公皆以風節論議顯聞於世為鄉里所重已而司諫公之子今筠州史君來訪予又得從問其父事甚詳恨未能與嚴之人表而出之也越三年予屏居潭湘之上筠州走書以清江劉清之之狀來請銘公墓以予曩日之所敬固不得以荒陋辭也乃叙而銘之公諱縉字子雲王氏系出琅琊晉司徒導南渡始家江左其後有居睦州桐廬者曰朐封仕唐為和州刺史生肅清主簿淘淘生梁烏程丞耕耕生周明州衙推仁鎬因家于明而處者為嚴州分水人公踰冠遊大學中崇寧五年進士第調歙州司法參軍議獄以忠厚稱移池州石埭令斷訟民服其明方田法行旋以不實罷而石埭之民請以公所均為定用薦者改宣教郎知婺州浦江縣神霄宫初建觀望者競為侈費邑當置下院獨取之逺鄉僅以充數而已主者加詰公曰朝㫖不言城内外縣境有觀而舎之吾非違御筆也辟監杭州鹽倉臨安縣市易務知温州永嘉縣調監池州永豐監丁内外艱㑹邑人翁漆乗亂聚衆剽新城令不以時應盜益熾新城求捕且急令遽調松村保甲以謀不素大擾吏懼莫知所為則以告公行義素為鄉里所信即日挺身徃諭已而縣得漆與其二子誅之衆乃定苗傅劉正彦南遁有詔起復公部松村民丁追之公以終制辭焉大駕在永嘉從臣有以公應詔權吏部郎官方移蹕草創之際公請許詣選者得以闕自言而為定其宜士無滯留而官不曠廢以論事忤宰相出知英州時二廣多盜郡有土豪公縻以職秩結以恩信得其死力所捕致無不克宜章賊尤熾公縱諜者諭以利害他日賊過郡境以俚語戒其徒曰無犯吾佛曹成蹂踐湖南為岳飛所敗走桂而東破連州衆號數萬廣東大震科調紛然公獨如平時客問所以然公曰吾州無兵無城冦至但當登譙門諭之以禍福否則以死繼之處之既定故寢食甚安耳寮屬請退保公曰吾守土吏也退將焉徃卒以靜鎭全安一境御史循行上公治行第一有㫖遷官秩滿令人對㑹朱丞相勝非當國雖故鄉監官至都堂亦使趨庭自列公顧不肯勝非怒敵方在邉擬公至滁州朝議皆言王公忤范丞相去之南荒今方来歸又置之北鄙何邪改知䖍州召為金部員外郎旋以選知温州加直秘閣陛辭之日大常謂公未得去朝廷即拜監察御史既謝擢殿中侍御史時紹興五年五月也公首陳正紀綱嚴法守明賞罰立軍政廣儲蓄厚風俗冀為經乆之謀且援古事以申諷諭曰晉武平呉天下既定何曽語其子曰吾毎宴見未嘗聞經國逺圖此亦今日之憂也因言湯以七十里而有九有之師惟仁足以得天下之心夫豈以地之廣狹勢之强弱哉而書之言曰慄慄危懼若將隕于深淵惟湯畏天保民此所以天下歸之雖狹而廣雖弱而强也於是東南大旱而江湖為甚公慮所以振䘏之者如伸枉濫寛擊累禁科斂緩逋負免榖稅通糴船瘞殍者其論奏甚備而尤所拳拳者以常平之法名存實廢借兊之不撥還支移之不收納此所以坐視㓙荒而莫之捄也至推其本原則願詔大臣以燮理之事飭清躬以脩省之意論極剴切六年二月遷右司諫公言聽忠言於艱難之時易受直言於平定之後難況冦讐未殄願毋以目前暫無事而忽芻蕘之言又因對言明皇即位之初焚錦繡珠玉於殿前厲精政事以致開元之治及侈心一動窮天下之欲以致天寳之禍非初之難而終之難也陛下憂勤恭儉圖濟中興徃歲金翠之禁自内庭始天下風靡而近者庫藏供瑇瑁坑冶採青綠未必以為器玩設飾之用然恐下之人妄意好尚緣類而至願深戒明皇之失終始惟一以永無疆之休上為之改容嘉納六月臨安地震公言地震駐驆之所豈非天心仁愛著隂盛之戒邪女子小人外域盜賊皆隂類也女子小人則逺之外域盜賊則備之恐懼祗畏以應天心此先哲王所以中興也又言陛下纂承十年于兹頻歲豐稔僅足糧餉一有小歉民已流移蓋耕者寡食者衆軍政未立國用未節故也謂宜詔大臣參酌祖宗舊制與毎歲出納之數而均節之抑僥倖以靖衆志薄稅歛以寛民力為乆長之計上幸姑蘇軍屯淮上逆賊驕雛方肆陸梁而主帥有慢令不赴機㑹者公請奮周世宗我太祖之英㫁以勵其餘又言今所與共濟艱難復大業者二三大臣耳或出而總戎或處而秉軸交修政事之間進退人才之際謀慮有不相及則初意未必盡同茍無私心惟其當而已蓄疑敗謀理必不可願戒大臣俾同心同德絶猜間之萌恊濟國事公以大臣不和為憂比終歲再三言之至謂執政間有於敵兵南向之時倡為抽軍退保之計上則幾誤國事下則離間宰臣言尤至切又言軍興以來多為一切之制今盜賊粗定上下内外宜守成憲而舊弊之未革者如官資之轉行過犯之改正差遣之審量皆用特㫖廢定法逺方監司守臣措置自肆姦贓抵罪鞫治既白或不行法止從輕比若此類紀綱不立法令不信雖宵旰焦勞未見可以為治也張俊營第建康廣袤占民居公請密敕俊自還之内侍李琮童貫壻也恩㫖復許其仕公言梓宫未返天下痛憤忍令童貫壻再仕乎所言多採用兵部尚書吕祉護諸將於淮上公請於都督府屬官中選知兵者助之謀議且留軍中撫循訓練通將士之情未幾酈瓊叛祉死之先忠獻公時為宰相臺諫議以擇帥不善為責公曰司言責者獨不任其咎乎且以是進退大臣非知大體者也既而章交上公獨論劉光世屯淮西士卒數萬惟王德一軍忠勇敢戰餘皆驕惰自肆不可用也一旦以德踵光世之後酈瓊等憚其威嚴訴於朝既為之改命而召瓊等赴行在乃懐疑貳相率北去則潜為此謀有日矣張某引咎求罷方防秋之際二大將又入奏而朝無宰相無乃未可乎章再上不報求補外復以直秘閣知温州先是日食之變詔求直言臺臣有語公者曰上任我輩言路而外求直言建此議者必懐姦公曰日食求直言故事也豈以臺諫而廢及是又諷公曩趙丞相之去我二人不擊故不遷今臺諫媒孽右相勢已搖吾與君遂言之則同升矣公正色拒之至是反劾公觀望欲為後圖公聞之笑曰吾老矣不願目前之利乃為後圖不亦左乎坐落職奉祠公在言路知無不言毎謂人才實難多事之際尤宜為朝廷愛惜以故不専彈擊而惟論安危利害大計與所以啟悟君心者上嘗稱公中正不阿得諫臣體它日言事者有不稱上曰王某論事可思即復直秘閣知常州淮上戍軍經從有攘民羊及誣民為盜縛之去公追得民與羊於舟中獨不得軍士姓名貽書誚主帥卒以三輩狥河上聞者服焉㑹有故從官歸自敵中蓋嘗仕敵國據吾京邑而為之守者過郡公惡之不為禮力求見公面詰媿之而宰相秦檜與之親厚歸而泣訴檜怒十一年春以公主管台州崇道觀州人惜公去以為循良之政前人莫及也州舊有河貫子城達于倉後或堙塞公請于朝開深以便輸至今頼之退歸幾二十載恬然自樂也積官左朝奉大夫既告老以郊恩賜三品服二十九年六月己酉與親戚笑語如常時語其家人曰心中無一事時至可行矣夜分而逝享年八十七九月甲申葬于縣之分水鄉茅山之原公天資忠厚事親從兄誠意篤密子孫侍側燕居笑談必寓以訓敕治縣八年囚無瘐死者去官人思之不忘雅不喜求請及公之存子孫悉從吏部選無詣堂者其行義尤為文定胡公翰林學士朱公所知皆嘗論薦於朝劉清之曰嘗得公遺書所謂霜臺諫垣藁者合九巻讀之累日深惟既徃之是非易定而當時之毁譽難公也觀前輩奏篇至毁譽之際雖元祐忠賢猶惜其是非之未定焉而公書手跡具存繫以時日皆可依據至所尊信必天下鉅人所排黜必其自絶於善人之類者非唯當時迨今實然而後知公之所言蓋有見于中非茍然也配詹氏贈左光祿大夫良臣之女贈碩人後公一年卒子男二人日休右承議郎權發遣筠州軍州事日勤左朝散郎權發遣處州軍州事女四人長適右迪功郎邵希仲次適左朝散大夫翟􅎮次夭次適右迪功郎詹煥孫男四人瑑右從政郎玼珙皆右迪功郎珌未仕孫女六人曽孫男女十一人銘曰士或逺實浮華是滋凡厥言行曷據曷依觀公平生惟實之務陳言諫省質直靡嫮有所毁譽皆心所安乆而益信是則為難其在郡邑悃愊平夷惟其有常去輒愈思其在閨閫孝友融怡豈惟其家鄉黨是儀子陵之山千古蒼蒼清芬不磨惟公之藏南軒集巻三十八
